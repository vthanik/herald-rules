id: HRL-SD-0308
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Dictionary-Derived Term (--DECOD) should be populated when Preferred
  Term Code (--PTCD) is populated.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: --PTCD
      operator: non_empty
    - name: '%Domain%DECOD'
      operator: non_empty
outcome:
  message: Missing value for %Domain%DECOD, when %Domain%PTCD is populated
  severity: Error
provenance:
  p21_id: SD1289
  core_id: ~
  cg_ids:
    - CG0050
  fda_ids: []
  source_doc: SDTM-IG v3.3

