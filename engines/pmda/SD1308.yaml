id: SD1308
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: When test product is added to existing treatment (TSPARMCD = 'ADDON'
  and TSVAL = 'Y'), the Current Therapy or Treatment parameter should be provided
  with Parameter Value populated (TSVAL should not be null when TSPARMCD = 'CURTRT').
scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include: TS
check:
  all:
    - name: TSPARMCD
      operator: equal_to
      value: CURTRT
    - name: $ADDON_Y
      operator: greater_than_or_equal_to
      value: 1
    - name: TSVAL
      operator: empty
outcome:
  message: TSVAL is missing for the CURTRT Trial Summary Parameter when ADDON parameter
    equals 'Y'
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1308
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000532

