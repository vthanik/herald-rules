id: DD0111
version: 1
status: Reference
standard: Define-XML
category: Define-XML
sensitivity: Record
executability: Partially Executable
description: For Define-XML v2.0, the Pages field must be empty when Origin Type is
  not 'CRF'. For Define-XML v2.1, the Pages field is required when Origin Type is
  'Collected' and Source is 'Investigator' or 'Subject'. Define-XML specification
  represents Pages as def:PDFPageRef elements within def:DocumentRef element.
scope:
