id: HRL-SD-0465
version: 1
status: Published
standard: SDTM
category: Format
sensitivity: Record
executability: Fully Executable
description: The value of Actual Arm Code (ACTARMCD) should be no more than 20 characters
  in length.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
