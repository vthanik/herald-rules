id: SD1060
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: The value of Visit Number (VISITNUM) variable should be unique for each
  record within a subject.
scope:
  Classes:
    Include: ALL
  Domains:
    Include: SV
  Use_Case: INDH
check:
  all:
    - name: VISITNUM
      operator: is_contained_by
      value: $tv_visitnum
    - name: VISITNUM
      operator: is_not_unique_set
      value: USUBJID
outcome:
  message: Duplicate VISITNUM
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1060
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000204

