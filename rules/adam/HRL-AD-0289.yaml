id: HRL-AD-0289
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Within a Study and a Parameter, all CHGCATy  (Change from Baseline Category
  y) variable values must be the same for each unique value of CHGCATyN (Change from
  Baseline Category y (N)), when variable CHGCATyN is populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: CHGCATVARIABLEN
      operator: non_empty
    - name: '%Variables[CHGCAT#]%'
      operator: all_values_equal
      group_by: STUDYID,PARAMCD,CHGCAT%Variable.1%N
outcome:
  message: Inconsistent value for CHGCAT%Variable.1%
  severity: Error
provenance:
  p21_id: AD0331
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

