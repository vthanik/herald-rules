Check:
  all:
    - name: --STTPT
      operator: is_complete_date
    - name: --DTC
      operator: exists
    - name: --STTPT
      operator: date_less_than
      value: --DTC
    - name: --STRTPT
      operator: is_not_contained_by
      value:
        - BEFORE
        - COINCIDENT
        - AFTER
        - UNKNOWN
Core:
  Id: CORE-000710
  Status: Published
  Version: '1'
Description: Trigger error when --STRTPT is not in ('BEFORE', 'COINCIDENT', 'AFTER',
  'UNKNOWN') and --STTPT is prior to the date of collection or assessment.
Executability: Partially Executable
Outcome:
  Message: --STRTPT is not in ('BEFORE', 'COINCIDENT', 'AFTER', 'UNKNOWN')
  Output_Variables:
    - --STTPT
    - --STRTPT
    - --DTC
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ALL
  Use_Case: INDH, PROD
Sensitivity: Record
herald:
  source: CDISC Library API
