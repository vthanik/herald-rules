id: HRL-SD-0205
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: All values of Planned Elapsed Time (--ELTM) variable should be the same
  for a given value of Planned Time Point Name (--TPT) variable, Time Point Reference
  (--TPTREF) and/or Visit Number (VISITNUM)
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: --ELTM
      operator: non_empty
    - name: '%Domain%ELTM'
      operator: all_values_equal
      group_by: '%Domain%TPT,%Domain%TPTREF,VISITNUM'
outcome:
  message: Inconsistent value for  %Domain%ELTM within %Domain%TPT, %Domain%TPTREF
    and/or VISITNUM
  severity: Error
provenance:
  p21_id: SD1125
  core_id: ~
  cg_ids:
    - CG0241
  fda_ids: []
  source_doc: SDTM-IG v3.3

