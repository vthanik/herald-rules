Check:
  all:
    - name: variable_name
      operator: is_not_contained_by
      value: $allowed_variables
Core:
  Id: CORE-000550
  Status: Published
  Version: '1'
Description: Raise an error when a variable is not an allowed variable for an Observation
  Class
Executability: Partially Executable - Possible Underreporting
Operations:
  - id: $allowed_variables
    operator: get_model_column_order
Outcome:
  Message: Variables not listed in the Model List of Allowed Variables for Observation
    Class should be in SUPPQUAL.
Rule_Type: Variable Metadata Check
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ALL
  Use_Case: INDH, PROD
Sensitivity: Record
