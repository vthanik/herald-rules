id: HRL-AD-0115
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: If any of CHG (change) , PCHG (percent change) or R2BASE (ratio of Analysis
  Value to Base) is populated, the values necessary for its calculation must both
  be present and populated.    CHG       = AVAL - BASE, PCHG    = (AVAL - BASE)/BASE
  * 100, R2BASE = AVAL / BASE.  Once this issue is resolved, there is greater potential
  for rules AD0132,AD0225,AD0223 to fire.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: AVAL
      operator: non_empty
    - name: BASE
      operator: non_empty
    - name: CHG
      operator: non_empty
    - name: PCHG
      operator: non_empty
    - name: R2BASE
      operator: non_empty
outcome:
  message: 'Calculation issue: CHG, PCHG or R2BASE is populated but AVAL and/or BASE
    are not present and populated'
  severity: Error
provenance:
  p21_id: AD0132B
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

