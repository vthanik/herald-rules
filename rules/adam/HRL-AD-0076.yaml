id: HRL-AD-0076
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Any variable ending in SDY (Start day) must have a value less than or
  equal to its corresponding EDY (end day) value.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: VARIABLESDY
      operator: less_than
      value: eq  %Variable.1%EDY
    - name: '%Variables[*SDY]%'
      operator: non_empty
    - name: VARIABLEEDY
      operator: non_empty
outcome:
  message: '%Variable.1%SDY is greater than %Variable.1%EDY'
  severity: Error
provenance:
  p21_id: AD0098
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

