id: SD1099
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Category (--CAT) variable should be included into dataset when Subcategory
  (--SCAT) variable is present.
scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include: TI
  Use_Case: INDH
check:
  all:
    - name: IESCAT
      operator: exists
    - name: IECAT
      operator: not_exists
outcome:
  message: Missing --CAT variable when --SCAT variable is present
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1099
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000786

