id: HRL-SD-0476
version: 1
status: Published
standard: SDTM
category: Terminology
sensitivity: Record
executability: Partially Executable
description: Case for High Level Term (--HLT) variable must be sentence case using
  a High Level Term of the MedDRA dictionary of a version specified in the define.xml
  (Case-sensitive).
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: '%Variables[--HLT]%'
      operator: non_empty
outcome:
  message: Value for %Domain%HLT is in incorrect case
  severity: Error
provenance:
  p21_id: SD2010C
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB017
  source_doc: SDTM-IG v3.3

