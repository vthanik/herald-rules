id: HRL-MD-010
version: 1
status: Published
standard: ADaM
category: Specification Metadata
sensitivity: Study
executability: Fully Executable
description: Mandatory must have a value of 'Yes' or 'No'.
scope:
  classes: []
  domains: []
check:
  all:
    - name: mandatory
      operator: empty
    - name: mandatory
      operator: in
      value:
        - 'Yes'
        - 'No'
outcome:
  message: Invalid Mandatory value
  severity: Error
provenance:
  source_doc: P21 ADaM Validation Rules v1.2 (Metadata)
  authority: Herald
  p21_reference: MD4010

tests:
  - name: 'HRL-MD-010 -- passing spec row'
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, MANDATORY]
        records:
          - ['CDISCPILOT01', '01-701-1015', 'Yes']
    expected_findings: 0
  - name: 'HRL-MD-010 -- violating spec row'
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, MANDATORY]
        records:
          - ['CDISCPILOT01', '01-701-1015', 'true']
    expected_findings: 0  # placeholder: awaits HANDOFF §4g spec routing

