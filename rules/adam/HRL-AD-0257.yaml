id: HRL-AD-0257
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Across studies, All AERELN must be the same for each unique value of
  AEREL, when both variables are populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: AEREL
      operator: non_empty
    - name: AERELN
      operator: non_empty
    - name: AERELN
      operator: all_values_equal
      group_by: AEREL
outcome:
  message: Inconsistent value for AERELN
  severity: Error
provenance:
  p21_id: AD0288B
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

