id: HRL-SD-0097
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Description of Unplanned Element (SEUPDES) should be populated, when
  subject's experience for a particular period of time is represented as an unplanned
  Element, where Element Code (ETCD) is equal to 'UNPLAN'.
scope:
  classes:
    - SPECIAL-PURPOSE
  domains:
    - SE
check:
  all:
    - name: SEUPDES
      operator: non_empty
    - name: ETCD
      operator: equal_to
      value: UNPLAN
outcome:
  message: Missing value for SEUPDES, when ETCD='UNPLAN'
  severity: Error
provenance:
  p21_id: SD0092
  core_id: ~
  cg_ids:
    - CG0211
  fda_ids: []
  source_doc: SDTM-IG v3.3

