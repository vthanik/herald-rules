id: HRL-AD-0061
version: 1
status: Published
standard: ADaM
category: Presence
sensitivity: Record
executability: Partially Executable
description: If Planned Treatment for Period xx (TRTxxP) is present, Last Treatment
  date for period xx (TRxxEDT) must be present if there is more than one treatment
  period.   When there is only 1 treatment period 01, TRTEDT is sufficient.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: VARIABLE
      operator: variable_exists
      value: TR%Variable.1%EDT
outcome:
  message: TRTxxP is present but TRxxEDT is not present for periods greater than 01
  severity: Error
provenance:
  p21_id: AD0079
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

