id: HRL-DD-016
version: 1
status: Published
standard: Define-XML
category: Method Completeness
sensitivity: Variable
executability: Fully Executable
description: >
  Variables with Origin Type = 'Derived' must have a corresponding MethodRef
  pointing to a MethodDef that documents the derivation logic. A derived
  variable without a method is not reproducible from metadata alone.
scope:
  classes: []
  domains: []
check:
  all:
    - name: __origin_type__
      operator: equal_to
      value: Derived
    - name: __method_ref__
      operator: empty
outcome:
  message: Variable has Origin='Derived' but no MethodRef (derivation undocumented)
  severity: Error
provenance:
  source_doc: StudySAS Blog — Define.xml Review Checklist (2026-03)
  authority: Herald
  reference_url: https://studysas.blogspot.com/2026/03/a-definexml-review-checklist-i-actually.html

tests:
  - name: "Derived variable with MethodRef present"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "Derived variable without MethodRef"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1
