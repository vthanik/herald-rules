id: HRL-AD-0273
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Across studies, All SMQzzSC must be the same for each unique value of
  SMQzzSCN when primary variable SMQzzSC is populated.  The usual mapping is BROAD=1,NARROW=2.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: SMQVARIABLESC
      operator: non_empty
    - name: '%Variables[SMQ##SC]%'
      operator: all_values_equal
      group_by: SMQ%Variable.1%SCN
outcome:
  message: Inconsistent value for SMQ%Variable.1%SC
  severity: Error
provenance:
  p21_id: AD0310
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.0

