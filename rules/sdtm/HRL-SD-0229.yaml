id: HRL-SD-0229
version: 1
status: Published
standard: SDTM
category: Limit
sensitivity: Record
executability: Partially Executable
description: Start Date/Time (--STDTC) variable value must be less than or equal to
  Date/Time of End of Participation (RFPENDTC).
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: SUB:RFPENDTC
      operator: greater_than
      value: eq %Domain%STDTC
    - name: SUB:RFPENDTC
      operator: non_empty
    - name: --STDTC
      operator: non_empty
outcome:
  message: '%Domain%STDTC date is after RFPENDTC'
  severity: Error
provenance:
  p21_id: SD1202
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB034
  source_doc: SDTM-IG v3.3

