id: HRL-SD-0057
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Completion Status (--STAT) should be set to 'NOT DONE', when Reason Not
  Done (--REASND) is populated.
scope:
  classes:
    - FINDINGS
  domains:
    - RE
check:
  all:
    - name: --REASND
      operator: non_empty
    - name: '%Domain%STAT'
      operator: non_empty
outcome:
  message: Missing value for %Domain%STAT, when %Domain%REASND is provided
  severity: Error
provenance:
  p21_id: SD0023
  core_id: ~
  cg_ids:
    - CG0094
  fda_ids: []
  source_doc: SDTM-IG v3.3

