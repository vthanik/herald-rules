id: AD0078
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: If Planned Treatment for Period xx (TRTxxP) is present, First Treatment
  date for period xx (TRxxSDT) must be present if there is more than one Treatment
  Period. When there is only 1 Treatment Period 01, TRTSDT is sufficient.
scope:
  classes: []
  domains:
    - ADSL
    - ADDL
check:
  all:
    - name: __variable__
      operator: in_range
outcome:
  message: TRTxxP is present, but TRxxSDT is not present for periods greater than
    01
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0078
  pmda_category: Warning
  ig_versions: []

