Check:
  all:
    - name: --STRESC
      operator: non_empty
    - name: --STRESC
      operator: matches_regex
      value: ^-?(0|[1-9]\d*)(\.\d+)?$
    - name: --STRESN
      operator: empty
Core:
  Id: CORE-000863
  Status: Published
  Version: '1'
Description: When --STRESC is populated with a numeric value, --STRESN should be populated.
Executability: Fully Executable
Outcome:
  Message: --STRESC is populated with a numeric value, but --STRESN is not populated.
  Output_Variables:
    - --STRESC
    - --STRESN
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - FINDINGS
  Domains:
    Include:
      - ALL
Sensitivity: Record
