Core:
  Id: FDAV-SD1309
  Status: Reference
  Version: '1'
Description: When the study type is interventional (TSPARMCD = 'STYPE' and TSVAL =
  'INTERVENTIONAL'), the Investigational Therapy or Treatment parameter should be
  provided with Parameter Value populated (TSVAL should not be null when TSPARMCD
  = 'TRT').
Check:
  all:
    - name: TSPARMCD
      operator: equal_to
      value: TRT
    - name: $STYPE_INTERVENTIONAL
      operator: greater_than_or_equal_to
      value: 1
    - name: TSVAL
      operator: empty
Outcome:
  Message: TSVAL is missing for the TRT Trial Summary Parameter, when STYPE parameter
    equals 'INTERVENTIONAL'
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: TS
Standard: SDTM
Publisher ID: CG0276
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
CORE Reference: CORE-000468
Executability: Fully Executable
Scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include: TS

