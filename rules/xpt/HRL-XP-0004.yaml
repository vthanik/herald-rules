id: HRL-XP-0004
version: 1
status: Published
standard: XPT
category: Structure
sensitivity: Dataset
executability: Fully Executable

description: >
  Variable label must not exceed 40 characters. The SAS V5 transport format limits variable labels to 40 characters.

scope:
  classes:
    []
  domains:
    []

check:
  all:
    - name: variable_label
      operator: shorter_than
      value: 41

outcome:
  message: "Variable label for '{variable_name}' exceeds 40 characters in dataset '{dataset_name}'"
  severity: Error

provenance:
  p21_id: XP0004
  core_id: null
  cg_ids:
    - CG0404
  fda_ids:
    - FDA-XPT-004
  source_doc: "SAS V5 Transport Format Specification"
