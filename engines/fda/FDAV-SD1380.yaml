Core:
  Id: FDAV-SD1380
  Status: Reference
  Version: '1'
Description: 'At least one of the following subject identifier variables must be populated
  for each record: Unique Subject Identifier (USUBJID), Associated Persons Identifier
  (APID), Sponsor Device Identifier (SPDEVID), or Pool Identifier (POOLID).'
Check:
  any:
    - all:
        - name: DOMAIN
          operator: prefix_matches_regex
          prefix: 2
          value: (AP|ap)
        - name: APID
          operator: not_exists
    - all:
        - name: DOMAIN
          operator: not_prefix_matches_regex
          prefix: 2
          value: (AP|ap)
        - name: STUDYID
          operator: exists
        - name: --SEQ
          operator: exists
        - name: USUBJID
          operator: not_exists
        - name: SPDEVID
          operator: not_exists
        - name: POOLID
          operator: not_exists
        - name: SPTOBID
          operator: not_exists
        - name: STOCONID
          operator: not_exists
Outcome:
  Message: No subject identifier variables are populated
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: CO, SV, INTERVENTIONS, EVENTS, FINDINGS, FINDINGS ABOUT, RELSUB, SUPPQUAL
Standard: SDTM
Publisher ID: CG0554
IG Versions:
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
CORE Reference: CORE-000107
Executability: Fully Executable
Scope:
  Classes:
    Include:
      - EVENTS
      - INTERVENTIONS
      - FINDINGS ABOUT
      - FINDINGS
  Domains:
    Include: ALL
  Use_Case: INDH, PROD

