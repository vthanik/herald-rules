id: HRL-AD-0131
version: 1
status: Published
standard: ADaM
category: Format
sensitivity: Record
executability: Fully Executable
description: PARAMCD value must be a max of 8 characters, start with a letter A-Z
  or underscore, and not contain anything other than letters, numbers, underscore
  (_).
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: PARAMCD
      operator: matches_regex
      value: '[A-Za-z_][A-Za-z0-9_]{0,7}'
outcome:
  message: Illegal PARAMCD value
  severity: Error
provenance:
  p21_id: AD0143
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

