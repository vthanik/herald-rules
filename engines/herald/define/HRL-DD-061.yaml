# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 4.3.2
id: HRL-DD-061
version: 2
status: Published
standard: Define-XML
category: Origin Metadata
sensitivity: Record
executability: Fully Executable
description: >
  Predecessor field is required when Origin is 'Predecessor'.
scope:
  classes: []
  domains: []
check:
  all:
    - name: origin
      operator: not_equal_to
      value: Predecessor
    - name: predecessor
      operator: non_empty
outcome:
  message: "Predecessor variable reference is missing. When Origin is 'Predecessor', the predecessor dataset.variable must be specified."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "4.3.2"
  cited_guidance: >
    Predecessor -- An entry that is copied from a variable in another dataset. The Description child element identifies the dataset and variable.

tests:
  - name: "HRL-DD-061 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-061 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

