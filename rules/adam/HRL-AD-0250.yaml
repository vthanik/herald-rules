id: HRL-AD-0250
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Across studies, All ASEV must be the same for each unique value of ASEVN
  when primary variable ASEV is populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: ASEV
      operator: non_empty
    - name: ASEV
      operator: all_values_equal
      group_by: ASEVN
outcome:
  message: Inconsistent value for ASEV
  severity: Error
provenance:
  p21_id: AD0283
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.0

