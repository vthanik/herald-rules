Core:
  Id: FDAV-SD1137
  Status: Reference
  Version: '1'
Description: Character Result/Finding in Original Units (--ORRES) value should be
  NULL, when Derived Flag (--DRVFL) value is 'Y'.
Check:
  any:
    - all:
        - name: --STAT
          operator: empty
        - name: --DRVFL
          operator: not_equal_to
          value: 'Y'
          value_is_literal: yes
        - name: --ORRES
          operator: empty
    - all:
        - name: --STAT
          operator: empty
        - name: --DRVFL
          operator: not_exists
        - name: --ORRES
          operator: empty
    - all:
        - name: --STAT
          operator: not_exists
        - name: --DRVFL
          operator: not_equal_to
          value: 'Y'
          value_is_literal: yes
        - name: --ORRES
          operator: empty
Outcome:
  Message: Non-missing value for --ORRES, when --DRVFL='Y'
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: FINDINGS, FINDINGS ABOUT
Standard: SDTM
Publisher ID: CG0348
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
  - SENDIG-AR 1.0
CORE Reference: CORE-000200
Executability: Fully Executable
Scope:
  Classes:
    Include: FINDINGS
  Domains:
    Include: ALL
  Use_Case: INDH, PROD

