id: HRL-SD-0060
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: All values of Visit Name (VISIT) should be the same for a given value
  of Visit Number (VISITNUM).
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: VISIT
      operator: non_empty
    - name: VISIT
      operator: all_values_equal
      group_by: VISITNUM
outcome:
  message: Inconsistent value for VISIT within VISITNUM
  severity: Error
provenance:
  p21_id: SD0051
  core_id: ~
  cg_ids:
    - CG0035
  fda_ids: []
  source_doc: SDTM-IG v3.3

