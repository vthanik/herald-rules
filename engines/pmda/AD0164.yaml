id: AD0164
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: If Baseline Toxicity Grade (BTOXGR) variable is present, then Analysis
  Toxicity Grade (ATOXGR) and Baseline Record Flag (ABLFL) variables must be present.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
check:
  all:
    - name: ABLFL
      operator: equal_to
      value: 'Y'
    - name: BTOXGR
      operator: non_empty
    - name: ATOXGR
      operator: non_empty
    - name: BTOXGR
      operator: not_equal_to_variable
      value: ATOXGR
outcome:
  message: BTOXGR is present, but ABLFL is not present
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0164
  pmda_category: Error
  ig_versions: []

