id: SD1357
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Disease Milestone Instance Date/Time (MIDSDTC) variable should not be
  present in the domain when the Disease Milestone Instance Name (MIDS) variable is
  missing.
scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
check:
  all:
    - name: MIDSDTC
      operator: exists
    - name: MIDS
      operator: not_exists
outcome:
  message: MIDS variable is missing, when MIDSDTC variable is present
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1357
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000193

