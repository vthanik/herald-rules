Check:
  all:
    - name: RDOMAIN
      operator: exists
    - name: IDVAR
      operator: non_empty
    - name: IDVAR
      operator: is_not_contained_by
      value: $rdomain_variables
Core:
  Id: CORE-000916
  Status: Published
  Version: '1'
Description: Part B - Raise and error when IDVAR in RELREC is not populated with a
  valid variable from the dataset referenced in RDOMAIN.
Executability: Fully Executable
Match_Datasets:
  - Child: yes
    Keys:
      - USUBJID
      - IDVAR
      - IDVARVAL
    Name: RELREC
Operations:
  - domain: RELREC
    id: $rdomain_variables
    name: IDVAR
    operator: distinct
    value_is_reference: yes
Outcome:
  Message: Value for IDVAR in RELREC does not represent a variable present in the
    dataset referenced in RDOMAIN.
  Output_Variables:
    - IDVAR
Rule_Type: Record Data
Scope:
  Classes:
