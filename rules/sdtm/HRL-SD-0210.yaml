id: HRL-SD-0210
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: All values of Qualifier Variable Name (QNAM) should be the same for a
  given value of Qualifier Variable Label (QLABEL).
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: QNAM
      operator: non_empty
    - name: QNAM
      operator: all_values_equal
      group_by: QLABEL
outcome:
  message: Inconsistent value for QNAM within QLABEL
  severity: Error
provenance:
  p21_id: SD1130
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB009
  source_doc: SDTM-IG v3.3

