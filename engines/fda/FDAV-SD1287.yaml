Core:
  Id: FDAV-SD1287
  Status: Reference
  Version: '1'
Description: All values of Dictionary-Derived Term (--DECOD) should be the same for
  a given value of Preferred Term Code (--PTCD).
Check:
  all:
    - name: --DECOD
      operator: exists
    - name: --PTCD
      operator: exists
    - name: --PTCD
      operator: is_not_unique_relationship
      value: --DECOD
Outcome:
  Message: Inconsistent value for --DECOD within --PTCD
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: EVENTS
Standard: SDTM
Publisher ID: CG0049
IG Versions:
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
  - SENDIG-AR 1.0
CORE Reference: CORE-000268
Executability: Fully Executable
Scope:
  Classes:
    Include: EVENTS
  Domains:
    Include: ALL
  Use_Case: INDH

