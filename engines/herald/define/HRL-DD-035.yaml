# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 4.1.1
id: HRL-DD-035
version: 2
status: Published
standard: Define-XML
category: Standards Reference
sensitivity: Dataset
executability: Fully Executable
description: >
  Standard column must use a recognized standard name and version format.
scope:
  classes: []
  domains: []
check:
  all:
    - name: standard
      operator: empty
    - name: standard
      operator: matches_regex
      value: "^(SDTMIG|SDTMIG-MD|SDTMIG-AP|SDTMIG-PGx|SENDIG|SENDIG-DART|ADaMIG)\\s+\\d"  
outcome:
  message: "Standard does not match expected format '<Name> <Version>'. Must use allowable standard names (SDTMIG, ADaMIG, SENDIG, etc.)."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "4.1.1"
  cited_guidance: >
    Allowable Names: SDTMIG, SDTMIG-MD, SDTMIG-AP, SDTMIG-PGx, SENDIG, SENDIG-DART, ADaMIG.

tests:
  - name: "HRL-DD-035 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-035 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

