Core:
  Id: FDAV-SD1280
  Status: Reference
  Version: '1'
Description: Toxicity (--TOX) variable should not be present in the domain, when the
  Toxicity Grade (--TOXGR) variable is missing.
Check:
  all:
    - name: --TOXGR
      operator: not_exists
    - name: --TOX
      operator: exists
Outcome:
  Message: --TOX variable is present when --TOXGR variable is missing
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: EVENTS, FINDINGS, FINDINGS ABOUT
Standard: SDTM
Publisher ID: CG0084
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
  - SENDIG-AR 1.0
CORE Reference: CORE-000023
Executability: Fully Executable
Scope:
  Classes:
    Include:
      - EVENTS
      - FINDINGS
  Domains:
    Include: ALL
  Use_Case: INDH, PROD

