id: HRL-SD-0504
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Fully Executable
description: '''Trial Indication Type'' (TINDTP) record must be populated in Trial
  Summary (TS) domain, when study type is ''INTERVENTIONAL''. It is expected for SDTM
  IG v3.1.2 data and required for data in all more recent SDTM versions.'
scope:
  classes:
    - TRIAL DESIGN
  domains:
    - TI
check:
  all:
    - name: TSPARMCD
      operator: variable_exists
      value: TINDTP
outcome:
  message: Missing TINDTP Trial Summary Parameter
  severity: Error
provenance:
  p21_id: SD2212
  core_id: ~
  cg_ids:
    - CG0287
  fda_ids: []
  source_doc: SDTM-IG v3.3

