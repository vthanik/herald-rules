id: HRL-AD-0105
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Within a study, All PARCATy values must be the same for each unique value
  of PARCATyN when primary variable PARCATy is populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: PARCATVARIABLE
      operator: non_empty
    - name: '%Variables[PARCAT#]%'
      operator: all_values_equal
      group_by: STUDYID,PARCAT%Variable.1%N
outcome:
  message: Inconsistent value for PARCAT%Variable.1%
  severity: Error
provenance:
  p21_id: AD0125
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.0

