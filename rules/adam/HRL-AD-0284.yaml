id: HRL-AD-0284
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Within a Study and a Period, all ASPERC (Subperiod within Period (C))
  variable values must be the same for each unique value of ASPER (Subperiod within
  Period), when primary variable ASPER is populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: ASPER
      operator: non_empty
    - name: ASPERC
      operator: all_values_equal
      group_by: STUDYID,APERIOD,ASPER
outcome:
  message: Inconsistent value for ASPERC
  severity: Error
provenance:
  p21_id: AD0326
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

