id: HRL-SD-0278
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: DTHFL must equal 'Y' when there is a record in the Adverse Events (AE)
  domain with AEOUT = 'FATAL'.
scope:
  classes:
    - EVENTS
  domains:
    - AE
check:
  all:
    - name: USUBJID != '' @and (AEOUT
      operator: equal_to
      value: FATAL
    - name: AEOUT
      operator: equal_to
      value: ''''
outcome:
  message: Rule HRL-SD-0278 violation
  severity: Error
provenance:
  p21_id: SD1254
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: P21 rule SD1254

