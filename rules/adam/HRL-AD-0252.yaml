id: HRL-AD-0252
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Across studies, All ASEVN must be the same for each unique value of ASEV
  when primary variable ASEV is populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: ASEV
      operator: non_empty
    - name: ASEVN
      operator: all_values_equal
      group_by: ASEV
outcome:
  message: Inconsistent value for ASEVN
  severity: Error
provenance:
  p21_id: AD0284
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.0

