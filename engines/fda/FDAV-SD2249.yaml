Core:
  Id: FDAV-SD2249
  Status: Reference
  Version: '1'
Description: TSVAL variable value must be numeric, when TSPARMCD='ACTSUB'.
Check:
  all:
    - name: TSPARMCD
      operator: equal_to
      value: ACTSUB
    - name: TSVAL
      operator: not_matches_regex
      value: ^[1-9]\d*$
Outcome:
  Message: Invalid TSVAL value for ACTSUB
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: TS
Standard: SDTM
Publisher ID: CG0457
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
CORE Reference: CORE-000338
Executability: Fully Executable
Scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include: TS

