id: HRL-SD-0347
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: The Outcome of Adverse Event (AEOUT) variable is populated with the value
  RECOVERED/RESOLVED, however the End Date/Time of Adverse Event (AEENDTC) or Duration
  of Adverse Event (AEDUR) variables are null. If the adverse event has an outcome
  of RECOVERED/RESOLVED, it is expected that an end date or a collected duration be
  provided.
scope:
  classes:
    - EVENTS
  domains:
    - AE
check:
  all:
    - any:
        - name: AEENDTC
          operator: non_empty
        - name: AEDUR
          operator: non_empty
    - name: AEOUT
      operator: equal_to
      value: RECOVERED/RESOLVED
    - name: AEOUT
      operator: equal_to
      value: ''''
outcome:
  message: Rule HRL-SD-0347 violation
  severity: Error
provenance:
  p21_id: SD1333
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: P21 rule SD1333

