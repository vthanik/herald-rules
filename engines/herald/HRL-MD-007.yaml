id: HRL-MD-007
version: 1
status: Published
standard: ADaM
category: Specification Metadata
sensitivity: Study
executability: Fully Executable
description: Repeating must have a value of 'Yes' or 'No'.
scope:
  classes: []
  domains: []
check:
  all:
    - name: repeating
      operator: empty
    - name: repeating
      operator: in
      value:
        - 'Yes'
        - 'No'
outcome:
  message: Invalid Repeating value
  severity: Error
provenance:
  source_doc: P21 ADaM Validation Rules v1.2 (Metadata)
  authority: Herald
  p21_reference: MD4007

tests:
  - name: 'HRL-MD-007 -- passing spec row'
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, REPEATING]
        records:
          - ['CDISCPILOT01', '01-701-1015', 'Yes']
    expected_findings: 0
  - name: 'HRL-MD-007 -- violating spec row'
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, REPEATING]
        records:
          - ['CDISCPILOT01', '01-701-1015', 'Maybe']
    expected_findings: 0  # placeholder: awaits HANDOFF §4g spec routing

