Core:
  Id: CORE-000885
  Status: Published
  Version: '1'
Description: All subjects in the Demographics domain who are participating in a study
  that includes an interventional product must have at least one corresponding record
  in the Exposure domain, except for subjects who failed screening, were not fully
  assigned to an Arm, or did not receive study treatment.
Executability: Fully Executable
Match_Datasets:
  - Keys:
      - STUDYID
    Name: TS
Operations:
  - domain: EX
    id: $usubjids_in_ex
    name: USUBJID
    operator: distinct
Outcome:
  Message: A subject has a record in DM but not in EX while participating in an interventional
    study
  Output_Variables:
    - ARMNRS
    - TSVAL
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - SPECIAL PURPOSE
  Domains:
    Include:
      - DM
Sensitivity: Record
