id: HRL-SD-0073
version: 1
status: Published
standard: SDTM
category: Metadata
sensitivity: Dataset
executability: Partially Executable
description: Variable Label in the dataset should match the variable label described
  in SDTM IG. When creating a new domain Variable Labels could be adjusted as appropriate
  to properly convey the meaning in the context of the data being submitted.
scope:
  classes:
    - SPECIAL-PURPOSE
  domains:
    - SE
check:
  all:
    - name: VARIABLE
      operator: equal_to_variable
      value: '%Variables$Present$Core:Model Permissible|Not Recommend|Prohibited|SDTM
        Only|SEND Only%'
    - name: LABEL
      operator: in
      value: '%Variable.Label%'
outcome:
  message: SDTM/dataset variable label mismatch
  severity: Error
provenance:
  p21_id: SD0063A
  core_id: ~
  cg_ids:
    - CG0303
  fda_ids: []
  source_doc: SDTM-IG v3.3

