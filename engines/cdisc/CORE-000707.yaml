Check:
  all:
    - name: --DY
      operator: exists
    - name: --ENDY
      operator: exists
    - name: --DY
      operator: non_empty
    - name: --ENDY
      operator: non_empty
    - name: --DY
      operator: greater_than
      value: --ENDY
Core:
  Id: CORE-000707
  Status: Published
  Version: '1'
Description: Study Day of Visit/Collection/Exam (--DY) should be less than or equal
  to Study Day of End of Observation (--ENDY).
Executability: Fully Executable
Outcome:
  Message: --DY is greater than --ENDY.
  Output_Variables:
    - --DY
    - --ENDY
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - FINDINGS
  Domains:
    Include:
      - ALL
Sensitivity: Record
