id: HRL-AD-0002
version: 1
status: Published
standard: ADaM
category: Presence
sensitivity: Record
executability: Fully Executable

description: >
  USUBJID must not be empty in ADSL. The unique subject identifier is a required variable in the ADaM Subject-Level Analysis Dataset.

scope:
  classes:
    - ADSL
  domains:
    - ADSL

check:
  all:
    - name: USUBJID
      operator: non_empty

outcome:
  message: "USUBJID is empty or missing in ADSL"
  severity: Error

