id: AD0477
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: There should be only a single value of Strata from Verification Source
  (N) (STRATAVN) variable for a given value of Strata from Verification Source (STRATAV)
  variable, considering only those rows on which both variables are populated.
scope:
  classes: []
  domains:
    - ADSL
    - ADDL
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for STRATAVN
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0477
  pmda_category: Error
  ig_versions: []

