id: HRL-AD-0139
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Within a study and a given value of PARAMCD when both AVAL and AVALC
  are populated, then all AVAL values must be the same for each unique value of AVALC
  creating a one-to-one mapping.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: PARAMCD
      operator: non_empty
    - name: AVAL
      operator: non_empty
    - name: AVALC
      operator: non_empty
    - name: AVAL
      operator: all_values_equal
      group_by: STUDYID,PARAMCD,AVALC
outcome:
  message: Inconsistent value for AVAL
  severity: Error
provenance:
  p21_id: AD0150
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

