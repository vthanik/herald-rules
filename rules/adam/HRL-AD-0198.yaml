id: HRL-AD-0198
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Within a study, All TRTSEQPN values must be the same for each unique
  value of TRTSEQP when primary variable TRTSEQP is populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: TRTSEQP
      operator: non_empty
    - name: TRTSEQPN
      operator: all_values_equal
      group_by: STUDYID,TRTSEQP
outcome:
  message: Inconsistent value for TRTSEQPN
  severity: Error
provenance:
  p21_id: AD0228
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.0

