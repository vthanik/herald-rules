id: HRL-SD-0415
version: 1
status: Published
standard: SDTM
category: Limit
sensitivity: Record
executability: Fully Executable
description: Date/Time of First Challenge Agent Admin (RFCSTDTC) variable value must
  be less than or equal to Date/Time of Last Challenge Agent Admin (RFCENDTC).
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: RFCENDTC
      operator: greater_than
      value: eq RFCSTDTC
    - name: RFCENDTC
      operator: non_empty
    - name: RFCSTDTC
      operator: non_empty
outcome:
  message: RFCSTDTC date is after RFCENDTC
  severity: Error
provenance:
  p21_id: SD1403
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB034
  source_doc: SEND-IG-AR v1.0

