id: HRL-SD-0221
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Partially Executable
description: When a description of Other Medically Important Serious Adverse Events
  category is collected on a CRF, sponsors should place the description in the SUPPAE
  dataset using the standard supplemental qualifier name code AESOSP.
scope:
  classes:
    - EVENTS
  domains:
    - AE
check:
  all:
    - name: USUBJID
      operator: non_empty
    - name: AESMIE
      operator: equal_to
      value: 'Y'
outcome:
  message: No Details info for AESMIE Adverse Event in SUPPAE domain
  severity: Error
provenance:
  p21_id: SD1143
  core_id: ~
  cg_ids:
    - CG0043
  fda_ids: []
  source_doc: SDTM-IG v3.3

