id: HRL-AD-0099
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Within a study, All ATPTN values must be the same for each unique value
  group of [PARAMCD,ATPT] when PARAMCD and primary variable ATPT are populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: PARAMCD
      operator: non_empty
    - name: ATPT
      operator: non_empty
    - name: ATPTN
      operator: all_values_equal
      group_by: STUDYID,PARAMCD,ATPT
outcome:
  message: Inconsistent value for ATPTN
  severity: Error
provenance:
  p21_id: AD0118
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.0

