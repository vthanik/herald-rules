id: HRL-AD-0295
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: When MCRITyML (Multi-Response Criterion y Evaluation) variable value
  is populated, then its corresponding MCRITy (Analysis Multi-Response Criterion y)
  variable must be also populated
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: MCRITVARIABLE
      operator: non_empty
    - name: '%Variables[MCRIT#ML]%'
      operator: non_empty
outcome:
  message: MCRIT%Variable.1% is not populated, when MCRIT%Variable.1%ML is populated
  severity: Error
provenance:
  p21_id: AD0339
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

