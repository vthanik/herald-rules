id: HRL-SD-0262
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: There should be one record per device property defined by SPDEVID and
  DOTESTCD variables
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: SPDEVID
      operator: non_empty
    - name: DOTESTCD
      operator: is_unique
      group_by: SPDEVID
outcome:
  message: Duplicate records in Device Property
  severity: Error
provenance:
  p21_id: SD1237
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: P21 Community SDTM-IG 3.3 (FDA)

