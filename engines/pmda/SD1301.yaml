id: SD1301
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Offset from the Anchor (TDSTOFF) variable value must be either 0, ISO
  8601 format for duration (e.g., P80Y), or null.
scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include: TD
check:
  all:
    - name: TDSTOFF
      operator: not_equal_to
      value: 0
    - name: TDSTOFF
      operator: not_matches_regex
      value: ^P(?=\d+[YMWD])(\d+Y)?(\d+M)?(\d+W)?(\d+D)?(T(?=\d+[HMS])(\d+H)?(\d+M)?(\d+S)?)?$
outcome:
  message: Invalid value for TDSTOFF variable
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1301
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000779

