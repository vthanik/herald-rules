# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 4.3.2.1; 4.3.2.2
id: HRL-DD-056
version: 2
status: Published
standard: Define-XML
category: Origin Metadata
sensitivity: Record
executability: Fully Executable
description: >
  Source is required for SDTM and ADaM variables when Origin is populated
  and not equal to 'Predecessor'.
scope:
  classes: []
  domains: []
check:
  all:
    - name: origin
      operator: in
      value:
        - Predecessor
    - name: origin
      operator: empty
    - name: source
      operator: non_empty
outcome:
  message: "Source is missing. For SDTM and ADaM datasets, Source is required when Origin is not Predecessor."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "4.3.2.1; 4.3.2.2"
  cited_guidance: >
    Source is required for SDTM and ADaM datasets when Origin Type is not Predecessor.

tests:
  - name: "HRL-DD-056 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-056 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

