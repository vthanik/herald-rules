id: HRL-CT-0001
version: 1
status: Published
standard: SDTM
category: Terminology
sensitivity: Value
executability: Fully Executable

description: >
  SEX values must match CDISC Controlled Terminology. Values in the
  SEX variable must be from the C66731 codelist (F, M, U, UNDIFFERENTIATED).

scope:
  classes:
    - SPECIAL-PURPOSE
  domains:
    - DM

check:
  all:
    - name: SEX
      operator: codelist_terms
      ct_ref:
        codelist: C66731
        version: "2023-12-15"
        terms:
          - F
          - M
          - U
          - UNDIFFERENTIATED

outcome:
  message: "SEX value '{SEX}' does not match CDISC CT codelist C66731"
  severity: Error

provenance:
  p21_id: CT0001
  core_id: CORE-000259
  cg_ids:
    - CG0301
  fda_ids:
    - FDA-CT-001
  source_doc: "CDISC CT 2023-12-15, Codelist C66731"
