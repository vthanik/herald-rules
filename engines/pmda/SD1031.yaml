id: SD1031
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: End Relative to Reference Period (--ENRF) should not be populated for
  subjects with missing value for Reference End Date/Time (RFENDTC).
scope:
  Classes:
    Include: ALL
  Domains:
    Exclude: DM
  Use_Case: INDH
check:
  all:
    - name: RFENDTC
      operator: empty
    - name: --ENRF
      operator: non_empty
outcome:
  message: Value for --ENRF is populated when RFENDTC is null
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1031
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000177

