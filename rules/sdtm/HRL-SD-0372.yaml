id: HRL-SD-0372
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: When Planned Arm Code (ARMCD)/Description of Planned Arm (ARM) are not
  populated, the Reason Arm and/or Actual Arm is Null (ARMNRS) variable must be populated
  with the reason ARMCD/ARM are null.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: ARMNRS
      operator: non_empty
    - name: ARMCD
      operator: is_empty
    - name: ARM
      operator: is_empty
outcome:
  message: ARMNRS is not populated when ARMCD/ARM are not provided
  severity: Error
provenance:
  p21_id: SD1359
  core_id: ~
  cg_ids:
    - CG0517
    - CG0519
  fda_ids: []
  source_doc: SDTM-IG v3.3

