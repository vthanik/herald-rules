id: AD0233
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: Within a study, all Planned Pooled Trt y for Period xx (N) (TRxxPGyN)
  variable values must be the same for each unique value of Planned Pooled Treatment
  y for Period xx (TRxxPGy) variable when the primary variable TRxxPGy is populated.
  analogous rule for AD0236.
scope:
  classes: []
  domains:
    - ADSL
    - ADDL
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for TRxxPGyN
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0233
  pmda_category: Error
  ig_versions: []

