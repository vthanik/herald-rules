Core:
  Id: FDAV-SD1306
  Status: Reference
  Version: '1'
Description: When the study population is healthy subjects (TSPARMCD = 'HLTSUBJI'
  and TSVAL = 'Y'), the Diagnosis Group parameter should be provided with a null Parameter
  Value (TSVAL should be null when TSPARMCD = 'TDIGRP').
Check:
  all:
    - name: TSPARMCD
      operator: equal_to
      value: TDIGRP
    - name: $HLTSUBJI_Y
      operator: greater_than_or_equal_to
      value: 1
    - all:
        - name: TSVAL
          operator: not_equal_to
          value: HEALTHY SUBJECTS
          value_is_literal: yes
        - name: TSVAL
          operator: non_empty
Outcome:
  Message: The TDIGRP Trial Summary Parameter is not provided with TSVAL equal to
    null, when HLTSUBJI parameter equals 'Y'
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: TS
Standard: SDTM
Publisher ID: CG0272
IG Versions:
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
CORE Reference: CORE-000473
Executability: Fully Executable
Scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include: TS

