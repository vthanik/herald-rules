id: SD1278
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Parameter Value Code (TSVALCD) and Parameter Value (TSVAL) should have
  a one-to-one relationship.
scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include: TS
  Use_Case: INDH
check:
  all:
    - name: TSVAL
      operator: non_empty
    - name: TSVALCD
      operator: non_empty
    - name: TSVAL
      operator: is_not_unique_relationship
      value: TSVALCD
outcome:
  message: Inconsistent value for TSVALCD within TSVAL
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1278
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000152

