id: AD0353
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: If the record is flagged as the Analysis Baseline (ABLFL = Y), then the
  value of Baseline Analysis Range y Indicator (ByIND) variable must equal the value
  of Analysis Range y Indicator (AyIND) variable.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
check:
  all:
    - name: BNRIND
      operator: consistent_within_subject
outcome:
  message: B*IND != AyIND when ABLFL = Y
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0353
  pmda_category: Error
  ig_versions: []

