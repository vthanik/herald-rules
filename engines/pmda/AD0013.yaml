id: AD0013
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: A variable must be a max of 8 characters, start with a letter A-Z and
  does not contain anything other than letters, numbers, underscore (_).
scope:
  classes: []
  domains:
    - ADSL
    - ADDL
    - BDS
    - ADNCA
    - MDBDS
    - OCCDS
    - ADAE
    - MDOCCDS
    - ADAMOTHER
check:
  all:
    - name: STUDYID
      operator: matches_regex
      value: '^[A-Za-z][A-Za-z0-9_]{0,7}$'
outcome:
  message: 'Illegal variable name: basic format is violated'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0013
  pmda_category: Error
  ig_versions: []

