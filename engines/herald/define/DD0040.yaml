# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.11; 5.3.12
id: DD0040
version: 1
status: Published
standard: Define-XML
category: Cross-Reference
sensitivity: Record
executability: Fully Executable
description: >
  Dataset referenced in Variables sheet must exist in the Datasets sheet.
scope:
  classes: []
  domains: []
check:
  all:
    - name: dataset
      operator: not_empty
    - name: __dataset_exists_in_ds_spec
      operator: equal_to
      value: false
outcome:
  message: "Dataset referenced in Variables sheet does not exist in the Datasets sheet."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.11; 5.3.12"
  cited_guidance: >
    Each ItemOID used in an ItemRef must match an OID for an ItemDef. Variables are associated with datasets through ItemRefs contained in ItemGroupDef elements.
