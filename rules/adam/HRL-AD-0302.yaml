standard: ADaM
category: Presence
sensitivity: Record
executability: Partially Executable
description: If R2AyLO (Ratio to Analysis Range y Lower Limit) Flag variable is present,
  there must also be a corresponding AyLO (Analysis Range y Lower Limit) variable.
