id: SD1240
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: All subjects should have an Informed Consent record in the Disposition
  domain.
scope:
  Classes:
    Include: EVENTS
  Domains:
    Include: DS
  Use_Case: INDH
check:
  all:
    - name: DSTERM
      operator: contains
      value: INFORMED CONSENT
    - name: RFICDTC
      operator: date_not_equal_to
      value: $min_ds_dsstdtc
    - name: $min_ds_dsstdtc
      operator: equal_to
      value: DSSTDTC
outcome:
  message: No Informed Consent Obtained record in DS domain for subject
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1240
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000370

