Core:
  Id: FDAV-SD1366
  Status: Reference
  Version: '1'
Description: Subject Reference End Date/Time (RFENDTC) should be null for screen failures
  or unassigned subjects. Therefore, when the Reason Arm and/or Actual Arm is Null
  (ARMNRS) variable is populated, RFENDTC should be null.
Check:
  all:
    - name: ARMNRS
      operator: non_empty
    - name: RFENDTC
      operator: non_empty
Outcome:
  Message: RFENDTC is populated when ARMNRS is not null
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: DM
Standard: SDTM
Publisher ID: CG0530
IG Versions: SDTMIG 3.3
CORE Reference: CORE-000192
Executability: Fully Executable
Scope:
  Classes:
    Include: SPECIAL PURPOSE
  Domains:
    Include: DM
  Use_Case: INDH

