id: HRL-AD-0104
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Within a study, All PARCATy values must be the same for each unique value
  of PARAMCD when PARAMCD is populated.  A parameter can only be categorized once.  However
  that category can be used across PARAMs.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: PARAMCD
      operator: non_empty
    - name: '%Variables[PARCAT#]%'
      operator: all_values_equal
      group_by: STUDYID,PARAMCD
outcome:
  message: Inconsistent value for PARCAT%Variable.1% within a unique PARAMCD
  severity: Error
provenance:
  p21_id: AD0124
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

