id: SD1213
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Partially Executable
description: Subject Reference Start Date/Time (RFSTDTC) should be populated for all
  treated subjects, those where Actual Arm Code (ACTARMCD) is not equal to 'SCRNFAIL',
  'NOTASSGN', 'NOTTRT', or null.
scope:
  classes: []
  domains: DM
check:
  all:
    - name: __see_description__
      operator: manual_review
outcome:
  message: RFSTDTC is not provided for a treated subject
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1213
  pmda_category: Warning
  ig_versions: []

