id: AD0165
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: If the record is flagged as the baseline (ABLFL = Y), then the baseline
  toxicity grade (BTOXGR) value must equal the analysis toxicity grade (ATOXGR) value.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
check:
  all:
    - name: ABLFL
      operator: equal_to
      value: 'Y'
    - name: AVALC
      operator: non_empty
    - name: BASEC
      operator: non_empty
    - name: BASEC
      operator: not_equal_to_variable
      value: AVALC
outcome:
  message: ABLFL = Y, but BTOXGR != ATOXGR
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0165
  pmda_category: Error
  ig_versions: []

