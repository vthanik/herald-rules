id: AD0149
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: Within a study and a given value of PARAMCD when both AVAL and AVALC
  are populated, then all AVALC values must be the same for each unique value of AVAL
  creating a one-to-one mapping.
scope:
  classes: []
  domains: BDS
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for AVALC
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0149
  pmda_category: Warning
  ig_versions: []

