id: HRL-AD-0323
version: 1
status: Published
standard: ADaM
category: Presence
sensitivity: Record
executability: Partially Executable
description: If CHGCATyN is used in a dataset, CHGCATy must also be present in that
  dataset.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: VARIABLE
      operator: variable_exists
      value: CHGCAT%Variable.1%
outcome:
  message: CHGCATyN is present and CHGCATy is not present
  severity: Error
provenance:
  p21_id: AD0545
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

