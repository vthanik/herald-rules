id: HRL-SD-0038
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Fully Executable

description: >
  MHDECOD must not be empty in the MH domain. The dictionary-derived medical history term (MedDRA preferred term) is required for every MH record.

scope:
  classes:
    - EVENTS
  domains:
    - MH

check:
  all:
    - name: MHDECOD
      operator: non_empty

outcome:
  message: "MHDECOD is empty or missing in MH for subject '{USUBJID}'"
  severity: Error

provenance:
  p21_id: SD0038
  core_id: CORE-000289
  cg_ids:
    - CG0038
  fda_ids:
    []
  source_doc: "SDTM-IG v3.3 Section 6.2.3"
