id: SD1376
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Not Executable
description: Subject Reference End Date/Time (RFENDTC) should be populated for all
  treated subjects, those where Actual Arm Code (ACTARMCD) is not equal to 'SCRNFAIL',
  'NOTASSGN' or 'NOTTRT' (or null). If the study is ongoing, Parameter Value (TSVAL)
  for the 'ONGOSIND/Ongoing Study Indicator' parameter should be set to 'Y' in the
  Trial Summary (TS) domain.
