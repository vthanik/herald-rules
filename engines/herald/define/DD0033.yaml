# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 4.3.2.1; 4.3.2.2
id: DD0033
version: 1
status: Published
standard: Define-XML
category: Origin Metadata
sensitivity: Record
executability: Fully Executable
description: >
  Source is required for SDTM and ADaM variables when Origin is not Predecessor.
scope:
  classes: []
  domains: []
check:
  all:
    - name: origin
      operator: not_in
      value:
        - Predecessor
        - ""
    - name: origin
      operator: not_empty
    - name: source
      operator: empty
outcome:
  message: "Source is missing. For SDTM and ADaM datasets, Source is required when Origin is not Predecessor."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "4.3.2.1; 4.3.2.2"
  cited_guidance: >
    Source is required for SDTM and ADaM datasets when Origin Type is not Predecessor.
