Core:
  Id: FDAV-SD1019
  Status: Reference
  Version: '1'
Description: Planned Study Day of Visit (VISITDY) should equal NULL for unplanned
  visits, where Description of Unplanned Visit (SVUPDES) is populated.
Check:
  all:
    - name: SVUPDES
      operator: non_empty
    - name: VISITDY
      operator: non_empty
Outcome:
  Message: VISITDY is populated for unplanned visit
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: SV
Standard: SDTM
