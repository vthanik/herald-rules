id: HRL-AD-0003
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Dataset
executability: Fully Executable

description: >
  USUBJID must be unique in ADSL. Each subject should appear exactly once in the Subject-Level Analysis Dataset.

scope:
  classes:
    - ADSL
  domains:
    - ADSL

check:
  all:
    - name: USUBJID
      operator: is_unique

outcome:
  message: "USUBJID '{USUBJID}' is duplicated in ADSL"
  severity: Error

provenance:
  p21_id: AD0003
  core_id: null
  cg_ids:
    - CG0103
  fda_ids:
    - FDA-AD-003
  source_doc: "ADaM-IG v1.3 Section 3.1"
