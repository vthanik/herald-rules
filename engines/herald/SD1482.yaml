id: SD1482
version: 1
status: Published
standard: SDTM
category: Conformance
sensitivity: Record
executability: Fully Executable
description: >
  Reference record defined by Related Domain Abbreviation (RDOMAIN),
  Associated Person Identifier (APID), Identifying Variable (IDVAR), and
  Identifying Variable Value (IDVARVAL) must resolve to an actual record
  in the referenced domain. Otherwise the RELREC row is an orphan
  reference and cannot be verified against real data.
scope:
  classes: []
  domains: [RELREC]
check:
  all:
    - name: ""
      operator: referenced_record_exists
      value:
        rdomain_col: RDOMAIN
        idvar_col: IDVAR
        idvarval_col: IDVARVAL
outcome:
  message: Invalid referenced record (RDOMAIN + IDVAR + IDVARVAL unresolved)
  severity: Error
provenance:
  source_doc: Pinnacle 21 Community Validator v4.1.0
  authority: Herald-relay (pending FDA Validator v1.7 upstream source)
  p21_reference: SD1482

tests:
  - name: "RELREC references resolvable records -- passes"
    type: positive
    datasets:
      AE:
        variables: [STUDYID, USUBJID, AESEQ]
        records:
          - ["S1", "S1-001", 1]
          - ["S1", "S1-001", 2]
      RELREC:
        variables: [STUDYID, RDOMAIN, IDVAR, IDVARVAL]
        records:
          - ["S1", "AE", "AESEQ", "1"]
          - ["S1", "AE", "AESEQ", "2"]
    expected_findings: 0
  - name: "RELREC references unresolvable record -- flagged"
    type: negative
    datasets:
      AE:
        variables: [STUDYID, USUBJID, AESEQ]
        records:
          - ["S1", "S1-001", 1]
      RELREC:
        variables: [STUDYID, RDOMAIN, IDVAR, IDVARVAL]
        records:
          - ["S1", "AE", "AESEQ", "999"]
    expected_findings: 1
