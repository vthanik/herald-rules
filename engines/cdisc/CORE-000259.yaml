Check:
  all:
    - name: SSSTRESC
      operator: equal_to
      value: DEAD
      value_is_literal: yes
    - name: SSDTC
      operator: date_less_than
      value: DTHDTC
Core:
  Id: CORE-000259
  Status: Published
  Version: '1'
Description: Date/time of collection of subject status in SS dataset where survival
  status (SSSTRESC) = 'DEAD' should be equal to or after the Date/Time of Death (DTHDTC)
  in the DM dataset for the corresponding subject.
Executability: Fully Executable
Match_Datasets:
  - Keys:
      - USUBJID
    Name: DM
Outcome:
  Message: SSDTC in SS dataset where SSTRESC = 'DEAD' is not equal to or after the
    DTHDTC in the DM dataset.
  Output_Variables:
    - SSSTRESC
    - SSDTC
    - DTHDTC
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - FINDINGS
  Domains:
    Include:
      - SS
Sensitivity: Record
herald:
  source: CDISC Library API
  catalogs:
