id: HRL-SD-0127
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: A value for Description of Planned Arm (ARM) must have a unique value
  for Planned Arm Code (ARMCD) with the domain.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: ARMCD
      operator: non_empty
    - name: ARMCD
      operator: all_values_equal
      group_by: ARM
outcome:
  message: Inconsistent value for ARM
  severity: Error
provenance:
  p21_id: SD1033
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB009
  source_doc: SDTM-IG v3.3

