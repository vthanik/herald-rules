id: HRL-SD-0493
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Fully Executable
description: '''Added on to Existing Treatments'' (ADDON) record must be populated
  in Trial Summary (TS) domain. It is expected for SDTM IG v3.1.2 data and required
  for data in all more recent SDTM versions.'
scope:
  classes:
    - TRIAL DESIGN
  domains:
    - TS
check:
  all:
    - name: TSPARMCD
      operator: variable_exists
      value: ADDON
outcome:
  message: Missing ADDON Trial Summary Parameter
  severity: Error
provenance:
  p21_id: SD2201
  core_id: ~
  cg_ids:
    - CG0287
  fda_ids: []
  source_doc: SDTM-IG v3.3

