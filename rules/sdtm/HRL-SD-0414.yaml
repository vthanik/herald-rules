id: HRL-SD-0414
version: 1
status: Published
standard: SDTM
category: Limit
sensitivity: Record
executability: Fully Executable
description: End Date/Time of Agent (AGENDTC) variable value must be less than or
  equal to Date/Time of Last Challenge Agent Admin (RFCENDTC).
scope:
  classes:
    - INTERVENTIONS
  domains:
    - AG
check:
  all:
    - name: SUB:RFCENDTC
      operator: greater_than
      value: eq AGENDTC
    - name: SUB:RFCENDTC
      operator: non_empty
    - name: AGENDTC
      operator: non_empty
outcome:
  message: AGENDTC date is after RFCENDTC
  severity: Error
provenance:
  p21_id: SD1402
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: P21 Community SEND-IG-AR 1.0 (FDA)

