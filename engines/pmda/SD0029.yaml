id: SD0029
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Standard Units (--STRESU) should not be null when Character Result/Finding
  in Std Units (--STRESC) is provided as a numeric result.
scope:
  classes: []
  domains:
    - FINDINGS(-IE
    - -QS
    - -SC
    - -SS)
    - FINDINGSABOUT
check:
  all:
    - name: __domain_variable__
      operator: check_value
outcome:
  message: Missing value for --STRESU when --STRESC is provided
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0029
  pmda_category: Warning
  ig_versions: []

