id: HRL-SD-0375
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Description of Actual Arm (ACTARM) must be populated, when Actual Arm
  Code (ACTARMCD) is populated, and vice versa.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: ACTARMCD
      operator: is_empty
    - name: ACTARM
      operator: is_empty
    - name: ACTARMCD
      operator: is_empty
    - name: ACTARM
      operator: is_empty
outcome:
  message: ACTARM is populated, but ACTARMCD is null, or vice versa
  severity: Error
provenance:
  p21_id: SD1362
  core_id: ~
  cg_ids:
    - CG0522
  fda_ids: []
  source_doc: SDTM-IG v3.3

