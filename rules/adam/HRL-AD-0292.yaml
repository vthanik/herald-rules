id: HRL-AD-0292
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Within a Study and a Parameter, all PCHGCAyN (Percent Chg from Baseline
  Category y (N)) variable values must be the same for each unique value of PCHGCATy
  (Percent Chg from Baseline Category y), when primary variable PCHGCATy is populated
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: PCHGCATVARIABLE
      operator: non_empty
    - name: '%Variables[PCHGCA#N]%'
      operator: all_values_equal
      group_by: STUDYID,PARAMCD,PCHGCAT%Variable.1%
outcome:
  message: Inconsistent value for PCHGCA%Variable.1%N
  severity: Error
provenance:
  p21_id: AD0334
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

