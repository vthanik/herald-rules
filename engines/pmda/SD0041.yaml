id: SD0041
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Occurrence (--OCCUR) may only be populated when a given Intervention
  or Event has been pre-specified (--PRESP = 'Y').
scope:
  Classes:
    Include:
      - EVENTS
      - INTERVENTIONS
  Domains:
    Exclude:
      - AE
      - DS
      - DV
      - EX
  Use_Case: INDH
check:
  all:
    - name: --PRESP
      operator: equal_to
      value: 'Y'
    - name: --STAT
      operator: empty
    - name: --OCCUR
      operator: exists
    - name: --OCCUR
      operator: empty
outcome:
  message: Value for --OCCUR is populated for unsolicited Intervention or Event
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0041
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000018

