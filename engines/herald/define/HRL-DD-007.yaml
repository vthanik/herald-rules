id: HRL-DD-007
version: 1
status: Published
standard: Define-XML
category: Conformance
sensitivity: Study
executability: Reference
description: Paired variables such as TEST/TESTCD must be populated using terms with
  the same Term Code (C-Code) value.
scope:
  classes: []
  domains: []
outcome:
  message: Coded and Decoded values do not have the same C-Code
  severity: Error
provenance:
  source_doc: P21 ADaM Validation Rules v1.2 (Define-XML)
  authority: Herald
  p21_reference: DD0152

tests:
  - name: "HRL-DD-007 — nominal compliant record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-007 — nominal violating record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

notes: >
  Blocked on `paired_terms_same_c_code` operator (TEST/TESTCD pair codes must share NCI C-Code). See HANDOFF section 4g.

