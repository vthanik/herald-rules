id: SD1016
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: The combination of Inclusion/Exclusion Criterion Short Name (IETESTCD),
  Criterion (IETEST), and Category (IECAT) values should match entries in the Trial
  Inclusion/Exclusion Criteria (TI) dataset.
scope:
  Classes:
    Include: FINDINGS
  Domains:
    Include: IE
  Use_Case: INDH
check:
  all:
    - name: IETEST
      operator: is_not_contained_by
      value: $ti_ietest
outcome:
  message: IETESTCD/IETEST/IECAT values do not exist in TI domain
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1016
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000227

