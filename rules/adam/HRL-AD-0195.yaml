id: HRL-AD-0195
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: When baseline (BASE) equals 0, the Percent Change from Baseline (PCHG)
  should not be populated since you cannot divide by 0.  AD0225 checks the PCHG calculation
  is correct when BASE does not equal 0.  AD0132B also complements this rule.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: PCHG
      operator: is_empty
    - name: BASE
      operator: equal_to
      value: '0'
outcome:
  message: 'Calculation issue: BASE = 0 but PCHG is populated'
  severity: Error
provenance:
  p21_id: AD0225A
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

