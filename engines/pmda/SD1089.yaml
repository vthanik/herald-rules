id: SD1089
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Study Day of Start (--STDY) variable value should not be imputed. It
  may be only populated when both Start Study Date/Time (--STDTC) and Subject Reference
  Start Date/Time (RFSTDTC) variables values are provided, and both include complete
  date part.
scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
  Use_Case: INDH
check:
  any:
    - all:
        - name: --STDTC
          operator: is_incomplete_date
        - name: --STDY
          operator: non_empty
    - all:
        - name: RFSTDTC
          operator: is_incomplete_date
        - name: --STDY
          operator: non_empty
outcome:
  message: --STDY variable value is imputed
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1089
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000138

