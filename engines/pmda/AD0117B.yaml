id: AD0117B
version: 1
status: Reference
standard: ADaM
category: Conformance
sensitivity: Record
executability: Not Executable
description: Within a study, all ATPT values must be the same for each unique value
  group of [PARAMCD, ATPTN] when PARAMCD and primary variable ATPT are populated.
  Considering only those rows on which both variables are populated.
