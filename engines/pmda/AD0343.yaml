id: AD0343
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: Within a Study and a Parameter, all Analysis Normal Range Lower Limit
  (C) (ANRLOC) variable values must be the same for each unique value of Analysis
  Normal Range Lower Limit (ANRLO) variable when variable ANRLO is populated.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for ANRLOC
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0343
  pmda_category: Error
  ig_versions: []

