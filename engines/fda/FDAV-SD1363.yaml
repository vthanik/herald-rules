Core:
  Id: FDAV-SD1363
  Status: Reference
  Version: '1'
Description: Planned Arm Code (ARMCD) and Description of Planned Arm (ARM) must not
  be null for subjects who are not assigned to treatment. This includes Screen Failure
  subjects and Not Assigned subjects.
Check:
  all:
    - name: ARM
      operator: is_contained_by_case_insensitive
      value:
        - Screen Failure
        - Not Assigned
        - Not Treated
        - Unplanned Treatment
Outcome:
  Message: ARMCD/ARM is populated for a subject not assigned to treatment
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: DM
Standard: SDTM
Publisher ID: CG0523, CG0570
IG Versions: SDTMIG 3.3
CORE Reference: CORE-000115
Executability: Fully Executable
Scope:
  Classes:
    Include:
      - TRIAL DESIGN
      - SPECIAL PURPOSE
  Domains:
    Include:
      - DM
      - TA
      - TV

