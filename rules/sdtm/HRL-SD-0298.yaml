id: HRL-SD-0298
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Dose Description (ECDOSTXT) should be populated when Dose (ECDOSE) is
  null, ECOCCUR does not equal 'N', and ECSTAT does not equal 'NOT DONE'.
scope:
  classes:
    - INTERVENTIONS
  domains:
    - EC
check:
  all:
    - name: ECDOSTXT
      operator: non_empty
    - name: ECDOSE
      operator: is_empty
    - name: ECOCCUR
      operator: not_equal_to
      value: 'N'
    - name: ECSTAT
      operator: is_empty
outcome:
  message: ECDOSTXT is null when ECDOSE is null and ECOCCUR does not equal 'N'
  severity: Error
provenance:
  p21_id: SD1279
  core_id: ~
  cg_ids:
    - CG0462
  fda_ids: []
  source_doc: SDTM-IG v3.3

