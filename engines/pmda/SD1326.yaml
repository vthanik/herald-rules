id: SD1326
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Related Device Identifier (RDEVID) and Related Subject or Pool Identifier
  (RSUBJID) should not both be populated for the same record.
scope:
  Classes:
    Include: ALL
  Domains:
    Include: AP--
check:
  all:
    - name: RSUBJID
      operator: non_empty
    - name: RDEVID
      operator: non_empty
outcome:
  message: RDEVID is not null when RSUBJID is populated
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1326
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000233

