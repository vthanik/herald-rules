id: HRL-AD-0199
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Within a study, all TRTSEQPN values must be the same for each unique
  value of TRTSEQP, when both variables are populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: TRTSEQP
      operator: non_empty
    - name: TRTSEQPN
      operator: non_empty
    - name: TRTSEQPN
      operator: all_values_equal
      group_by: STUDYID,TRTSEQP
outcome:
  message: Inconsistent value for TRTSEQPN
  severity: Error
provenance:
  p21_id: AD0228B
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

