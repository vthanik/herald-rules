Core:
  Id: FDAV-SD1015
  Status: Reference
  Version: '1'
Description: Epoch (EPOCH) values should match entries in the Trial Arms (TA) dataset.
Check:
  all:
    - name: EPOCH
      operator: is_not_contained_by
      value: $ta_epoch
    - name: EPOCH
      operator: non_empty
Outcome:
  Message: Invalid EPOCH
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: SE, SM, SV, INTERVENTIONS, FINDINGS, FINDINGS ABOUT, EVENTS, STUDY REFERENCE
Standard: SDTM
Publisher ID: CG0009
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
CORE Reference: CORE-000271
Executability: Fully Executable
Scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
  Use_Case: INDH

