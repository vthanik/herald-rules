Check:
  all:
    - name: $dataset_variables
      operator: shares_no_elements_with
      value: $timing_variables
Core:
  Id: CORE-000575
  Status: Published
  Version: '1'
Description: There must be at least one timing variable for any of the domains based
  on the three general observation classes
Executability: Partially Executable - Possible Underreporting
Operations:
  - id: $dataset_variables
    operator: get_column_order_from_dataset
  - id: $timing_variables
    key_name: role
    key_value: Timing
    operator: get_model_filtered_variables
Outcome:
  Message: No timing variable is provided
  Output_Variables:
    - $dataset_variables
    - $timing_variables
Rule_Type: Variable Metadata Check
Scope:
  Classes:
    Include:
      - FINDINGS
      - INTERVENTIONS
      - EVENTS
  Domains:
    Exclude:
      - IE
      - SC
  Use_Case: NONCLIN, INDH
Sensitivity: Dataset
herald:
  source: CDISC Library API
  catalogs:
    - SDTMIG 3.2
    - SDTMIG 3.3
  fetched: '2026-04-03T12:15:16Z'

