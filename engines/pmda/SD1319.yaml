id: SD1319
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: All records in the Disposition (DS) and Protocol Deviations (DV) domains
  should have the Start Date/Time of Event (--STDTC) equal to or after a subject's
  Date/Time of Informed Consent (RFICDTC) in the Demographics (DM) domain.
scope:
  Classes:
    Include: EVENTS
  Domains:
    Include: DS
  Use_Case: INDH
check:
  all:
    - name: DSDECOD
      operator: present_on_multiple_rows_within
      within: USUBJID
    - name: DSDECOD
      operator: equal_to
      value: INFORMED CONSENT OBTAINED
    - name: $min_ds_dsstdtc
      operator: not_equal_to
      value: RFICDTC
    - name: $min_ds_dsstdtc
      operator: equal_to
      value: DSSTDTC
outcome:
  message: --STDTC is before RFICDTC
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1319
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000363

