id: HRL-DD-0001
version: 1
status: Published
standard: Define-XML
category: Presence
sensitivity: Dataset
executability: Fully Executable

description: >
  Dataset label must not be empty in Define-XML. Every ItemGroupDef element must have a non-empty Label attribute or def:Label element.

scope:
  classes:
    []
  domains:
    []

check:
  all:
    - name: dataset_label
      operator: non_empty

outcome:
  message: "Dataset '{dataset_name}' has an empty label in Define-XML"
  severity: Error

provenance:
  p21_id: DD0001
  core_id: null
  cg_ids:
    - CG0201
  fda_ids:
    - FDA-DEF-001
  source_doc: "Define-XML v2.1 Specification Section 4.1"
