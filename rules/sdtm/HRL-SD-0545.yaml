id: HRL-SD-0545
version: 1
status: Published
standard: SDTM
category: Terminology
sensitivity: Record
executability: Partially Executable
description: TSVALCD for COMPTRT record must be a valid unique ingredient identifier
  from FDA Substance Registration System (SRS).
scope:
  classes:
    - SPECIAL-PURPOSE
  domains:
    - CO
check:
  all:
    - name: TSPARMCD
      operator: equal_to
      value: COMPTRT
    - name: TSVAL
      operator: non_empty
outcome:
  message: Invalid TSVALCD value for COMPTRT
  severity: Error
provenance:
  p21_id: SD2254
  core_id: ~
  cg_ids:
    - CG0446
  fda_ids: []
  source_doc: SDTM-IG v3.3

