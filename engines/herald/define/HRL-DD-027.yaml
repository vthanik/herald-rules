# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.5
id: HRL-DD-027
version: 2
status: Published
standard: Define-XML
category: Study Metadata
sensitivity: Study
executability: Fully Executable
description: >
  DefineVersion must start with '2.1' to conform to Define-XML v2.1.
scope:
  classes: []
  domains: []
check:
  all:
    - name: DefineVersion
      operator: matches_regex
      value: "^2\\.1"  
outcome:
  message: "DefineVersion does not match '2.1.x'. Define-XML v2.1 requires def:DefineVersion starting with '2.1'."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.5"
  cited_guidance: >
    def:DefineVersion -- Required. '2.1.n'. Version of Define-XML to which the file conforms.

tests:
  - name: "HRL-DD-027 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-027 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

