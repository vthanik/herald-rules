id: HRL-SD-0164
version: 1
status: Published
standard: SDTM
category: Metadata
sensitivity: Dataset
executability: Partially Executable
description: Variables requested by the relevant regulatory agency in policy documents
  should be included in the dataset. E.g., EPOCH.
scope:
  classes:
    - FINDINGS
  domains:
    - DA
check:
  all:
    - name: VARIABLE
      operator: variable_exists
      value: '%Variables[EPOCH]%'
outcome:
  message: Regulatory Expected variable %Variable% not found
  severity: Error
provenance:
