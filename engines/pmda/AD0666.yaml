id: AD0666
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: If DOSPCTDF (Percent Diff. Nominal vs. Actual Dose) is populated, both
  DOSEP (Planned Treatment Dose) and DOSEA (Actual Treatment Dose) must be populated.
scope:
  classes: []
  domains: ADNCA
check:
  all:
    - name: DOSPCTDF
      operator: non_empty
    - name: ARRDOS
      operator: empty
    - name: NRDOS
      operator: empty
outcome:
  message: DOSPCTDF is populated and DOSEP and DOSEA are not populated
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0666
  pmda_category: Error
  ig_versions: []

