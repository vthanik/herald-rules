id: HRL-AD-0176
version: 1
status: Published
standard: ADaM
category: Presence
sensitivity: Record
executability: Partially Executable
description: 'Unlike SDTM, only some of ADaM Required variables (where Core attribute
  is ''Req'') must be populated. CDISC ADaM rules affirm that PARAM and PARAMCD must
  be populated, while others are populated as appropriate. Known Exceptions: TRTP,TRTxxP,AGE,AGEU,RACE,SUBJID,AESER.'
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: '%Variables[!TRTP;!TRT##P;!AGE;!AGEU;!RACE;!SUBJID;!AESER].Core:Required%'
      operator: non_empty
outcome:
  message: Required %Variable% value is null
  severity: Error
provenance:
  p21_id: AD0196
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

