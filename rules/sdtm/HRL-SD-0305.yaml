id: HRL-SD-0305
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: A value of Incl/Excl Criterion Short Name (IETESTCD) must be unique within
  a version of inclusion/exclusion criteria (TIVERS).
scope:
  classes:
    - FINDINGS
  domains:
    - IE
check:
  all:
    - name: IETESTCD
      operator: non_empty
    - name: VARIABLE
      operator: non_empty
    - name: IETESTCD
      operator: is_unique
      group_by: '%Variables[TIVERS]%'
outcome:
  message: IETESTCD is not unique within TIVERS
  severity: Error
provenance:
  p21_id: SD1286
  core_id: ~
  cg_ids:
    - CG0255
  fda_ids: []
  source_doc: SDTM-IG v3.3

