id: HRL-SD-0275
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Treatment Vehicle Amount Units (--VAMTU) value must be null when Treatment
  Vehicle Amount (--TRTV) value is null.
scope:
  classes:
    - FINDINGS
  domains:
    - TR
check:
  all:
    - name: --VAMTU
      operator: is_empty
    - name: --TRTV
      operator: is_empty
outcome:
  message: '%Domain%VAMTU is not null when %Domain%TRTV is null'
  severity: Error
provenance:
  p21_id: SD1251
  core_id: ~
  cg_ids:
    - CG0108
  fda_ids: []
  source_doc: SDTM-IG v3.3

