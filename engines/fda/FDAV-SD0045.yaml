  Status: Reference
  Version: '1'
Description: Character Result/Finding in Std Units (--STRESC) should be provided,
  when Result Category (--RESCAT) is specified.
Check:
  all:
    - name: --RESCAT
      operator: non_empty
    - name: --STRESC
      operator: empty
Outcome:
  Message: Missing value for --STRESC, when --RESCAT is populated
