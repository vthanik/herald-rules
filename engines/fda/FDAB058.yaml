Core:
  Id: FDAB058
  Status: Reference
Description: The term "Spanish origin" can be used to collect ethnicity data. If the
  term "Spanish origin" is collected, it should be mapped to the controlled terminology
  "HISPANIC OR LATINO" for submission.
