            Origin: SDTM and SDTMIG Conformance Rules
            Rule_Identifier:
              Id: CG0075
              Version: '1'
            Version: '2.0'
        Version: '3.3'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited_Guidance: The intent of the domain is to capture protocol violations
                  and deviations during the course of the study and will store only
                  those criteria violation by or deviated from by the subject and
                  not a response to each violation or deviation.
                Document: IG v3.2
                Item: ''
                Section: '6.2'
            Origin: SDTM and SDTMIG Conformance Rules
            Rule_Identifier:
              Id: CG0075
              Version: '1'
            Version: '2.0'
        Version: '3.2'
      - Name: TIG
        References:
          - Citations:
              - Cited_Guidance: 1. The DV domain is an Events model for collected
                  protocol deviations and not for derived protocol deviations that
                  are more likely to be part of analysis. Events typically include
                  what the event was, captured in --TERM (the topic variable), and
                  when it happened (captured in its start and/or end dates). The intent
                  of the domain model is to capture protocol deviations that occurred
                  during the course of the study (see ICH E3, Section 10.2[1]).
                Document: TIG 1.0
                Item: Assumption 1
                Section: 2.8.10.19
            Origin: TIG Conformance Rules
