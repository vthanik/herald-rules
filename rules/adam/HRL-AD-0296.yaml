id: HRL-AD-0296
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Within a Study and a Parameter, all MCRITyML (Multi-Response Criterion
  y Evaluation) variable values must be the same for each unique value of MCRITyMN
  (Multi-Response Criterion y Eval (N)), when variable MCRITyMN is populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: MCRITVARIABLEMN
      operator: non_empty
    - name: '%Variables[MCRIT#ML]%'
      operator: all_values_equal
      group_by: STUDYID,PARAMCD,MCRIT%Variable.1%MN
outcome:
  message: Inconsistent value for MCRIT%Variable.1%ML
  severity: Error
provenance:
  p21_id: AD0340
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

