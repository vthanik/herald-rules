id: HRL-AD-0147
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: If AWTDIFF (Analysis Window Diff from Target) is populated AWTARGET (Analysis
  Window Target) must be populated.  AWTDIFF = Absolute value of (ADY or ARELTM) -
  AWTARGET.  A future rule should validate the calculation is correct.  rule enhanced
  by OpenCDISC to include ADY and ARELTM.   If only AWTDIFF is present and populated,
  this rule will fire even if some or all other variables are not present.  This may
  fire simultaneously with AD0158.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - any:
        - name: ARELTM
          operator: not_equal_to
          value: ''''')'
    - name: AWTDIFF
      operator: non_empty
outcome:
  message: 'Calculation issue: AWTDIFF is populated but AWTARGET and/or one of [ADY,ARELTM]
    are not both present and populated'
  severity: Error
provenance:
  p21_id: AD0159
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

