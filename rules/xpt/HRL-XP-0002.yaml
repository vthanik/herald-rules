id: HRL-XP-0002
version: 1
status: Published
standard: XPT
category: Structure
sensitivity: Dataset
executability: Fully Executable

description: >
  Variable name must not exceed 8 characters. The SAS V5 transport format limits variable names to 8 characters.

scope:
  classes:
    []
  domains:
    []

check:
  all:
    - name: variable_name
      operator: shorter_than
      value: 9

outcome:
  message: "Variable name '{variable_name}' exceeds 8 characters in dataset '{dataset_name}'"
  severity: Error

provenance:
  p21_id: XP0002
  core_id: null
  cg_ids:
    - CG0402
  fda_ids:
    - FDA-XPT-002
  source_doc: "SAS V5 Transport Format Specification"
