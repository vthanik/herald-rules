id: HRL-SD-0342
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: The Related Subject or Pool Identifier (RSUBJID) value should not be
  equal to Pool Identifier (POOLID).
scope:
  classes:
    - FINDINGS
  domains:
    - RS
check:
  all:
    - name: RSUBJID
      operator: not_equal_to
      value: POOLID
    - name: RSUBJID
      operator: non_empty
    - name: POOLID
      operator: non_empty
outcome:
  message: RSUBJID is equal to POOLID
  severity: Error
provenance:
  p21_id: SD1327
  core_id: ~
  cg_ids:
    - CG0364
  fda_ids: []
  source_doc: SDTM-IG v3.3

