id: HRL-SD-0053
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: When Serious Event (AESER) variable value is 'Y', then at least one of
  seriousness criteria variables is expected to have value 'Y' (Involves Cancer (AESCAN),
  Congenital Anomaly or Birth Defect (AESCONG), Persist or Signif Disability/Incapacity
  (AESDISAB), Results in Death (AESDTH), Requires or Prolongs Hospitalization (AESHOSP),
  Is Life Threatening (AESLIFE), or Other Medically Important Serious Event (AESMIE)).
scope:
  classes:
    - EVENTS
  domains:
    - AE
check:
  all:
    - any:
        - name: AESCAN
          operator: equal_to
          value: 'Y'
        - name: AESCONG
          operator: equal_to
          value: 'Y'
        - name: AESDISAB
          operator: equal_to
          value: 'Y'
        - name: AESDTH
          operator: equal_to
          value: 'Y'
        - name: AESHOSP
          operator: equal_to
          value: 'Y'
        - name: AESLIFE
          operator: equal_to
          value: 'Y'
        - name: AESMIE
          operator: equal_to
          value: 'Y'
    - name: AESER
      operator: equal_to
      value: 'Y'
outcome:
  message: No qualifiers set to 'Y', when AE is Serious
  severity: Error
provenance:
  p21_id: SD0009
  core_id: ~
  cg_ids:
    - CG0042
  fda_ids: []
  source_doc: SDTM-IG v3.3

