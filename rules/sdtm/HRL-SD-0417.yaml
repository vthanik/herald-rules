id: HRL-SD-0417
version: 1
status: Published
standard: SDTM
category: Limit
sensitivity: Record
executability: Fully Executable
description: Date/Time of First Challenge Agent Admin (RFCSTDTC) variable must be
  populated, when Date/Time of Last Challenge Agent Admin (RFXENDTC) variable value
  is provided.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: RFCSTDTC
      operator: non_empty
    - name: RFCENDTC
      operator: non_empty
outcome:
  message: Missing value for RFCSTDTC, when RFCENDTC is provided
  severity: Error
provenance:
  p21_id: SD1405
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB043
  source_doc: SEND-IG-AR v1.0

