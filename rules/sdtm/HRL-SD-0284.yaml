id: HRL-SD-0284
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Subject Status Date/Time of Assessment (SSDTC) must be greater than or
  equal to Date/Time of Death (DTHDTC) when the subject's status is 'DEAD'.
scope:
  classes:
    - FINDINGS
  domains:
    - SS
check:
  all:
    - name: SSDTC
      operator: greater_than
      value: eq SUB:DTHDTC
    - name: USUBJID != '' @and SSDTC != '' @and (SSSTRESC
      operator: equal_to
      value: DEAD
    - name: SSSTRESC
      operator: equal_to
      value: ''''
outcome:
  message: Rule HRL-SD-0284 violation
  severity: Error
provenance:
  p21_id: SD1261
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: P21 rule SD1261

