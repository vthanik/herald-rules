Core:
  Id: FDAV-SD0030
  Status: Reference
  Version: '1'
Description: Character Result/Finding in Std Units (--STRESC) should not be NULL,
  when Standard Units (--STRESU) is provided.
Check:
  all:
    - name: --STRESU
      operator: non_empty
    - name: --STRESC
      operator: empty
Outcome:
  Message: Missing value for --STRESC, when --STRESU is provided
