id: SD1022
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: The value of Qualifier Variable Name (QNAM) should be limited to 8 characters,
  cannot start with a number, and cannot contain characters other than letters in
  upper case, numbers, or underscores.
scope:
  Classes:
    Include: RELATIONSHIP
  Domains:
    Include: SUPP--
  Use_Case: INDH, PROD
check:
  all:
    - name: QNAM
      operator: not_matches_regex
      value: ^[A-Z_][A-Z0-9_]{0,7}$
outcome:
  message: Invalid value for QNAM variable
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1022
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000221

