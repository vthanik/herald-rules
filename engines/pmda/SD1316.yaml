id: SD1316
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: All subjects who have Death records (SSSTRESC = 'DEAD') in Survival Status
  (SS) domain should also have death records (DSDECOD='DEATH') in Disposition (DS)
  domain.
scope:
  Classes:
    Include: FINDINGS
  Domains:
    Include: SS
check:
  all:
    - name: SSSTRESC
      operator: equal_to
      value: DEAD
      value_is_literal: yes
    - name: $ds_dsdecod
      operator: does_not_contain
      value: DEATH
      value_is_literal: yes
outcome:
  message: Missing 'DEATH' record for subject in DS domain
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1316
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000251

