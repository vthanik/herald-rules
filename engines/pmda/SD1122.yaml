id: SD1122
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Standardized Result in Numeric Format (--STRESN) variable value should
  be populated when Standardized Result in Character Format (--STRESC) variable value
  represents a numeric value.
scope:
  classes: []
  domains:
    - FINDINGS
    - FINDINGSABOUT
check:
  all:
    - name: __domain_variable__
      operator: check_value
outcome:
  message: Missing value for --STRESN
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1122
  pmda_category: Error
  ig_versions: []

