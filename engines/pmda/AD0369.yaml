id: AD0369
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: If a Date variable is indicated to be imputated by population of an Imputation
  Flag (*DTF), that Date variable (*DT) or Datetime variable (*DTM) must have a value.
scope:
  classes: []
  domains:
    - ADSL
    - ADDL
    - BDS
    - ADNCA
    - MDBDS
    - OCCDS
    - ADAE
    - MDOCCDS
    - ADAMOTHER
check:
  all:
    - name: __see_description__
      operator: manual_review
outcome:
  message: '*DTF is populated, but *DT or *DTM is not populated'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0369
  pmda_category: Error
  ig_versions: []

