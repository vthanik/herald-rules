Core:
  Id: FDAV-SD1144
  Status: Reference
  Version: '1'
Description: The medical history dataset includes the subject's prior history at the
  start of the trial. Start Date/Time of Medical History Event (MHSTDTC) should be
  before Subject Reference Start Date/Time (RFSTDTC).
Check:
  all:
    - name: MHSTDTC
      operator: non_empty
    - name: MHSTDTC
      operator: date_greater_than_or_equal_to
      value: RFSTDTC
Outcome:
  Message: MHSTDTC date is after RFSTDTC
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: MH
Standard: SDTM
Publisher ID: CG0079
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
  - SENDIG-AR 1.0
CORE Reference: CORE-000236
Executability: Fully Executable
Scope:
  Classes:
    Include: EVENTS
  Domains:
    Include: MH
  Use_Case: INDH

