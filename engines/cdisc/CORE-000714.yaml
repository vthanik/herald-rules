Core:
  Id: CORE-000714
  Status: Published
  Version: '1'
Description: Date/Time of First Study Treatment (RFXSTDTC) variable value should be
  prior or equal to the Date/Time of Last Study Treatment (RFXENDTC).
Executability: Fully Executable
Outcome:
  Message: RFXSTDTC falls after RFXENDTC.
  Output_Variables:
    - RFXSTDTC
    - RFXENDTC
