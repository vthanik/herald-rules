      operator: exists
outcome:
  message: Variable which can be used only in SEND
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1074
  pmda_category: Reject
  ig_versions: []
  core_reference: CORE-000226

