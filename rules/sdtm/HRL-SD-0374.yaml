id: HRL-SD-0374
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Description of Planned Arm (ARM) must be populated, when Planned Arm
  Code (ARMCD) is populated, and vice versa.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: ARMCD
      operator: is_empty
    - name: ARM
      operator: is_empty
    - name: ARMCD
      operator: is_empty
    - name: ARM
      operator: is_empty
outcome:
  message: ARM is populated, but ARMCD is null, or vice versa
  severity: Error
provenance:
  p21_id: SD1361
  core_id: ~
  cg_ids:
    - CG0521
  fda_ids: []
  source_doc: SDTM-IG v3.3

