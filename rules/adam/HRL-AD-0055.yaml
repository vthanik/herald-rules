id: HRL-AD-0055
version: 1
status: Published
standard: ADaM
category: Presence
sensitivity: Record
executability: Partially Executable
description: If Planned Treatment (TRTxxPN) numeric variable is present, there must
  be a corresponding Planned Treatment (TRTxxP) character variable.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: VARIABLE
      operator: variable_exists
      value: TRT%Variable.1%P
outcome:
  message: TRTxxPN is present but TRTxxP is not present
  severity: Error
provenance:
  p21_id: AD0075
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

