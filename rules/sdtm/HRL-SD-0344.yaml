id: HRL-SD-0344
version: 1
status: Published
standard: SDTM
category: Limit
sensitivity: Record
executability: Partially Executable
description: Study Day of Observation (--DY) must be less or equal to Study Day of
  End of Observation (--ENDY)
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: --DY
      operator: less_than
      value: eq %Domain%ENDY
    - name: --DY
      operator: non_empty
    - name: --ENDY
      operator: non_empty
outcome:
  message: '%Domain%DY is after %Domain%ENDY'
  severity: Error
provenance:
  p21_id: SD1330
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB034
  source_doc: SDTM-IG v3.3

