id: HRL-SD-0169
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Partially Executable
description: Study Day of Start (--STDY) variable should be included into dataset,
  when Start Study Date/Time (--STDTC) variable is present.
scope:
  classes:
    - FINDINGS
  domains:
    - DA
check:
  all:
    - name: VARIABLE
      operator: variable_exists
      value: '%Domain%STDY'
outcome:
  message: Missing %Domain%STDY variable, when %Domain%STDTC variable is present
  severity: Error
provenance:
  p21_id: SD1087
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB034
  source_doc: SDTM-IG v3.3

