id: HRL-SD-0090
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: I/E Criterion Original Result (IEORRES) and I/E Criterion Result in Std
  Format (IESTRESC) should have the same value.
scope:
  classes:
    - FINDINGS
  domains:
    - IE
check:
  all:
    - name: IEORRES
      operator: equal_to
      value: IESTRESC
    - name: IEORRES
      operator: non_empty
    - name: IESTRESC
      operator: non_empty
outcome:
  message: Mismatch between IEORRES and IESTRESC values
  severity: Error
provenance:
  p21_id: SD0085
  core_id: ~
  cg_ids:
    - CG0177
  fda_ids: []
  source_doc: SDTM-IG v3.3

