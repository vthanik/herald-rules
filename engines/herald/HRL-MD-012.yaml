id: HRL-MD-012
version: 1
status: Published
standard: ADaM
category: Specification Metadata
sensitivity: Study
executability: Fully Executable
description: A value is required for Form for each Question. Questions must be associated
  to a Form and Section.
scope:
  classes: []
  domains: []
check:
  all:
    - name: form
      operator: non_empty
outcome:
  message: Form is required for each Question
  severity: Error
provenance:
  source_doc: P21 ADaM Validation Rules v1.2 (Metadata)
  authority: Herald
  p21_reference: MD4012

tests:
  - name: 'HRL-MD-012 -- passing spec row'
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, FORM]
        records:
          - ['CDISCPILOT01', '01-701-1015', 'Demographics']
    expected_findings: 0
  - name: 'HRL-MD-012 -- violating spec row'
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, FORM]
        records:
          - ['CDISCPILOT01', '01-701-1015', '']
    expected_findings: 1

