id: AD0105
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: Within a study, all APERIODC values must be the same for each unique
  value of APERIOD when the primary variable APERIOD is populated.
scope:
  classes: []
  domains:
    - BDS
    - ADAE
    - ADAMOTHER
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for APERIODC
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0105
  pmda_category: Error
  ig_versions: []

