Core:
  Id: FDAV-SD1032
  Status: Reference
  Version: '1'
Description: All subjects with Planned Arm Code (ARMCD) equals 'SCRNFAIL' should have
  records in the Inclusion/Exclusion Criteria Not Met (IE) domain.
Check:
  all:
    - name: ACTARMCD
      operator: is_not_contained_by_case_insensitive
      value:
        - SCRNFAIL
        - NOTASSGN
        - NOTTRT
    - name: USUBJID
      operator: is_not_contained_by
      value: $usubjids_in_ex
Outcome:
  Message: No records for 'SCRNFAIL' subject are found in IE domain
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: DM
Standard: SDTM
Publisher ID: CG0109
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
CORE Reference: CORE-000366
Executability: Fully Executable
Scope:
  Classes:
    Include: SPECIAL PURPOSE
  Domains:
    Include: DM

