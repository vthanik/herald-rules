id: HRL-AD-0264
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Across studies, All AETOXGRN must be the same for each unique value of
  AETOXGR when primary variable AETOXGR is populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: AETOXGR
      operator: non_empty
    - name: AETOXGRN
      operator: all_values_equal
      group_by: AETOXGR
outcome:
  message: Inconsistent value for AETOXGRN
  severity: Error
provenance:
  p21_id: AD0294
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.0

