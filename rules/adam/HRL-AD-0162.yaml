id: HRL-AD-0162
version: 1
status: Published
standard: ADaM
category: Cross-reference
sensitivity: Record
executability: Partially Executable
description: If LVOTFL  =Y then TRTSDT <=ADT <= TRTEDT should be true (analysis must
  be between start and end range) Also ensure subject exists in both files.
scope:
  classes:
    - ADSL
  domains:
    - ADSL
check:
  all:
    - name: LVOTFL
      operator: equal_to
      value: 'Y'
    - name: USUBJID
      operator: non_empty
    - name: ADT
      operator: non_empty
outcome:
  message: Subject recorded last value on treatment (LVOTFL), but analysis date (ADT)
    is before treatment start date (ADSL.TRTSDT)
  severity: Error
provenance:
  p21_id: AD0174
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

