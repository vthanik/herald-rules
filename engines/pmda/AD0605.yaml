id: AD0605
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Not Executable
description: When analysis Phase (APHASE) variable is defined, the Phase Start Date
  (PHSDT) variable value must equal ADSL Phase w Start Date (PHwSDT) variable value
  for that phase defined by the value in Phase (N) (APHASEN) variable. APHASEN = w.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - OCCDS
    - ADAE
    - MDOCCDS
    - ADAMOTHER
check: []
outcome:
  message: APHASEN w has a PHSDT != ADSL.PHwSDT
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0605
  pmda_category: Error
  ig_versions: []

