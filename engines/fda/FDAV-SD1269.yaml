Core:
  Id: FDAV-SD1269
  Status: Reference
  Version: '1'
Description: For the trial summary parameter Randomization Quotient (TSPARMCD = 'RANDQT'),
  the value must always be a number between 0 and 1, with some cases where the ratio
  might be equal to 1.
Check:
  all:
    - name: TSPARMCD
      operator: equal_to
      value: RANDQT
    - name: TSVAL
      operator: non_empty
    - name: TSVAL
      operator: not_matches_regex
      value: ^(0.[0-9]+?)$
    - name: TSVAL
      operator: not_matches_regex
      value: ^[1]$
Outcome:
  Message: TSVAL is not between 0 and 1, when TSPARMCD = 'RANDQT'
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: TS
Standard: SDTM
Publisher ID: CG0280
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
CORE Reference: CORE-000335
Executability: Fully Executable
Scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include: TS

