id: HRL-AD-0237
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: If a time variable (TM) is indicated to be imputated by population of
  an Imputation flag (TMF), that time variable (TM) must have a value.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: VARIABLETM
      operator: non_empty
    - name: '%Variables[*TMF]%'
      operator: non_empty
outcome:
  message: '%Variable.1%TMF is populated but %Variable.1%TM is not populated'
  severity: Error
provenance:
  p21_id: AD0264
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

