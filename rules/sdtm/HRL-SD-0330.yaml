id: HRL-SD-0330
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Reported Term for the Disposition Event (DSTERM) and Standardized Disposition
  Term (DSDECOD) should contain the same value, when Category for Disposition Event
  (DSCAT) is 'PROTOCOL MILESTONE'.
scope:
  classes:
    - EVENTS
  domains:
    - DS
check:
  all:
    - name: DSDECOD
      operator: equal_to
      value: DSTERM
    - name: DSCAT
      operator: equal_to
      value: PROTOCOL MILESTONE
outcome:
  message: DSDECOD is not the same as DSTERM, when DSCAT='PROTOCOL MILESTONE'
  severity: Error
provenance:
  p21_id: SD1315
  core_id: ~
  cg_ids:
    - CG0066
  fda_ids: []
  source_doc: SDTM-IG v3.3

