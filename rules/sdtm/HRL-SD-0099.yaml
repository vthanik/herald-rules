      operator: not_equal_to
      value: SUPPCO
    - name: DOMAIN
      operator: not_equal_to
      value: SUPPDI
    - name: DOMAIN
      operator: not_equal_to
      value: SUPPDR
    - name: DOMAIN
      operator: not_equal_to
      value: SUPPSE
    - name: DOMAIN
      operator: not_equal_to
      value: SUPPSM
    - name: DOMAIN
      operator: not_equal_to
      value: SUPPOI
    - name: DOMAIN
      operator: not_equal_to
      value: SUPPTD
    - name: DOMAIN
