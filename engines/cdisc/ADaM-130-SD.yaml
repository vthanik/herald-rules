Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  Within a single dataset, all BASEC values must be the same for each unique combination of USUBJID and PARAMCD.
                Document: ADaM IG v1.1
                Section: '3.3.5'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-130-SD
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: BASEC
      operator: consistent_within_subject
Core:
  Id: ADaM-130-SD
  Status: Published
  Version: '1'
Description: >-
  BASEC must be consistent within USUBJID+PARAMCD in a single BDS dataset.
Executability: Fully Executable
Outcome:
  Message: 'BASEC is inconsistent for the same subject+parameter within dataset'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "BASEC consistent (single dataset)"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, BASEC]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "NORMAL"]
          - ["CDISCPILOT01", "01-701-1023", "SODIUM", "HIGH"]
    expected_findings: 0
  - name: "BASEC inconsistent for same subject+param"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, BASEC]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "NORMAL"]
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "HIGH"]
    expected_findings: 1
