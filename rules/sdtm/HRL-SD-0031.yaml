id: HRL-SD-0031
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Fully Executable

description: >
  LBORRES must not be empty when LBSTAT is not 'NOT DONE' in the LB domain. When a laboratory test was performed, the original result must be populated.

scope:
  classes:
    - FINDINGS
  domains:
    - LB

check:
  all:
    - name: LBORRES
      operator: non_empty
      when:
        name: LBSTAT
        operator: not_equal_to
        value: NOT DONE

outcome:
  message: "LBORRES is empty but LBSTAT is not 'NOT DONE' in LB for subject '{USUBJID}'"
  severity: Error

provenance:
  p21_id: SD0031
  core_id: CORE-000282
  cg_ids:
    - CG0031
  fda_ids:
    []
  source_doc: "SDTM-IG v3.3 Section 6.3.4"
