id: HRL-AD-0269
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Across studies, All ATOXGRN must be the same for each unique value of
  ATOXGR, when both variables are populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: ATOXGR
      operator: non_empty
    - name: ATOXGRN
      operator: non_empty
    - name: ATOXGRN
      operator: all_values_equal
      group_by: ATOXGR
outcome:
  message: Inconsistent value for ATOXGRN
  severity: Error
provenance:
  p21_id: AD0296B
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

