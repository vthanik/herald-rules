id: HRL-SD-0313
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Partially Executable
description: Completion Status (--STAT) variable should not be present in the domain,
  when the Pre-specified (--PRESP) variable is missing.
scope:
  classes:
    - INTERVENTIONS
  domains:
    - PR
check:
  all:
    - name: VARIABLE
      operator: variable_exists
      value: '%Domain%PRESP'
outcome:
  message: '%Domain%STAT variable is present when %Domain%PRESP variable is missing'
  severity: Error
provenance:
  p21_id: SD1294
  core_id: ~
  cg_ids:
    - CG0056
  fda_ids: []
  source_doc: SDTM-IG v3.3

