id: HRL-SD-0302
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Partially Executable
description: Laterality (--LAT) variable should not be present in the domain, when
  the Location (--LOC) variable is missing.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: VARIABLE
      operator: variable_exists
      value: '%Domain%LOC'
outcome:
  message: '%Domain%LAT variable is present when %Domain%LOC variable is missing'
  severity: Error
provenance:
  p21_id: SD1283
  core_id: ~
  cg_ids:
    - CG0095
  fda_ids: []
  source_doc: SDTM-IG v3.3

