sensitivity: Record
executability: Partially Executable
description: Treatment Dose Units (DOSEU) variable is required when either Treatment
  Dose at Record Start (DOSEON) or Cumulative Actual Treatment Dose (DOSCUMA) variable
  is present in the dataset.
