# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 4.3.2; 5.3.12.3
id: HRL-DD-054
version: 2
status: Published
standard: Define-XML
category: Origin Metadata
sensitivity: Record
executability: Fully Executable
description: >
  Origin Type must be a valid value. When populated, origin must be one of
  {Collected, Derived, Assigned, Protocol, Predecessor, Not Available}.
  Empty origins are scoped out of this rule and flagged by HRL-DD-053.
scope:
  classes: []
  domains: []
check:
  all:
    - name: origin
      operator: empty
    - name: origin
      operator: in
      value:
        - Collected
        - Derived
        - Assigned
        - Protocol
        - Predecessor
        - Not Available
outcome:
  message: "Origin type is not valid. Must be one of: Collected, Derived, Assigned, Protocol, Predecessor, Not Available."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "4.3.2; 5.3.12.3"
  cited_guidance: >
    Type -- Required. Origin type. The list of allowable values is not extensible.

tests:
  - name: "HRL-DD-054 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-054 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

