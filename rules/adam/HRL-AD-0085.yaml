id: HRL-AD-0085
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Within a study, All APERIOD values must be the same for each unique value
  of APERIODC when primary variable APERIOD is populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: APERIOD
      operator: non_empty
    - name: APERIOD
      operator: all_values_equal
      group_by: STUDYID,APERIODC
outcome:
  message: Inconsistent value for APERIOD
  severity: Error
provenance:
  p21_id: AD0106
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.0

