id: SD2255
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: TSVAL and TSVALCD values must be populated from the same name record
  in FDA Substance Registration System (SRS).
scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include: TS
  Use_Case: INDH
check:
  all:
    - name: TSVAL
      operator: non_empty
    - name: TSVALCD
      operator: non_empty
    - name: TSVAL
      operator: is_not_unique_relationship
      value: TSVALCD
outcome:
  message: TSVAL/TSVALCD value mismatch for COMPTRT
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD2255
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000152

