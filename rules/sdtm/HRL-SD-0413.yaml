id: HRL-SD-0413
version: 1
status: Published
standard: SDTM
category: Limit
sensitivity: Record
executability: Fully Executable
description: Start Date/Time of Agent (AGSTDTC) variable value must be less than or
  equal to Date/Time of Last Challenge Agent Admin (RFCENDTC).
scope:
  classes:
    - INTERVENTIONS
  domains:
    - AG
check:
  all:
    - name: SUB:RFCENDTC
      operator: greater_than
      value: eq AGSTDTC
    - name: SUB:RFXENDTC
      operator: non_empty
    - name: AGSTDTC
      operator: non_empty
outcome:
  message: AGSTDTC date is after RFCENDTC
  severity: Error
provenance:
  p21_id: SD1401
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: P21 Community SEND-IG-AR 1.0 (FDA)

