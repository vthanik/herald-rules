id: SD1306
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: When the study population is healthy subjects (TSPARMCD = 'HLTSUBJI'
  and TSVAL = 'Y'), the Diagnosis Group parameter should be provided with a null Parameter
  Value (TSVAL should be null when TSPARMCD = 'TDIGRP').
scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include: TS
check:
  all:
    - name: TSPARMCD
      operator: equal_to
      value: TDIGRP
    - name: $HLTSUBJI_Y
      operator: greater_than_or_equal_to
      value: 1
    - all:
        - name: TSVAL
          operator: not_equal_to
          value: HEALTHY SUBJECTS
          value_is_literal: yes
        - name: TSVAL
          operator: non_empty
outcome:
  message: The TDIGRP Trial Summary Parameter is not provided with TSVAL equal to
    null when HLTSUBJI parameter equals 'Y'
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1306
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000473

