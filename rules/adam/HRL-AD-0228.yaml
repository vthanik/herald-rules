id: HRL-AD-0228
version: 1
status: Published
standard: ADaM
category: Presence
sensitivity: Record
executability: Fully Executable
description: When CNSR is present, the STARTDT and one of ADT or ADTM must be included
  in the dataset.  In Time to Event studies, the basis of analysis is the time from
  a defined starting point to the time of occurrence of the event of interest.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: VARIABLE
      operator: variable_exists
      value: ADT,ADTM
outcome:
  message: CNSR is present but both ADT and ADTM are not present
  severity: Error
provenance:
  p21_id: AD0246
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

