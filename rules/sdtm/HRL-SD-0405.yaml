id: HRL-SD-0405
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Partially Executable
description: End Day of Obs Rel to Challenge Agent (--CHENDY) variable value should
  not be imputed. It may only be populated, when both End Date/Time of Observation
  (--ENDTC) and Date/Time of First Challenge Agent Admin (RFCSTDTC) variables values
  are provided and both of them include complete date parts.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: --CHENDY
      operator: is_empty
    - name: POOLID
      operator: is_empty
outcome:
  message: '%Domain%CHENDY variable value is imputed'
  severity: Error
provenance:
  p21_id: SD1392
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: P21 Community SEND-IG-AR 1.0 (FDA)

