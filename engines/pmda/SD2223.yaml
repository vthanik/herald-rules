description: '''Pharmacological Class of Investigational Therapy'' (PCLAS) record
  must be populated in Trial Summary (TS) domain when study type is ''INTERVENTIONAL''
  and if Intervention Type (INTTYPE) is one for which pharmacological class is applicable.
  It is expected for SDTM IG v3.1.2 data and required for data in all more recent
  SDTM versions.'
