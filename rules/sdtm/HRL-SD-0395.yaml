id: HRL-SD-0395
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Partially Executable
description: 'Start Day of Obs Relative to Exposure (--XSTDY) variable value should
  be populated as defined by CDISC standards: --XSTDY = (date portion of --STDTC)
  - (date portion of RFXSTDTC) +1 if --STDTC is on or after RFXSTDTC; --XSTDY = (date
  portion of --STDTC) - (date portion of RFXSTDTC) if --STDTC precedes RFXSTDTC.'
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: --XSTDY
      operator: equal_to
      value: :DY(SUB:RFXSTDTC,%Domain%STDTC)
    - name: --XSTDY
      operator: non_empty
outcome:
  message: Incorrect value for %Domain%XSTDY variable
  severity: Error
provenance:
  p21_id: SD1382
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: P21 Community SEND-IG-AR 1.0 (FDA)

