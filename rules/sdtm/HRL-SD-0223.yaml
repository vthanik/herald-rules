id: HRL-SD-0223
version: 1
status: Published
standard: SDTM
category: Limit
sensitivity: Record
executability: Fully Executable
description: The medical history dataset includes the subject's prior history at the
  start of the trial. End Date/Time of Medical History Event (MHENDTC) should be before
  Subject Reference Start Date/Time (RFSTDTC).
scope:
  classes:
    - EVENTS
  domains:
    - MH
check:
  all:
    - name: SUB:RFSTDTC
      operator: greater_than
      value: eq MHENDTC
    - name: SUB:RFSTDTC
      operator: non_empty
    - name: MHENDTC
      operator: non_empty
outcome:
  message: MHENDTC date is after RFSTDTC
  severity: Error
provenance:
  p21_id: SD1145
  core_id: ~
  cg_ids:
    - CG0078
  fda_ids: []
  source_doc: SDTM-IG v3.2

