id: SD1287
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: All values of Dictionary-Derived Term (--DECOD) should be the same for
  a given value of Preferred Term Code (--PTCD).
scope:
  Classes:
    Include: EVENTS
  Domains:
    Include: ALL
  Use_Case: INDH
check:
  all:
    - name: --DECOD
      operator: exists
    - name: --PTCD
      operator: exists
    - name: --PTCD
      operator: is_not_unique_relationship
      value: --DECOD
outcome:
  message: Inconsistent value for --DECOD within --PTCD
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1287
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000268

