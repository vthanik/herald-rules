id: SD1284
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Portion or Totality (--PORTOT) variable should not be present in the
  domain when the Location (--LOC) variable is missing.
scope:
  Classes:
    Include:
      - INTERVENTIONS
      - FINDINGS
      - EVENTS
  Domains:
    Include: ALL
  Use_Case: INDH, PROD
check:
  all:
    - name: --LOC
      operator: not_exists
    - name: --PORTOT
      operator: exists
outcome:
  message: --PORTOT variable is present when --LOC variable is missing
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1284
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000096

