id: HRL-CT-0008
version: 1
status: Published
standard: CT
category: Terminology
sensitivity: Record
executability: Partially Executable
description: Variable should be populated with terms from its CDISC controlled terminology
  codelist, when its value level condition is met. New terms can be added as long
  as they are not duplicates, synonyms or subsets of existing standard terms.
scope:
  classes: []
  domains: []
check:
  all:
    - name: +%Variables.Config.@Clause.CodeList.Extensible:Y%
      operator: in
      value: '%Variable.Config.@Clause.CodeList.Values%'
outcome:
  message: '%Variable% value not found in ''%Variable.Config.@Clause.CodeList.Name%''
    extensible codelist when %Variable.Config.@Clause.Expression%'
  severity: Error
provenance:
  p21_id: CT2005
  core_id: ~
  cg_ids:
    - CG0021
  fda_ids: []
  source_doc: ADaM-IG v1.1

