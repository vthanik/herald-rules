id: HRL-SD-0456
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: MedDRA System Organ Class (--SOC) should be consistent for the same collected
  term (--TERM)
scope:
  classes:
    - TRIAL DESIGN
  domains:
    - TE
check:
  all:
    - name: --DECOD
      operator: non_empty
    - name: '%Domain%SOC'
      operator: all_values_equal
      group_by: '%Domain%TERM'
outcome:
  message: Inconsistent value for %Domain%SOC within %Domain%TERM
  severity: Error
provenance:
  p21_id: SD1444
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB003
  source_doc: SDTM-IG v3.3

