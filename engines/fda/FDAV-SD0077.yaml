Core:
  Id: FDAV-SD0077
  Status: Reference
  Version: '1'
Description: Reference record defined by Related Domain Abbreviation (RDOMAIN), Unique
  Subject Identifier (USUBJID), Identifying Variable (IDVAR) and Identifying Variable
  Value (IDVARVAL) must exist in the target Domain.
Check:
  all:
    - name: IDVAR
      operator: non_empty
    - name: IDVARVAL
      operator: non_empty
    - name: IDVARVAL
      operator: not_equal_to
      type_insensitive: yes
      value: IDVAR
      value_is_reference: yes
Outcome:
  Message: Invalid referenced record
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: CO, RELREC, SUPPQUAL
Standard: SDTM
Publisher ID: CG0371, CG0465, 118, 121, 258, 259, 260
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
  - SENDIG 3.0
  - SENDIG 3.1
  - SENDIG 3.1.1
  - SENDIG-AR 1.0
  - SENDIG-DART 1.1
CORE Reference: CORE-000206
Executability: Fully Executable
Scope:
  Classes:
    Include:
      - SPECIAL PURPOSE
      - RELATIONSHIP
  Domains:
    Include:
      - CO
      - SUPP--
      - RELREC
  Use_Case: NONCLIN, INDH, PROD

