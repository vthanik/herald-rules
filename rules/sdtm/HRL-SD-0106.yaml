id: HRL-SD-0106
version: 1
status: Published
standard: SDTM
category: Format
sensitivity: Record
executability: Fully Executable
description: The value of Element Code (ETCD) should be no more than 8 characters
  in length.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: ETCD
      operator: matches_regex
      value: .{0,8}
outcome:
  message: Invalid value for ETCD
  severity: Error
provenance:
  p21_id: SD1009
  core_id: ~
  cg_ids:
    - CG0246
  fda_ids: []
  source_doc: SDTM-IG v3.3

