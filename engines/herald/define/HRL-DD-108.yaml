# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 4.1.1; 5.3.6.1
id: HRL-DD-108
version: 1
status: Published
standard: Define-XML
category: Standards Reference
sensitivity: Dataset
executability: Fully Executable
description: >
  Dataset and variable metadata must match the configured base standard.
scope:
  classes: []
  domains: []
check:
  all:
    - name: __metadata_matches_standard
      operator: equal_to
      value: false
outcome:
  message: "Metadata does not match the configured base standard. Check that dataset/variable metadata aligns with the expected values defined in the referenced standard."
  severity: Warning
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "4.1.1; 5.3.6.1"
  cited_guidance: >
    P21 DD0148: Check metadata to make sure the value matches the configured base standard.

tests:
  - name: "HRL-DD-108 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-108 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

