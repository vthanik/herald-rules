id: HRL-DD-021
version: 1
status: Published
standard: Define-XML
category: Origin Metadata
sensitivity: Variable
executability: Fully Executable
description: >
  When a Variables-sheet row has Origin='Derived', the Predecessor column
  must be null. A derived variable has no single source record; the
  derivation is documented in Method, not Predecessor. Counterpart to
  HRL-DD-059 (which requires Method when Origin='Derived').
scope:
  classes: []
  domains: []
check:
  all:
    - name: origin
      operator: not_equal_to
      value: Derived
    - name: predecessor
      operator: empty
outcome:
  message: "Origin='Derived' but Predecessor is populated. Derived variables document their source in Method, not Predecessor."
  severity: Error
provenance:
  source_doc: Herald-original (Define-XML origin integrity); CDISC Define-XML v2.1 § 4.3.2
  authority: Herald
  reference_url: https://www.cdisc.org/standards/data-exchange/define-xml

tests:
  - name: "Origin=Derived with null Predecessor passes"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "Origin=Derived with populated Predecessor flags"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1
