id: AD0333
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: Within a Study and a Parameter, all Percent Chg from Baseline Category
  y (PCHGCATy) variable values must be the same for each unique value of Percent Chg
  from Baseline Category y (N) (PCHGCAyN) variable when variable PCHGCAyN is populated.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for PCHGCAT*
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0333
  pmda_category: Error
  ig_versions: []

