id: HRL-AD-0122
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: If R2AyHI is populated, the values necessary for its calculation must
  both be present and populated. R2AyHI = AVAL / AyHI.  Once this issue is resolved,
  there is greater potential for AD0134 to fire.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: AVAL
      operator: non_empty
    - name: AVARIABLEHI
      operator: non_empty
    - name: '%Variables[R2A#HI]%'
      operator: non_empty
outcome:
  message: 'Calculation issue: R2A%Variable.1%HI is populated but AVAL and/or A%Variable.1%HI
    are not populated'
  severity: Error
provenance:
  p21_id: AD0134B
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

