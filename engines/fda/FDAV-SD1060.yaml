Core:
  Id: FDAV-SD1060
  Status: Reference
  Version: '1'
Description: The value of Visit Number (VISITNUM) variable should be unique for each
  record within a subject.
Check:
  all:
    - name: VISITNUM
      operator: is_contained_by
      value: $tv_visitnum
    - name: VISITNUM
      operator: is_not_unique_set
      value: USUBJID
Outcome:
  Message: Duplicate VISITNUM
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: SV
Standard: SDTM
Publisher ID: CG0410
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
CORE Reference: CORE-000204
Executability: Fully Executable
Scope:
  Classes:
    Include: ALL
  Domains:
    Include: SV
  Use_Case: INDH

