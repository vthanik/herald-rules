id: SD0034
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Time Point Reference (--TPTREF) should not be null when Planned Elapsed
  Time from Time Point Ref (--ELTM) is populated.
scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
  Use_Case: INDH, PROD
check:
  all:
    - name: --TPTREF
      operator: empty
    - name: --ELTM
      operator: non_empty
outcome:
  message: Missing value for --TPTREF when --ELTM is provided
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0034
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000028

