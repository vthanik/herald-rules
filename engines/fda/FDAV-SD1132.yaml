Core:
  Id: FDAV-SD1132
  Status: Reference
  Version: '1'
Description: Serious Event (AESER) variable value is expected to be 'Y', when either
  of Seriousness Criteria variables (AESCAN, AESCONG, AESDISAB, AESDTH, AESHOSP, AESLIFE,
  AESMIE) has value 'Y'.
Check:
  all:
    - any:
        - name: AESCAN
          operator: equal_to
          value: 'Y'
          value_is_literal: yes
        - name: AESCONG
          operator: equal_to
          value: 'Y'
          value_is_literal: yes
        - name: AESDISAB
          operator: equal_to
          value: 'Y'
          value_is_literal: yes
        - name: AESDTH
          operator: equal_to
          value: 'Y'
          value_is_literal: yes
        - name: AESHOSP
          operator: equal_to
          value: 'Y'
          value_is_literal: yes
        - name: AESLIFE
          operator: equal_to
          value: 'Y'
          value_is_literal: yes
        - name: AESOD
          operator: equal_to
          value: 'Y'
          value_is_literal: yes
        - name: AESMIE
          operator: equal_to
          value: 'Y'
          value_is_literal: yes
    - name: AESER
      operator: not_equal_to
      value: 'Y'
      value_is_literal: yes
Outcome:
  Message: AESER is not 'Y'
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: AE
Standard: SDTM
Publisher ID: CG0041
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
CORE Reference: CORE-000022
Executability: Fully Executable
Scope:
  Classes:
    Include: EVENTS
  Domains:
    Include: AE
  Use_Case: INDH

