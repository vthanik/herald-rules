id: AD0256
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: All subjects included into ADaM datasets should be present in ADSL dataset
  and use the same Unique Subject Identifier (USUBJID).
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - OCCDS
    - ADAE
    - MDOCCDS
    - ADAMOTHER
check:
  all:
    - name: __see_description__
      operator: manual_review
outcome:
  message: USUBJID value does not exist in the ADaM ADSL domain
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0256
  pmda_category: Error
  ig_versions: []

