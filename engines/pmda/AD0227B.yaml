id: AD0227B
version: 1
status: Reference
standard: ADaM
category: Conformance
sensitivity: Record
executability: Fully Executable
description: Within a study, all Planned Sequence of Treatments (TRTSEQP) variable
  values must be the same for each unique value of Planned Sequence of Treatments
  (N) (TRTSEQPN) when both variables are populated.
scope:
  classes: []
  domains:
    - ADSL
    - ADDL
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for TRTSEQP
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0227B
  pmda_category: Error
  ig_versions: []

