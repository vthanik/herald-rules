id: HRL-SD-0288
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: For subjective data (when QORIG='ASSIGNED'), QEVAL should be populated
  and the value should reflect the role of the person or institution assigning the
  value.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: QEVAL
      operator: non_empty
    - name: QORIG
      operator: non_empty
    - name: QORIG
      operator: equal_to_case_insensitive
      value: ASSIGNED
outcome:
  message: QEVAL is null when QORIG equals 'ASSIGNED'
  severity: Error
provenance:
  p21_id: SD1265
  core_id: ~
  cg_ids:
    - CG0202
  fda_ids: []
  source_doc: SDTM-IG v3.3

