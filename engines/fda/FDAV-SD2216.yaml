Core:
  Id: FDAV-SD2216
  Status: Reference
  Version: '1'
Description: '''Current Therapy or Treatment'' (CURTRT) record must be populated in
  Trial Summary (TS) domain, when ADDON is ''Y''. It is expected for SDTM IG v3.1.2
  data and required for data in all more recent SDTM versions.'
Check:
  all:
    - name: TSPARMCD
      operator: not_contains_all
      value:
        - ADDON
        - AGEMAX
        - AGEMIN
        - LENGTH
        - PLANSUB
        - RANDOM
        - SEXPOP
        - STOPRULE
        - TBLIND
        - TCNTRL
        - TITLE
        - TPHASE
        - TTYPE
        - OBJPRIM
        - SPONSOR
        - REGID
        - OUTMSPRI
        - FCNTRY
        - ADAPT
        - DCUTDTC
        - DCUTDESC
        - NARMS
        - STYPE
        - SSTDTC
        - SENDTC
        - ACTSUB
        - HLTSUBJI
Outcome:
  Message: Missing CURTRT Trial Summary Parameter
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: TS
Standard: SDTM
Publisher ID: CG0287
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
CORE Reference: CORE-000740
Executability: Fully Executable
Scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include: TS

