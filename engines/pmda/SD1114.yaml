id: SD1114
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Value for Body System or Organ Class (--BODSYS) variable must be populated
  using a System Organ Class of the MedDRA dictionary of a version specified in the
  define.xml (Case-insensitive).
scope:
  classes: []
  domains:
    - AE
    - CE
    - MH
check:
  all:
    - name: __domain_variable__
      operator: check_value
outcome:
  message: Value for --BODSYS not found in MedDRA dictionary
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1114
  pmda_category: Warning
  ig_versions: []

