id: SD0058
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Partially Executable - Possible Underreporting
description: Only variables listed in SDTM model should appear in a dataset. New sponsor
  defined variables must not be added, and existing variables must not be renamed
  or modified.
scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
check:
  all:
    - name: variable_name
      operator: not_equal_to
      value: EXMETHOD
    - name: variable_name
      operator: not_equal_to
      value: EGBEATNO
    - name: variable_name
      operator: not_equal_to
      value: ICIMPLBL
    - name: variable_name
      operator: not_equal_to
      value: MSAGENT
    - name: variable_name
      operator: not_equal_to
      value: MSCONC
    - name: variable_name
      operator: not_equal_to
      value: MSCONCU
    - name: variable_name
      operator: is_not_contained_by
      value: $allowed_variables
outcome:
  message: Variable appears in dataset, but is not in SDTM model
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0058
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-001079

