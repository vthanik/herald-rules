id: HRL-DD-0005
version: 1
status: Published
standard: Define-XML
category: Structure
sensitivity: Value
executability: Fully Executable

description: >
  Variable order must be a positive integer in Define-XML. The OrderNumber attribute on ItemRef elements must be a positive integer defining the variable sequence within a dataset.

scope:
  classes:
    []
  domains:
    []

check:
  all:
    - name: variable_order
      operator: is_positive_integer

outcome:
  message: "Variable order '{variable_order}' is not a positive integer for '{variable_name}' in Define-XML"
  severity: Error

provenance:
  p21_id: DD0005
  core_id: null
  cg_ids:
    - CG0205
  fda_ids:
    - FDA-DEF-005
  source_doc: "Define-XML v2.1 Specification Section 4.2"
