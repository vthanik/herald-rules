id: HRL-SD-0134
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Value of Subcategory (--SCAT) should not be  identical to that in Domain
  Abbreviation (DOMAIN); Reported Term (--TERM); Name of Measurement, Test, or Examination
  (--TESTCD); Name of Treatment (--TRT); Body System or Organ Class (--BODSYS).
scope:
  classes:
    - FINDINGS
  domains:
    - SC
check:
  all:
    - name: --SCAT
      operator: not_equal_to
      value: DOMAIN
    - name: --SCAT
      operator: not_equal_to_variable
      value: --TERM
    - name: --SCAT
      operator: not_equal_to_variable
      value: --TESTCD
    - name: --SCAT
      operator: not_equal_to_variable
      value: --TRT
    - name: --SCAT
      operator: not_equal_to_variable
      value: --BODSYS
    - name: --SCAT
      operator: non_empty
outcome:
  message: '%Domain%SCAT value is redundant with other variable values'
  severity: Error
provenance:
  p21_id: SD1040
  core_id: ~
  cg_ids:
    - CG0338
    - CG0339
    - CG0340
    - CG0350
  fda_ids: []
  source_doc: SDTM-IG v3.3

