id: HRL-SD-0400
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Partially Executable
description: Day of Obs relative to Exposure (--XDY) variable value should not be
  imputed. It may only be populated, when both Date/Time of Collection (--DTC) and
  Date/Time of First Study Treatment (RFXSTDTC) variables values are provided and
  both of them include complete date parts.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: --XDY
      operator: is_empty
    - name: POOLID
      operator: is_empty
outcome:
  message: '%Domain%XDY variable value is imputed'
  severity: Error
provenance:
  p21_id: SD1387
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: P21 Community SEND-IG-AR 1.0 (FDA)

