Core:
  Id: FDAV-SD2022
  Status: Reference
  Version: '1'
Description: Age Units (AGEU) variable values should be provided, when Age (AGE) or
  Age Range (AGETXT) variables values are populated.
Check:
  all:
    - any:
        - name: AGEU
          operator: not_exists
        - name: AGEU
          operator: empty
    - any:
        - name: AGETXT
          operator: non_empty
        - name: AGE
          operator: non_empty
Outcome:
  Message: Missing value for AGEU, when AGE or AGETXT is populated
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: DM
Standard: SDTM
Publisher ID: CG0432, 104
IG Versions:
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
  - SENDIG 3.0
  - SENDIG 3.1
  - SENDIG 3.1.1
  - SENDIG-AR 1.0
  - SENDIG-DART 1.1
CORE Reference: CORE-000452
Executability: Fully Executable
Scope:
  Classes:
    Include: SPECIAL PURPOSE
  Domains:
    Include: DM

