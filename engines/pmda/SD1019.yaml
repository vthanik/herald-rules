id: SD1019
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Planned Study Day of Visit (VISITDY) should equal null for unplanned
  visits, where Description of Unplanned Visit (SVUPDES) is populated.
scope:
  Classes:
    Include: SPECIAL PURPOSE
  Domains:
    Include: SV
check:
  all:
    - name: SVUPDES
      operator: non_empty
    - name: VISITDY
      operator: non_empty
outcome:
  message: VISITDY is populated for unplanned visit
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1019
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000501

