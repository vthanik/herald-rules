Core:
  Id: FDAV-SD1338
  Status: Reference
  Version: '1'
Description: A Link Group (RSLNKGRP) value for a response assessment that is referenced
  in the Disease Response (RS) domain for a subject must also be present in the Tumor
  Results (TR) domain for the appropriate measurement records for that subject.
Check:
  all:
    - name: --LNKGRP
      operator: exists
    - name: $VARIABLE_COUNT
      operator: less_than
      value: 2
Outcome:
  Message: RSLNKGRP value does not exist in TR domain
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: RS
Standard: SDTM
Publisher ID: CG0022
IG Versions:
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
CORE Reference: CORE-000358
Executability: Fully Executable
Scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
  Use_Case: INDH, PROD

