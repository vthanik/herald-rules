              Version: '2'
            Version: '2.0'
        Version: '3.3'
      - Name: TIG
        References:
          - Citations:
              - Cited_Guidance: All relative day values will be integers and there
                  will be no study day 0. The reference start date is considered day
                  1 and the study day value is increased by 1 for each date following
                  the reference start date and decreased by 1 for each date prior
                  to the reference start date, e.g.; --DY = (date portion of --DTC)
                  - (date portion of RFSTDTC) + 1 if --DTC is on or after RFSTDTC
                  --DY = (date portion of --DTC) - (date portion of RFSTDTC) if --DTC
                  precedes RFSTDTC
                Document: TIG v1.0
                Item: Table 1 Num 1
                Section: 2.8.7.6
            Origin: TIG Conformance Rules
            Rule_Identifier:
              Id: TIG0291
              Version: '1'
            Version: '1.0'
        Substandard: SDTM
        Version: '1.0'
      - Name: SENDIG
