id: HRL-SD-0494
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Fully Executable
description: '''Planned Maximum Age of Subjects'' (AGEMAX) record must be populated
  in Trial Summary (TS) domain. It is expected for SDTM IG v3.1.2 data and required
  for data in all more recent SDTM versions.'
scope:
  classes:
    - INTERVENTIONS
  domains:
    - AG
check:
  all:
    - name: TSPARMCD
      operator: variable_exists
      value: AGEMAX
outcome:
  message: Missing AGEMAX Trial Summary Parameter
  severity: Error
provenance:
  p21_id: SD2202
  core_id: ~
  cg_ids:
    - CG0287
  fda_ids: []
  source_doc: SDTM-IG v3.3

