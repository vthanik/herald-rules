Core:
  Id: FDAV-SD1349
  Status: Reference
  Version: '1'
Description: Study Identifier (STUDYID) values should be consistent for all subjects
  in the Demographics (DM) domain for one study.
Check:
  all:
    - name: STUDYID
      operator: is_not_contained_by
      value: $dm_studyid
Outcome:
  Message: Inconsistent STUDYID
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: DM
Standard: SDTM
Publisher ID: CG0409, 249
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
  - SENDIG 3.0
  - SENDIG 3.1
  - SENDIG 3.1.1
  - SENDIG-AR 1.0
  - SENDIG-DART 1.1
CORE Reference: CORE-000172
Executability: Fully Executable
Scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
  Use_Case: INDH, NONCLIN

