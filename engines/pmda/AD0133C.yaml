id: AD0133C
version: 1
status: Reference
standard: ADaM
category: Conformance
sensitivity: Record
executability: Partially Executable
description: When Analysis Range Low (AyLO) equals 0, the Ratio to Analysis Range
  Low (R2AyLO) should not be populated since you cannot divide by 0. AD0133 checks
  the calculation is correct when AyLO does not equal 0.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
check:
  all:
    - name: __see_description__
      operator: manual_review
outcome:
  message: 'Calculation issue: AyLO = 0, but R2AyLO is populated'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0133C
  pmda_category: Error
  ig_versions: []

