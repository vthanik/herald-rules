id: SD1082
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Variable length should be assigned based on actual stored data to minimize
  file size. Datasets should be re-sized to the maximum length of actual data used
  prior to splitting.
scope:
  classes: []
  domains: []
check:
  all:
    - name: __variable__
      operator: max_length
      value: 200
outcome:
  message: Variable length is too long for actual data
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1082
  pmda_category: Warning
  ig_versions: []

