Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  In v1.2, record-level and parameter-level population flag variables may use Y/N/null when N and null values need to be analyzed differently. See Section 3.1.4 items 6-7.
                Document: ADaM IG v1.2
                Section: '3.1.4'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-1020
              Version: '1'
            Version: '1.0'
        Version: '1.2'
Check:
  all:
    - name: ABLFL
      operator: non_empty
    - name: ABLFL
      operator: not_in
      value:
        - 'Y'
        - 'N'
Core:
  Id: ADaM-1020
  Status: Published
  Version: '1'
Description: >-
  A variable with a suffix of RFL (record-level flag) may have a value of Y, N, or null in ADaM-IG v1.2. Uses ABLFL as representative *RFL variable.
Executability: Partially Executable
Outcome:
  Message: '*RFL variable (e.g. ABLFL) has a value other than Y, N, or null'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.2"]
  source: Herald-originated (ADaM-IG v1.2 gap-fill)
  catalogs:
    - ADaMIG 1.2
  fetched: '2026-04-12'

