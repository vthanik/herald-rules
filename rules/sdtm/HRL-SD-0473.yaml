id: HRL-SD-0473
version: 1
status: Published
standard: SDTM
category: Terminology
sensitivity: Record
executability: Partially Executable
description: Case for Lowest Level Term (--LLT) variable must be sentence case using
  a Lowest Level Term of the MedDRA dictionary of a version specified in the define.xml
  (Case-sensitive).
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: '%Variables[--LLT]%'
      operator: non_empty
outcome:
  message: Value for %Domain%LLT is in incorrect case
  severity: Error
provenance:
  p21_id: SD2008C
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB017
  source_doc: SDTM-IG v3.3

