# P21 Sheet validation against Define-XML v2.1 Specification
# Section: ARM 1.0
id: HRL-DD-102
version: 2
status: Published
standard: Define-XML
category: ARM Metadata
sensitivity: Record
executability: Fully Executable
description: >
  ARM AnalysisVariable is required when AnalysisResults are defined.
scope:
  classes: []
  domains: []
check:
  all:
    - name: variables
      operator: non_empty
outcome:
  message: "AnalysisVariable is missing in the AnalysisResults sheet. Variables must be populated."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "ARM 1.0"
  cited_guidance: >
    P21 DD0096: The armAnalysisVariable in the Analysis Results Metadata is missing and must be populated.

tests:
  - name: "HRL-DD-102 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-102 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

