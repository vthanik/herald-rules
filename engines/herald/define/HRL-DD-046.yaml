# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 4.3.1; 5.3.12
id: HRL-DD-046
version: 2
status: Published
standard: Define-XML
category: Variable Definition
sensitivity: Record
executability: Fully Executable
description: >
  Data Type must be a valid Define-XML data type.
scope:
  classes: []
  domains: []
check:
  all:
    - name: data_type
      operator: empty
    - name: data_type
      operator: in
      value:
        - text
        - integer
        - float
        - date
        - datetime
        - time
        - partialDate
        - partialTime
        - partialDatetime
        - incompleteDatetime
        - durationDatetime
        - intervalDatetime
outcome:
  message: "Data Type is not a valid Define-XML type. Allowable values: text, integer, float, date, datetime, time, partialDate, partialTime, partialDatetime, incompleteDatetime, durationDatetime, intervalDatetime."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "4.3.1; 5.3.12"
  cited_guidance: >
    DataType -- Required. See Section 4.3.1, Data Type Considerations, for a list of valid Define-XML DataType values.

tests:
  - name: "HRL-DD-046 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-046 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

