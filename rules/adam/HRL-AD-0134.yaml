id: HRL-AD-0134
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Within a study, All PARAMN values must be the same for each unique value
  of PARAM when primary variable PARAM is populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: PARAM
      operator: non_empty
    - name: PARAMN
      operator: all_values_equal
      group_by: STUDYID,PARAM
outcome:
  message: Inconsistent value for PARAMN
  severity: Error
provenance:
  p21_id: AD0147
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.0

