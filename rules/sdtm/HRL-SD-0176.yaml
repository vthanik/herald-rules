id: HRL-SD-0176
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Partially Executable
description: 'Study Day of End (--ENDY) variable value should be populated as defined
  by CDISC standards: --ENDY = (date portion of --ENDTC) - (date portion of RFSTDTC)
  +1 if --ENDTC is on or after RFSTDTC; --ENDY = (date portion of --ENDTC) - (date
  portion of RFSTDTC) if --ENDTC precedes RFSTDTC.'
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: --ENDY
      operator: equal_to
      value: :DY(SUB:RFSTDTC,%Domain%ENDTC)
    - name: --ENDY
      operator: non_empty
outcome:
  message: Incorrect value for %Domain%ENDY variable
  severity: Error
provenance:
  p21_id: SD1094
  core_id: ~
  cg_ids:
    - CG0222
  fda_ids: []
  source_doc: SDTM-IG v3.3

