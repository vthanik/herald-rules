id: HRL-SD-0546
version: 1
status: Published
standard: SDTM
category: Terminology
sensitivity: Record
executability: Partially Executable
description: TSVAL and TSVALCD values must be populated from the same name record
  in FDA Substance Registration System (SRS).
scope:
  classes:
    - SPECIAL-PURPOSE
  domains:
    - CO
check:
  all:
    - name: TSPARMCD
      operator: equal_to
      value: COMPTRT
    - name: TSVAL
      operator: non_empty
    - name: TSVALCD
      operator: non_empty
outcome:
  message: TSVAL/TSVALCD value mismatch for COMPTRT
  severity: Error
provenance:
  p21_id: SD2255
  core_id: ~
  cg_ids:
    - CG0265
  fda_ids: []
  source_doc: SDTM-IG v3.3

