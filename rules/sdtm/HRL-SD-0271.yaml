id: HRL-SD-0271
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: ECDOSE must be greater than zero when ECOCCUR does not equal 'N' , ECSTAT
  does not equal 'NOT DONE', and ECDOSTXT is null. ECDOSE must not be set to zero
  (0) as an alternative method for indicating doses not taken, not given, or missed.
scope:
  classes:
    - INTERVENTIONS
  domains:
    - EC
check:
  all:
    - name: ECDOSE
      operator: greater_than
      value: '0'
    - name: ECOCCUR
      operator: not_equal_to
      value: 'N'
    - name: ECSTAT
      operator: is_empty
    - name: ECDOSTXT
      operator: is_empty
outcome:
  message: ECDOSE is not greater than 0 when ECOCCUR does not equal 'N' and ECDOSTXT
    is null
  severity: Error
provenance:
  p21_id: SD1247
  core_id: ~
  cg_ids:
    - CG0100
  fda_ids: []
  source_doc: SDTM-IG v3.3

