Check:
  all:
    - name: DTHFL
      operator: equal_to
      value: 'Y'
      value_is_literal: yes
    - name: $ds_dsdecod
      operator: does_not_contain
      value: DEATH
      value_is_literal: yes
Core:
  Id: CORE-000679
  Status: Published
  Version: '1'
Description: When Death flag (DTHFL) in the DM dataset is populated as 'Y' then a
  record should be present in the DS dataset where DSDECOD = 'DEATH' for the corresponding
  subject.
Executability: Fully Executable
Match_Datasets:
  - Keys:
      - USUBJID
    Name: DM
Operations:
  - domain: DS
    group:
      - USUBJID
    id: $ds_dsdecod
    name: DSDECOD
    operator: distinct
Outcome:
  Message: DTHFL in DM dataset is "Y" but a record is missing in DS dataset where
    DSDECOD = "DEATH".
  Output_Variables:
    - USUBJID
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - EVENTS
  Domains:
    Include:
      - DS
Sensitivity: Dataset
herald:
  source: CDISC Library API
  catalogs:
