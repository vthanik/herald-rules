id: HRL-SD-0574
version: 1
status: Published
standard: SDTM
category: Terminology
sensitivity: Record
executability: Fully Executable
description: Value for the Null Flavor (TSVALNF) variable must be populated using
  terms found in ISO 21090.
scope:
  classes:
    - TRIAL DESIGN
  domains:
    - TS
check:
  all:
    - name: TSVALNF
      operator: non_empty
    - name: TSVALNF
      operator: in
      value: NI,INV,OTH,PINF,NINF,UNC,DER,UNK,ASKU,NAV,NASK,QS,TRC,MSK,NA
outcome:
  message: Value for TSVALNF not found in ISO 21090
  severity: Error
provenance:
  p21_id: SD2283
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB011
  source_doc: SDTM-IG v3.3

