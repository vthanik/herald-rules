Core:
  Id: FDAV-SD1266
  Status: Reference
  Version: '1'
Description: When the Description of Unplanned Element (SEUPDES) is not populated,
  the Element Code (ETCD) should not be equal to 'UNPLAN'.
Check:
  all:
    - name: SEUPDES
      operator: empty
    - name: ETCD
      operator: equal_to
      value: UNPLAN
Outcome:
  Message: ETCD equals 'UNPLAN' when SEUPDES is null
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: SE
Standard: SDTM
Publisher ID: CG0210, 125
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
  - SENDIG 3.0
  - SENDIG 3.1
  - SENDIG 3.1.1
  - SENDIG-AR 1.0
  - SENDIG-DART 1.1
CORE Reference: CORE-000256
Executability: Fully Executable
Scope:
  Classes:
    Include: SPECIAL PURPOSE
  Domains:
    Include: SE
  Use_Case: INDH, NONCLIN

