id: HRL-AD-0192
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Within a study, All *CATy values must be the same for each unique value
  of the variable it categorizes within a PARAMCD. [AVAL:AVALCATy], [AVALC:AVALCATy],
  [BASE:BASECATy], [BASEC:BASECATy], [CHG:CHGCATy], [PCHG:PCHGCATy].  A category may
  be the same across values.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: VARIABLECATVARIABLE
      operator: non_empty
    - name: '%Variables[*CAT#;!PARCAT#]%'
      operator: all_values_equal
      group_by: STUDYID,PARAMCD,%Variable.1%,%Variable.1%C
outcome:
  message: Inconsistent value for %Variable.1%CAT%Variable.2%
  severity: Error
provenance:
  p21_id: AD0221
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

