id: SD1015
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Epoch (EPOCH) values should match entries in the Trial Arms (TA) dataset.
scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
  Use_Case: INDH
check:
  all:
    - name: EPOCH
      operator: is_not_contained_by
      value: $ta_epoch
    - name: EPOCH
      operator: non_empty
outcome:
  message: EPOCH is not in TA.EPOCH
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1015
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000271

