id: HRL-SD-0280
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: DTHFL must equal 'Y' when there is a record in the Disposition (DS) domain
  with DSDECOD = 'DEATH'.
scope:
  classes:
    - EVENTS
  domains:
    - DS
check:
  all:
    - name: USUBJID != '' @and (DSDECOD
      operator: equal_to
      value: DEATH
    - name: DSDECOD
      operator: equal_to
      value: ''''
outcome:
  message: Rule HRL-SD-0280 violation
  severity: Error
provenance:
  p21_id: SD1256
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: P21 rule SD1256

