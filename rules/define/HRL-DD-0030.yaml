standard: Define-XML
category: Terminology
sensitivity: Record
executability: Not Executable
description: NCI Code is required for each Codelist Term that is defined in CDISC
  Controlled Terminology. Define-XML specification represents Term as CodedValue attribute
  on either EnumeratedItem or CodeListItem elements within CodeList element. NCI Code
  is represented as Name attribute on Alias element when Context attribute is "nci:ExtCodeID".
