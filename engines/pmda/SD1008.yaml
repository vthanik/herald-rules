id: SD1008
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: The value of Date/Time of Comment (CODTC) should be null when comments
  are related to a specific parent record or group of parent records in a domain (RDOMAIN,
  IDVAR and IDVARVAL are populated).
scope:
  Classes:
    Include: SPECIAL PURPOSE
  Domains:
    Include: CO
  Use_Case: INDH
check:
  all:
    - name: IDVAR
      operator: non_empty
    - name: CODTC
      operator: non_empty
outcome:
  message: CODTC is populated when comment is a child record of another domain
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1008
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000187

