id: SD1362
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Description of Actual Arm (ACTARM) must be populated when Actual Arm
  Code (ACTARMCD) is populated, and vice versa.
scope:
  Classes:
    Include: SPECIAL PURPOSE
  Domains:
    Include: DM
  Use_Case: INDH
check:
  all:
    - name: ACTARMCD
      operator: empty
    - name: ACTARM
      operator: non_empty
outcome:
  message: ACTARM is populated, but ACTARMCD is null, or vice versa
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1362
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000120

