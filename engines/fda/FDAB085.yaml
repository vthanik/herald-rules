Core:
  Id: FDAB085
  Status: Reference
Description: For findings in MISTRESC using the NEOPLASM controlled terminology list,
  malignancy status in MIRESCAT should align with any benign or malignant designation
  in NEOPLASM. Explain any inconsistencies in the nSDRG.
