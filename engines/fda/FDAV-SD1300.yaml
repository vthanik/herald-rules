Core:
  Id: FDAV-SD1300
  Status: Reference
  Version: '1'
Description: The value of DOMAIN should be no more than 2 characters in length, excluding
  Associated Persons domains.
Check:
  all:
    - name: DOMAIN
      operator: longer_than
      value: 2
Outcome:
  Message: Invalid value for DOMAIN variable
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: ''
Standard: SDTM
Publisher ID: CG0308
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
  - SENDIG-AR 1.0
CORE Reference: CORE-000180
Executability: Fully Executable
Scope:
  Classes:
    Exclude: RELATIONSHIP
  Domains:
    Exclude: AP--
  Use_Case: INDH, PROD

