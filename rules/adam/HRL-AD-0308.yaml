id: HRL-AD-0308
version: 1
status: Published
standard: ADaM
category: Presence
sensitivity: Record
executability: Partially Executable
description: AyIND (Analysis Range y Indicator) variable indicates relationship of
  AVAL (Analysis Value) to the analysis range variables AyLO (Analysis Range y Lower
  Limit) and/or AyHI (Analysis Range y Upper Limit), or the relationship of AVALC
  (Analysis Value (C)) variable to the analysis range variables AyLOC (Analysis Range
  y Lower Limit (C)) and/or AyHIC (Analysis Range y Upper Limit (C)). At least one
  of  AyLO, AyHI, AyLOC, and AyHIC is expected to be present for use of AyIND variable.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: VARIABLE
      operator: variable_exists
      value: A%Variable.1%LO,A%Variable.1%HI,A%Variable.1%LOC,A%Variable.1%HIC
outcome:
  message: None of A%Variable.1%LO, A%Variable.1%HI, A%Variable.1%LOC, or A%Variable.1%HIC
    variables is present, when A%Variable.1%IND is present
  severity: Error
provenance:
  p21_id: AD0352
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

