id: SD1152
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: The structure of study data should be one record per unique combination
  of values in Key Variables provided in Define.xml file by KeySequence attribute
  for each domain or dataset. Note that Key Variables should represent physical structure
  of collected data. Utilization of artificial surrogate keys like --SEQ variable
  should be avoided. Current implementation of the rule is limited to the domain and
  does not use additional non-standard variables stored in SUPPQUAL datasets.
scope:
  classes: []
  domains: []
check:
  all:
    - name: __key_variables__
      operator: is_unique
outcome:
  message: Duplicate records per Key Variables in Define.xml
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1152
  pmda_category: Error
  ig_versions: []

