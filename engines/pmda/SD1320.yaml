id: SD1320
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Character Result/Finding in Std Format (--STRESC) value should not be
  null when Completion Status (--STAT) value is null.
scope:
  Classes:
    Include: FINDINGS
  Domains:
    Include: ALL
  Use_Case: INDH, PROD
check:
  any:
    - all:
        - name: --STAT
          operator: empty
        - name: --DRVFL
          operator: not_equal_to
          value: 'Y'
          value_is_literal: yes
        - name: --ORRES
          operator: empty
    - all:
        - name: --STAT
          operator: empty
        - name: --DRVFL
          operator: not_exists
        - name: --ORRES
          operator: empty
    - all:
        - name: --STAT
          operator: not_exists
        - name: --DRVFL
          operator: not_equal_to
          value: 'Y'
          value_is_literal: yes
        - name: --ORRES
          operator: empty
outcome:
  message: Missing value for --STRESC when --STAT is null
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1320
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000200

