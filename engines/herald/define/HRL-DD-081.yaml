# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.14
id: HRL-DD-081
version: 2
status: Published
standard: Define-XML
category: Method Definition
sensitivity: Record
executability: Fully Executable
description: >
  Method Description is required.
scope:
  classes: []
  domains: []
check:
  all:
    - name: description
      operator: non_empty
outcome:
  message: "Method Description is missing. MethodDef must contain a Description element."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.14"
  cited_guidance: >
    Business Rule: Must contain the child Description element.

tests:
  - name: "HRL-DD-081 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-081 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

