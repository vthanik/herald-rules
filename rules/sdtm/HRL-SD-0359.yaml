id: HRL-SD-0359
version: 1
status: Published
standard: SDTM
category: Terminology
sensitivity: Record
executability: Partially Executable
description: Value for the Medication Class Code (--CLASCD) variable must be populated
  using ATC Code from the WHO Drug dictionary version specified in the define.xml.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: --CLASCD
      operator: not_equal_to
      value: MULTIPLE
    - name: --CLASCD
      operator: non_empty
outcome:
  message: Value for %Domain%CLASCD not found in WHODrug dictionary
  severity: Error
provenance:
  p21_id: SD1346
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB017
  source_doc: SDTM-IG v3.3

