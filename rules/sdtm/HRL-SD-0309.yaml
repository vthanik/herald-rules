id: HRL-SD-0309
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: If multiple disposition events are reported for an EPOCH, the sponsor
  should identify a primary reason and use that to populate DSTERM and DSDECOD. Additional
  reasons should be submitted in SUPPDS.
scope:
  classes:
    - EVENTS
  domains:
    - DS
check:
  all:
    - name: --CAT
      operator: equal_to
      value: DISPOSITION EVENT
    - name: --TERM
      operator: not_equal_to
      value: COMPLETED
    - name: '%Domain%SEQ'
      operator: all_values_equal
      group_by: USUBJID,EPOCH
outcome:
  message: Multiple disposition events for the same EPOCH
  severity: Error
provenance:
  p21_id: SD1290
  core_id: ~
  cg_ids:
    - CG0398
  fda_ids: []
  source_doc: SDTM-IG v3.3

