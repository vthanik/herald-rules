id: HRL-AD-0118
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: If R2AyLO is populated, the values necessary for its calculation must
  both be present and populated. R2AyLO = AVAL / AyLO.  Once this issue is resolved,
  there is greater potential for AD0133 to fire.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: AVAL
      operator: non_empty
    - name: AVARIABLELO
      operator: non_empty
    - name: '%Variables[R2A#LO]%'
      operator: non_empty
outcome:
  message: 'Calculation issue: R2A%Variable.1%LO is populated but AVAL and/or A%Variable.1%LO
    are not populated'
  severity: Error
provenance:
  p21_id: AD0133B
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

