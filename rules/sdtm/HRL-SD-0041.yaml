id: HRL-SD-0041
version: 1
status: Published
standard: SDTM
category: Terminology
sensitivity: Value
executability: Fully Executable

description: >
  EPOCH must be in controlled terminology when present. Valid values are defined by CDISC Controlled Terminology codelist C99079.

scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
  domains:
    []

check:
  all:
    - name: EPOCH
      operator: in
      value:
        - SCREENING
        - RUN-IN
        - TREATMENT
        - FOLLOW-UP
        - "NOT APPLICABLE"

outcome:
  message: "EPOCH value '{EPOCH}' is not in CDISC CT codelist C99079"
  severity: Warning

provenance:
  p21_id: CT0041
  core_id: CORE-000292
  cg_ids:
    - CG0041
  fda_ids:
    []
  source_doc: "SDTM-IG v3.3 Section 4.1.5, CDISC CT C99079"
