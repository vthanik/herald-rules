id: HRL-AD-0133
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Within a study, All PARAM values must be the same for each unique value
  of PARAMN, when both variables PARAM and PARAMN are populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: PARAM
      operator: non_empty
    - name: PARAMN
      operator: non_empty
    - name: PARAM
      operator: all_values_equal
      group_by: STUDYID,PARAMN
outcome:
  message: Inconsistent value for PARAM
  severity: Error
provenance:
  p21_id: AD0146B
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

