id: HRL-SD-0105
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: The value of Date/Time of Comment (CODTC) should be NULL, when comments
  are related to a specific parent record or group of parent records in a domain (RDOMAIN,
  IDVAR and IDVARVAL are populated).
scope:
  classes:
    - SPECIAL-PURPOSE
  domains:
    - CO
check:
  all:
    - name: CODTC
      operator: is_empty
    - name: RDOMAIN
      operator: non_empty
    - name: IDVAR
      operator: non_empty
    - name: IDVARVAL
      operator: non_empty
outcome:
  message: CODTC is populated, when comment is a child record of another domain
  severity: Error
provenance:
  p21_id: SD1008
  core_id: ~
  cg_ids:
    - CG0168
  fda_ids: []
  source_doc: SDTM-IG v3.3

