id: HRL-SD-0453
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: MedDRA coding High Level Term (--HLT) should be consistent for the same
  collected term (--TERM)
scope:
  classes:
    - TRIAL DESIGN
  domains:
    - TE
check:
  all:
    - name: --DECOD
      operator: non_empty
    - name: '%Domain%HLT'
      operator: all_values_equal
      group_by: '%Domain%TERM'
outcome:
  message: Inconsistent value for %Domain%HLT within %Domain%TERM
  severity: Error
provenance:
  p21_id: SD1441
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB003
  source_doc: SDTM-IG v3.3

