# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 4.3.2.2
id: HRL-DD-057
version: 2
status: Published
standard: Define-XML
category: Origin Metadata
sensitivity: Record
executability: Fully Executable
description: >
  For ADaM datasets (Purpose='Analysis') with Origin in {Derived, Assigned},
  Source must be 'Sponsor'.
scope:
  classes: []
  domains: []
check:
  all:
    - name: purpose
      operator: not_equal_to
      value: Analysis
    - name: origin
      operator: not_in
      value:
        - Derived
        - Assigned
    - name: source
      operator: equal_to
      value: Sponsor
outcome:
  message: "ADaM Derived/Assigned variables must have Source = 'Sponsor'."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "4.3.2.2"
  cited_guidance: >
    The Source is always 'Sponsor' for ADaM Derived and Assigned origin types.

tests:
  - name: "HRL-DD-057 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-057 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

