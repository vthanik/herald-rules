id: AD0134C
version: 1
status: Reference
standard: ADaM
category: Conformance
sensitivity: Record
executability: Not Executable
description: When Analysis Range High (AyHI) = 0, the Ratio to Analysis Range High
  (R2AyHI) should not be populated since you cannot divide by 0. AD0134 checks the
  calculation is correct when AyLO != '0'.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
check: []
outcome:
  message: 'Calculation issue: AyHI = 0, but R2AyHI is populated'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0134C
  pmda_category: Error
  ig_versions: []

