id: HRL-SD-0024
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Fully Executable

description: >
  VSTEST must not be empty in the VS domain. The vital signs test name is required for every vital signs record.

scope:
  classes:
    - FINDINGS
  domains:
    - VS

check:
  all:
    - name: VSTEST
      operator: non_empty

outcome:
  message: "VSTEST is empty or missing in VS for subject '{USUBJID}'"
  severity: Error

provenance:
  p21_id: SD0024
  core_id: CORE-000275
  cg_ids:
    - CG0024
  fda_ids:
    []
  source_doc: "SDTM-IG v3.3 Section 6.3.7"
