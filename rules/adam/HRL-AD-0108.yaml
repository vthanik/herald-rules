id: HRL-AD-0108
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Within a study, all PARCATyN values must be the same for each unique
  value of PARCATy, when both variables are populated
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: PARCATVARIABLE
      operator: non_empty
    - name: PARCATVARIABLEN
      operator: non_empty
    - name: '%Variables[PARCAT#N]%'
      operator: all_values_equal
      group_by: STUDYID,PARCAT%Variable.1%
outcome:
  message: Inconsistent value for PARCAT%Variable.1%N
  severity: Error
provenance:
  p21_id: AD0126B
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

