Core:
  Id: FDAV-SD1295
  Status: Reference
  Version: '1'
Description: TSVAL for ADDON record must be 'Y' or 'N'.
Check:
  all:
    - name: TSPARMCD
      operator: equal_to
      value: ADDON
      value_is_literal: yes
    - name: TSVAL
      operator: non_empty
    - name: TSVAL
      operator: is_not_contained_by
      value:
        - 'N'
        - 'Y'
Outcome:
  Message: Invalid TSVAL value for ADDON parameter
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: TS
Standard: SDTM
Publisher ID: CG0269
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
CORE Reference: CORE-000372
Executability: Fully Executable
Scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include: TS

