id: AD0236B
version: 1
status: Reference
standard: ADaM
category: Conformance
sensitivity: Record
executability: Fully Executable
description: Within a study, all Actual Pooled Trt y for Period xx (N) (TRxxAGyN)
  variable values must be the same for each unique value of Actual Pooled Treatment
  y for Period xx (TRxxAGy) variable when both variables are populated. Analogous
  rule for AD0233.
scope:
  classes: []
  domains:
    - ADSL
    - ADDL
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for TRxxAGyN
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0236B
  pmda_category: Error
  ig_versions: []

