id: HRL-SD-0379
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Subject Reference End Date/Time (RFENDTC) should be null for screen failures
  or unassigned subjects. Therefore, when the Reason Arm and/or Actual Arm is Null
  (ARMNRS) variable is populated, RFENDTC should be null.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: RFENDTC
      operator: is_empty
    - name: ARMNRS
      operator: non_empty
outcome:
  message: RFENDTC is populated when ARMNRS is not null
  severity: Error
provenance:
  p21_id: SD1366
  core_id: ~
  cg_ids:
    - CG0530
  fda_ids: []
  source_doc: SDTM-IG v3.3

