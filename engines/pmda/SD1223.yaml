id: SD1223
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: TSVAL for RANDOM record must be 'Y' or 'N'.
scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include: TS
check:
  all:
    - name: TSPARMCD
      operator: equal_to
      value: RANDOM
      value_is_literal: yes
    - name: TSVAL
      operator: non_empty
    - name: TSVAL
      operator: is_not_contained_by
      value:
        - 'N'
        - 'Y'
outcome:
  message: Invalid TSVAL value for RANDOM
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1223
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000373

