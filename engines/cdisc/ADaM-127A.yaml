Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  ABLFL (Analysis Baseline Flag) is required if BASE (Baseline Value) or BASEC (Baseline Value Character) is present in the dataset.
                Document: ADaM IG v1.1
                Section: '3.3.5'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-127A
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  any:
    - all:
        - name: BASE
          operator: non_empty
        - name: ABLFL
          operator: empty
    - all:
        - name: BASEC
          operator: non_empty
        - name: ABLFL
          operator: empty
Core:
  Id: ADaM-127A
  Status: Published
  Version: '1'
Description: >-
  When BASE or BASEC is populated, ABLFL must also be present to identify the baseline record. Without ABLFL, the baseline assignment is ambiguous.
Executability: Fully Executable
Outcome:
  Message: 'BASE or BASEC is present but ABLFL is missing'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "BASE and ABLFL both present"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, BASE, ABLFL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", 140.0, "Y"]
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", 140.0, ""]
    expected_findings: 0
  - name: "BASE populated but ABLFL is null"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, BASE, ABLFL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", 140.0, ""]
    expected_findings: 1
