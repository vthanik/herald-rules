id: HRL-AD-0103
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Within a study, All PARAMTYP values must be the same for each unique
  value of PARAMCD when PARAMCD is populated.  If a PARAMCD is said to be derived,
  all instances must be derived.  More than one paramater can be derived.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: PARAMCD
      operator: non_empty
    - name: PARAMTYP
      operator: all_values_equal
      group_by: STUDYID,PARAMCD
outcome:
  message: Inconsistent value for PARAMTYP
  severity: Error
provenance:
  p21_id: AD0123
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

