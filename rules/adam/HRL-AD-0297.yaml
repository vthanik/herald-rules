id: HRL-AD-0297
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Within a Study and a Parameter, all MCRITyMN  (Multi-Response Criterion
  y Eval (N)) variable values must be the same for each unique value of MCRITyML (Multi-Response
  Criterion y Evaluation), when primary variable MCRITyML is populated
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: MCRITVARIABLEML
      operator: non_empty
    - name: '%Variables[MCRIT#MN]%'
      operator: all_values_equal
      group_by: STUDYID,PARAMCD,MCRIT%Variable.1%ML
outcome:
  message: Inconsistent value for MCRIT%Variable.1%MN
  severity: Error
provenance:
  p21_id: AD0341
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

