Core:
  Id: FDAV-SD1037
  Status: Reference
  Version: '1'
Description: A value for a Toxicity (--TOX) variable should be provided, when a Toxicity
  Grade (--TOXGR) variable value is populated and greater than 0.
Check:
  all:
    - name: --TOX
      operator: non_empty
    - name: --TOXGR
      operator: empty
Outcome:
  Message: Missing value for --TOX, when --TOXGR is populated
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
