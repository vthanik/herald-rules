id: HRL-SD-0004
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Dataset
executability: Fully Executable

description: >
  STUDYID must be consistent across all records within a dataset. All records in a single dataset must have the same STUDYID value.

scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
  domains:
    []

check:
  all:
    - name: STUDYID
      operator: is_consistent_across_dataset

outcome:
  message: "STUDYID has inconsistent values within {DOMAIN} dataset"
  severity: Error

provenance:
  p21_id: SD0004
  core_id: CORE-000255
  cg_ids:
    - CG0004
  fda_ids:
    []
  source_doc: "SDTM-IG v3.3 Section 4.1.1"
