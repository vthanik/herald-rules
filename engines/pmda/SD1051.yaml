id: SD1051
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Both Identifying Variable (IDVAR) and Identifying Variable Value (IDVARVAL)
  should not be populated when relating information to the Demographics (DM) domain.
scope:
  Classes:
    Include: RELATIONSHIP
  Domains:
    Include: SUPP--
  Use_Case: INDH, PROD
check:
  all:
    - name: RDOMAIN
      operator: not_equal_to
      value: DM
      value_is_literal: yes
    - name: IDVAR
      operator: empty
outcome:
  message: Unexpected value for IDVAR/IDVARVAL
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1051
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000134

