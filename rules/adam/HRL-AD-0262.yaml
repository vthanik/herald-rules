id: HRL-AD-0262
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Across studies, All AETOXGR must be the same for each unique value of
  AETOXGRN when primary variable AETOXGR is populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: AETOXGR
      operator: non_empty
    - name: AETOXGR
      operator: all_values_equal
      group_by: AETOXGRN
outcome:
  message: Inconsistent value for AETOXGR
  severity: Error
provenance:
  p21_id: AD0293
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.0

