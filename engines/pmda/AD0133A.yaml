id: AD0133A
version: 1
status: Reference
standard: ADaM
category: Conformance
sensitivity: Record
executability: Not Executable
description: R2AyLO = AVAL / AyLO. therefore if R2AyLO is present, both AVAL and AyLO
  must be present for calculation consistency.
scope:
