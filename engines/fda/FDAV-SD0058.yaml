Core:
  Id: FDAV-SD0058
  Status: Reference
  Version: '1'
Description: Only variables listed in SDTM model should appear in a dataset. New sponsor
  defined variables must not be added, and existing variables must not be renamed
  or modified.
Check:
  all:
    - name: variable_name
      operator: not_equal_to
      value: EXMETHOD
    - name: variable_name
      operator: not_equal_to
      value: EGBEATNO
    - name: variable_name
      operator: not_equal_to
      value: ICIMPLBL
    - name: variable_name
      operator: not_equal_to
      value: MSAGENT
    - name: variable_name
      operator: not_equal_to
      value: MSCONC
    - name: variable_name
      operator: not_equal_to
      value: MSCONCU
    - name: variable_name
      operator: is_not_contained_by
      value: $allowed_variables
Outcome:
  Message: Variable appears in dataset, but is not in SDTM model
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: ''
Standard: SDTM
Publisher ID: CG0013, CG0542, CG0564, CG0565, CG0566, CG0567, 2, 10, 30, 31, 32, 268,
  269, 270
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
  - SENDIG 3.0
  - SENDIG 3.1
  - SENDIG 3.1.1
  - SENDIG-AR 1.0
  - SENDIG-DART 1.1
CORE Reference: CORE-001079
Executability: Partially Executable - Possible Underreporting
Scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL

