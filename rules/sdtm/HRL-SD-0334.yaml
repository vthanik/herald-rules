id: HRL-SD-0334
version: 1
status: Published
standard: SDTM
category: Limit
sensitivity: Record
executability: Partially Executable
description: All records in the Disposition (DS) and Protocol Deviations (DV) domains
  should have the Start Date/Time of Event (--STDTC) equal to or after a subject's
  Date/Time of Informed Consent (RFICDTC) in the Demographics (DM) domain.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: SUB:RFICDTC
      operator: less_than
      value: eq %Domain%STDTC
    - name: SUB:RFICDTC
      operator: non_empty
    - name: --STDTC
      operator: non_empty
outcome:
  message: '%Domain%STDTC is before RFICDTC'
  severity: Error
provenance:
  p21_id: SD1319
  core_id: ~
  cg_ids:
    - CG0068
    - CG0075
  fda_ids: []
  source_doc: SDTM-IG v3.3

