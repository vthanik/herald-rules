Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If Analysis Toxicity Description Low (ATOXDSCL) variable is present,
                  ATOXGRLN or ATOXGRL must also be present.
                Document: ADaM IG v1.1
                Section: "4.4"
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-401
              Version: "1"
            Version: "1.0"
        Version: "1.1"
Check:
  all:
    - name: ATOXDSCL
      operator: non_empty
    - name: ATOXGRLN
      operator: empty
    - name: ATOXGRL
      operator: empty
Core:
  Id: ADaM-401
  Status: Published
  Version: "1"
Description: >-
  If Analysis Toxicity Description Low (ATOXDSCL) variable is present,
  ATOXGRLN or ATOXGRL must also be present.
Executability: Fully Executable
Outcome:
  Message: "ATOXDSCL is present but neither ATOXGRLN nor ATOXGRL is present"
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BASIC DATA STRUCTURE
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: "2026-04-12"

tests:
  - name: ATOXDSCL with ATOXGRLN present (valid)
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ATOXDSCL, ATOXGRLN, ATOXGRL]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, "Grade 1 Low", 1, ""]
    expected_findings: 0
  - name: ATOXDSCL present but ATOXGRLN and ATOXGRL missing (violation)
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ATOXDSCL, ATOXGRLN, ATOXGRL]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, "Grade 1 Low", "", ""]
    expected_findings: 1
