Check:
  all:
    - name: --DY
      operator: non_empty
    - name: --DTC
      operator: is_complete_date
    - name: RFSTDTC
      operator: is_complete_date
    - name: --DY
      operator: not_equal_to
      value: $val_dy
Core:
  Id: CORE-000529
  Status: Published
  Version: '1'
Description: Raise an error when --DY is not calculated as per the study day algorithm
  as a non-zero integer value when the date portion of --DTC is complete and the date
  portion of DM.RFSTDTC is a complete date AND --DY is not empty
Executability: Fully Executable
Match_Datasets:
  - Keys:
      - USUBJID
    Name: DM
Operations:
  - id: $val_dy
    name: --DTC
    operator: dy
Outcome:
  Message: --DY is not correctly calculated even though the date portion of --DTC
    is complete, the date portion of RFSTDTC is complete, and --DY is not empty.
  Output_Variables:
    - $val_dy
    - --DY
    - --DTC
    - RFSTDTC
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ALL
  Use_Case: NONCLIN, INDH, PROD
Sensitivity: Record
herald:
  source: CDISC Library API
  catalogs:
    - SDTMIG 3.2
    - SDTMIG 3.3
  fetched: '2026-04-03T12:15:16Z'

