id: HRL-AD-0057
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Within a study, All TRTxxPN values must be the same for each unique value
  of TRTxxP when primary variable TRTxxP is populated. Considering only those rows
  on which both variables are populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: TRTVARIABLEP
      operator: non_empty
    - name: TRTVARIABLEPN
      operator: non_empty
    - name: '%Variables[TRT##PN]%'
      operator: all_values_equal
      group_by: STUDYID,TRT%Variable.1%P
outcome:
  message: Inconsistent value for TRT%Variable.1%PN
  severity: Error
provenance:
  p21_id: AD0076B
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

