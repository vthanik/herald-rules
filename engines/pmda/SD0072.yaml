id: SD0072
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Related Domain Abbreviation (RDOMAIN) must have a valid value of Domains
  included in the study data.
scope:
  Classes:
    Include: ALL
  Domains:
    Include:
      - CO
      - RELREC
      - SUPP--
  Use_Case: INDH, PROD
check:
  all:
    - name: RDOMAIN
      operator: non_empty
    - name: RDOMAIN
      operator: is_not_contained_by
      value: $study_domains
outcome:
  message: Invalid RDOMAIN
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0072
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000502

