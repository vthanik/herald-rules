id: SD1052
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Order of Element within Arm (TAETORD) must have a unique value for a
  given value of Planned Arm Code (ARMCD) within the domain.
scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include: TA
  Use_Case: INDH
check:
  all:
    - name: TAETORD
      operator: is_not_unique_set
      value: ARM
outcome:
  message: Non-unique value for TAETORD within ARMCD
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1052
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000144

