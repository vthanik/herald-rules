id: HRL-AD-0008
version: 1
status: Published
standard: ADaM
category: Terminology
sensitivity: Value
executability: Fully Executable

description: >
  ITTFL must be in (Y, N) in ADSL. The intent-to-treat population flag must contain only the values Y or N.

scope:
  classes:
    - ADSL
  domains:
    - ADSL

check:
  all:
    - name: ITTFL
      operator: in
      value:
        - "Y"
        - "N"

outcome:
  message: "ITTFL value '{ITTFL}' is not Y or N in ADSL for subject '{USUBJID}'"
  severity: Error

provenance:
  p21_id: AD0008
  core_id: null
  cg_ids:
    - CG0108
  fda_ids:
    - FDA-AD-008
  source_doc: "ADaM-IG v1.3 Section 3.1.3"
