# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 3.5
id: HRL-DD-097
version: 1
status: Published
standard: Define-XML
category: Orphan Detection
sensitivity: Study
executability: Fully Executable
description: >
  Method defined in Methods sheet but never referenced by any Variable or ValueLevel entry.
scope:
  classes: []
  domains: []
check:
  all:
    - name: __method_is_referenced
      operator: equal_to
      value: false
outcome:
  message: "Method is defined but never referenced by any variable or value-level entry. Consider removing orphaned methods."
  severity: Warning
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "3.5"
  cited_guidance: >
    Each distinct method is expected to have a unique MethodOID and can be referenced from different variables.

tests:
  - name: "HRL-DD-097 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-097 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

