id: AD0794
version: 1
status: Published
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: >
  On a given record, a variable with a suffix of SDTM has a value greater than
  a value of a variable with the same root and a suffix of EDTM, and both
  variables are populated. (Paired *SDTM / *EDTM datetime variables must obey
  start <= end.)
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: ""
      operator: paired_suffix_date_order
      value:
        start_suffix: SDTM
        end_suffix: EDTM
outcome:
  message: "*SDTM is greater than *EDTM"
  severity: Error
provenance:
  source_doc: P21 Community ADaM Validation Rules
  authority: Herald
  p21_reference: AD0794
  ig_versions: []
