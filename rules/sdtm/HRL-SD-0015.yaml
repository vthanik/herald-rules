id: HRL-SD-0015
version: 1
status: Published
standard: SDTM
category: Format
sensitivity: Value
executability: Fully Executable

description: >
  BRTHDTC must be a valid ISO 8601 date string in the DM domain. The date of birth must conform to ISO 8601 format when present.

scope:
  classes:
    - SPECIAL-PURPOSE
  domains:
    - DM

check:
  all:
    - name: BRTHDTC
      operator: is_valid_iso8601

outcome:
  message: "BRTHDTC value '{BRTHDTC}' is not a valid ISO 8601 date in DM"
  severity: Warning

provenance:
  p21_id: SD0015
  core_id: CORE-000266
  cg_ids:
    - CG0015
  fda_ids:
    []
  source_doc: "SDTM-IG v3.3 Section 5.1"
