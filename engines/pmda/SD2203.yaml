id: SD2203
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: '''Planned Minimum Age of Subject'' (AGEMIN) record must be populated
  in Trial Summary (TS) domain. It is expected for SDTM IG v3.1.2 data and required
  for data in all more recent SDTM versions.'
scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include: TS
check:
  all:
    - name: TSPARMCD
      operator: not_contains_all
      value:
        - ADDON
        - AGEMAX
        - AGEMIN
        - LENGTH
        - PLANSUB
        - RANDOM
        - SEXPOP
        - STOPRULE
        - TBLIND
        - TCNTRL
        - TITLE
        - TPHASE
        - TTYPE
        - OBJPRIM
        - SPONSOR
        - REGID
        - OUTMSPRI
        - FCNTRY
        - ADAPT
        - DCUTDTC
        - DCUTDESC
        - NARMS
        - STYPE
        - SSTDTC
        - SENDTC
        - ACTSUB
        - HLTSUBJI
outcome:
  message: Missing AGEMIN Trial Summary Parameter
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD2203
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000740

