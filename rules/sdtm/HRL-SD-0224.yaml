id: HRL-SD-0224
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Partially Executable
description: Pre-specified (--PRESP) variable should be included into dataset, when
  Occurrence (--OCCUR) variable is present. (--PRESP/Events) Used to indicate whether
  the event describe by --TERM was pre-specified on a CRF.  Value is Y for pre-specified
  events, null for spontaneously reported events. (--PRESP/Interventions) Used when
  a specific intervention is pre-specified on a CRF. Values should be 'Y' or null.
  (--OCCUR) Used to record whether a pre-specified event occurred when information
  about the occurrence of a specific event is solicited.
scope:
  classes:
    - INTERVENTIONS
  domains:
    - PR
check:
  all:
    - name: VARIABLE
      operator: variable_exists
      value: '%Domain%PRESP'
outcome:
  message: Missing %Domain%PRESP variable, when %Domain%OCCUR variable is present
  severity: Error
provenance:
  p21_id: SD1147
  core_id: ~
  cg_ids:
    - CG0088
  fda_ids: []
  source_doc: SDTM-IG v3.3

