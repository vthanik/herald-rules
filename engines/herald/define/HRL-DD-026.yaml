# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.4.4
id: HRL-DD-026
version: 2
status: Published
standard: Define-XML
category: Study Metadata
sensitivity: Study
executability: Fully Executable
description: >
  ProtocolName is required and must be non-empty in the Define sheet.
scope:
  classes: []
  domains: []
check:
  all:
    - name: ProtocolName
      operator: non_empty
outcome:
  message: "ProtocolName is missing or empty in the Define sheet. This is required for all Define-XML documents."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.4.4"
  cited_guidance: >
    ProtocolName -- Required. Cardinality: Exactly one. A protocol name or number assigned to the study.

tests:
  - name: "HRL-DD-026 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-026 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

