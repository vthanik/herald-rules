Core:
  Id: CORE-000892
  Status: Published
  Version: '1'
Description: When Eed timepoint (--ENDTC, --ENRF or --ENRTPT) is populated, related
  start timepoint (--STDTC, --STRF or --STRTPT should also be populated.
Executability: Fully Executable
Outcome:
  Message: End timepoint is populated but start timepoint is missing.
  Output_Variables:
    - --STDTC
    - --STRF
    - --STRTPT
    - --ENDTC
    - --ENRF
    - --ENRTPT
