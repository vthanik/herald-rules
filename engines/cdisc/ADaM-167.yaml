Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If Baseline Reference Range Indicator (BNRIND) variable is present, then BNRIND on the baseline record (ABLFL=Y) must equal ANRIND on that record.
                Document: ADaM IG v1.1
                Section: '3.3.6'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-167
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: ABLFL
      operator: equal_to
      value: 'Y'
    - name: BNRIND
      operator: non_empty
    - name: ANRIND
      operator: non_empty
    - name: BNRIND
      operator: not_equal_to_variable
      value: ANRIND
Core:
  Id: ADaM-167
  Status: Published
  Version: '1'
Description: >-
  On baseline record (ABLFL=Y), BNRIND must equal ANRIND.
Executability: Fully Executable
Outcome:
  Message: 'ABLFL=Y but BNRIND does not equal ANRIND on baseline record'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "ABLFL=Y and BNRIND=ANRIND (correct)"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ABLFL, ANRIND, BNRIND]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Y", "NORMAL", "NORMAL"]
    expected_findings: 0
  - name: "ABLFL=Y but BNRIND != ANRIND"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ABLFL, ANRIND, BNRIND]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Y", "NORMAL", "HIGH"]
    expected_findings: 1
