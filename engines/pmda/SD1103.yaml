id: SD1103
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Start Reference Time Point (--STTPT) variable must be included into the
  domain when Start Relative to Reference Time Point (--STRTPT) variable is present.
scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
  Use_Case: INDH, PROD
check:
  all:
    - name: --STRTPT
      operator: exists
    - name: --STTPT
      operator: not_exists
outcome:
  message: Missing --STTPT variable when --STRTPT variable is present
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1103
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000258

