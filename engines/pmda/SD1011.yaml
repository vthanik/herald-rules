id: SD1011
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Value of Duration, Elapsed Time, and Interval variables (--DUR, --ELTM,
  --EVLINT, --STINT, --ENINT, TDSTOFF, TDTGTPAI, TDMINPAI, TDMAXPAI) must conform
  to the ISO 8601 international standard.
scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
  Use_Case: INDH, PROD
check:
  all:
    - name: --TPTREF
      operator: empty
    - name: --ELTM
      operator: non_empty
outcome:
  message: Invalid ISO 8601 value for variable
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1011
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000028

