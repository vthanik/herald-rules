id: SD1361
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Description of Planned Arm (ARM) must be populated when Planned Arm Code
  (ARMCD) is populated, and vice versa.
scope:
  Classes:
    Include: SPECIAL PURPOSE
  Domains:
    Include: DM
  Use_Case: INDH
check:
  all:
    - name: ARMCD
      operator: empty
    - name: ARM
      operator: non_empty
outcome:
  message: ARM is populated, but ARMCD is null, or vice versa
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1361
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000119

