id: HRL-SD-0471
version: 1
status: Published
standard: SDTM
category: Terminology
sensitivity: Record
executability: Partially Executable
description: Value for Preferred Term Code (--PTCD) variable must be populated using
  a Preferred Term Code of the MedDRA dictionary of a version specified in the define.xml.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: '%Variables[--PTCD]%'
      operator: non_empty
outcome:
  message: Value for %Domain%PTCD not found in MedDRA dictionary
  severity: Error
provenance:
  p21_id: SD2007
  core_id: ~
  cg_ids:
    - CG0380
  fda_ids:
    - FDAB003
  source_doc: SDTM-IG v3.3

