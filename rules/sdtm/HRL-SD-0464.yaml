id: HRL-SD-0464
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: The value of Sequence Number (DISEQ) variable must be unique for each
  record within a domain and within each Sponsor Device Identifier (SPDEVID)
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: --SEQ
      operator: non_empty
    - name: '%Domain%SEQ'
      operator: is_unique
      group_by: SPDEVID
outcome:
  message: Duplicate value for %Domain%SEQ variable
  severity: Error
provenance:
  p21_id: SD1453
  core_id: ~
  cg_ids:
    - CG0028
  fda_ids: []
  source_doc: SDTM-IG v3.3

