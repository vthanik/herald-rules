id: SD0063A
version: 1
status: Reference
standard: SDTM
category: Conformance
sensitivity: Record
executability: Fully Executable
description: Variable Label in the dataset should match the variable label described
  in SDTM IG. When creating a new domain Variable Labels could be adjusted as appropriate
  to properly convey the meaning in the context of the data being submitted.
scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
check:
  all:
    - name: variable_name
      operator: equal_to
      value: library_variable_name
    - name: library_variable_label
      operator: non_empty
    - name: variable_label
      operator: not_equal_to
      value: library_variable_label
outcome:
  message: SDTM/dataset variable label mismatch
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0063A
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000398

