id: HRL-SD-0062
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Description of Arm (ARM) must equal 'Not Assigned', when Arm Code (ARMCD)
  is 'NOTASSGN', and vice versa.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: ARMCD
      operator: equal_to_case_insensitive
      value: NOTASSGN
    - name: ARM
      operator: equal_to_case_insensitive
      value: Not Assigned
    - name: ARMCD
      operator: equal_to_case_insensitive
      value: NOTASSGN
    - name: ARM
      operator: equal_to_case_insensitive
      value: Not Assigned
outcome:
  message: ARM is not 'Not Assigned', when ARMCD equals 'NOTASSGN', or vice versa
  severity: Error
provenance:
  p21_id: SD0053
  core_id: ~
  cg_ids:
    - CG0129
  fda_ids: []
  source_doc: SDTM-IG v3.3

