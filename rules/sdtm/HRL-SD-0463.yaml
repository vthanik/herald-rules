id: HRL-SD-0463
version: 1
status: Published
standard: SDTM
category: Limit
sensitivity: Record
executability: Partially Executable
description: Non-missing Treatment Vehicle Amount (--VAMT) value must be greater than
  or equal to 0.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: --VAMT
      operator: greater_than
      value: eq 0
    - name: --VAMT
      operator: non_empty
outcome:
  message: Negative value for %Domain%VAMT
  severity: Error
provenance:
  p21_id: SD1452
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB040
  source_doc: SDTM-IG v3.3

