# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.14
id: DD0058
version: 1
status: Published
standard: Define-XML
category: Method Definition
sensitivity: Record
executability: Fully Executable
description: >
  Method Description is required.
scope:
  classes: []
  domains: []
check:
  all:
    - name: description
      operator: empty
outcome:
  message: "Method Description is missing. MethodDef must contain a Description element."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.14"
  cited_guidance: >
    Business Rule: Must contain the child Description element.
