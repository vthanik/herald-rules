id: HRL-AD-0300
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Within a Study and a Parameter, all ANRHI (Analysis Normal Range Upper
  Limit) variable values must be the same for each unique value of ANRHIC (Analysis
  Normal Range Upper Limit (C)), when variable ANRHIC is populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: ANRHIC
      operator: non_empty
    - name: ANRHI
      operator: all_values_equal
      group_by: STUDYID,PARAMCD,ANRHIC
outcome:
  message: Inconsistent value for ANRHI
  severity: Error
provenance:
  p21_id: AD0344
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

