id: HRL-SD-0088
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: The value of Unique Subject Identifier (USUBJID) variable must be unique
  for each subject across all trials in the submission. In the Demographics (DM) domain,
  there should only be one record per subject.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: USUBJID
      operator: non_empty
    - name: USUBJID
      operator: is_unique
      group_by: STUDYID
outcome:
  message: Duplicate USUBJID in DM within STUDYID
  severity: Error
provenance:
  p21_id: SD0083
  core_id: ~
  cg_ids:
    - CG0151
  fda_ids: []
  source_doc: SDTM-IG v3.3

