id: HRL-AD-0028
version: 1
status: Published
standard: ADaM
category: Format
sensitivity: Record
executability: Fully Executable
description: 'The SAS format listed in the dataset must be valid. Here is a list of
  SAS Date formats utilized in the rule algorithm: B8601DA, B8601DN , DATE, DAY, DDMMYY,
  DDMMYYB, DDMMYYC, DDMMYYD, DDMMYYN, DDMMYYP, DDMMYYS, DOWNAME, DTMONYY, E8601DA,
  JULDAY, JULIAN, MMDDYY, MMDDYYB, MMDDYYC, MMDDYYD, MMDDYYN, MMDDYYP, MMDDYYS, MMYY,
  MMYYB, MMYYC, MMYYD, MMYYN, MMYYP, MMYYS, MONNAME, MONTH, MONYY, PDJULG, PDJULI,
  QTR, QTRR, WEEKDATE, WEEKDATX, WEEKDAY, WEEKU, WEEKV, WEEKW, WORDDATE, WORDDATX,
  YEAR, YYMM, YYMMDD, YYMMDDB, YYMMDDC, YYMMDDD, YYMMDDN, YYMMDDP, YYMMDDS, YYMMB,
  YYMMC, YYMMD, YYMMN, YYMMP, YYMMS, YYMON, YYQ, YYQB, YYQC, YYQD, YYQN, YYQP, YYQS,
  YYQR, YYQRB, YYQRC, YYQRD, YYQRN, YYQRP, YYQRS, IS8601DA'
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
