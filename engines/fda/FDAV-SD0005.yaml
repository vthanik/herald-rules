Core:
  Id: FDAV-SD0005
  Status: Reference
  Version: '1'
Description: The value of Sequence Number (--SEQ) variable must be unique for each
  record within a domain and within each Unique Subject Identifier (USUBJID) or Pool
  Identifier (POOLID) variables value when they are present in the domain. Exclusions
  are DO, DT, DU and DX domains.
Check:
  any:
    - all:
        - name: --SEQ
          operator: exists
        - name: USUBJID
          operator: non_empty
        - name: --SEQ
          operator: is_not_unique_set
          value:
            - DOMAIN
            - USUBJID
    - all:
        - name: --SEQ
          operator: exists
        - name: POOLID
          operator: non_empty
        - name: --SEQ
          operator: is_not_unique_set
          value:
            - DOMAIN
            - POOLID
Outcome:
  Message: Duplicate value for --SEQ variable
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: ''
Standard: SDTM
Publisher ID: CG0028, 138, 354
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
  - SENDIG 3.0
  - SENDIG 3.1
  - SENDIG 3.1.1
  - SENDIG-AR 1.0
  - SENDIG-DART 1.1
CORE Reference: CORE-000544
Executability: Fully Executable
Scope:
  Classes:
    Include: ALL
  Domains:
    Exclude: TS

