id: HRL-AD-0075
version: 1
status: Published
standard: ADaM
category: Presence
sensitivity: Record
executability: Partially Executable
description: If Planned Pooled Treatment y(TRTPGyN) numeric variable is present, there
  must be a corresponding Planned Pooled Treatment y (TRTPGy) character variable.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: VARIABLE
      operator: variable_exists
      value: TRTPG%Variable.1%
outcome:
  message: TRTPGyN is present but TRTPGy is not present
  severity: Error
provenance:
  p21_id: AD0097
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

