id: HRL-AD-0143
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: For a set of [Subject (USUBJID), Parameter (PARAMCD), baseline type (BASETYPE)]
  only one record can be the actual baseline value, marked by ABLFL = Y.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: USUBJID
      operator: non_empty
    - name: PARAMCD
      operator: non_empty
    - name: ABLFL
      operator: equal_to
      value: 'Y'
    - name: ABLFL
      operator: is_unique
      group_by: STUDYID,USUBJID,PARAMCD,BASETYPE
outcome:
  message: Multiple baseline records exist for a unique USUBJID,PARAMCD,BASETYPE
  severity: Error
provenance:
  p21_id: AD0154
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

