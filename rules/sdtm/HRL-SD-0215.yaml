id: HRL-SD-0215
version: 1
status: Published
standard: SDTM
category: Limit
sensitivity: Record
executability: Partially Executable
description: Study Day variables (*DY) value should not be negative in Exposure (EX)
  datasets.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: '%Variables[*DY]%'
      operator: matches_regex
      value: '[1-9]?[0-9]*'
outcome:
  message: Negative value of %Variable% Study Day variable
  severity: Error
provenance:
  p21_id: SD1135
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB036
  source_doc: SDTM-IG v3.3

