id: HRL-AD-0101
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Any variable ending in SDT (Start date) must have a value less than or
  equal to its corresponding EDT (end date) value (e.g. ADSL - TRTSDT, TR01SDT, AP01SDT;
  BDS - APERSDT.
scope:
  classes:
    - ADSL
  domains:
    - ADSL
check:
  all:
    - name: VARIABLESDT
      operator: less_than
      value: eq  %Variable.1%EDT
    - name: '%Variables[*SDT]%'
      operator: non_empty
    - name: VARIABLEEDT
      operator: non_empty
outcome:
  message: '%Variable.1%SDT is greater than %Variable.1%EDT'
  severity: Error
provenance:
  p21_id: AD0121
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

