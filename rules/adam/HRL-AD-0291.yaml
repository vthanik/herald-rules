id: HRL-AD-0291
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Within a Study and a Parameter, all PCHGCATy (Percent Chg from Baseline
  Category y) variable values must be the same for each unique value of PCHGCAyN (Percent
  Chg from Baseline Category y (N)), when variable PCHGCAyN is populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: PCHGCAVARIABLEN
      operator: non_empty
    - name: '%Variables[PCHGCAT#]%'
      operator: all_values_equal
      group_by: STUDYID,PARAMCD,PCHGCA%Variable.1%N
outcome:
  message: Inconsistent value for PCHGCAT%Variable.1%
  severity: Error
provenance:
  p21_id: AD0333
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

