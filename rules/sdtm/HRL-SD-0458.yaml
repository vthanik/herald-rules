id: HRL-SD-0458
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Start Date/Time of Treatment (EXSTDTC) should be less than or equal to
  the Start Date/Time of the latest Disposition Event (DSSTDTC).
scope:
  classes:
    - EVENTS
  domains:
    - DS
check:
  all:
    - name: EXSTDTC
      operator: less_than
      value: eq DS:DSSTDTC
    - name: EXSTDTC
      operator: non_empty
    - name: DS:DSSTDTC
      operator: non_empty
    - name: USUBJID
      operator: non_empty
outcome:
  message: Exposure start date is after the latest Disposition date
  severity: Error
provenance:
  p21_id: SD1446
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB034
  source_doc: SDTM-IG v3.3

