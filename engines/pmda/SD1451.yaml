id: SD1451
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Planned Start of Assessment Interval (--STINT) variable must be included
  in the domain when Planned End of Assessment Interval (--ENINT) variable is present.
scope:
  classes: []
  domains: PP
check:
  all:
    - name: __required_variable__
      operator: exists
outcome:
  message: Missing --STINT variable when --ENINT variable is present
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1451
  pmda_category: Error
  ig_versions: []

