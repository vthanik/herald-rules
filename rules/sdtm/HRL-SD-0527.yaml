id: HRL-SD-0527
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: A value for an Actual Arm Code (ACTARMCD) variable is expected to be
  equal to a value of an Arm Code (ARMCD) variable.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: ACTARMCD
      operator: equal_to
      value: ARMCD
    - name: ACTARMCD
      operator: non_empty
outcome:
  message: ACTARMCD does not equal ARMCD
  severity: Error
provenance:
  p21_id: SD2236
  core_id: ~
  cg_ids:
    - CG0127
  fda_ids:
    - FDAB025
  source_doc: SDTM-IG v3.3

