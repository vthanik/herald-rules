id: HRL-SD-0008
version: 1
status: Published
standard: SDTM
category: Terminology
sensitivity: Value
executability: Fully Executable

description: >
  SEX must be in controlled terminology in the DM domain. Valid values are defined by CDISC Controlled Terminology codelist C66731.

scope:
  classes:
    - SPECIAL-PURPOSE
  domains:
    - DM

check:
  all:
    - name: SEX
      operator: codelist_terms
      ct_codelist: C66731

outcome:
  message: "SEX value '{SEX}' is not in CDISC CT codelist C66731"
  severity: Error

provenance:
  p21_id: CT0008
  core_id: CORE-000259
  cg_ids:
    - CG0008
  fda_ids:
    []
  source_doc: "SDTM-IG v3.3 Section 5.1, CDISC CT 2023-12-15"
