id: SD2256
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: TSVCDREF variable value must be 'UNII' when TSPARMCD='COMPTRT'.
scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include: TS
check:
  all:
    - any:
        - name: TSPARMCD
          operator: equal_to
          value: COMPTRT
        - name: TSPARMCD
          operator: equal_to
          value: CURTRT
        - name: TSPARMCD
          operator: equal_to
          value: TRT
    - name: TSVCDREF
      operator: not_equal_to
      value: UNII
outcome:
  message: Invalid TSVCDREF value for COMPTRT
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD2256
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000735

