# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.14
id: HRL-DD-079
version: 2
status: Published
standard: Define-XML
category: Method Definition
sensitivity: Record
executability: Fully Executable
description: >
  Method ID is required and must be unique.
scope:
  classes: []
  domains: []
check:
  all:
    - name: method_id
      operator: non_empty
outcome:
  message: "Method ID is missing. Each method must have a unique ID."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.14"
  cited_guidance: >
    OID -- Required. Unique ID for the MethodDef.

tests:
  - name: "HRL-DD-079 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-079 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

