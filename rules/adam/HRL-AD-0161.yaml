id: HRL-AD-0161
version: 1
status: Published
standard: ADaM
category: Cross-reference
sensitivity: Record
executability: Partially Executable
description: If ONTRTFL does not equal Y then TRTSDT <=ADT <= TRTEDT should NOT be
  true (analysis must occur outside of treatment range).  Ensure subject exists in
  both files.
scope:
  classes:
    - ADSL
  domains:
    - ADSL
check:
  all:
    - name: ONTRTFL
      operator: not_equal_to
      value: 'Y'
    - name: USUBJID
      operator: non_empty
    - name: ADT
      operator: non_empty
outcome:
  message: Subject is off treatment (ONTRTFL), but analysis date (ADT) is within treatment
    period (ADSL.TRTSDT<= ADT <=ADSL.TRTEDT)
  severity: Error
provenance:
  p21_id: AD0173
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

