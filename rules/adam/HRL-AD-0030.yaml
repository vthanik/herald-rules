id: HRL-AD-0030
version: 1
status: Published
standard: ADaM
category: Format
sensitivity: Record
executability: Fully Executable
description: 'The SAS format listed in the dataset must be valid. Here is a list of
  SAS Time formats utilized in the rule algorithm: B8601LZ, B8601TM, B8601TZ, E8601LZ,
  E8601TM, E8601TZ, HHMM, HOUR, MMSS, TIME, TIMEAMPM, IS8601TM, IS8601TZ, TOD'
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: FORMAT
      operator: in
      value: B8601LZ, B8601TM, B8601TZ, E8601LZ, E8601TM, E8601TZ, HHMM, HOUR, MMSS,
        TIME, TIMEAMPM, IS8601TM, IS8601TZ, TOD
outcome:
  message: '*TM does not have the ADaM required SAS time format'
  severity: Error
provenance:
  p21_id: AD0042
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

