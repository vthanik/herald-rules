id: HRL-DD-019
version: 1
status: Published
standard: Define-XML
category: Origin Metadata
sensitivity: Variable
executability: Fully Executable
description: >
  When a Variables-sheet row has Origin='Predecessor', the Source column must
  be null. Source is mandated only when Origin is not Predecessor (see
  HRL-DD-056); populating it alongside a Predecessor origin indicates
  inconsistent metadata. Counterpart to HRL-DD-061 (which covers the
  Predecessor-field-present requirement).
scope:
  classes: []
  domains: []
check:
  all:
    - name: origin
      operator: not_equal_to
      value: Predecessor
    - name: source
      operator: empty
outcome:
  message: "Origin='Predecessor' but Source is populated. Leave Source null for Predecessor origins."
  severity: Error
provenance:
  source_doc: Herald-original (Define-XML origin integrity); CDISC Define-XML v2.1 § 4.3.2
  authority: Herald
  reference_url: https://www.cdisc.org/standards/data-exchange/define-xml

tests:
  - name: "Origin=Predecessor with null Source passes"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "Origin=Predecessor with populated Source flags"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1
