id: HRL-AD-0285
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Within a Study and a Parameter, all AVALCATy (Analysis Value Category
  y) variable values must be the same for each unique value of AVALCAyN (Analysis
  Value Category y (N)), when primary variable AVALCAy is populated
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: AVALCATVARIABLE
      operator: non_empty
    - name: '%Variables[AVALCAT#]%'
      operator: all_values_equal
      group_by: STUDYID,PARAMCD,AVALCA%Variable.1%N
outcome:
  message: Inconsistent value for AVALCAT%Variable.1%
  severity: Error
provenance:
  p21_id: AD0327
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

