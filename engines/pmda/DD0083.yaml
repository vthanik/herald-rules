id: DD0083
version: 1
status: Reference
standard: Define-XML
category: Define-XML
sensitivity: Record
executability: Fully Executable
description: The OID attribute for Comment (the Comment ID) must be unique within
  Define.xml. Define-XML specification represents Comments as def:CommentDef elements
  within MetaDataVersion element.
scope:
  classes: []
  domains: Error
check:
  all:
    - name: __key_variables__
      operator: is_unique
outcome:
  message: Duplicate Comment OID
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: DD0083
  pmda_category: X
  ig_versions: []

