id: HRL-AD-0207
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Within a study, All TRxxPGyN values must be the same for each unique
  value of TRxxPGy when primary variable TRxxPGy is populated. analogous rule for
  AD0236.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: TRVARIABLEPGVARIABLE
      operator: non_empty
    - name: '%Variables[TR##PG#N]%'
      operator: all_values_equal
      group_by: STUDYID,TR%Variable.1%PG%Variable.2%
outcome:
  message: Inconsistent value for TR%Variable.1%PG%Variable.2%N
  severity: Error
provenance:
  p21_id: AD0233
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

