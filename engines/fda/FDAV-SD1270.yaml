Core:
  Id: FDAV-SD1270
  Status: Reference
  Version: '1'
Description: Pharmacokinetic Concentrations (PC) dataset should be included, when
  a Pharmacokinetic Parameters(PP) dataset is present.
Check:
  all:
    - name: PP
      operator: exists
    - name: PC
      operator: not_exists
Outcome:
  Message: Missing PC dataset, when PP dataset is present
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: PC
Standard: SDTM
Publisher ID: CG0318
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
CORE Reference: CORE-000183
Executability: Fully Executable
Scope:
  Classes:
    Include: FINDINGS
  Domains:
    Include:
      - PC
      - PP
  Use_Case: INDH

