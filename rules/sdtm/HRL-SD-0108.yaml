description: Value of Duration, Elapsed Time, and Interval variables (--DUR, --ELTM,
  --EVLINT, --STINT, --ENINT, TDSTOFF, TDTGTPAI, TDMINPAI, TDMAXPAI) must conform
  to the ISO 8601 international standard.
