id: HRL-AD-0123
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: When analysis range high(AyHI) = 0, the Ratio to analysis range high(R2AyHI)
  should not be populated since you cannot divide by 0.  AD0134 checks the calculation
  is correct when AyLO != '0'.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: R2AVARIABLEHI
      operator: is_empty
    - name: '%Variables[A#HI]%'
      operator: equal_to
      value: '0'
outcome:
  message: 'Calculation issue: A%Variable.1%HI = 0 but R2A%Variable.1%HI is populated'
  severity: Error
provenance:
  p21_id: AD0134C
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

