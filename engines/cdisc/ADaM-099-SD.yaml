Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  Any variable ending in STDY (Start day) must have a value less than
                  or equal to its corresponding ENDY (End day) variable value.
                Document: ADaM IG v1.1
                Section: "3.2"
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-099-SD
              Version: "1"
            Version: "1.0"
        Version: "1.1"
Check:
  all:
    - name: ASTDY
      operator: non_empty
    - name: AENDY
      operator: non_empty
    - name: AENDY
      operator: less_than_variable
      value: ASTDY
Core:
  Id: ADaM-099-SD
  Status: Published
  Version: "1"
Description: >-
  Any variable ending in STDY (Start day) must have a value less than or equal
  to its corresponding ENDY (End day) variable value. ASTDY must be ≤ AENDY.
Executability: Partially Executable
Outcome:
  Message: "*STDY is greater than *ENDY"
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BASIC DATA STRUCTURE
      - OCCURRENCE DATA STRUCTURE
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: "2026-04-12"

tests:
  - name: ASTDY less than AENDY (valid)
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ASTDY, AENDY]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, 1, 7]
    expected_findings: 0
  - name: ASTDY greater than AENDY (violation)
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ASTDY, AENDY]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, 10, 5]
    expected_findings: 1
