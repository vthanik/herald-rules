id: HRL-SD-0455
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Body System (--BODSYS) should be consistent for the same collected term
  (--TERM)
scope:
  classes:
    - TRIAL DESIGN
  domains:
    - TE
check:
  all:
    - name: --DECOD
      operator: non_empty
    - name: '%Domain%BODSYS'
      operator: all_values_equal
      group_by: '%Domain%TERM'
outcome:
  message: Inconsistent value for %Domain%BODSYS within %Domain%TERM
  severity: Error
provenance:
  p21_id: SD1443
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB003
  source_doc: SDTM-IG v3.3

