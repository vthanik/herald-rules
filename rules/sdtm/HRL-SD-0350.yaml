id: HRL-SD-0350
version: 1
status: Published
standard: SDTM
category: Cross-reference
sensitivity: Record
executability: Partially Executable
description: A Link ID (TRLNKID) value for a tumor that is referenced in the Tumor
  Results (TR) domain for a subject must also be present in the Tumor Identification
  (TU) domain for that subject.
scope:
  classes:
    - FINDINGS
  domains:
    - TU
check:
  all:
    - name: --LNKID
      operator: non_empty
    - name: USUBJID
      operator: non_empty
outcome:
  message: TRLNKID value does not exist in TU domain
  severity: Error
provenance:
  p21_id: SD1336
  core_id: ~
  cg_ids:
    - CG0024
  fda_ids: []
  source_doc: SDTM-IG v3.3

