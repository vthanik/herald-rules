# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.11.2.1
id: HRL-DD-033
version: 2
status: Published
standard: Define-XML
category: Dataset Definition
sensitivity: Dataset
executability: Fully Executable
description: >
  SubClass must be a valid CDISC Controlled Terminology value when provided.
scope:
  classes: []
  domains: []
check:
  all:
    - name: subclass
      operator: empty
    - name: subclass
      operator: in
      value:
        - TIME-TO-EVENT
        - ADVERSE EVENT
outcome:
  message: "SubClass value is not valid. Allowable values are 'TIME-TO-EVENT' and 'ADVERSE EVENT'."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.11.2.1"
  cited_guidance: >
    def:SubClass -- Name must follow CDISC Controlled Terminology for SubClass.

tests:
  - name: "HRL-DD-033 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-033 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

