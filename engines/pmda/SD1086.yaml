id: SD1086
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Not Executable
description: 'Collection Study Day (--DY) variable value should be populated as defined
  by CDISC standards: --DY = (date portion of --DTC) - (date portion of RFSTDTC) +1
  if --DTC is on or after RFSTDTC; --DY = (date portion of --DTC) - (date portion
  of RFSTDTC) if --DTC precedes RFSTDTC.'
