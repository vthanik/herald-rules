id: HRL-SD-0064
version: 1
status: Published
standard: SDTM
category: Metadata
sensitivity: Dataset
executability: Partially Executable
description: Variable Data Types in the dataset should match the variable data types
  described in SDTM.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: VARIABLE
      operator: equal_to_variable
      value: '%Variables%'
    - name: TYPE
      operator: in
      value: '%Variable.Type.Basic%'
outcome:
  message: SDTM/dataset variable type mismatch
  severity: Error
provenance:
  p21_id: SD0055
  core_id: ~
  cg_ids:
    - CG0012
  fda_ids: []
  source_doc: SDTM-IG v3.3

