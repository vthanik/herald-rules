id: HRL-CT-0002
version: 1
status: Published
standard: SDTM
category: Terminology
sensitivity: Value
executability: Fully Executable

description: >
  RACE values must match CDISC Controlled Terminology. Values in the
  RACE variable must be from the C74457 codelist.

scope:
  classes:
    - SPECIAL-PURPOSE
  domains:
    - DM

check:
  all:
    - name: RACE
      operator: codelist_terms
      ct_ref:
        codelist: C74457
        version: "2023-12-15"
        terms:
          - AMERICAN INDIAN OR ALASKA NATIVE
          - ASIAN
          - BLACK OR AFRICAN AMERICAN
          - NATIVE HAWAIIAN OR OTHER PACIFIC ISLANDER
          - WHITE
          - MULTIPLE
          - NOT REPORTED
          - UNKNOWN
          - OTHER

outcome:
  message: "RACE value '{RACE}' does not match CDISC CT codelist C74457"
  severity: Error

provenance:
  p21_id: CT0002
  core_id: CORE-000260
  cg_ids:
    - CG0302
  fda_ids:
    - FDA-CT-002
  source_doc: "CDISC CT 2023-12-15, Codelist C74457"
