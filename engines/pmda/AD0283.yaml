id: AD0283
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: Across studies, all Analysis Severity/Intensity (ASEV) variable values
  must be the same for each unique value of Analysis Severity/Intensity (N) (ASEVN)
  variable when the primary variable ASEV is populated.
scope:
  classes: []
  domains:
    - ADAE
    - ADAMOTHER
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for ASEV
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0283
  pmda_category: Error
  ig_versions: []

