Core:
  Id: FDAV-SD1316
  Status: Reference
  Version: '1'
Description: All subjects who have Death records (SSSTRESC = 'DEAD') in Survival Status
  (SS) domain should also have death records (DSDECOD='DEATH') in Disposition (DS)
  domain.
Check:
  all:
    - name: SSSTRESC
      operator: equal_to
      value: DEAD
      value_is_literal: yes
    - name: $ds_dsdecod
      operator: does_not_contain
      value: DEATH
      value_is_literal: yes
Outcome:
  Message: Missing 'DEATH' record for subject in DS domain
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: SS
Standard: SDTM
Publisher ID: CG0067
IG Versions:
  - SDTMIG 3.2
  - SDTMIG 3.3
CORE Reference: CORE-000251
Executability: Fully Executable
Scope:
  Classes:
    Include: FINDINGS
  Domains:
    Include: SS

