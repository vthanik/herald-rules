id: SD1467
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Occurrence Indicator (--OCCUR) variable should not be used in cases of
  spontaneously reported event occurred (--PRESP=null) and prespecified event which
  has no response (--PRESP='Y' and --STAT='NOT DONE').  See SDTMIG 3.4 section 4.5.7
  for details.
scope:
  classes: []
  domains:
    - INTERVENTIONS(-EX)
    - EVENTS(-AE
    - -DS
    - -DV)
check:
  all:
    - name: __domain_variable__
      operator: check_value
outcome:
  message: --OCCUR is populated when --PRESP is null or --STAT is 'NOT DONE'
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1467
  pmda_category: Warning
  ig_versions: []

