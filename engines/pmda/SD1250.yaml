id: SD1250
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Planned Time Point Number (--TPTNUM) variable must be included into the
  domain when Planned Time Point Name (--TPT) variable is present.
scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
  Use_Case: INDH, PROD
check:
  all:
    - name: --TPT
      operator: exists
    - name: --TPTNUM
      operator: not_exists
outcome:
  message: Missing --TPTNUM variable when --TPT variable is present
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1250
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000026

