# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.11
id: HRL-DD-029
version: 2
status: Published
standard: Define-XML
category: Dataset Definition
sensitivity: Dataset
executability: Fully Executable
description: >
  Dataset name is required in the Datasets sheet.
scope:
  classes: []
  domains: []
check:
  all:
    - name: dataset
      operator: non_empty
outcome:
  message: "Dataset name is missing. Each row in the Datasets sheet must have a dataset name."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.11"
  cited_guidance: >
    Name -- Required. Short description for the ItemGroup.

tests:
  - name: "HRL-DD-029 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-029 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

