id: OD0081
version: 1
status: Reference
standard: Define-XML
category: ODM/Define-XML
sensitivity: Record
executability: Fully Executable
description: 'Codelist must have at least one item. Define-XML specification allows
  Codelists to contain 3 types of items: 1) list of Terms (EnumeratedItem); 2) list
  of Terms and Decoded Values (CodeListItem); 3) or a reference to external dictionary
  (ExternalCodeList).'
scope:
  classes: []
  domains: Warning
check:
  all:
    - name: __variable__
      operator: non_empty
outcome:
  message: Codelist <codelist> is empty
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: OD0081
  pmda_category: X
  ig_versions: []

