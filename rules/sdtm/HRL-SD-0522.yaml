id: HRL-SD-0522
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Fully Executable
description: '''Intervention Type'' (INTTYPE) record must be populated in Trial Summary
  (TS) domain, when study type is ''INTERVENTIONAL''. It is expected for SDTM IG v3.1.2
  data and required for data in all more recent SDTM versions.'
scope:
  classes:
    - TRIAL DESIGN
  domains:
    - TS
check:
  all:
    - name: TSPARMCD
      operator: variable_exists
      value: INTTYPE
outcome:
  message: Missing INTTYPE Trial Summary Parameter
  severity: Error
provenance:
  p21_id: SD2231
  core_id: ~
  cg_ids:
    - CG0287
  fda_ids: []
  source_doc: SDTM-IG v3.3

