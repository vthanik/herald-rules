id: AD0229
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: Within a study, all Actual Sequence of Treatment (TRTSEQA) variable values
  must be the same for each unique value of Actual Sequence of Treatments (N) (TRTSEQAN)
  when the primary variable TRTSEQA is populated.
scope:
  classes: []
  domains: ADSL
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for TRTSEQA
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0229
  pmda_category: Error
  ig_versions: []

