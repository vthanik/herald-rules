id: HRL-SD-0552
version: 1
status: Published
standard: SDTM
category: Terminology
sensitivity: Record
executability: Partially Executable
description: TSVALCD for TRT record must be a valid unique ingredient identifier from
  FDA Substance Registration System (SRS).
scope:
  classes:
    - TRIAL DESIGN
  domains:
    - TS
check:
  all:
    - name: TSPARMCD
      operator: equal_to
      value: TRT
    - name: TSVAL
      operator: non_empty
outcome:
  message: Invalid TSVALCD value for TRT
  severity: Error
provenance:
  p21_id: SD2261
  core_id: ~
  cg_ids:
    - CG0451
  fda_ids:
    - FDAB011
  source_doc: SDTM-IG v3.3

