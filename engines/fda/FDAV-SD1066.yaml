Core:
  Id: FDAV-SD1066
  Status: Reference
  Version: '1'
Description: Variable Value (IDVARVAL) variable value should not be populated, when
  Relationship Type (RELTYPE) variable value is populated.
Check:
  all:
    - name: IDVARVAL
      operator: empty
    - name: USUBJID
      operator: empty
    - name: IDVAR
      operator: ends_with
      value: SEQ
Outcome:
  Message: IDVARVAL value is populated, when RELTYPE values is populated
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: RELREC
Standard: SDTM
Publisher ID: CG0201, CG0419, 286
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
  - SENDIG 3.0
  - SENDIG 3.1
  - SENDIG 3.1.1
  - SENDIG-AR 1.0
  - SENDIG-DART 1.1
CORE Reference: CORE-000136
Executability: Fully Executable
Scope:
  Classes:
    Include: RELATIONSHIP
  Domains:
    Include: RELREC
  Use_Case: INDH, PROD

