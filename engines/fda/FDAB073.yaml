Core:
  Id: FDAB073
  Status: Reference
Description: The number of animals with a specific tumor finding for each organ/tissue
  should be consistent between the MI.xpt (SEND) and Tumor.xpt for the same dose group
  and sex. Explain any inconsistencies in the nSDRG.
