id: HRL-SD-0331
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: All subjects who have Death records (SSSTRESC = 'DEAD') in Survival Status
  (SS) domain should also have death records (DSDECOD='DEATH') in Disposition (DS)
  domain.
scope:
  classes:
    - EVENTS
  domains:
    - DS
check:
  all:
    - name: SSSTRESC
      operator: equal_to_case_insensitive
      value: DEAD
    - name: SSSTRESC
      operator: equal_to_case_insensitive
      value: ''''
outcome:
  message: Rule HRL-SD-0331 violation
  severity: Error
provenance:
  p21_id: SD1316
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: P21 rule SD1316

