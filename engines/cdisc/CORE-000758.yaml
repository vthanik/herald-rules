Check:
  all:
    - name: ARMNRS
      operator: non_empty
    - name: ARMNRS
      operator: not_equal_to
      value: UNPLANNED TREATMENT
      value_is_literal: yes
    - name: RFSTDTC
      operator: non_empty
Core:
  Id: CORE-000758
  Status: Published
  Version: '1'
Description: Raise an error when milestone associated with RFSTDTC is start of treatment
  and ARMNRS is not null and different from 'UNPLANNED TREATMENT', but RFSTDTC is
  not null.
Executability: Partially Executable
Outcome:
  Message: Milestone associated with RFSTDTC is start of treatment and ARMNRS is not
    null and different from 'UNPLANNED TREATMENT', but RFSTDTC is not empty.
  Output_Variables:
    - ARMNRS
    - RFSTDTC
Rule_Type: Record Data
