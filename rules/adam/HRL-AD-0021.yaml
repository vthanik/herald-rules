id: HRL-AD-0021
version: 1
status: Published
standard: ADaM
category: Terminology
sensitivity: Record
executability: Partially Executable
description: A variable with a suffix of PFN must have a value that is 1 or null (P
  = parameter level flag variable).
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: '%Variables[*PFN]%'
      operator: in
      value: '1'
outcome:
  message: '%Variable.1%PFN value is not 1 or null'
  severity: Error
provenance:
  p21_id: AD0036
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

