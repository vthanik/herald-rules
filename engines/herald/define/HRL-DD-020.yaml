id: HRL-DD-020
version: 1
status: Published
standard: Define-XML
category: Origin Metadata
sensitivity: Variable
executability: Fully Executable
description: >
  When a Variables-sheet row has Origin='Predecessor', the Method column
  must be null. Predecessor origins inherit from another dataset and should
  not carry a derivation method. Counterpart to HRL-DD-059 (which requires
  Method when Origin='Derived').
scope:
  classes: []
  domains: []
check:
  all:
    - name: origin
      operator: not_equal_to
      value: Predecessor
    - name: method_id
      operator: empty
outcome:
  message: "Origin='Predecessor' but a Method is assigned. Methods belong only to Derived origins."
  severity: Error
provenance:
  source_doc: Herald-original (Define-XML origin integrity); CDISC Define-XML v2.1 § 5.3.9.2
  authority: Herald
  reference_url: https://www.cdisc.org/standards/data-exchange/define-xml

tests:
  - name: "Origin=Predecessor with null Method passes"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "Origin=Predecessor with populated Method flags"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1
