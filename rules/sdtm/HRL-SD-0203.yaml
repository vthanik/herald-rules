id: HRL-SD-0203
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Fully Executable
description: Value for Age (AGE) or Age Range (AGETXT) variables should be populated
  for all subjects. The only exception for SDTM is for Screen Failures (ARMCD=SCRNFAIL)
  and Not Assigned (ARMCD=NOTASSGN) subjects, or subjects with ARMCD=null.  There
  are no exceptions for SEND.
scope:
  classes:
    - FINDINGS
  domains:
    - SC
check:
  all:
    - any:
        - name: AGE
          operator: non_empty
        - name: AGETXT
          operator: non_empty
    - name: ARMCD
      operator: not_equal_to
      value: SCRNFAIL
    - name: ARMCD
      operator: not_equal_to
      value: NOTASSGN
    - name: ARMCD
      operator: non_empty
outcome:
  message: Neither AGE nor AGETXT values are populated
  severity: Error
provenance:
  p21_id: SD1121
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB005
  source_doc: SDTM-IG v3.3

