Core:
  Id: FDAV-SD1041
  Status: Reference
  Version: '1'
Description: Values of Category (--CAT) and Subcategory (--SCAT) variables should
  not be identical.
Check:
  all:
    - name: --SCAT
      operator: non_empty
    - name: --SCAT
      operator: equal_to
      value: --CAT
Outcome:
  Message: Values for --CAT and --SCAT are identical
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: INTERVENTIONS, EVENTS, FINDINGS, FINDINGS ABOUT, TI
Standard: SDTM
Publisher ID: CG0027, 43
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
  - SENDIG 3.0
  - SENDIG 3.1
  - SENDIG 3.1.1
  - SENDIG-AR 1.0
  - SENDIG-DART 1.1
CORE Reference: CORE-000237
Executability: Fully Executable
Scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
  Use_Case: INDH, PROD

