id: SD0015
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Non-missing Duration of Event, Exposure or Observation (--DUR) value
  must be greater than or equal to 0.
scope:
  classes: []
  domains:
    - SPECIALPURPOSE(-CO
    - -DM)
    - INTERVENTIONS
    - FINDINGS
    - EVENTS
    - FINDINGSABOUT
    - TE
check:
  all:
    - name: __domain_variable__
      operator: check_value
outcome:
  message: Negative value for --DUR
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0015
  pmda_category: Error
  ig_versions: []

