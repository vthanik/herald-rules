Check:
  all:
    - any:
        - name: SVUPDES
          operator: empty
        - name: SVUPDES
          operator: not_exists
    - name: VISITNUM
      operator: is_not_contained_by
      value: $visitnums_in_tv
Core:
  Id: CORE-000842
  Status: Published
  Version: '1'
Description: When SVUPDES is not populated, then the VISITNUM should be equal to a
  VISITNUM in TV
Executability: Partially Executable - Possible Overreporting
Operations:
  - domain: TV
    id: $visitnums_in_tv
    name: VISITNUM
    operator: distinct
Outcome:
  Message: SVUPDES is not populated or does not exist, but the VISITNUM does not equal
    a VISITNUM present in TV
  Output_Variables:
    - SVUPDES
    - VISITNUM
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - SPECIAL PURPOSE
  Domains:
    Include:
      - SV
Sensitivity: Record
herald:
