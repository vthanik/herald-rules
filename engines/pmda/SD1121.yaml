id: SD1121
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Partially Executable
description: Value for Age (AGE) or Age Range (AGETXT) variables should be populated
  for all subjects. The only exception for SDTM is for Screen Failures (ARMCD=SCRNFAIL)
  and Not Assigned (ARMCD=NOTASSGN) subjects, or subjects with ARMCD=null. There are
  no exceptions for SEND.
scope:
  classes: []
  domains: DM
check:
  all:
    - name: __see_description__
      operator: manual_review
outcome:
  message: Neither AGE nor AGETXT values are populated
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1121
  pmda_category: Error
  ig_versions: []

