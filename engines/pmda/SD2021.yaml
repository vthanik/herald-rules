id: SD2021
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Either of Age (AGE) or Age Range (AGETXT) variable values should be provided
  when Age Units (AGEU) are populated.
scope:
  Classes:
    Include: SPECIAL PURPOSE
  Domains:
    Include: DM
check:
  all:
    - name: AGEU
      operator: non_empty
    - any:
        - name: AGETXT
          operator: not_exists
        - name: AGETXT
          operator: empty
    - any:
        - name: AGE
          operator: not_exists
        - name: AGE
          operator: empty
outcome:
  message: Missing values for both AGE and AGETXT when AGEU is provided
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD2021
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000453

