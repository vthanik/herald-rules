id: AD0079
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Not Executable
description: If Planned Treatment for Period xx (TRTxxP) is present, Last Treatment
  Date for Period xx (TRxxEDT) must be present if there is more than one Treatment
  Period. When there is only 1 Treatment Period 01, TRTEDT is sufficient.
scope:
  classes: []
  domains:
    - ADSL
    - ADDL
check: []
outcome:
  message: TRTxxP is present, but TRxxEDT is not present for periods greater than
    01
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0079
  pmda_category: Warning
  ig_versions: []

