id: HRL-SD-0019
version: 1
status: Published
standard: SDTM
category: Format
sensitivity: Value
executability: Fully Executable

description: >
  AESTDTC must be a valid ISO 8601 date/datetime string in the AE domain. The adverse event start date must conform to ISO 8601 format.

scope:
  classes:
    - EVENTS
  domains:
    - AE

check:
  all:
    - name: AESTDTC
      operator: is_valid_iso8601

outcome:
  message: "AESTDTC value '{AESTDTC}' is not a valid ISO 8601 date in AE"
  severity: Error

provenance:
  p21_id: SD0019
  core_id: CORE-000270
  cg_ids:
    - CG0019
  fda_ids:
    []
  source_doc: "SDTM-IG v3.3 Section 6.2.1"
