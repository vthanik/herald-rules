id: HRL-AD-0241
version: 1
status: Published
standard: ADaM
category: Format
sensitivity: Record
executability: Fully Executable
description: For additional AE Flag Variables representing the 1st occurrence of an
  analysis event or datapoint, zz must be nth flag variable (01 to 99).  The main
  purpose of these flags is to facilitate data point traceability between records
  in the dataset and unique counts in the summary displays. In addition if a Time
  to Event (TTE) Analysis is built off of Adverse Events, the flags provide a crucial
  link between the summary records in the TTE BDS and the source of the records in
  ADAE. If the producer of the ADAE dataset has standard programs in place to summarize
  unique counts of events then they may chose not to create these flags.
scope:
