id: AD0662
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: If TMPCTDF (Percent Diff. Nominal vs. Actual Time) is populated, both
  ARRLT (Actual Rel. Time from Ref. Dose) and NRRLT (Nominal Rel. Time from Ref. Dose)
  must be populated.
scope:
  classes: []
  domains: ADNCA
check:
  all:
    - name: TMPCTDF
      operator: non_empty
    - name: ARRLT
      operator: empty
    - name: NRRLT
      operator: empty
outcome:
  message: TMPCTDF is populated and ARRLT or NRRLT are not populated
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0662
  pmda_category: Error
  ig_versions: []

