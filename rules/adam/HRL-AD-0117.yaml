id: HRL-AD-0117
version: 1
status: Published
standard: ADaM
category: Presence
sensitivity: Record
executability: Partially Executable
description: R2AyLO = AVAL / AyLO.  therefore if R2AyLO is present, both AVAL and
  AyLO must be present for calculation consistency.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: VARIABLE
      operator: variable_exists
      value: A%Variable.1%LO,AVAL
outcome:
  message: 'Calculation issue: R2A%Variable.1%LO is present but AVAL and/or A%Variable.1%LO
    is not present'
  severity: Error
provenance:
  p21_id: AD0133A
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

