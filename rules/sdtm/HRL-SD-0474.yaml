id: HRL-SD-0474
version: 1
status: Published
standard: SDTM
category: Terminology
sensitivity: Record
executability: Partially Executable
description: Value for Lowest Level Term Code (--LLTCD) variable must be populated
  using a Lowest Level Term Code of the MedDRA dictionary of a version specified in
  the define.xml.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: '%Variables[--LLTCD]%'
      operator: non_empty
outcome:
  message: Value for %Domain%LLTCD not found in MedDRA dictionary
  severity: Error
provenance:
  p21_id: SD2009
  core_id: ~
  cg_ids:
    - CG0378
  fda_ids:
    - FDAB003
  source_doc: SDTM-IG v3.3

