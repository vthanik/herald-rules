# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 4.9; 5.3.12.3
id: HRL-DD-053
version: 2
status: Published
standard: Define-XML
category: Origin Metadata
sensitivity: Record
executability: Fully Executable
description: >
  Origin is required for all variables in regulatory submissions.
scope:
  classes: []
  domains: []
check:
  all:
    - name: origin
      operator: non_empty
outcome:
  message: "Origin is missing. For regulatory submissions, def:Origin metadata must be provided for all variables at either the variable or value level."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "4.9; 5.3.12.3"
  cited_guidance: >
    For regulatory submissions, def:Origin metadata must be provided for all variables.

tests:
  - name: "HRL-DD-053 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-053 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

