id: HRL-AD-0163
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: For a set of [Study (STUDYID, Subject (USUBJID), Parameter (PARAM)],
  Last Value on Treatment (LVOTFL) should be set on only one record.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: USUBJID
      operator: non_empty
    - name: PARAMCD
      operator: non_empty
    - name: LVOTFL
      operator: equal_to
      value: 'Y'
    - name: LVOTFL
      operator: is_unique
      group_by: STUDYID,USUBJID,PARAMCD
outcome:
  message: There is more than 1 record with LVOTFL = Y for a unique USUBJID and PARAMCD
  severity: Error
provenance:
  p21_id: AD0175
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

