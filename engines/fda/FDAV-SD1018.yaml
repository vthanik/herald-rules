Core:
  Id: FDAV-SD1018
  Status: Reference
  Version: '1'
Description: The combination of Visit Number (VISITNUM), Visit Name (VISIT), and Planned
  Study Day of Visit (VISITDY) values should match entries in the Trial Visits (TV)
  dataset, when they are planned visits (SVUPDES = NULL).
Check:
  all:
    - name: VISIT
      operator: non_empty
    - name: SVPRESP
      operator: equal_to
      value: 'Y'
    - name: VISIT
      operator: is_not_contained_by
      value: $tv_visit
Outcome:
  Message: VISITNUM/VISIT/VISITDY values do not match TV domain data
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: SV
Standard: SDTM
Publisher ID: CG0031, CG0032, CG0033, CG0215, CG0657
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
CORE Reference: CORE-000269
Executability: Fully Executable
Scope:
  Classes:
    Include: ALL
  Domains:
    Exclude: TV
  Use_Case: INDH

