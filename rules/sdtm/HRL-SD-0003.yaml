id: HRL-SD-0003
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Fully Executable

description: >
  USUBJID must not be empty in all SDTM domains. The unique subject identifier is required for every record across all datasets.

scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
  domains:
    []

check:
  all:
    - name: USUBJID
      operator: non_empty

outcome:
  message: "USUBJID is empty or missing in {DOMAIN} dataset"
  severity: Error

provenance:
  p21_id: SD0003
  core_id: CORE-000254
  cg_ids:
    - CG0003
  fda_ids:
    []
  source_doc: "SDTM-IG v3.3 Section 4.1.1"
