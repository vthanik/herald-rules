id: AD0403
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: Within a subject, there should be only a single value of Analysis Toxicity
  Description Low (ATOXDSCL) variable for a given value of Parameter Code (PARAMCD)
  variable, considering only those rows on which both variables are populated.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - ADAMOTHER
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for ATOXDSCL within a subject and parameter
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0403
  pmda_category: Warning
  ig_versions: []

