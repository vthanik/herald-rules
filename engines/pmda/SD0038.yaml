id: SD0038
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Study Day variables (*DY) value should not equal 0.
scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
  Use_Case: NONCLIN, INDH, PROD
check:
  all:
    - name: --DY
      operator: non_empty
    - name: --DTC
      operator: is_complete_date
    - name: RFSTDTC
      operator: is_complete_date
    - name: --DY
      operator: not_equal_to
      value: $val_dy
outcome:
  message: Value of Study Day variable equals 0
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0038
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000529

