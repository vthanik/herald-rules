id: AD0212
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: 'ANLzzFN (Analyzed Record Flag zz Numeric) must be 1 or null. For Parameter-Level
  and Record-Level Numeric Population Flag variables: 1 = yes (included). Null values
  are allowed.'
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - ADAMOTHER
check:
  all:
    - name: ANL01FN
      operator: non_empty
    - name: ANL01FN
      operator: not_in
      value:
        - 1
outcome:
  message: ANLzzFN value is not 1 or null
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0212
  pmda_category: Error
  ig_versions: []

