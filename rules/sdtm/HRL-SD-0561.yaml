id: HRL-SD-0561
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Partially Executable
description: Collection Study Date/Time (--DTC) variable should be included into dataset,
  when Collection Study Day (--DY) variable is present.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: VARIABLE
      operator: variable_exists
      value: '%Domain%DTC'
outcome:
  message: Missing %Domain%DTC variable, when %Domain%DY variable is present
  severity: Error
provenance:
  p21_id: SD2270
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB038
  source_doc: SDTM-IG v3.3

