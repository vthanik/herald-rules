Check:
  all:
    - name: ARMNRS
      operator: empty
    - name: TSPARMCD
      operator: equal_to
      value: STYPE
      value_is_literal: yes
    - name: TSVAL
      operator: equal_to
      value: INTERVENTIONAL
      value_is_literal: yes
    - name: USUBJID
      operator: is_not_contained_by
      value: $usubjids_in_ex
Core:
  Id: CORE-000886
  Status: Published
  Version: '1'
Description: All subjects that have no record in the Exposure domain who are participating
  in a study that includes an interventional product should have ARMNRS populated.
Executability: Fully Executable
Match_Datasets:
  - Keys:
      - STUDYID
    Name: TS
Operations:
  - domain: EX
    id: $usubjids_in_ex
    name: USUBJID
    operator: distinct
Outcome:
  Message: A subject has a no record in EX but is not populated ARMNRS while participating
    in an interventional study
  Output_Variables:
    - ARMNRS
    - TSPARMCD
    - TSVAL
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - SPECIAL PURPOSE
  Domains:
    Include:
      - DM
Sensitivity: Record
herald:
  source: CDISC Library API
  catalogs:
    - SDTMIG 3.3
