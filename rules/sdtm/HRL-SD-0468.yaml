id: HRL-SD-0468
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Subject Death Flag (DTHFL) value must equal 'Y', when Date/Time of Death
  (DTHDTC) is provided.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: DTHFL
      operator: equal_to
      value: 'Y'
    - name: DTHDTC
      operator: non_empty
outcome:
  message: Missing value for DTHFL, when DTHDTC is populated
  severity: Error
provenance:
  p21_id: SD2004
  core_id: ~
  cg_ids:
    - CG0435
  fda_ids: []
  source_doc: SDTM-IG v3.3

