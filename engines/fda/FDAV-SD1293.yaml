Core:
  Id: FDAV-SD1293
  Status: Reference
  Version: '1'
Description: Reason Not Done (--REASND) variable should not be present in the domain,
  when the Pre-specified (--PRESP) variable is missing.
Check:
  all:
    - name: --PRESP
      operator: not_exists
    - name: --REASND
      operator: exists
Outcome:
  Message: --REASND variable is present when --PRESP variable is missing
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: INTERVENTIONS, EVENTS, NOT(DS, DV, EX)
Standard: SDTM
Publisher ID: CG0053
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
  - SENDIG-AR 1.0
CORE Reference: CORE-000030
Executability: Fully Executable
Scope:
  Classes:
    Include:
      - EVENTS
      - INTERVENTIONS
  Domains:
    Exclude:
      - DS
      - DV
      - EX
  Use_Case: INDH, PROD

