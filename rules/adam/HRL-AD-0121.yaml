id: HRL-AD-0121
version: 1
status: Published
standard: ADaM
category: Presence
sensitivity: Record
executability: Partially Executable
description: R2AyHI = AVAL / AyHI.  therefore if R2AyHI is present, both AVAL and
  AyHI must be present for calculation consistency.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: VARIABLE
      operator: variable_exists
      value: A%Variable.1%HI,AVAL
outcome:
  message: 'Calculation issue: R2A%Variable.1%HI is present but AVAL and/or A%Variable.1%HI
    is not present'
  severity: Error
provenance:
  p21_id: AD0134A
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

