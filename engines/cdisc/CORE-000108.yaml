Check:
  all:
    - name: DTHFL
      operator: not_equal_to
      value: 'Y'
    - name: USUBJID
      operator: is_contained_by
      value: $usubjids_in_dd
Core:
  Id: CORE-000108
  Status: Published
  Version: '1'
Description: When a record is present in the DD dataset then death flag (DTHFL) should
  be populated as 'Y' in the DM dataset for the corresponding subject.
Executability: Fully Executable
Match_Datasets:
  - Keys:
      - USUBJID
    Name: DD
Operations:
  - domain: DD
    id: $usubjids_in_dd
    name: USUBJID
    operator: distinct
Outcome:
  Message: DD record is present, but DTHFL in DM dataset is not "Y".
  Output_Variables:
    - DTHFL
    - USUBJID
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - SPECIAL PURPOSE
  Domains:
    Include:
      - DM
  Use_Case: INDH
Sensitivity: Dataset
herald:
  source: CDISC Library API
  catalogs:
