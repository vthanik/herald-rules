id: HRL-SD-0382
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Reference Result in Standard Format (--STREFC) should be populated when
  Reference Result in Original Units (--ORREF) is populated.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: --STREFC
      operator: non_empty
    - name: --ORREF
      operator: non_empty
outcome:
  message: '%Domain%STREFC is null when %Domain%ORREF is populated'
  severity: Error
provenance:
  p21_id: SD1369
  core_id: ~
  cg_ids:
    - CG0549
  fda_ids: []
  source_doc: SDTM-IG v3.3

