Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  The same subject in ADSL and DM must have the same value for
                  Arm (ARM). There must be traceability between ADaM and SDTM.
                Document: ADaM IG v1.1
                Section: "3.1"
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-210
              Version: "1"
            Version: "1.0"
        Version: "1.1"
Check:
  all:
    - name: ARM
      operator: empty
Core:
  Id: ADaM-210
  Status: Published
  Version: "1"
Description: >-
  The same subject in ADSL and DM must have the same value for Arm (ARM).
  There must be traceability between ADaM and SDTM.
Executability: Partially Executable
Outcome:
  Message: "For the same USUBJID, the ADSL.ARM != DM.ARM"
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - SUBJECT LEVEL
  Domains:
    Include:
      - ADSL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: "2026-04-12"

tests:
  - name: ARM populated in ADSL (valid)
    type: positive
    datasets:
      ADSL:
        variables: [STUDYID, USUBJID, ARM]
        records:
          - [CDISCPILOT01, 01-701-1015, Placebo]
    expected_findings: 0
  - name: ARM missing in ADSL (violation)
    type: negative
    datasets:
      ADSL:
        variables: [STUDYID, USUBJID, ARM]
        records:
          - [CDISCPILOT01, 01-701-1015, ""]
    expected_findings: 1
