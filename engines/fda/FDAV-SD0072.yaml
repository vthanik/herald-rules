Core:
  Id: FDAV-SD0072
  Status: Reference
  Version: '1'
Description: Related Domain Abbreviation (RDOMAIN) must have a valid value of Domains
  included in the study data.
Check:
  all:
    - name: RDOMAIN
      operator: non_empty
    - name: RDOMAIN
      operator: is_not_contained_by
      value: $study_domains
Outcome:
  Message: Invalid RDOMAIN
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: CO, RELREC, SUPPQUAL
Standard: SDTM
Publisher ID: CG0369, CG0373, CG0374, 116
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
  - SENDIG 3.0
  - SENDIG 3.1
  - SENDIG 3.1.1
  - SENDIG-AR 1.0
  - SENDIG-DART 1.1
CORE Reference: CORE-000502
Executability: Fully Executable
Scope:
  Classes:
    Include: ALL
  Domains:
    Include:
      - CO
      - RELREC
      - SUPP--
  Use_Case: INDH, PROD

