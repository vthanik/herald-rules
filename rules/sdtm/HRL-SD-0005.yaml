id: HRL-SD-0005
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable

description: >
  DOMAIN variable value must equal the dataset name. The two-character abbreviation stored in DOMAIN must match the name of the dataset in which it appears.

scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
  domains:
    []

check:
  all:
    - name: DOMAIN
      operator: equal_to
      value: "{dataset_name}"

outcome:
  message: "DOMAIN value '{DOMAIN}' does not equal the dataset name '{dataset_name}'"
  severity: Error

provenance:
  p21_id: SD0005
  core_id: CORE-000256
  cg_ids:
    - CG0005
  fda_ids:
    []
  source_doc: "SDTM-IG v3.3 Section 4.1.2"
