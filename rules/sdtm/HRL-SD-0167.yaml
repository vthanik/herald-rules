id: HRL-SD-0167
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Partially Executable
description: Collection Study Day (--DY) variable value should not be imputed. It
  may be only populated, when both Collection Study Date/Time (--DTC) and Subject
  Reference Start Date/Time (RFSTDTC) variables values are provided and both of them
  include complete date part.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: --DY
      operator: is_empty
    - name: POOLID
      operator: is_empty
outcome:
  message: '%Domain%DY variable value is imputed'
  severity: Error
provenance:
  p21_id: SD1085
  core_id: ~
  cg_ids:
    - CG0007
  fda_ids: []
  source_doc: SDTM-IG v3.3

