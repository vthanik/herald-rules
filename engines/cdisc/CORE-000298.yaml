Check:
  all:
    - name: LBORRES
      operator: not_matches_regex
      value: ^-?(\d+(\.\d+)?$)|(\.\d+$)
    - name: LBSTNRLO
      operator: non_empty
    - name: LBORRES
      operator: non_empty
Core:
  Id: CORE-000298
  Status: Published
  Version: '1'
Description: Raise an error when LBORRES is not a continuous measurement and LBSTNRLO
  is not empty. The interpretation of the guidance is that LBORRES is populated (not
  null).
Executability: Fully Executable
Outcome:
  Message: LBORRES is not a continuous measurment but LBSTNRLO is not empty.
