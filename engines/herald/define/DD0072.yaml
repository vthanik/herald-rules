# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.7.1
id: DD0072
version: 1
status: Published
standard: Define-XML
category: Cross-Reference
sensitivity: Record
executability: Fully Executable
description: >
  AnalysisResults Display ID must exist in the AnalysisDisplays sheet when provided.
scope:
  classes: []
  domains: []
check:
  all:
    - name: display_id
      operator: not_empty
    - name: __display_exists_in_disp_spec
      operator: equal_to
      value: false
outcome:
  message: "AnalysisResults references a Display ID that does not exist in the AnalysisDisplays sheet."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.7.1"
  cited_guidance: >
    Each AnalysisResult must reference a valid AnalysisDisplay.
