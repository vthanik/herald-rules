id: HRL-SD-0014
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable

description: >
  RFSTDTC must be on or before RFENDTC when both are present in the DM domain. The reference start date cannot occur after the reference end date.

scope:
  classes:
    - SPECIAL-PURPOSE
  domains:
    - DM

check:
  all:
    - name: RFSTDTC
      operator: date_on_or_before
      value: "RFENDTC"
      when:
        - name: RFSTDTC
          operator: non_empty
        - name: RFENDTC
          operator: non_empty

outcome:
  message: "RFSTDTC '{RFSTDTC}' is after RFENDTC '{RFENDTC}' for subject '{USUBJID}'"
  severity: Error

provenance:
  p21_id: SD0014
  core_id: CORE-000265
  cg_ids:
    - CG0014
  fda_ids:
    []
  source_doc: "SDTM-IG v3.3 Section 5.1"
