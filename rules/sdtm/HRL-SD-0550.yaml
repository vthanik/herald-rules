id: HRL-SD-0550
version: 1
status: Published
standard: SDTM
category: Terminology
sensitivity: Record
executability: Partially Executable
description: TSVAL and TSVALCD values must be populated from the same concept description
  record in SNOMED CT.
scope:
  classes:
    - TRIAL DESIGN
  domains:
    - TS
check:
  all:
    - name: TSPARMCD
      operator: equal_to
      value: INDIC
    - name: TSVAL
      operator: non_empty
    - name: TSVALCD
      operator: non_empty
outcome:
  message: TSVAL/TSVALCD value mismatch for INDIC
  severity: Error
provenance:
  p21_id: SD2259
  core_id: ~
  cg_ids:
    - CG0265
  fda_ids:
    - FDAB011
  source_doc: SDTM-IG v3.3

