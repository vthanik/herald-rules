Authorities:
  - Organization: CDISC
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited_Guidance: Protocol-defined description of clinical encounter.
                Document: IG v3.2
                Item: Specification
                Section: 5 SV
            Origin: SDTM and SDTMIG Conformance Rules
            Rule_Identifier:
              Id: CG0215
              Version: '1'
            Version: '2.0'
