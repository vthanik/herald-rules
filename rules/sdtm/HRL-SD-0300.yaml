id: HRL-SD-0300
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Partially Executable
description: Occurrence (--OCCUR) variable should not be present in the domain, when
  the Pre-specified (--PRESP) variable is missing.
scope:
  classes:
    - INTERVENTIONS
  domains:
    - PR
check:
  all:
    - name: VARIABLE
      operator: variable_exists
      value: '%Domain%PRESP'
outcome:
  message: '%Domain%OCCUR variable is present when %Domain%PRESP variable is missing'
  severity: Error
provenance:
  p21_id: SD1281
  core_id: ~
  cg_ids:
    - CG0088
  fda_ids: []
  source_doc: SDTM-IG v3.2

