Core:
  Id: FDAV-SD1093
  Status: Reference
  Version: '1'
Description: Study Day of End (--ENDY) variable value should not be imputed. It may
  be only populated, when both End Study Date/Time (--ENDTC) and Subject Reference
  Start Date/Time (RFSTDTC) variables values are provided, and both of them include
  complete date part.
Check:
  any:
    - all:
        - name: --ENDTC
          operator: is_incomplete_date
        - name: --ENDY
          operator: non_empty
    - all:
        - name: RFSTDTC
          operator: is_incomplete_date
        - name: --ENDY
          operator: non_empty
Outcome:
  Message: --ENDY variable value is imputed
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: SE, SM, SV, INTERVENTIONS, EVENTS, FINDINGS, FINDINGS ABOUT
Standard: SDTM
Publisher ID: CG0223, 71, 72, 73, 74
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
  - SENDIG 3.0
  - SENDIG 3.1
  - SENDIG 3.1.1
  - SENDIG-AR 1.0
  - SENDIG-DART 1.1
CORE Reference: CORE-000139
Executability: Fully Executable
Scope:
  Classes:
    Include: ALL
  Domains:
    Exclude: DM
  Use_Case: INDH

