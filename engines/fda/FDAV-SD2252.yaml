Core:
  Id: FDAV-SD2252
  Status: Reference
  Version: '1'
Description: TSVAL and TSVALCD values must be populated from the same name record
  in FDA Substance Registration System (SRS).
Check:
  all:
    - name: TSVAL
      operator: non_empty
    - name: TSVALCD
      operator: non_empty
    - name: TSVAL
      operator: is_not_unique_relationship
      value: TSVALCD
Outcome:
  Message: TSVAL/TSVALCD value mismatch for CURTRT
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: TS
Standard: SDTM
Publisher ID: CG0265
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
CORE Reference: CORE-000152
Executability: Fully Executable
Scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include: TS
  Use_Case: INDH

