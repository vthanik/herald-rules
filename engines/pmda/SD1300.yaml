id: SD1300
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: The value of DOMAIN should be no more than 2 characters in length, excluding
  Associated Persons domains.
scope:
  Classes:
    Exclude: RELATIONSHIP
  Domains:
    Exclude: AP--
  Use_Case: INDH, PROD
check:
  all:
    - name: DOMAIN
      operator: longer_than
      value: 2
outcome:
  message: Invalid value (not 2 chars) for DOMAIN variable
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1300
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000180

