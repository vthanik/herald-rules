id: HRL-SD-0089
version: 1
status: Published
standard: SDTM
category: Limit
sensitivity: Record
executability: Fully Executable
description: The value of Age (AGE) cannot be less than or equal to 0.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: AGE
      operator: greater_than
      value: eq 0
    - name: AGE
      operator: not_equal_to
      value: '0'
    - name: AGE
      operator: non_empty
outcome:
  message: Negative or zero value for AGE
  severity: Error
provenance:
  p21_id: SD0084
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB040
  source_doc: SDTM-IG v3.3

