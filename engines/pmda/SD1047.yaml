id: SD1047
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Only one of Dose (--DOSE) or Dose Description (--DOSTXT) variables must
  be populated on the same record.
scope:
  Classes:
    Include: INTERVENTIONS
  Domains:
    Include: ALL
  Use_Case: INDH
check:
  all:
    - name: --DOSTXT
      operator: non_empty
    - name: --DOSE
      operator: non_empty
outcome:
  message: Both --DOSE and --DOSTXT values are populated
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1047
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000092

