id: HRL-SD-0131
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: A value for a Toxicity (--TOX) variable should be provided, when a Toxicity
  Grade (--TOXGR) variable value is populated and greater than 0.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: --TOX
      operator: non_empty
    - name: --TOXGR
      operator: non_empty
    - name: --TOXGR
      operator: not_equal_to
      value: '0'
outcome:
  message: Missing value for %Domain%TOX, when %Domain%TOXGR is populated
  severity: Error
provenance:
  p21_id: SD1037
  core_id: ~
  cg_ids:
    - CG0428
  fda_ids: []
  source_doc: SDTM-IG v3.3

