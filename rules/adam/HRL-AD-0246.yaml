id: HRL-AD-0246
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Across studies, All AESEV must be the same for each unique value of AESEVN,when
  both variables are populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: AESEV
      operator: non_empty
    - name: AESEVN
      operator: non_empty
    - name: AESEV
      operator: all_values_equal
      group_by: AESEVN
outcome:
  message: Inconsistent value for AESEV
  severity: Error
provenance:
  p21_id: AD0280B
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

