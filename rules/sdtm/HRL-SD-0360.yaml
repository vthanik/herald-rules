id: HRL-SD-0360
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Fatal Adverse Event records (AEOUT = 'FATAL') in the Adverse Events (AE)
  domain should have End Date/Time of Adverse Event (AEENDTC) equal to subject's Date/Time
  of Death (DTHDTC) populated in the Demographics (DM) domain. Subject's Date/Time
  of Death info should be consistent across all domains.
scope:
  classes:
    - EVENTS
  domains:
    - AE
check:
  all:
    - name: SUB:DTHDTC
      operator: equal_to
      value: AEENDTC
    - name: SUB:DTHDTC !='' @and AEENDTC !=' ' @and (AEOUT
      operator: equal_to
      value: FATAL
    - name: AEOUT
      operator: equal_to
      value: ''''
outcome:
  message: Rule HRL-SD-0360 violation
  severity: Error
provenance:
  p21_id: SD1347
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: P21 rule SD1347

