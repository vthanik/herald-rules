id: SD1125
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: All values of Planned Elapsed Time (--ELTM) variable should be the same
  for a given value of Planned Time Point Name (--TPT) variable, Time Point Reference
  (--TPTREF) and/or Visit Number (VISITNUM).
scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
  Use_Case: INDH
check:
  all:
    - name: --TPT
      operator: non_empty
    - name: --TPTNUM
      operator: non_empty
    - name: --ELTM
      operator: non_empty
    - name: --ELTM
      operator: is_inconsistent_across_dataset
      value:
        - DOMAIN
        - VISITNUM
        - --TPTREF
        - --TPTNUM
outcome:
  message: Inconsistent value for --ELTM within --TPT, --TPTREF and/or VISITNUM
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1125
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000142

