# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 4.3.2.2
id: DD0034
version: 1
status: Published
standard: Define-XML
category: Origin Metadata
sensitivity: Record
executability: Fully Executable
description: >
  For ADaM Derived or Assigned origins, Source must be 'Sponsor'.
scope:
  classes: []
  domains: []
check:
  all:
    - name: purpose
      operator: equal_to
      value: Analysis
    - name: origin
      operator: in
      value:
        - Derived
        - Assigned
    - name: source
      operator: not_equal_to
      value: Sponsor
outcome:
  message: "ADaM Derived/Assigned variables must have Source = 'Sponsor'."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "4.3.2.2"
  cited_guidance: >
    The Source is always 'Sponsor' for ADaM Derived and Assigned origin types.
