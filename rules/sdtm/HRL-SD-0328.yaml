id: HRL-SD-0328
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Epoch (EPOCH) variable should be provided, when Category for Disposition
  Event (DSCAT) equals 'DISPOSITION EVENT'.
scope:
  classes:
    - EVENTS
  domains:
    - DS
check:
  all:
    - name: EPOCH
      operator: non_empty
    - name: DSCAT
      operator: equal_to
      value: DISPOSITION EVENT
    - name: DSCAT
      operator: equal_to
      value: ''''
outcome:
  message: Rule HRL-SD-0328 violation
  severity: Error
provenance:
  p21_id: SD1313
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: P21 rule SD1313

