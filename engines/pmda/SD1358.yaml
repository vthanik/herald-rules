id: SD1358
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: When Actual Arm Code (ACTARMCD)/Description of Actual Arm (ACTARM) are
  not populated, the Reason Arm and/or Actual Arm is Null (ARMNRS) variable must be
  populated with the reason ACTARMCD/ACTARM are null.
scope:
  Classes:
    Include: SPECIAL PURPOSE
  Domains:
    Include: DM
  Use_Case: INDH
check:
  all:
    - name: ACTARMCD
      operator: empty
    - name: ARMNRS
      operator: empty
outcome:
  message: ARMNRS is not populated, when ACTARMCD or ACTARM is null
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1358
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000223

