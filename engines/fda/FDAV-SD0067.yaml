Core:
  Id: FDAV-SD0067
  Status: Reference
  Version: '1'
Description: Element Code (ETCD) values should match entries in the Trial Elements
  (TE) dataset, except for unplanned Element (ETCD = 'UNPLAN').
Check:
  all:
    - name: ETCD
      operator: not_equal_to
      value: UNPLAN
    - name: ETCD
      operator: is_not_contained_by
      value: $te_etcd
Outcome:
  Message: Invalid ETCD
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: SE, TA
Standard: SDTM
Publisher ID: CG0414, 123
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
  - SENDIG 3.0
  - SENDIG 3.1
  - SENDIG 3.1.1
  - SENDIG-AR 1.0
  - SENDIG-DART 1.1
CORE Reference: CORE-000173
Executability: Fully Executable
Scope:
  Classes:
    Include:
      - SPECIAL PURPOSE
      - TRIAL DESIGN
  Domains:
    Include:
      - SE
      - TA
  Use_Case: INDH

