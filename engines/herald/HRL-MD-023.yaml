id: HRL-MD-023
version: 1
status: Published
standard: ADaM
category: Specification Metadata
sensitivity: Study
executability: Fully Executable
description: A Name value is required for each Section.  Name is a required attribute
  for the ItemGroupDef element. Sections are represented in ODM as ItemGroupDef elements.
scope:
  classes: []
  domains: []
check:
  all:
    - name: section_name
      operator: non_empty
outcome:
  message: Name is required for each Section
  severity: Error
provenance:
  source_doc: P21 ADaM Validation Rules v1.2 (Metadata)
  authority: Herald
  p21_reference: MD4023

tests:
  - name: 'HRL-MD-023 -- passing spec row'
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, SECTION_NAME]
        records:
          - ['CDISCPILOT01', '01-701-1015', 'Baseline']
    expected_findings: 0
  - name: 'HRL-MD-023 -- violating spec row'
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, SECTION_NAME]
        records:
          - ['CDISCPILOT01', '01-701-1015', '']
    expected_findings: 1

