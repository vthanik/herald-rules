Core:
  Id: FDAB059
  Status: Reference
Description: 'When collecting racial demographic data from clinical trial participants,
  the following five minimum choices should be offered: American Indian or Alaska
  Native, Asian, Black or African American, Native Hawaiian or Other Pacific Islander,
  and White'
Outcome:
  Message: 'When collecting racial demographic data from clinical trial participants,
