id: SD1067
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Unique Subject Identifier (USUBJID) variable value should not be populated
  when Relationship Type (RELTYPE) variable value is populated.
scope:
  Classes:
    Include: RELATIONSHIP
  Domains:
    Include: RELREC
  Use_Case: INDH, PROD
check:
  all:
    - name: IDVARVAL
      operator: empty
    - name: USUBJID
      operator: empty
    - name: IDVAR
      operator: ends_with
      value: SEQ
outcome:
  message: USUBJID value is populated when RELTYPE values is populated
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1067
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000136

