id: SD0052
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: All values of Visit Number (VISITNUM) should be the same for a given
  value of Visit Name (VISIT).
scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
  Use_Case: INDH
check:
  all:
    - name: VISITNUM
      operator: is_contained_by
      value: $tv_visitnum
    - name: VISIT
      operator: is_not_unique_relationship
      value: VISITNUM
outcome:
  message: Inconsistent value for VISITNUM within VISIT
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0052
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000361

