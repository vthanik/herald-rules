id: SD0057
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Variables described in SDTM IG as Expected should be included in the
  dataset.
scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
  Use_Case: INDH, PROD, NONCLIN
check:
  all:
    - name: variable_name
      operator: not_contains_all
      value: $expected_variables
outcome:
  message: SDTM Expected variable not found
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0057
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000334

