Authorities:
  - Organization: CDISC
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited_Guidance: Using SDTM-specified standard domain names and prefixes
                  where applicable.
                Document: SDTMIG v3.4
                Section: 3.2.2
            Origin: SDTM and SDTMIG Conformance Rules
            Rule_Identifier:
              Id: CG0001
              Version: '1'
            Version: '2.0'
        Version: '3.4'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited_Guidance: Check the CDISC Controlled Terminology [see Appendix
                  C - Controlled Terminology] for reserved two-character domain identifiers
                  or abbreviations. If one has not been assigned by CDISC, then the
                  sponsor may select the unique two-character domain code to be used
                  consistently throughout the submission.
                Document: IG v3.2
                Item: 3.d
                Section: '2.6'
            Origin: SDTM and SDTMIG Conformance Rules
            Rule_Identifier:
              Id: CG0001
              Version: '1'
            Version: '2.0'
        Version: '3.2'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited_Guidance: Determine the domain code, one that is not a domain
                  code in the CDISC Controlled Terminology codelist "SDTM Domain Abbreviations"
                  available at http://www.cancer.gov/research/resources/terminology/cdisc.
                  If it desired to have this domain code as part of CDISC controlled
                  terminology, then submit a request to https://ncitermform.nci.nih.gov/ncitermform/?version=cdisc.
                  The sponsor-selected, two-character domain code should be used consistently
                  throughout the submission.
                Document: IG v3.3
                Item: 3.e
                Section: '2.6'
            Origin: SDTM and SDTMIG Conformance Rules
            Rule_Identifier:
              Id: CG0001
              Version: '1'
            Version: '2.0'
        Version: '3.3'
      - Name: TIG
        References:
          - Citations:
              - Cited_Guidance: A dataset is created using a domain specification
                  in this guide when the scientific nature or role of the data is
                  within the scope of a domain. Domains are extended or custom domain
                  specifications are only used when data are different in nature and
                  are not in scope for domains in this guide.
                Document: TIG 1.0
                Item: Table 2 Num 2
                Section: '2.5'
            Origin: TIG Conformance Rules
            Rule_Identifier:
              Id: TIG0289
              Version: '1'
            Version: '1.0'
        Substandard: SDTM
        Version: '1.0'
      - Name: SENDIG
        References:
