id: HRL-CT-0006
version: 1
status: Published
standard: CT
category: Terminology
sensitivity: Record
executability: Partially Executable
description: Paired variables such as TEST/TESTCD must be populated using terms with
  the same Codelist Code value in CDISC control terminology. There is one-to-one relationship
  between paired variable values defined in CDISC control terminology by Codelist
  Code value.
scope:
  classes: []
  domains: []
check:
  all:
    - name: '%Variables$Config.CodeList.PairedValues$DecodedVariable%'
      operator: in
      value: '%Variable.Config.CodeList.PairedValues%'
outcome:
  message: '%Variable% and %Variable.DecodedVariable% values do not have the same
    Code in CDISC CT'
  severity: Error
provenance:
  p21_id: CT2003
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB009
  source_doc: ADaM-IG v1.1

