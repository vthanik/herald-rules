Core:
  Id: ADaM-1047
  Status: Published
  Version: '1'
Description: >-
  SHIFTy variables may only be based on the change in value of approved variable pairs, which in v1.2 include the bi-directional toxicity pairs (ATOXGRL/BTOXGRL, ATOXGRH/BTOXGRH) in addition to the standard ATOXGR/BTOXGR pair.
Executability: Reference
Outcome:
  Message: 'SHIFTy variable must be derived from an approved variable pair per ADaM-IG v1.2 Table 3.3.4.1'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.2"]
  source: Herald-originated (ADaM-IG v1.2 gap-fill)
  catalogs:
    - ADaMIG 1.2
  fetched: '2026-04-12'
  notes: >
    Deferred to Reference pending a `valid_shift_pair` operator in the herald
    R package. The previous stub (`SHIFT1 non_empty`) would overreport on every
    populated SHIFTy row because it cannot distinguish valid pairs from
    invalid. The real check requires verifying that SHIFTy is derived from an
    approved (ATOXGR/BTOXGR, ATOXGRL/BTOXGRL, or ATOXGRH/BTOXGRH) source pair
    per ADaM-IG v1.2 Table 3.3.4.1. Activation plan in
    HANDOFF_TO_HERALD_2026-04-18.md section 4b.
