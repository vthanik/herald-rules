id: HRL-AD-0052
version: 1
status: Published
standard: ADaM
category: Presence
sensitivity: Record
executability: Partially Executable
description: If Actual Pooled Treatment y for Period xx (TRxxAGyN) numeric variable
  is present, there must be a corresponding Actual Pooled Treatment y for Period xx
  (TRxxAGy) character variable.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: VARIABLE
      operator: variable_exists
      value: TR%Variable.1%AG%Variable.2%
outcome:
  message: TRxxAGyN is present but TRxxAGy is not present
  severity: Error
provenance:
  p21_id: AD0070
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

