description: Permissible variable should not be present in domain, when the variable
  has missing value for all records in the dataset (SDTM-IG 3.1.1 - 3.2). Permissible
  variable should not be present in domain, when the variable is not present on study
  CRFs (SDTM-IG 3.3 and higher).
