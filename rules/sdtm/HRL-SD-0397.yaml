id: HRL-SD-0397
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Partially Executable
description: 'Day of Obs Rel to Challenge Agent (--CHDY) variable value should be
  populated as defined by CDISC standards: --CHDY = (date portion of --DTC) - (date
  portion of RFCSTDTC) +1 if --DTC is on or after RFCSTDTC; --CHDY = (date portion
  of --DTC) - (date portion of RFCSTDTC) if --DTC precedes RFCSTDTC.'
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: --CHDY
      operator: equal_to
      value: :DY(SUB:RFCSTDTC,%Domain%DTC)
    - name: --CHDY
      operator: non_empty
outcome:
  message: Incorrect value for %Domain%CHDY variable
  severity: Error
provenance:
  p21_id: SD1384
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: P21 Community SEND-IG-AR 1.0 (FDA)

