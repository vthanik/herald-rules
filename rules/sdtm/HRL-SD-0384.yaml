id: HRL-SD-0384
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Result or Finding in Original Units (--ORRES) should be populated when
  Last Observation Before Exposure Flag (--LOBXFL) is set to 'Y', unless the record
  is derived (--DRVFL = 'Y').
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: --ORRES
      operator: non_empty
    - name: --LOBXFL
      operator: equal_to
      value: 'Y'
    - name: --DRVFL
      operator: is_empty
outcome:
  message: '%Domain%ORRES is null when %Domain%LOBXFL = ''Y'' (and %Domain%DRVFL is
    null)'
  severity: Error
provenance:
  p21_id: SD1371
  core_id: ~
  cg_ids:
    - CG0553
  fda_ids: []
  source_doc: SDTM-IG v3.3

