id: HRL-AD-0288
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Within a Study and a Parameter, all BASECAyN (Baseline Category y (N))
  variable values must be the same for each unique value of BASECATy (Baseline Category
  y), when primary variable BASECATy is populated
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: BASECATVARIABLE
      operator: non_empty
    - name: '%Variables[BASECA#N]%'
      operator: all_values_equal
      group_by: STUDYID,PARAMCD,BASECAT%Variable.1%
outcome:
  message: Inconsistent value for BASECA%Variable.1%N
  severity: Error
provenance:
  p21_id: AD0330
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

