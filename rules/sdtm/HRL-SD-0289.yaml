id: HRL-SD-0289
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: When the Description of Unplanned Element (SEUPDES) is not populated,
  the Element Code (ETCD) should not be equal to 'UNPLAN'.
scope:
  classes:
    - SPECIAL-PURPOSE
  domains:
    - SE
check:
  all:
    - name: ETCD
      operator: not_equal_to
      value: UNPLAN
    - name: SEUPDES
      operator: is_empty
outcome:
  message: ETCD equals 'UNPLAN' when SEUPDES is null
  severity: Error
provenance:
  p21_id: SD1266
  core_id: ~
  cg_ids:
    - CG0210
  fda_ids: []
  source_doc: SDTM-IG v3.3

