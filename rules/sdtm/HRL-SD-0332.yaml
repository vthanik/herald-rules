id: HRL-SD-0332
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: DEATH records (DSDECOD='DEATH') in the Disposition (DS) domain should
  have Start Date of Event (DSSTDTC) equal to subject's Date/Time of Death (DTHDTC)
  populated in the Demographics (DM) domain. Subject's Date/Time of Death info should
  be consistent across all domains.
scope:
  classes:
    - EVENTS
  domains:
    - DS
check:
  all:
    - name: SUB:DTHDTC
      operator: equal_to
      value: DSSTDTC
    - name: SUB:DTHDTC !='' @and DSSTDTC !=' ' @and (DSDECOD
      operator: equal_to_case_insensitive
      value: DEATH
    - name: DSDECOD
      operator: equal_to_case_insensitive
      value: ''''
outcome:
  message: Rule HRL-SD-0332 violation
  severity: Error
provenance:
  p21_id: SD1317
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: P21 rule SD1317

