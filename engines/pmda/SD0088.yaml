description: Subject Reference End Date/Time (RFENDTC) should be populated for all
  randomized subjects, those where Planned Arm Code (ARMCD) is not equal to 'SCRNFAIL'
  or 'NOTASSGN' or null. If the study is ongoing, Parameter Value (TSVAL) for the
  'ONGOSIND/Ongoing Study Indicator' parameter should be set to 'Y' in the Trial Summary
  (TS) domain.
