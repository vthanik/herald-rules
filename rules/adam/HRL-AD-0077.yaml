id: HRL-AD-0077
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Any variable ending in STDY (Start day) must have a value less than or
  equal to its corresponding ENDY (end day) value.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: VARIABLESTDY
      operator: less_than
      value: eq  %Variable.1%ENDY
    - name: '%Variables[*STDY]%'
      operator: non_empty
    - name: VARIABLEENDY
      operator: non_empty
outcome:
  message: '%Variable.1%STDY is greater than %Variable.1%ENDY'
  severity: Error
provenance:
  p21_id: AD0099
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

