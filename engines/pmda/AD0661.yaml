id: AD0661
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: When ADOSEDUR is present, NDOSEDUR and/or DOSEDURU must also be included
  in the dataset.
scope:
  classes: []
  domains: ADNCA
check:
  all:
    - name: ADOSEDUR
      operator: non_empty
    - name: NDOSEDUR
      operator: empty
    - name: DOSEDURU
      operator: empty
outcome:
  message: ADOSEDUR is present and NDOSEDUR or DOSEDURU is not present
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0661
  pmda_category: Error
  ig_versions: []

