id: HRL-AD-0329
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: 'In a pair of corresponding character and numeric variables (* and *N
  or *C) the primary or most commonly used variable must be populated if its secondary
  variable describing it is populated. Exceptions: *DTC, *FN, TRTPN, TRT01PN, PARAMN,
  AVALC, BASEC.  Corresponding character and numeric values must also have a one to
  one mapping consistency when the primary variable is populated, which are addressed
  in other rules.'
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: VARIABLE
      operator: non_empty
    - name: '%Variables[*N,*C;!*DTC;!*FN;!TRTPN;!TRT01PN;!PARAMN;!AVALC;!BASEC]%'
      operator: non_empty
outcome:
  message: Secondary variable %Variable% is populated but its primary variable %Variable.1%
    is not populated
  severity: Error
provenance:
  p21_id: AD1011
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

