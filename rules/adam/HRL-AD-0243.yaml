id: HRL-AD-0243
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: If DOSECUMU (Cumulative Study Drug Dose unit) or populated DOSECUM (Cumulative
  Study Drug Dose) is populated, then both must be populated together.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: DOSECUMU
      operator: non_empty
    - name: DOSECUM
      operator: non_empty
    - name: DOSECUMU
      operator: non_empty
    - name: DOSECUM
      operator: non_empty
outcome:
  message: 'Only one of these variables is populated: DOSECUMU,DOSECUM'
  severity: Error
provenance:
  p21_id: AD0275
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

