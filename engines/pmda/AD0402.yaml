id: AD0402
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Not Executable
description: On a given record, if Analysis Toxicity Description High (ATOXDSCH) variable
  value is populated, then both Analysis Value (AVAL) and the Analysis Toxicity Grade
  High (ATOXGRH) variable values must be populated.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - ADAMOTHER
check: []
outcome:
  message: AVAL is not populated or ATOXGRH is not populated, and ATOXDSCH is populated
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0402
  pmda_category: Error
  ig_versions: []

