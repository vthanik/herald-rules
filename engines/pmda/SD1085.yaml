id: SD1085
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Collection Study Day (--DY) variable value should not be imputed. It
  may be only populated when both Collection Study Date/Time (--DTC) and Subject Reference
  Start Date/Time (RFSTDTC) variables values are provided and both include complete
  date part.
scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
  Use_Case: INDH
check:
  all:
    - name: --DY
      operator: non_empty
    - any:
        - name: --DTC
          operator: is_incomplete_date
        - name: RFSTDTC
          operator: is_incomplete_date
outcome:
  message: --DY variable value is imputed
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1085
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000354

