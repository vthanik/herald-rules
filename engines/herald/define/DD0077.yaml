# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 3.5
id: DD0077
version: 1
status: Published
standard: Define-XML
category: Orphan Detection
sensitivity: Study
executability: Fully Executable
description: >
  Codelist defined in Codelists sheet but never referenced by any Variable or ValueLevel entry.
scope:
  classes: []
  domains: []
check:
  all:
    - name: __codelist_is_referenced
      operator: equal_to
      value: false
outcome:
  message: "Codelist is defined but never referenced by any variable or value-level entry. Consider removing orphaned codelists."
  severity: Warning
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "3.5"
  cited_guidance: >
    For each controlled terminology referenced by variable or valuelist, a CodeList element must be provided.
