Core:
  Id: FDAV-SD1278
  Status: Reference
  Version: '1'
Description: Parameter Value Code (TSVALCD) and Parameter Value (TSVAL) should have
  a one-to-one relationship.
Check:
  all:
    - name: TSVAL
      operator: non_empty
    - name: TSVALCD
      operator: non_empty
    - name: TSVAL
      operator: is_not_unique_relationship
      value: TSVALCD
Outcome:
  Message: Inconsistent value for TSVALCD within TSVAL
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: TS
Standard: SDTM
Publisher ID: CG0265
IG Versions:
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
CORE Reference: CORE-000152
Executability: Fully Executable
Scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include: TS
  Use_Case: INDH

