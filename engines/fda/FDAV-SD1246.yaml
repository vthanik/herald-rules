Core:
  Id: FDAV-SD1246
  Status: Reference
  Version: '1'
Description: Time Point Reference (--TPTREF) variable must be included into the domain,
  when Planned Elapsed Time from Time Point Ref (--ELTM) variable is present.
Check:
  all:
    - name: --ELTM
      operator: exists
    - name: --TPTREF
      operator: not_exists
Outcome:
  Message: Missing --TPTREF variable, when --ELTM variable is present
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: ''
Standard: SDTM
Publisher ID: CG0092, 84, 279
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
  - SENDIG 3.0
  - SENDIG 3.1
  - SENDIG 3.1.1
  - SENDIG-AR 1.0
  - SENDIG-DART 1.1
CORE Reference: CORE-000167
Executability: Fully Executable
Scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
  Use_Case: INDH, PROD

