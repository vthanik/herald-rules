id: SD2024
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Only one of the Unique Subject Identifier (USUBJID) or Pool Identifier
  (POOLID) variables values may be populated, not both.
scope:
  Classes:
    Include: SPECIAL PURPOSE
  Domains:
    Include: RELSUB
check:
  all:
    - name: USUBJID
      operator: non_empty
    - name: POOLID
      operator: non_empty
outcome:
  message: Redundant values for USUBJID and POOLID
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD2024
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000229

