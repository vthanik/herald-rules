id: HRL-XP-0003
version: 1
status: Published
standard: XPT
category: Limit
sensitivity: Value
executability: Fully Executable

description: >
  Character variable length must not exceed 200 bytes. The SAS V5 transport format limits character variable storage to 200 bytes.

scope:
  classes:
    []
  domains:
    []

check:
  all:
    - name: {character_variables}
      operator: max_length
      value: 200

outcome:
  message: "Character variable '{variable_name}' exceeds 200 bytes in dataset '{dataset_name}'"
  severity: Error

provenance:
  p21_id: XP0003
  core_id: null
  cg_ids:
    - CG0403
  fda_ids:
    - FDA-XPT-003
  source_doc: "SAS V5 Transport Format Specification"
