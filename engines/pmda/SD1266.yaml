id: SD1266
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: When the Description of Unplanned Element (SEUPDES) is not populated,
  the Element Code (ETCD) should not be equal to 'UNPLAN'.
scope:
  Classes:
    Include: SPECIAL PURPOSE
  Domains:
    Include: SE
  Use_Case: INDH, NONCLIN
check:
  all:
    - name: SEUPDES
      operator: empty
    - name: ETCD
      operator: equal_to
      value: UNPLAN
outcome:
  message: ETCD equals 'UNPLAN' when SEUPDES is null
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1266
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000256

