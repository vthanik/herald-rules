id: AD0468
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: There should be only a single value of Strata Used for Randomization
  (STRATAR) variable for a given value of Strata Used for Randomization (N) (STRATARN)
  variable, considering only those rows on which both variables are populated.
scope:
  classes: []
  domains:
    - ADSL
    - ADDL
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for STRATAR
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0468
  pmda_category: Error
  ig_versions: []

