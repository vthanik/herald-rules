id: HRL-AD-0261
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Across studies, All ARELN must be the same for each unique value of AREL,
  when both variables are populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: AREL
      operator: non_empty
    - name: ARELN
      operator: non_empty
    - name: ARELN
      operator: all_values_equal
      group_by: AREL
outcome:
  message: Inconsistent value for ARELN
  severity: Error
provenance:
  p21_id: AD0290B
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

