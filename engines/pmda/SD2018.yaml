id: SD2018
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Value for Parameter Null Flavor (--VALNF) variable should be null when
  Parameter Value (--VAL) variable value can be populated.
scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include: TS
check:
  all:
    - name: TSVAL
      operator: empty
    - name: TSVALNF
      operator: empty
outcome:
  message: Both --VAL and --VALNF variables are populated
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD2018
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000149

