id: SD2010C
version: 1
status: Reference
standard: SDTM
category: Conformance
sensitivity: Record
executability: Fully Executable
description: Case for High Level Term (--HLT) variable must be sentence case using
  a High Level Term of the MedDRA dictionary of a version specified in the define.xml
  (Case-sensitive).
scope:
  classes: []
  domains:
    - AE
    - CE
    - MH
check:
  all:
    - name: __domain_variable__
      operator: check_value
outcome:
  message: Value for --HLT is in incorrect case
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD2010C
  pmda_category: Warning
  ig_versions: []

