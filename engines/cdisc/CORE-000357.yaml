Check:
  all:
    - name: dataset_name
      operator: longer_than
      value: 8
Core:
  Id: CORE-000357
  Status: Published
  Version: '1'
Description: When a supplemental qualifier dataset is associated with a split dataset,
  the dataset name length must not be greater than 8 characters.
Executability: Fully Executable
Outcome:
  Message: Supplemental qualifier dataset associated with a split dataset is greater
    than 8 characters in length
Rule_Type: Dataset Metadata Check
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - SUPP--
    include_split_datasets: yes
  Use_Case: INDH, PROD
Sensitivity: Record
