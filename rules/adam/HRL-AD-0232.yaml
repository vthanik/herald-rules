id: HRL-AD-0232
version: 1
status: Published
standard: ADaM
category: Presence
sensitivity: Record
executability: Partially Executable
description: Variables described in ADaM IG as inappropriate for usage must be not
  included in the dataset.  i.e...For ADAE, there is no need for AVAL,AVALC and Parameter
  variables.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: VARIABLE
      operator: variable_exists
      value: '%Variables.Core:Prohibited%'
outcome:
  message: Variable present in dataset is prohibited for use in ADaM
  severity: Error
provenance:
  p21_id: AD0252
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

