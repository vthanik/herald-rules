id: AD0388
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: Within a parameter, there should be only a single value of Baseline Toxicity
  Grade High (N) (BTOXGRHN) variable for a given value of Baseline Toxicity Grade
  High (BTOXGRH) variable, considering only those rows on which both variables are
  populated.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - ADAMOTHER
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for BTOXGRHN within a unique PARAMCD
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0388
  pmda_category: Error
  ig_versions: []

