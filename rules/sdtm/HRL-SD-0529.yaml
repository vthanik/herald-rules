id: HRL-SD-0529
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Start Reference Time Point (--STTPT) value must be consistent for all
  records with same Subject (USUBJID) and Start Date/Time (--STDTC) values.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: --STDTC
      operator: non_empty
    - name: '%Domain%STTPT'
      operator: all_values_equal
      group_by: USUBJID,VISITNUM,%Domain%STDTC
outcome:
  message: Inconsistent value for %Domain%STTPT
  severity: Error
provenance:
  p21_id: SD2238
  core_id: ~
  cg_ids:
    - CG0059
    - CG0060
    - CG0061
    - CG0062
  fda_ids: []
  source_doc: SDTM-IG v3.3

