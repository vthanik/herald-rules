Core:
  Id: FDAV-SD1240
  Status: Reference
  Version: '1'
Description: All subjects should have an Informed Consent record in the Disposition
  domain.
Check:
  all:
    - name: DSTERM
      operator: contains
      value: INFORMED CONSENT
    - name: RFICDTC
      operator: date_not_equal_to
      value: $min_ds_dsstdtc
    - name: $min_ds_dsstdtc
      operator: equal_to
      value: DSSTDTC
Outcome:
  Message: No Informed Consent Obtained record in DS domain for subject
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: DM
Standard: SDTM
Publisher ID: CG0143
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
CORE Reference: CORE-000370
Executability: Fully Executable
Scope:
  Classes:
    Include: EVENTS
  Domains:
    Include: DS
  Use_Case: INDH

