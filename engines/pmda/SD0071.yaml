id: SD0071
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: The combination of Description of Planned Arm (ARM) and Planned Arm Code
  (ARMCD) values must match entries in the Trial Arms (TA) dataset, except for subjects
  who failed screening (ARMCD = 'SCRNFAIL') or were not fully assigned to an Arm (ARMCD
  = 'NOTASSGN').
scope:
  Classes:
    Include: SPECIAL PURPOSE
  Domains:
    Include: DM
check:
  all:
    - name: ARM
      operator: is_not_contained_by
      value:
        - Screen Failure
        - Not Assigned
        - SCREEN FAILURE
        - NOT ASSIGNED
    - name: ARM
      operator: is_not_contained_by
      value: $arm_list
outcome:
  message: Invalid ARM/ARMCD
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0071
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000368

