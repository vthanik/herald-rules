Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  Within a study, all BASEC values must be the same for each unique combination of USUBJID and PARAMCD (single-dataset variant).
                Document: ADaM IG v1.1
                Section: '3.3.5'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-129-SD
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: BASEC
      operator: consistent_within_subject
Core:
  Id: ADaM-129-SD
  Status: Published
  Version: '1'
Description: >-
  BASEC (Baseline Value Character) must be consistent within USUBJID+PARAMCD.
Executability: Fully Executable
Outcome:
  Message: 'BASEC has inconsistent values for the same subject and parameter'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "BASEC consistent within subject+param"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVISIT, BASEC]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Baseline", "NORMAL"]
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Week 2", "NORMAL"]
    expected_findings: 0
  - name: "BASEC inconsistent within subject+param"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVISIT, BASEC]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Baseline", "NORMAL"]
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Week 2", "HIGH"]
    expected_findings: 1
