description: 'Allowable values of Standard Name are: ''SDTM-IG'', ''SEND-IG'', ''SEND-IG-AR'',
  ''ADaM-IG'', or ''BIMO'' for Define-XML v2.0 or ''CDISC SDTM'', ''CDISC SEND'',
  or ''CDISC ADaM'' for Define-XML v1.0. Values must conform to this list of values.
  Define-XML specification represents Standard Name as def:StandardName attribute
  on MetaDataVersion element. Note: Refer to the data standards catalog by the relevant
  Regulatory Agency for acceptance of standards and their versions.'
