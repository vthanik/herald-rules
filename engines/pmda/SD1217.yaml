id: SD1217
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: TSVAL value must be either ISO 8601 format for time period (e.g., P80Y)
  or null when TSPARMCD='AGEMIN'.
scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include: TS
check:
  all:
    - name: TSPARMCD
      operator: equal_to
      value: AGEMIN
    - name: TSVAL
      operator: non_empty
    - name: TSVAL
      negative: yes
      operator: invalid_duration
outcome:
  message: Invalid TSVAL value for AGEMIN
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1217
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000730

