Core:
  Id: FDAV-SD1022
  Status: Reference
  Version: '1'
Description: The value of Qualifier Variable Name (QNAM) should be limited to 8 characters,
  cannot start with a number, and cannot contain characters other than letters in
  upper case, numbers, or underscores.
Check:
  all:
    - name: QNAM
      operator: not_matches_regex
      value: ^[A-Z_][A-Z0-9_]{0,7}$
Outcome:
  Message: Invalid value for QNAM variable
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: SUPPQUAL
Standard: SDTM
Publisher ID: CG0417, 20, 21, 22, 23
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
  - SENDIG 3.0
  - SENDIG 3.1
  - SENDIG 3.1.1
  - SENDIG-AR 1.0
  - SENDIG-DART 1.1
CORE Reference: CORE-000221
Executability: Fully Executable
Scope:
  Classes:
    Include: RELATIONSHIP
  Domains:
    Include: SUPP--
  Use_Case: INDH, PROD

