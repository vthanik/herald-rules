id: HRL-AD-0012
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: When a numeric Flag variable (*FN) is populated, its corresponding character
  Flag variable (*FL) must be populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: VARIABLEFN
      operator: is_empty
    - name: '%Variables[*FL;!COMPLFL;!FASFL;!ITTFL;!PPROTFL;!SAFFL;!RANDFL;!ENRLFL]%'
      operator: is_empty
outcome:
  message: Secondary variable %Variable.1%FN is populated but its primary variable
    %Variable.1%FL is not populated
  severity: Error
provenance:
  p21_id: AD0012
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

