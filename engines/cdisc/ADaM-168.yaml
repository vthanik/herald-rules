Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If the record is flagged as the baseline (ABLFL = Y), then the baseline toxicity grade (BTOXGR) must be consistent for the same subject+parameter.
                Document: ADaM IG v1.1
                Section: '3.3.7'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-168
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: BTOXGR
      operator: consistent_within_subject
Core:
  Id: ADaM-168
  Status: Published
  Version: '1'
Description: >-
  BTOXGR must be consistent within USUBJID+PARAMCD across all records.
Executability: Fully Executable
Outcome:
  Message: 'BTOXGR is inconsistent for the same subject+parameter'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "BTOXGR consistent within subject+param"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVISIT, BTOXGR]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Baseline", "1"]
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Week 2", "1"]
    expected_findings: 0
  - name: "BTOXGR inconsistent within subject+param"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVISIT, BTOXGR]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Baseline", "1"]
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Week 2", "2"]
    expected_findings: 1
