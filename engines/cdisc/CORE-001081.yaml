Check:
  all:
    - name: define_variable_role
      operator: not_equal_to
      value: library_variable_role
Core:
  Id: CORE-001081
  Status: Published
  Version: '1'
Description: Raise an error when the metadata attribute of variable role does not
  match the IG role for domain in IG, or model role (for custom domains)
Executability: Fully Executable
Outcome:
  Message: Variable role specified in the define-xml does not match the variable role
    in the IG (for domains) or in the model (for custom domains).
  Output_Variables:
    - define_variable_role
    - define_variable_name
    - library_variable_role
Rule_Type: Define Item Metadata Check against Library Metadata
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  source: CDISC Library API
  catalogs:
    - SDTMIG 3.2
    - SDTMIG 3.3
