id: SD1371
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Result or Finding in Original Units (--ORRES) should be populated when
  Last Observation Before Exposure Flag (--LOBXFL) is set to 'Y
check:
  all:
    - name: --ORRES
      operator: empty
    - name: --LOBXFL
      operator: equal_to
      value: 'Y'
    - any:
        - name: --DRVFL
          operator: not_exists
        - name: --DRVFL
          operator: not_equal_to
          value: 'Y'
provenance:
  core_reference: CORE-000083
scope:
  Classes:
    Include: FINDINGS
  Domains:
    Include: ALL
  Use_Case: INDH

