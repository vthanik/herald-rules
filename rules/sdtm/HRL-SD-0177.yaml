id: HRL-SD-0177
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Split datasets must not have name of original domain. E.g., lbhm.xpt
  is a valid name, when lb.xpt is not a valid dataset name for split domain.
scope:
  classes:
    - FINDINGS
  domains:
    - DA
check:
  all:
    - name: DATASET
      operator: variable_exists
      value: '%Domain%'
outcome:
  message: Invalid dataset name for split domain
  severity: Error
provenance:
  p21_id: SD1095
  core_id: ~
  cg_ids:
    - CG0017
  fda_ids: []
  source_doc: SDTM-IG v3.3

