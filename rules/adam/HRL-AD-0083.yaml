id: HRL-AD-0083
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Within a study, All APERIODC values must be the same for each unique
  value of APERIOD when primary variable APERIOD is populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: APERIOD
      operator: non_empty
    - name: APERIODC
      operator: all_values_equal
      group_by: STUDYID,APERIOD
outcome:
  message: Inconsistent value for APERIODC
  severity: Error
provenance:
  p21_id: AD0105
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.0

