id: SD1235
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Value for Sponsor Device Identifier (SPDEVID) or Unique Subject Identifier
  (USUBJID) variables should be populated for all records in Device In-Use (DU) domain.
scope:
  Classes:
    Include:
      - EVENTS
      - INTERVENTIONS
      - FINDINGS ABOUT
      - FINDINGS
  Domains:
    Include: ALL
  Use_Case: INDH, PROD
check:
  any:
    - all:
        - name: DOMAIN
          operator: prefix_matches_regex
          prefix: 2
          value: (AP|ap)
        - name: APID
          operator: not_exists
    - all:
        - name: DOMAIN
          operator: not_prefix_matches_regex
          prefix: 2
          value: (AP|ap)
        - name: STUDYID
          operator: exists
        - name: --SEQ
          operator: exists
        - name: USUBJID
          operator: not_exists
        - name: SPDEVID
          operator: not_exists
        - name: POOLID
          operator: not_exists
        - name: SPTOBID
          operator: not_exists
        - name: STOCONID
          operator: not_exists
outcome:
  message: Neither SPDEVID nor USUBJID values are populated
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1235
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000107

