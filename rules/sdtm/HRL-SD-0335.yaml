id: HRL-SD-0335
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Character Result/Finding in Std Format (--STRESC) value should not be
  NULL, when Completion Status (--STAT) value is NULL.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: --STAT
      operator: is_empty
    - name: '%Domain%STRESC'
      operator: non_empty
outcome:
  message: Missing value for %Domain%STRESC, when %Domain%STAT is null
  severity: Error
provenance:
  p21_id: SD1320
  core_id: ~
  cg_ids:
    - CG0348
  fda_ids: []
  source_doc: SDTM-IG v3.3

