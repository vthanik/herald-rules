id: SD1009
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: The value of Element Code (ETCD) should be no more than 8 characters
  in length.
scope:
  Classes:
    Include:
      - TRIAL DESIGN
      - SPECIAL PURPOSE
  Domains:
    Include:
      - TA
      - TE
      - SE
  Use_Case: INDH, NONCLIN
check:
  all:
    - name: ETCD
      operator: longer_than
      value: 8
outcome:
  message: Invalid value for ETCD
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1009
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000143

