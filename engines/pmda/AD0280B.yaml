id: AD0280B
version: 1
status: Reference
standard: ADaM
category: Conformance
sensitivity: Record
executability: Fully Executable
description: Across studies, all Severity/Intensity (AESEV) variable values must be
  the same for each unique value of Severity/Intensity (N) (AESEVN) variable when
  both variables are populated.
scope:
  classes: []
  domains:
    - OCCDS
    - ADAE
    - MDOCCDS
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for AESEV
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0280B
  pmda_category: Error
  ig_versions: []

