description: A value found in a Where Clause is not found in the defined Codelist
  within the linked Terminology.
scope:
  classes: []
  domains: []
outcome:
  message: Check Value not found in Codelist
  severity: Error
provenance:
  source_doc: P21 ADaM Validation Rules v1.2 (Define-XML)
  authority: Herald
  p21_reference: DD0151

tests:
  - name: "HRL-DD-006 — nominal compliant record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-006 — nominal violating record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

notes: >
  Blocked on `where_clause_value_in_codelist` operator (Where Clause value must be a term in the referenced codelist). See HANDOFF section 4g.

