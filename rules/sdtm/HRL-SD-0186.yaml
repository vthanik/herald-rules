id: HRL-SD-0186
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Epoch (EPOCH) variable value should not be populated, when Category for
  Disposition Event (DSCAT) variable value equals 'PROTOCOL MILESTONE'.
scope:
  classes:
    - EVENTS
  domains:
    - DS
check:
  all:
    - name: EPOCH
      operator: is_empty
    - name: DSCAT
      operator: equal_to
      value: PROTOCOL MILESTONE
    - name: DSCAT
      operator: equal_to
      value: ''''
outcome:
  message: Rule HRL-SD-0186 violation
  severity: Error
provenance:
  p21_id: SD1105
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: P21 rule SD1105

