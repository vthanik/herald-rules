Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If Analysis Toxicity Description High (ATOXDSCH) variable is present,
                  ATOXGRHN or ATOXGRH must also be present.
                Document: ADaM IG v1.1
                Section: "4.4"
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-402
              Version: "1"
            Version: "1.0"
        Version: "1.1"
Check:
  all:
    - name: ATOXDSCH
      operator: non_empty
    - name: ATOXGRHN
      operator: empty
    - name: ATOXGRH
      operator: empty
Core:
  Id: ADaM-402
  Status: Published
  Version: "1"
Description: >-
  If Analysis Toxicity Description High (ATOXDSCH) variable is present,
  ATOXGRHN or ATOXGRH must also be present.
Executability: Fully Executable
Outcome:
  Message: "ATOXDSCH is present but neither ATOXGRHN nor ATOXGRH is present"
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BASIC DATA STRUCTURE
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: "2026-04-12"

tests:
  - name: ATOXDSCH with ATOXGRHN present (valid)
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ATOXDSCH, ATOXGRHN, ATOXGRH]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, "Grade 2 High", 2, ""]
    expected_findings: 0
  - name: ATOXDSCH present but ATOXGRHN and ATOXGRH missing (violation)
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ATOXDSCH, ATOXGRHN, ATOXGRH]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, "Grade 2 High", "", ""]
    expected_findings: 1
