                  the subject was not assigned to an Arm, ARMCD is null and ARMNRS
                  is populated
                Document: IG v3.4
                Item: Specification
                Section: '5.2'
            Origin: SDTM and SDTMIG Conformance Rules
            Rule_Identifier:
              Id: CG0516
              Version: '1'
