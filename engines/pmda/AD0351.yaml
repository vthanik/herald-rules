id: AD0351
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: Within a Study and a Parameter, all Analysis Range y Upper Limit (C)
  (AyHIC) variable values must be the same for each unique value of Analysis Range
  y Upper Limit (AyHI) variable when variable AyHI is populated.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for AyHIC
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0351
  pmda_category: Error
  ig_versions: []

