description: If TREMxxFL is included, TRTEMFL is defined as the overall treatment
  emergent flag. If any Treatment Emergent Period xx Flag (TREMxxFL) variables are
  flagged Y, then the overall Treatment Emergent Analysis Flag (TRTEMFL) variable
  should also be Y.
