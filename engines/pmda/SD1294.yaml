id: SD1294
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Completion Status (--STAT) variable should not be present in the domain
  when the Pre-specified (--PRESP) variable is missing.
scope:
  Classes:
    Include:
      - EVENTS
      - INTERVENTIONS
  Domains:
    Exclude:
      - DS
      - DV
      - EX
  Use_Case: INDH, PROD
check:
  all:
    - name: --PRESP
      operator: not_exists
    - name: --STAT
      operator: exists
outcome:
  message: --STAT variable is present when --PRESP variable is missing
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1294
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000081

