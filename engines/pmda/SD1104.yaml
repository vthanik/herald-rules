id: SD1104
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Start Relative to Reference Time Point (--STRTPT) variable must be included
  into the domain when Start Relative Time Point (--STTPT) variable is present.
scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
  Use_Case: INDH, PROD
check:
  all:
    - name: --STTPT
      operator: exists
    - name: --STRTPT
      operator: not_exists
outcome:
  message: Missing --STRTPT variable when --STTPT variable is present
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1104
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000261

