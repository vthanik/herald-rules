Authorities:
  - Organization: CDISC
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited_Guidance: 'Records for unplanned visits should be included in
                  the SV dataset. For unplanned visits, SVUPDES should be populated
                  with a description of the reason for the unplanned visit. Some judgment
                  may be required to determine what constitutes an unplanned visit.
                  When data are collected outside a planned visit, that act of collecting
                  data may or may not be described as a ''visit.'' The encounter should
                  generally be treated as a visit if data from the encounter are included
                  in any domain for which VISITNUM is included, since a record with
                  a missing value for VISITNUM is generally less useful than a record
                  with VISITNUM populated. If the occasion is considered a visit,
                  its date/times must be included in the SV table and a value of VISITNUM
                  must be assigned. See Section 4: 4.1.4.5, Clinical Encounters And
                  Visits for information on the population of visit variables for
                  unplanned visits.'
                Document: IG v3.2
                Item: Assumption 3
                Section: 5 SV
            Origin: SDTM and SDTMIG Conformance Rules
            Rule_Identifier:
              Id: CG0214
              Version: '1'
            Version: '2.0'
        Version: '3.2'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited_Guidance: Records for unplanned visits should be included in
