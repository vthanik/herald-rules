id: HRL-SD-0348
version: 1
status: Published
standard: SDTM
category: Limit
sensitivity: Record
executability: Fully Executable
description: Date/Time of Informed Consent (RFICDTC) should not be after Subject Reference
  Start Date/Time (RFSTDTC).
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: RFICDTC
      operator: less_than
      value: eq RFSTDTC
    - name: RFICDTC
      operator: non_empty
    - name: RFSTDTC
      operator: non_empty
outcome:
  message: RFICDTC is after RFSTDTC
  severity: Error
provenance:
  p21_id: SD1334
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB034
  source_doc: SDTM-IG v3.3

