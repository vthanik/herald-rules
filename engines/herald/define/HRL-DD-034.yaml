# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.11
id: HRL-DD-034
version: 2
status: Published
standard: Define-XML
category: Dataset Definition
sensitivity: Dataset
executability: Fully Executable
description: >
  Structure description is required for all datasets.
scope:
  classes: []
  domains: []
check:
  all:
    - name: structure
      operator: non_empty
outcome:
  message: "Structure description is missing. def:Structure is required for all datasets."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.11"
  cited_guidance: >
    def:Structure -- Required. Description of the level of detail represented by individual records in the dataset.

tests:
  - name: "HRL-DD-034 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-034 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

