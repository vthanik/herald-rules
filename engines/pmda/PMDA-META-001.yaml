id: PMDA-META-001
version: 1
status: Published
standard: SDTM
category: Metadata
sensitivity: Record
executability: Fully Executable

description: >
  All variables must have non-empty labels. PMDA requires every variable
  in submitted datasets to carry a descriptive label.

scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []

check:
  all:
    - name: __variable_labels__
      operator: non_empty

outcome:
  message: "Variable label is missing or empty"
  severity: Error

provenance:
  source_doc: "PMDA Validation Rules v6.0"
  authority: PMDA
