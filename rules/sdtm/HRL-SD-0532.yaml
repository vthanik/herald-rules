id: HRL-SD-0532
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: TSVCDREF variable value must be 'UNII', when TSPARMCD='CURTRT'.
scope:
  classes:
    - TRIAL DESIGN
  domains:
    - TS
check:
  all:
    - name: TSVCDREF
      operator: equal_to
      value: UNII
    - name: TSPARMCD
      operator: equal_to
      value: CURTRT
    - name: TSVALNF
      operator: is_empty
outcome:
  message: Invalid TSVCDREF value for CURTRT
  severity: Error
provenance:
  p21_id: SD2241
  core_id: ~
  cg_ids:
    - CG0444
  fda_ids:
    - FDAB011
  source_doc: SDTM-IG v3.3

