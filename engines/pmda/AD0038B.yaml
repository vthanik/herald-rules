id: AD0038B
version: 1
status: Reference
standard: ADaM
category: Conformance
sensitivity: Record
executability: Not Executable
description: 'Within a study, all *GRy values must be the same for each unique value
  of *GRyN when the primary variable *GRy is populated. ADaM IG v1.1 p.15 general
  variable naming conventions #10: If any combining of the SDTM character categories
  is done, the name of the derived ADaM character grouping variable should end in
  GRy and the name of its numeric equivalent should end in GRyN where y is an integer
  from 1-9 representing a grouping scheme. CDISC created 3 new explicit rules for
  ADAE which were already covered by this general rule. Considering only those rows
  on which both variables are populated.'
