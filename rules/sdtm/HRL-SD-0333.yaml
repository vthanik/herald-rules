id: HRL-SD-0333
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Subjects who have DSDECOD = 'PROTOCOL VIOLATION' or DSDECOD = 'PROTOCOL
  DEVIATION' records in the Disposition (DS) domain should have supportive records
  with details in the Protocol Deviations (DV) domain.
scope:
  classes:
    - EVENTS
  domains:
    - DS
check:
  all:
    - name: DSDECOD
      operator: equal_to_case_insensitive
      value: PROTOCOL DEVIATION
    - name: DSDECOD
      operator: equal_to_case_insensitive
      value: PROTOCOL VIOLATION
    - name: DSDECOD
      operator: equal_to_case_insensitive
      value: ''''
outcome:
  message: Rule HRL-SD-0333 violation
  severity: Error
provenance:
  p21_id: SD1318
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: P21 rule SD1318

