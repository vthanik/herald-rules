id: HRL-AD-0298
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Within a Study and a Parameter, all ANRLO (Analysis Normal Range Lower
  Limit) variable values must be the same for each unique value of ANRLOC (Analysis
  Normal Range Lower Limit (C)), when variable ANRLOC is populated
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: ANRLOC
      operator: non_empty
    - name: ANRLO
      operator: all_values_equal
      group_by: STUDYID,PARAMCD,ANRLOC
outcome:
  message: Inconsistent value for ANRLO
  severity: Error
provenance:
  p21_id: AD0342
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

