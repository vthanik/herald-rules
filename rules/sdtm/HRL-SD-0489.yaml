id: HRL-SD-0489
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Either of Age (AGE) or Age Range (AGETXT) variable values should be provided,
  when Age Units (AGEU) are populated.
scope:
  classes:
    - INTERVENTIONS
  domains:
    - AG
check:
  all:
    - any:
        - name: AGE
          operator: non_empty
        - name: AGETXT
          operator: non_empty
    - name: AGEU
      operator: non_empty
outcome:
  message: Missing values for both AGE and AGETXT, when AGEU is provided
  severity: Error
provenance:
  p21_id: SD2021
  core_id: ~
  cg_ids:
    - CG0433
    - CG0434
  fda_ids: []
  source_doc: SDTM-IG v3.3

