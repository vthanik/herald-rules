id: HRL-SD-0196
version: 1
status: Published
standard: SDTM
category: Terminology
sensitivity: Record
executability: Partially Executable
description: Case for Body System or Organ Class (--BODSYS) variable must follow MedDRA
  sentence  case and be populated using a System Organ Class of the MedDRA dictionary
  of a version specified in the define.xml (Case-sensitive).
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: '%Variables[--BODSYS]%'
      operator: non_empty
outcome:
  message: Value for %Domain%BODSYS is in incorrect case
  severity: Error
provenance:
  p21_id: SD1114C
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB017
  source_doc: SDTM-IG v3.3

