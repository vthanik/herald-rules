id: SD1269
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: For the trial summary parameter Randomization Quotient (TSPARMCD = 'RANDQT'),
  the value must always be a number between 0 and 1, with some cases where the ratio
  might be equal to 1.
scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include: TS
check:
  all:
    - name: TSPARMCD
      operator: equal_to
      value: RANDQT
    - name: TSVAL
      operator: non_empty
    - name: TSVAL
      operator: not_matches_regex
      value: ^(0.[0-9]+?)$
    - name: TSVAL
      operator: not_matches_regex
      value: ^[1]$
outcome:
  message: TSVAL is not between 0 and 1 when TSPARMCD = 'RANDQT'
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1269
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000335

