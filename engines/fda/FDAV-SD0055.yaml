Core:
  Id: FDAV-SD0055
  Status: Reference
  Version: '1'
Description: Variable Data Types in the dataset should match the variable data types
  described in SDTM.
Check:
  all:
    - name: variable_data_type
      operator: not_equal_to
      value: library_variable_data_type
Outcome:
  Message: SDTM/dataset variable type mismatch
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: ''
Standard: SDTM
Publisher ID: CG0012
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
  - SENDIG-AR 1.0
CORE Reference: CORE-001082
Executability: Fully Executable
Scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL

