id: HRL-AD-0266
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Across studies, All ATOXGR must be the same for each unique value of
  ATOXGRN when primary variable ATOXGR is populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: ATOXGR
      operator: non_empty
    - name: ATOXGR
      operator: all_values_equal
      group_by: ATOXGRN
outcome:
  message: Inconsistent value for ATOXGR
  severity: Error
provenance:
  p21_id: AD0295
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.0

