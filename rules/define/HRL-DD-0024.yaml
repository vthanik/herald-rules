executability: Not Executable
description: If the allowed values for a variable are restricted by a non-extensible
  CDISC controlled terminology, the Codelist referenced in Define.xml must not contain
  Terms that are not part of CDISC controlled terminology. Define-XML specification
  represents Term as CodedValue attribute on either EnumeratedItem or CodeListItem
  elements within CodeList element.
