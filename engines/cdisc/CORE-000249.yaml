    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited_Guidance: For planned visits, values of VISIT, VISITNUM, and
                  VISITDY must be those defined in the Trial Visits (TV) dataset (Section
                  7.3.1, Trial Visits).
                Document: IG v3.4
                Item: ''
                Section: 4.4.5
            Origin: SDTM and SDTMIG Conformance Rules
            Rule_Identifier:
              Id: CG0032
              Version: '2'
