id: AD0792
version: 1
status: Published
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: >
  On a given record, a variable with a suffix of SDT has a value greater than
  a value of a variable with the same root and a suffix of EDT, and both
  variables are populated. (Paired *SDT / *EDT date variables must obey
  start <= end.)
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: ""
      operator: paired_suffix_date_order
      value:
        start_suffix: SDT
        end_suffix: EDT
outcome:
  message: "*SDT is greater than *EDT"
  severity: Error
provenance:
  source_doc: P21 Community ADaM Validation Rules
  authority: Herald
  p21_reference: AD0792
  ig_versions: []
