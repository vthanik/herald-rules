id: HRL-SD-0270
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Partially Executable
description: Time Point Reference (--TPTREF) variable must be included into the domain,
  when Planned Elapsed Time from Time Point Ref (--ELTM) variable is present.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: VARIABLE
      operator: variable_exists
      value: '%Domain%TPTREF'
outcome:
  message: Missing %Domain%TPTREF variable, when %Domain%ELTM variable is present
  severity: Error
provenance:
  p21_id: SD1246
  core_id: ~
  cg_ids:
    - CG0092
  fda_ids: []
  source_doc: SDTM-IG v3.3

