id: AD0225
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Not Executable
description: When all 3 variables are populated and base <> 0, Percent Change from
  Baseline (PCHG) must equal the difference of Analysis Value (AVAL) minus Baseline
  Value (BASE) divided by the Baseline Value (BASE), expressed as a percentage. AD0225A
  will raise errors when BASE = 0. AD0132B also complements this check.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
check: []
outcome:
  message: 'Calculation issue: PCHG != (AVAL - BASE)/BASE * 100'
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0225
  pmda_category: Warning
  ig_versions: []

