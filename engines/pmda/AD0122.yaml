id: AD0122
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: Any variable ending in SDTM (Start Date Time) must have a value less
  than or equal to its corresponding EDTM (End Date Time) value (e.g., ADSL - TRTSDTM,
  TR01SDTM, AP01SDTM; BDS - APERSDTM).
scope:
  classes: []
  domains:
    - ADSL
    - ADDL
    - BDS
    - ADNCA
    - MDBDS
    - OCCDS
    - ADAE
    - MDOCCDS
    - ADAMOTHER
check:
  all:
    - name: __variable__
      operator: in_range
outcome:
  message: '*SDTM is greater than *EDTM'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0122
  pmda_category: Error
  ig_versions: []

