id: HRL-SD-0523
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Fully Executable
description: '''Study Start Date'' (SSTDTC) record must be populated in Trial Summary
  (TS) domain. It is expected for SDTM IG v3.1.2 data and required for data in all
  more recent SDTM versions.'
scope:
  classes:
    - FINDINGS
  domains:
    - SS
check:
  all:
    - name: TSPARMCD
      operator: variable_exists
      value: SSTDTC
outcome:
  message: Missing SSTDTC Trial Summary Parameter
  severity: Error
provenance:
  p21_id: SD2232
  core_id: ~
  cg_ids:
    - CG0287
  fda_ids:
    - FDAB011
  source_doc: SDTM-IG v3.3

