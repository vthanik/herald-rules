standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: All values of Inclusion/Exclusion Criterion Short Name  (IETESTCD) should
  be the same for a given value of Inclusion/Exclusion Criterion (IETEST).
