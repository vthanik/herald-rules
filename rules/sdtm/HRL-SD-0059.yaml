id: HRL-SD-0059
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Start Reference Time Point (--STTPT) must not be NULL, when Start Relative
  to Reference Time Point (--STRTPT) is provided.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: --STRTPT
      operator: non_empty
    - name: '%Domain%STTPT'
      operator: non_empty
outcome:
  message: Missing value for %Domain%STTPT, when %Domain%STRTPT is populated
  severity: Error
provenance:
  p21_id: SD0049
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB044
  source_doc: SDTM-IG v3.3

