id: HRL-AD-0202
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Within a study, All TRTSEQAN values must be the same for each unique
  value of TRTSEQA when primary variable TRTSEQA is populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: TRTSEQA
      operator: non_empty
    - name: TRTSEQAN
      operator: all_values_equal
      group_by: STUDYID,TRTSEQA
outcome:
  message: Inconsistent value for TRTSEQAN
  severity: Error
provenance:
  p21_id: AD0230
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.0

