id: HRL-SD-0061
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: All values of Visit Number (VISITNUM) should be the same for a given
  value of Visit Name (VISIT).
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: VISITNUM
      operator: non_empty
    - name: VISIT
      operator: non_empty
    - name: VISITNUM
      operator: all_values_equal
      group_by: VISIT
outcome:
  message: Inconsistent value for VISITNUM within VISIT
  severity: Error
provenance:
  p21_id: SD0052
  core_id: ~
  cg_ids:
    - CG0035
  fda_ids: []
  source_doc: SDTM-IG v3.3

