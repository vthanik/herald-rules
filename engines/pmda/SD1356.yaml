id: SD1356
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: When the Temporal Relation to Milestone Instance (RELMIDS) variable is
  used in any dataset, the Trial Disease Milestones (TM) dataset must be present for
  the study.
scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
check:
  all:
    - name: $RELMIDS_EXISTS
      operator: equal_to
      value: yes
    - name: TM
      operator: not_exists
outcome:
  message: Missing TM dataset when variable RELMIDS is present in a dataset
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1356
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000777

