Core:
  Id: FDAV-SD0036
  Status: Reference
  Version: '1'
Description: Character Result/Finding in Std Units (--STRESC) must be populated, when
  Result or Finding in Original Units (--ORRES) is provided.
Check:
  all:
    - any:
        - name: --ORRES
          operator: non_empty
        - name: --DRVFL
          operator: equal_to
          value: 'Y'
    - all:
        - name: --STRESC
          operator: empty
Outcome:
  Message: Missing value for --STRESC, when --ORRES is provided
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: FINDINGS, FINDINGS ABOUT
Standard: SDTM
Publisher ID: CG0397, CG0561, 87
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
  - SENDIG 3.0
  - SENDIG 3.1
  - SENDIG 3.1.1
  - SENDIG-AR 1.0
  - SENDIG-DART 1.1
CORE Reference: CORE-000021
Executability: Fully Executable
Scope:
  Classes:
    Include: FINDINGS
  Domains:
    Include: ALL
  Use_Case: INDH, PROD

