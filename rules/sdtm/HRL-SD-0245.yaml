id: HRL-SD-0245
version: 1
status: Published
standard: SDTM
category: Format
sensitivity: Record
executability: Fully Executable
description: TSVAL value must be either ISO 8601 format for time period (e.g. P80Y)
  or null, when TSPARMCD='LENGTH'.
scope:
  classes:
    - TRIAL DESIGN
  domains:
    - TS
check:
  all:
    - name: TSVAL
      operator: matches_regex
      value: ^(R\d*/)?P(?:\d+(?:\.\d+)?Y)?(?:\d+(?:\.\d+)?M)?(?:\d+(?:\.\d+)?W)?(?:\d+(?:\.\d+)?D)?(?:T(?:\d+(?:\.\d+)?H)?(?:\d+(?:\.\d+)?M)?(?:\d+(?:\.\d+)?S)?)?$
outcome:
  message: Invalid TSVAL value for LENGTH
  severity: Error
provenance:
  p21_id: SD1219
  core_id: ~
  cg_ids:
    - CG0439
  fda_ids: []
  source_doc: SDTM-IG v3.3

