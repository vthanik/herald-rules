id: HRL-AD-0058
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Within a study, All TRTxxP values must be the same for each unique value
  of TRTxxPN when primary variable TRTxxP is populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: TRTVARIABLEP
      operator: non_empty
    - name: '%Variables[TRT##P]%'
      operator: all_values_equal
      group_by: STUDYID,TRT%Variable.1%PN
outcome:
  message: Inconsistent value for TRT%Variable.1%P
  severity: Error
provenance:
  p21_id: AD0077
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

