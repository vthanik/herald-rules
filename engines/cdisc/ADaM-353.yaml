Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If the record is flagged as the Analysis Baseline (ABLFL = Y), then BNRIND (Baseline Reference Range Indicator) must be consistent across all records for the same USUBJID and PARAMCD.
                Document: ADaM IG v1.1
                Section: '3.3.6'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-353
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: BNRIND
      operator: consistent_within_subject
Core:
  Id: ADaM-353
  Status: Published
  Version: '1'
Description: >-
  BNRIND must be consistent within USUBJID+PARAMCD.
Executability: Fully Executable
Outcome:
  Message: 'BNRIND is inconsistent for the same subject+parameter'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "BNRIND consistent within subject+param"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVISIT, BNRIND]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Baseline", "NORMAL"]
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Week 2", "NORMAL"]
    expected_findings: 0
  - name: "BNRIND inconsistent within subject+param"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVISIT, BNRIND]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Baseline", "NORMAL"]
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Week 2", "HIGH"]
    expected_findings: 1
