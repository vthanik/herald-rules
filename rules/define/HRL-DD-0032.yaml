description: NCI Code for Codelist Term must exist in CDISC Controlled Terminology.
  Define-XML specification represents Term as CodedValue attribute on either EnumeratedItem
  or CodeListItem elements within CodeList element. NCI Code is represented as Name
  attribute on Alias element when Context attribute is "nci:ExtCodeID".
