id: HRL-DD-0023
version: 1
status: Published
standard: Define-XML
category: Terminology
sensitivity: Record
executability: Not Executable
description: 'Standard Version must have a valid value for the given Standard Name.
  Allowed values are ''3.1.2'', ''3.1.3'', ''3.2'', or ''3.3'' for SDTM-IG, ''3.0''
  or ''3.1'' for SEND-IG, ''1.0'' for SEND-IG-AR, ''1.0'', ''1.1'', or ''1.2'' for
  ADaM-IG, and ''1.0'' for BIMO. Define-XML specification represents Standard Version
  as def:StandardVersion attribute on MetaDataVersion element. Note: Refer to the
  data standards catalog by the relevant Regulatory Agency for acceptance of standards
  and their versions.'
