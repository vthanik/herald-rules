id: HRL-AD-0102
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Any variable ending in SDTM (Start date time) must have a value less
  than or equal to its corresponding EDTM (end date time) value (e.g. ADSL - TRTSDTM,
  TR01SDTM, AP01SDTM; BDS - APERSDTM.
scope:
  classes:
    - ADSL
  domains:
    - ADSL
check:
  all:
    - name: VARIABLESDTM
      operator: less_than
      value: eq  %Variable.1%EDTM
    - name: '%Variables[*SDTM]%'
      operator: non_empty
    - name: VARIABLEEDTM
      operator: non_empty
outcome:
  message: '%Variable.1%SDTM is greater than %Variable.1%EDTM'
  severity: Error
provenance:
  p21_id: AD0122
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

