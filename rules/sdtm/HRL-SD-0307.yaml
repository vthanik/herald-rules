id: HRL-SD-0307
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: All values of Preferred Term Code (--PTCD) should be the same for a given
  value of Dictionary-Derived Term (--DECOD).
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: --PTCD
      operator: non_empty
    - name: --DECOD
      operator: non_empty
    - name: '%Domain%PTCD'
      operator: all_values_equal
      group_by: '%Domain%DECOD'
outcome:
  message: Inconsistent value for %Domain%PTCD within %Domain%DECOD
  severity: Error
provenance:
  p21_id: SD1288
  core_id: ~
  cg_ids:
    - CG0049
  fda_ids: []
  source_doc: SDTM-IG v3.3

