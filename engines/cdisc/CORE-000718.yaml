Check:
  all:
    - name: --STDTC
      operator: non_empty
    - name: --ENDTC
      operator: non_empty
    - name: --STDTC
      operator: date_greater_than
      value: --ENDTC
Core:
  Id: CORE-000718
  Status: Published
  Version: '1'
Description: Start Date/Time of Observation (--STDTC) should be prior or equal to
  the End Date/Time of Observation (--ENDTC).
Executability: Fully Executable
Outcome:
  Message: --STDTC falls after  --ENDTC.
  Output_Variables:
    - --STDTC
    - --ENDTC
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - INTERVENTIONS
      - EVENTS
      - SPECIAL PURPOSE
  Domains:
    Exclude:
      - DM
Sensitivity: Record
