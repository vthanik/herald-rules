id: HRL-SD-0035
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Fully Executable

description: >
  CMDECOD must not be empty in the CM domain. The dictionary-derived medication term (WHODrug preferred name) is required for every CM record.

scope:
  classes:
    - INTERVENTIONS
  domains:
    - CM

check:
  all:
    - name: CMDECOD
      operator: non_empty

outcome:
  message: "CMDECOD is empty or missing in CM for subject '{USUBJID}'"
  severity: Error

provenance:
  p21_id: SD0035
  core_id: CORE-000286
  cg_ids:
    - CG0035
  fda_ids:
    []
  source_doc: "SDTM-IG v3.3 Section 6.1.2"
