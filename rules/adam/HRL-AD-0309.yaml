id: HRL-AD-0309
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: If the record is flagged as the Analysis Baseline (ABLFL = Y), then the
  value of ByIND (Baseline Analysis Range y Indicator) variable must equal the value
  of AyIND (Analysis Range y Indicator) variable
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: BVARIABLEIND
      operator: equal_to
      value: A%Variable.1%IND
    - name: ABLFL
      operator: equal_to
      value: 'Y'
    - name: '%Variables[B#IND]%'
      operator: non_empty
outcome:
  message: B%Variable.1%IND != A%Variable.1%IND, when ABLFL = Y
  severity: Error
provenance:
  p21_id: AD0353
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

