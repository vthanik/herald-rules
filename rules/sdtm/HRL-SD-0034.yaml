id: HRL-SD-0034
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Fully Executable

description: >
  CMTRT must not be empty in the CM domain. The reported name of the concomitant medication is required for every CM record.

scope:
  classes:
    - INTERVENTIONS
  domains:
    - CM

check:
  all:
    - name: CMTRT
      operator: non_empty

outcome:
  message: "CMTRT is empty or missing in CM for subject '{USUBJID}'"
  severity: Error

provenance:
  p21_id: SD0034
  core_id: CORE-000285
  cg_ids:
    - CG0034
  fda_ids:
    []
  source_doc: "SDTM-IG v3.3 Section 6.1.2"
