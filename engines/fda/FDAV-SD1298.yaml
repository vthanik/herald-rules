Core:
  Id: FDAV-SD1298
  Status: Reference
  Version: '1'
Description: When a numeric scale is used (Grade 1, Grade 2, etc.), LBTOXGR should
  only contain the number.
Check:
  all:
    - name: LBTOXGR
      operator: matches_regex
      value: .*[a-zA-Z].*
    - name: LBTOXGR
      operator: matches_regex
      value: .*[0-9].*
Outcome:
  Message: LBTOXGR is not a numeric value when a numeric scale is used.
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: LB
Standard: SDTM
Publisher ID: CG0185
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
CORE Reference: CORE-000169
Executability: Fully Executable
Scope:
  Classes:
    Include: FINDINGS
  Domains:
    Include: LB
  Use_Case: INDH

