id: HRL-AD-0067
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Within a study, All TRTPN values must be the same for each unique value
  of TRTP when primary variable TRTP is populated. Considering only those rows on
  which both variables are populated
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: TRTP
      operator: non_empty
    - name: TRTPN
      operator: non_empty
    - name: TRTPN
      operator: all_values_equal
      group_by: STUDYID,TRTP
outcome:
  message: Inconsistent value for TRTPN
  severity: Error
provenance:
  p21_id: AD0092B
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

