id: HRL-AD-0153
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: If the record is flagged as the baseline (ABLFL = Y), then the baseline
  toxicity grade (BTOXGR) value must equal the analysis toxicity grade (ATOXGR) value.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: BTOXGR
      operator: equal_to
      value: ATOXGR
    - name: ABLFL
      operator: equal_to
      value: 'Y'
outcome:
  message: ABLFL = Y, but BTOXGR != ATOXGR
  severity: Error
provenance:
  p21_id: AD0165
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

