id: HRL-SD-0214
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: A value for Actual Arm Code (ACTARMCD) must have a unique value for Description
  of Actual Arm (ACTARM) with the domain.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: ACTARM
      operator: non_empty
    - name: ACTARM
      operator: all_values_equal
      group_by: ACTARMCD
outcome:
  message: Inconsistent value for ACTARMCD
  severity: Error
provenance:
  p21_id: SD1134
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB009
  source_doc: SDTM-IG v3.3

