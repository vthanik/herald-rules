Core:
  Id: FDAV-SD1016
  Status: Reference
  Version: '1'
Description: The combination of Inclusion/Exclusion Criterion Short Name (IETESTCD),
  Criterion (IETEST), and Category (IECAT) values should match entries in the Trial
  Inclusion/Exclusion Criteria (TI) dataset.
Check:
  all:
    - name: IETEST
      operator: is_not_contained_by
      value: $ti_ietest
Outcome:
  Message: Invalid IETESTCD/IETEST/IECAT
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: IE
Standard: SDTM
Publisher ID: CG0178
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
CORE Reference: CORE-000227
Executability: Fully Executable
Scope:
  Classes:
    Include: FINDINGS
  Domains:
    Include: IE
  Use_Case: INDH

