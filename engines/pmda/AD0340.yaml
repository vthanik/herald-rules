id: AD0340
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: Within a Study and a Parameter, all Multi-Response Criterion y Evaluation
  (MCRITyML) variable values must be the same for each unique value of Multi-Response
  Criterion y Eval (N) (MCRITyMN) variable when variable MCRITyMN is populated.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - ADAMOTHER
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for MCRITyML
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0340
  pmda_category: Error
  ig_versions: []

