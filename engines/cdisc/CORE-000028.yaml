Outcome:
  Message: --TPTREF is empty and --ELTM is not empty
  Output_Variables:
    - --TPTREF
    - --ELTM
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ALL
  Use_Case: INDH, PROD
Sensitivity: Record
