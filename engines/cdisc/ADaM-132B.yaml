Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If any of CHG (change), PCHG (percent change), or R2BASE (ratio to baseline) is populated, then both AVAL and BASE must also be populated.
                Document: ADaM IG v1.1
                Section: '3.3.5'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-132B
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  any:
    - all:
        - name: CHG
          operator: non_empty
        - name: BASE
          operator: empty
    - all:
        - name: PCHG
          operator: non_empty
        - name: BASE
          operator: empty
    - all:
        - name: R2BASE
          operator: non_empty
        - name: BASE
          operator: empty
Core:
  Id: ADaM-132B
  Status: Published
  Version: '1'
Description: >-
  When CHG, PCHG, or R2BASE is present, BASE must also be present since these are all derived from BASE.
Executability: Fully Executable
Outcome:
  Message: 'CHG/PCHG/R2BASE is populated but BASE is missing (required for derivation)'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "CHG present and BASE present (complete)"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL, BASE, CHG]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", 145.0, 140.0, 5.0]
    expected_findings: 0
  - name: "CHG present but BASE is null (missing)"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL, BASE, CHG]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", 145.0, "", 5.0]
    expected_findings: 1
