id: HRL-AD-0286
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Within a Study and a Parameter, all AVALCAyN (Analysis Value Category
  y (N)) variable values must be the same for each unique value of AVALCATy (Analysis
  Value Category y), when primary variable AVALCATy is populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: AVALCATVARIABLE
      operator: non_empty
    - name: '%Variables[AVALCA#N]%'
      operator: all_values_equal
      group_by: STUDYID,PARAMCD,AVALCAT%Variable.1%
outcome:
  message: Inconsistent value for AVALCA%Variable.1%N
  severity: Error
provenance:
  p21_id: AD0328
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

