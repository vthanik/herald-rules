id: HRL-AD-0048
version: 1
status: Published
standard: ADaM
category: Presence
sensitivity: Record
executability: Partially Executable
description: If Actual Treatment (TRTxxAN) numeric variable is present, there must
  be a corresponding Actual Treatment (TRTxxA) character variable.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: VARIABLE
      operator: variable_exists
      value: TRT%Variable.1%A
outcome:
  message: TRTxxAN is present but TRTxxA is not present
  severity: Error
provenance:
  p21_id: AD0064
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

