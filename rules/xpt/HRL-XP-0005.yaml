id: HRL-XP-0005
version: 1
status: Published
standard: XPT
category: Structure
sensitivity: Dataset
executability: Fully Executable

description: >
  Format name must not exceed 8 characters. The SAS V5 transport format limits format names to 8 characters.

scope:
  classes:
    []
  domains:
    []

check:
  all:
    - name: format_name
      operator: shorter_than
      value: 9

outcome:
  message: "Format name '{format_name}' exceeds 8 characters for variable '{variable_name}'"
  severity: Error

provenance:
  p21_id: XP0005
  core_id: null
  cg_ids:
    - CG0405
  fda_ids:
    - FDA-XPT-005
  source_doc: "SAS V5 Transport Format Specification"
