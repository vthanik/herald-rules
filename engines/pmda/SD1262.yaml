id: SD1262
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Subject Status Date/Time of Assessment (SSDTC) must be greater than or
  equal to Start Date/Time of Disposition Event (DSSTDTC) when the subject's status
  is 'DEAD'.
scope:
  Classes:
    Include: FINDINGS
  Domains:
    Include: SS
check:
  all:
    - name: SSSTRESC
      operator: equal_to
      value: DEAD
      value_is_literal: yes
    - name: SSDTC
      operator: date_less_than
      value: $max_ds_dsstdtc
outcome:
  message: SSDTC is not greater than or equal to DSSTDTC when SSSTRESC = 'DEAD'
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1262
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000178

