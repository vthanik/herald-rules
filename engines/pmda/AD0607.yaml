description: When analysis Phase (APHASE) variable is defined, the analysis Phase
  Start Time (PHSTM) variable value must equal ADSL Phase w Start Time (PHwSTM) variable
  value for that phase defined by the value in Phase (N) (APHASEN) variable. APHASEN
  = w.
