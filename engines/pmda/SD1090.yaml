id: SD1090
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: 'Study Day of Start (--STDY) variable value should be populated as defined
  by CDISC standards: --STDY = (date portion of --STDTC) - (date portion of RFSTDTC)
  +1 if --STDTC is on or after RFSTDTC; --STDY = (date portion of --STDTC) - (date
  portion of RFSTDTC) if --STDTC precedes RFSTDTC.'
scope:
  Classes:
    Include: ALL
  Domains:
    Exclude: DM
  Use_Case: INDH
check:
  all:
    - name: --STDTC
      operator: is_complete_date
    - name: RFSTDTC
      operator: is_complete_date
    - name: --STDY
      operator: not_equal_to
      value: $val_stdy
outcome:
  message: Incorrect value for --STDY variable
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1090
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000552

