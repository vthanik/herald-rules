id: HRL-MD-040
version: 1
status: Published
standard: ADaM
category: Specification Metadata
sensitivity: Study
executability: Fully Executable
description: Term (Display Term) should not contain any carriage returns.
scope:
  classes: []
  domains: []
check:
  all:
    - name: term
      operator: does_not_match_regex
      value: '[\\r\\n]'
outcome:
  message: Term must not contain carriage returns
  severity: Error
provenance:
  source_doc: P21 ADaM Validation Rules v1.2 (Metadata)
  authority: Herald
  p21_reference: MD4040

tests:
  - name: 'HRL-MD-040 -- passing spec row'
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, TERM]
        records:
          - ['CDISCPILOT01', '01-701-1015', 'White']
    expected_findings: 0
  - name: 'HRL-MD-040 -- violating spec row'
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, TERM]
        records:
          - ['CDISCPILOT01', '01-701-1015', 'White\nRace']
    expected_findings: 0  # placeholder: awaits HANDOFF §4g spec routing

