id: SD1088
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Study Day of Start (--STDY) variable value should be populated when Start
  Study Date (--STDTC) and Subject Reference Start Date/Time (RFSTDTC) variables values
  are provided, and both include complete date part.
scope:
  Classes:
    Include: ALL
  Domains:
    Exclude: DM
  Use_Case: INDH
check:
  all:
    - name: --STDTC
      operator: is_complete_date
    - name: RFSTDTC
      operator: is_complete_date
    - name: --STDY
      operator: not_equal_to
      value: $val_stdy
outcome:
  message: --STDY variable value is not populated
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1088
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000552

