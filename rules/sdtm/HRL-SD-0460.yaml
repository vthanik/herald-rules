id: HRL-SD-0460
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Partially Executable
description: 'Reported Term for the Adverse Event (AETERM) is expected to be coded
  using the Medical Dictionary for Regulatory Affairs (MedDRA). Sponsors should code
  each term to the MedDRA-specified hierarchy of terms. These terms/codes are represented
  in SDTM variables that are subject to MedDRA: AELLT, AELLTCD, AEDECOD, AEPTCD, AEHLT,
  AEHLTCD, AEHLGT, AEHLGTCD, AEBODSYS, AEBDSYCD, AESOC, AESOCCD.'
scope:
  classes:
    - EVENTS
  domains:
    - AE
check:
  all:
    - name: --LLT
      operator: non_empty
    - name: --LLTCD
      operator: non_empty
    - name: --DECOD
      operator: non_empty
    - name: --PTCD
      operator: non_empty
    - name: --HLT
      operator: non_empty
    - name: --HLTCD
      operator: non_empty
    - name: --HLGT
      operator: non_empty
    - name: --HLGTCD
      operator: non_empty
    - name: --BODSYS
      operator: non_empty
    - name: --BDSYCD
      operator: non_empty
    - name: --SOC
      operator: non_empty
    - name: --SOCCD
      operator: non_empty
    - name: --TERM
      operator: non_empty
outcome:
  message: 'Missing values for one or more variables subject to MedDRA: %Domain%LLT,
    %Domain%LLTCD, %Domain%DECOD, %Domain%PTCD, %Domain%HLT, %Domain%HLTCD, %Domain%HLGT,
    %Domain%HLGTCD, %Domain%BODSYS, %Domain%BDSYCD, %Domain%SOC, %Domain%SOCCD'
  severity: Error
provenance:
  p21_id: SD1449
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB003
  source_doc: SDTM-IG v3.3

