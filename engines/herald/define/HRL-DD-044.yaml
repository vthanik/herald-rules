# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.12
id: HRL-DD-044
version: 2
status: Published
standard: Define-XML
category: Variable Definition
sensitivity: Record
executability: Fully Executable
description: >
  Variable name is required in the Variables sheet.
scope:
  classes: []
  domains: []
check:
  all:
    - name: variable
      operator: non_empty
outcome:
  message: "Variable name is missing. Each row in the Variables sheet must have a variable name."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.12"
  cited_guidance: >
    Name -- Required. Dataset Variable name or Variable Value Name.

tests:
  - name: "HRL-DD-044 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-044 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

