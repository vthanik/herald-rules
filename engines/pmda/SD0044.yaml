id: SD0044
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Treatment Vehicle Amount Units (--VAMTU) should not be null when Treatment
  Vehicle Amount (--VAMT) is populated.
scope:
  Classes:
    Include: INTERVENTIONS
  Domains:
    Include: ALL
check:
  all:
    - name: --TRTV
      operator: empty
    - name: --VAMTU
      operator: non_empty
outcome:
  message: Missing value for --VAMTU when --VAMT is populated
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0044
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000091

