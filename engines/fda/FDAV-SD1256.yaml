Core:
  Id: FDAV-SD1256
  Status: Reference
  Version: '1'
Description: DTHFL must equal 'Y' when there is a record in the Disposition (DS) domain
  with DSDECOD = 'DEATH'.
Check:
  all:
    - name: DSDECOD
      operator: equal_to
      value: DEATH
      value_is_literal: yes
    - name: DTHFL
      operator: not_equal_to
      value: 'Y'
      value_is_literal: yes
Outcome:
  Message: DTHFL does not equal 'Y' when DS.DSDECOD = 'DEATH'
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: DS
Standard: SDTM
Publisher ID: CG0136
IG Versions:
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
CORE Reference: CORE-000252
Executability: Fully Executable
Scope:
  Classes:
    Include: SPECIAL PURPOSE
  Domains:
    Include: DM
  Use_Case: INDH

