id: HRL-SD-0028
version: 1
status: Published
standard: SDTM
category: Format
sensitivity: Value
executability: Fully Executable

description: >
  VSDTC must be a valid ISO 8601 date/datetime string in the VS domain. The vital signs collection date must conform to ISO 8601 format.

scope:
  classes:
    - FINDINGS
  domains:
    - VS

check:
  all:
    - name: VSDTC
      operator: is_valid_iso8601

outcome:
  message: "VSDTC value '{VSDTC}' is not a valid ISO 8601 date in VS"
  severity: Error

provenance:
  p21_id: SD0028
  core_id: CORE-000279
  cg_ids:
    - CG0028
  fda_ids:
    []
  source_doc: "SDTM-IG v3.3 Section 6.3.7"
