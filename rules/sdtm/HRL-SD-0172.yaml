id: HRL-SD-0172
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Partially Executable
description: 'Study Day of Start (--STDY) variable value should be populated as defined
  by CDISC standards: --STDY = (date portion of --STDTC) - (date portion of RFSTDTC)
  +1 if --STDTC is on or after RFSTDTC; --STDY = (date portion of --STDTC) - (date
  portion of RFSTDTC) if --STDTC precedes RFSTDTC.'
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: --STDY
      operator: equal_to
      value: :DY(SUB:RFSTDTC,%Domain%STDTC)
    - name: --STDY
      operator: non_empty
outcome:
  message: Incorrect value for %Domain%STDY variable
  severity: Error
provenance:
  p21_id: SD1090
  core_id: ~
  cg_ids:
    - CG0220
  fda_ids: []
  source_doc: SDTM-IG v3.3

