id: HRL-AD-0141
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: If the record is flagged as the baseline (ABLFL = Y), then the baseline
  Value (BASE) must equal the Analysis Value (AVAL).
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: BASE
      operator: equal_to
      value: AVAL
    - name: ABLFL
      operator: equal_to
      value: 'Y'
outcome:
  message: ABLFL = Y, but BASE != AVAL
  severity: Error
provenance:
  p21_id: AD0152
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

