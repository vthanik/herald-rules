executability: Not Executable
description: 'For regulatory submission data, Origin is required for all SDTM, ADaM,
  and SEND variables. It is at the sponsors discretion whether to provide Origin at
  the Variable or Value Level. When Origin is provided for each Value Level item,
  then providing Origin on the Variable is optional. Define-XML specification represents
  variable Origin as def:Origin element under ItemDef element. Note: Refer to the
  data standards catalog by the relevant Regulatory Agency for acceptance of standards
  and their versions.'
