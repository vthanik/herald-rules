id: AD0126
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: Within a study, all PARCATyN values must be the same for each unique
  value of PARCATy when the primary variable PARCATy is populated.
scope:
  classes: []
  domains: BDS
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for PARCATyN
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0126
  pmda_category: Error
  ig_versions: []

