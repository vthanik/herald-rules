# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 3.5
id: DD0075
version: 1
status: Published
standard: Define-XML
category: Orphan Detection
sensitivity: Study
executability: Fully Executable
description: >
  Comment defined in Comments sheet but never referenced by any Dataset, Variable, or ValueLevel entry.
scope:
  classes: []
  domains: []
check:
  all:
    - name: __comment_is_referenced
      operator: equal_to
      value: false
outcome:
  message: "Comment is defined but never referenced. Consider removing orphaned comments."
  severity: Warning
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "3.5"
  cited_guidance: >
    Each distinct comment is expected to have a unique def:CommentOID and can be referenced from different variables.
