Core:
  Id: FDAV-SD1219
  Status: Reference
  Version: '1'
Description: TSVAL value must be either ISO 8601 format for time period (e.g. P80Y)
  or null, when TSPARMCD='LENGTH'.
Check:
  all:
    - name: TSPARMCD
      operator: equal_to
      value: LENGTH
    - name: TSVAL
      operator: non_empty
    - name: TSVAL
      negative: yes
      operator: invalid_duration
Outcome:
  Message: Invalid TSVAL value for LENGTH
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: TS
Standard: SDTM
Publisher ID: CG0439
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
CORE Reference: CORE-000731
Executability: Fully Executable
Scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include: TS

