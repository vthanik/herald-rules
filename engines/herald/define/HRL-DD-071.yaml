# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.13
id: HRL-DD-071
version: 2
status: Published
standard: Define-XML
category: Codelist Definition
sensitivity: Record
executability: Fully Executable
description: >
  Codelist ID is required for each codelist entry.
scope:
  classes: []
  domains: []
check:
  all:
    - name: codelist_id
      operator: non_empty
outcome:
  message: "Codelist ID is missing. Each codelist entry must have an ID."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.13"
  cited_guidance: >
    OID -- Required. Unique ID for the CodeList.

tests:
  - name: "HRL-DD-071 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-071 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

