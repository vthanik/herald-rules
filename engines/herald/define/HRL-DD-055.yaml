# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 4.3.2.2
id: HRL-DD-055
version: 2
status: Published
standard: Define-XML
category: Origin Metadata
sensitivity: Record
executability: Fully Executable
description: >
  For ADaM datasets (Purpose='Analysis'), Origin 'Not Available' is not a
  valid value.
scope:
  classes: []
  domains: []
check:
  all:
    - name: purpose
      operator: not_equal_to
      value: Analysis
    - name: origin
      operator: not_equal_to
      value: Not Available
outcome:
  message: "Origin 'Not Available' is not valid for ADaM datasets."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "4.3.2.2"
  cited_guidance: >
    For ADaM datasets -- Not Available is not valid.

tests:
  - name: "HRL-DD-055 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-055 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

