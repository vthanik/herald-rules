id: SD1373
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Partially Executable
description: RFSTDTC must be null when the Reason Arm and/or Actual Arm is Null (ARMNRS)
  variable is populated (excluding values of UNPLANNED TREATMENT), which indicates
  that the subject did not receive treatment.
scope:
  Classes:
    Include: SPECIAL PURPOSE
  Domains:
    Include: DM
  Use_Case: INDH
check:
  all:
    - name: ARMNRS
      operator: non_empty
    - name: ARMNRS
      operator: not_equal_to
      value: UNPLANNED TREATMENT
      value_is_literal: yes
    - name: RFSTDTC
      operator: non_empty
outcome:
  message: RFSTDTC is populated for subject who did not receive treatment
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1373
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000758

