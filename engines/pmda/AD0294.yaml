id: AD0294
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: Across studies, all Standard Toxicity Grade (N) (AETOXGRN) variable values
  must be the same for each unique value of Standard Toxicity Grade (AETOXGR) variable
  when the primary variable AETOXGR is populated.
scope:
  classes: []
  domains: ADAE
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for AETOXGRN
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0294
  pmda_category: Error
  ig_versions: []

