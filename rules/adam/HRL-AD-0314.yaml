id: HRL-AD-0314
version: 1
status: Published
standard: ADaM
category: Limit
sensitivity: Record
executability: Fully Executable
description: The value of ASTDT (Analysis Start Date) variable must be less or equal
  to AENDT (Analysis End Date)
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: ASTDT
      operator: less_than
      value: eq AENDT
    - name: ASTDT
      operator: non_empty
    - name: AENDT
      operator: non_empty
outcome:
  message: Value of ASTDT is greater than value of AENDT
  severity: Error
provenance:
  p21_id: AD0361
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

