id: HRL-SD-0222
version: 1
status: Published
standard: SDTM
category: Limit
sensitivity: Record
executability: Fully Executable
description: The medical history dataset includes the subject's prior history at the
  start of the trial. Start Date/Time of Medical History Event (MHSTDTC) should be
  before Subject Reference Start Date/Time (RFSTDTC).
scope:
  classes:
    - EVENTS
  domains:
    - MH
check:
  all:
    - name: SUB:RFSTDTC
      operator: greater_than
      value: eq MHSTDTC
    - name: SUB:RFSTDTC
      operator: non_empty
    - name: MHSTDTC
      operator: non_empty
outcome:
  message: MHSTDTC date is after RFSTDTC
  severity: Error
provenance:
  p21_id: SD1144
  core_id: ~
  cg_ids:
    - CG0079
  fda_ids: []
  source_doc: SDTM-IG v3.3

