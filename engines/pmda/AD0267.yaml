id: AD0267
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: If any of Analysis Duration Units (ADURU) or Analysis Duration (N) (ADURN)
  variables is populated, then both must be populated together.
scope:
  classes: []
  domains:
    - ADAE
    - ADAMOTHER
check:
  all:
    - name: __see_description__
      operator: manual_review
outcome:
  message: 'Only one of these variables is populated: ADURU, ADURN'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0267
  pmda_category: Error
  ig_versions: []

