id: HRL-SD-0394
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Partially Executable
description: 'Day of Obs Relative to Exposure (--XDY) variable value should be populated
  as defined by CDISC standards: --XDY = (date portion of --DTC) - (date portion of
  RFXSTDTC) +1 if --DTC is on or after RFXSTDTC; --XDY = (date portion of --DTC) -
  (date portion of RFXSTDTC) if --DTC precedes RFXSTDTC.'
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: --XDY
      operator: equal_to
      value: :DY(SUB:RFXSTDTC,%Domain%DTC)
    - name: --XDY
      operator: non_empty
outcome:
  message: Incorrect value for %Domain%XDY variable
  severity: Error
provenance:
  p21_id: SD1381
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: P21 Community SEND-IG-AR 1.0 (FDA)

