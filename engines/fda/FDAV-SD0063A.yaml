Core:
  Id: FDAV-SD0063A
  Status: Reference
  Version: '1'
Description: Variable Label in the dataset should match the variable label described
  in SDTM IG. When creating a new domain Variable Labels could be adjusted as appropriate
  to properly convey the meaning in the context of the data being submitted.
Check:
  all:
    - name: variable_name
      operator: equal_to
      value: library_variable_name
    - name: library_variable_label
      operator: non_empty
    - name: variable_label
      operator: not_equal_to
      value: library_variable_label
Outcome:
  Message: SDTM/dataset variable label mismatch
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: ''
Standard: SDTM
Publisher ID: CG0303
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
CORE Reference: CORE-000398
Executability: Fully Executable
Scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL

