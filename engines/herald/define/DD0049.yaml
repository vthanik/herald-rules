# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.13
id: DD0049
version: 1
status: Published
standard: Define-XML
category: Codelist Definition
sensitivity: Dataset
executability: Fully Executable
description: >
  Codelist Name must be unique within the specification.
scope:
  classes: []
  domains: []
check:
  all:
    - name: name
      operator: not_unique
outcome:
  message: "Codelist Name is not unique. The Name must be unique within the set of CodeList elements."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.13"
  cited_guidance: >
    Business Rule: The Name must be unique within the set of Codelist elements.
