id: SD0066
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Planned Arm Code (ARMCD) values should match entries in the Trial Arms
  (TA) dataset, except for subjects who failed screening (ARMCD = 'SCRNFAIL') or were
  not fully assigned to an Arm (ARMCD = 'NOTASSGN').
scope:
  Classes:
    Include: SPECIAL PURPOSE
  Domains:
    Include: DM
check:
  all:
    - name: ARMCD
      operator: is_not_contained_by
      value:
        - SCRNFAIL
        - NOTASSGN
    - name: ARMCD
      operator: is_not_contained_by
      value: $armcd_list
outcome:
  message: Invalid ARMCD
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0066
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000531

