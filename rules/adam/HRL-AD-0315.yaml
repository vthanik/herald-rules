id: HRL-AD-0315
version: 1
status: Published
standard: ADaM
category: Limit
sensitivity: Record
executability: Fully Executable
description: The value of ASTDTM (Analysis Start Datetime) variable must be less or
  equal to AENDTM (Analysis End Datetime)
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: ASTDTM
      operator: less_than
      value: eq AENDTM
    - name: ASTDTM
      operator: non_empty
    - name: AENDTM
      operator: non_empty
outcome:
  message: Value of ASTDTM is greater than value of AENDTM
  severity: Error
provenance:
  p21_id: AD0362
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

