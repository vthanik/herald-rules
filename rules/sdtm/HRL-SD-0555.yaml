id: HRL-SD-0555
version: 1
status: Published
standard: SDTM
category: Terminology
sensitivity: Record
executability: Partially Executable
description: 'TSVALCD for PCLAS record must be a valid code from MED-RT or NDF-RT
  (Note: Any version 2018-02-05 or earlier uses NDF-RT, and any version after is MED-RT).'
scope:
  classes:
    - TRIAL DESIGN
  domains:
    - TS
check:
  all:
    - name: TSPARMCD
      operator: equal_to
      value: PCLAS
    - name: TSVAL
      operator: non_empty
outcome:
  message: Invalid TSVALCD value for PCLAS
  severity: Error
provenance:
  p21_id: SD2264
  core_id: ~
  cg_ids:
    - CG0454
  fda_ids:
    - FDAB011
  source_doc: SDTM-IG v3.3

