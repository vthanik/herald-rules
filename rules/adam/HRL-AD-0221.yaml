id: HRL-AD-0221
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Within a study, All TRTAGyN values must be the same for each unique value
  of TRTAGy when primary variable TRTAGy is populated. Analogous rule for AD0238.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: TRTAGVARIABLE
      operator: non_empty
    - name: '%Variables[TRTAG#N]%'
      operator: all_values_equal
      group_by: STUDYID,TRTAG%Variable.1%
outcome:
  message: Inconsistent value for TRTAG%Variable.1%N
  severity: Error
provenance:
  p21_id: AD0241
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.0

