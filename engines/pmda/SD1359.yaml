id: SD1359
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: When Planned Arm Code (ARMCD)/Description of Planned Arm (ARM) are not
  populated, the Reason Arm and/or Actual Arm is Null (ARMNRS) variable must be populated
  with the reason ARMCD/ARM are null.
scope:
  Classes:
    Include: SPECIAL PURPOSE
  Domains:
    Include: DM
  Use_Case: INDH
check:
  all:
    - name: ARMCD
      operator: empty
    - name: ARMNRS
      operator: empty
outcome:
  message: ARMNRS is not populated when ARMCD/ARM are not provided
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1359
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000045

