id: SD2001
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: The value of Actual Arm Code (ACTARMCD) should be no more than 20 characters
  in length.
scope:
  Classes:
    Include: SPECIAL PURPOSE
  Domains:
    Include: DM
  Use_Case: INDH
check:
  all:
    - name: ACTARMCD
      operator: longer_than
      value: 20
outcome:
  message: Invalid value for ACTARMCD exceeding 20 characters
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD2001
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000185

