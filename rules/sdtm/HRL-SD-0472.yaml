id: HRL-SD-0472
version: 1
status: Published
standard: SDTM
category: Terminology
sensitivity: Record
executability: Partially Executable
description: Value for Lowest Level Term (--LLT) variable must be populated using
  a Lowest Level Term of the MedDRA dictionary of a version specified in the define.xml
  (Case-insensitive).
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: '%Variables[--LLT]%'
      operator: non_empty
outcome:
  message: Value for %Domain%LLT not found in MedDRA dictionary
  severity: Error
provenance:
  p21_id: SD2008
  core_id: ~
  cg_ids:
    - CG0377
  fda_ids:
    - FDAB003
  source_doc: SDTM-IG v3.3

