id: HRL-SD-0153
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Fully Executable
description: Variable Value (IDVARVAL) variable value should not be populated, when
  Relationship Type (RELTYPE) variable value is populated.
scope:
  classes:
    - FINDINGS
  domains:
    - RE
check:
  all:
    - name: IDVARVAL
      operator: is_empty
    - name: RELTYPE
      operator: non_empty
outcome:
  message: IDVARVAL value is populated, when RELTYPE values is populated
  severity: Error
provenance:
  p21_id: SD1066
  core_id: ~
  cg_ids:
    - CG0201
    - CG0419
  fda_ids: []
  source_doc: SDTM-IG v3.3

