description: Lower end of reference range for continuous measurement in original units
  (--ORNRLO) should be populated only for continuous results (--ORRES is numeric value).
  Allowed "numeric" values may include optional >, <, =, a space and - leading symbols
  in the listed order. For example, "<= -1.2".
