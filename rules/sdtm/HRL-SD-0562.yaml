  all:
    - name: VARIABLE
      operator: variable_exists
      value: '%Domain%STDTC'
outcome:
  message: Missing %Domain%STDTC variable, when %Domain%STDY variable is present
  severity: Error
provenance:
  p21_id: SD2271
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB038
  source_doc: SDTM-IG v3.3

