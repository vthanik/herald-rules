id: SD0001
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Domain table should have at least one record.
scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
check:
  all:
    - name: $records_in_dataset
      operator: equal_to
      value: 0
outcome:
  message: No records in data source
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0001
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000579

