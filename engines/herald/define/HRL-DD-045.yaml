# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.9.1
id: HRL-DD-045
version: 2
status: Published
standard: Define-XML
category: Variable Definition
sensitivity: Record
executability: Fully Executable
description: >
  Variable label is required for regulatory submissions.
scope:
  classes: []
  domains: []
check:
  all:
    - name: label
      operator: non_empty
outcome:
  message: "Variable label is missing. Description is required for all ItemDef corresponding to Variable definitions in regulatory submissions."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.9.1"
  cited_guidance: >
    Description -- Required for all ItemDef elements corresponding to Variable definitions in the context of a regulatory submission.

tests:
  - name: "HRL-DD-045 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-045 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

