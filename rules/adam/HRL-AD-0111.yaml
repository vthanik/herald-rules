id: HRL-AD-0111
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: 'Within a study, All BASE values must be the same for each unique value
  group of [PARAMCD,BASEC] when PARAMCD, BASE and BASEC are populated  (ADaM IG: There
  must be a one-to-one map between BASE and BASEC within a given PARAM if BOTH are
  populated).'
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: PARAMCD
      operator: non_empty
    - name: BASE
      operator: non_empty
    - name: BASEC
      operator: non_empty
    - name: BASE
      operator: all_values_equal
      group_by: STUDYID,PARAMCD,BASEC
outcome:
  message: Inconsistent value for BASE
  severity: Error
provenance:
  p21_id: AD0129
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

