id: HRL-SD-0301
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Partially Executable
description: Time Point Reference (--TPTREF) variable should not be present in the
  domain, when the Planned Elapsed Time from Time Point Ref (--ELTM) variable, Planned
  Time Point Number (--TPTNUM) variable, and Planned Time Point (--TPT) variable are
  missing.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: VARIABLE
      operator: variable_exists
      value: '%Domain%ELTM,%Domain%TPTNUM,%Domain%TPT'
outcome:
  message: '%Domain%TPTREF variable is present when %Domain%ELTM, %Domain%TPTNUM,
    and %Domain%TPT are missing'
  severity: Error
provenance:
  p21_id: SD1282
  core_id: ~
  cg_ids:
    - CG0093
  fda_ids: []
  source_doc: SDTM-IG v3.3

