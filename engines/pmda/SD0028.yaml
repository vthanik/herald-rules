id: SD0028
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Reference Range Upper Limit-Std Units (--STNRHI) value must be greater
  than or equal to Reference Range Lower Limit-Std Units (--STNRLO) value.
scope:
  classes: []
  domains:
    - FINDINGS
    - FINDINGSABOUT
check:
  all:
    - name: __variable__
      operator: in_range
outcome:
  message: Value for --STNRHI is less than value for --STNRLO
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0028
  pmda_category: Error
  ig_versions: []

