id: AD0240B
version: 1
status: Reference
standard: ADaM
category: Conformance
sensitivity: Record
executability: Fully Executable
description: Within a study, all Actual Pooled Treatment y (TRTAGy) variable values
  must be the same for each unique value of Actual Pooled Treatment y (N) (TRTAGyN)
  variable when both variables are populated. Analogous rule for AD0237.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - ADAMOTHER
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for TRTAGy
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0240B
  pmda_category: Error
  ig_versions: []

