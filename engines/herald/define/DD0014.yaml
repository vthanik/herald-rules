# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 4.1.1; 1.5.1
id: DD0014
version: 1
status: Published
standard: Define-XML
category: Standards Reference
sensitivity: Dataset
executability: Fully Executable
description: >
  SDTMIG version must be one of the allowable versions: 3.1.2, 3.2, 3.3, 3.4.
scope:
  classes: []
  domains: []
check:
  all:
    - name: standard_name
      operator: equal_to
      value: SDTMIG
    - name: standard_version
      operator: not_in
      value:
        - "3.1.2"
        - "3.2"
        - "3.3"
        - "3.4" 
outcome:
  message: "SDTMIG version is not allowable. Must be one of: 3.1.2, 3.2, 3.3, 3.4."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "4.1.1; 1.5.1"
  cited_guidance: >
    Name: SDTMIG. Allowable Versions: 3.1.2, 3.2, 3.3. Define-XML v2.1 supports SDTMIG v3.1.2 and higher.
