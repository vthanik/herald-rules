Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If Analysis Window Unit (AWU) variable is present, then Analysis
                  Window Lower Bound (AWLO) and Analysis Window Upper Bound (AWHI)
                  must also be present.
                Document: ADaM IG v1.1
                Section: "4.3"
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-160
              Version: "1"
            Version: "1.0"
        Version: "1.1"
Check:
  all:
    - name: AWU
      operator: non_empty
    - name: AWLO
      operator: empty
    - name: AWHI
      operator: empty
Core:
  Id: ADaM-160
  Status: Published
  Version: "1"
Description: >-
  If Analysis Window Unit (AWU) variable is present, then Analysis Window
  Lower Bound (AWLO) and Analysis Window Upper Bound (AWHI) must also be present.
Executability: Fully Executable
Outcome:
  Message: "AWU is present, but both AWLO and AWHI are not present"
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BASIC DATA STRUCTURE
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: "2026-04-12"

tests:
  - name: AWU present with AWLO and AWHI present (valid)
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AWU, AWLO, AWHI]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, DAYS, -3, 3]
    expected_findings: 0
  - name: AWU present but AWLO and AWHI missing (violation)
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AWU, AWLO, AWHI]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, DAYS, "", ""]
    expected_findings: 1
