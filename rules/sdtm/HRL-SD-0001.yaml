id: HRL-SD-0001
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Fully Executable

description: >
  STUDYID must not be empty in all SDTM domains. Every record in every SDTM dataset must contain a non-missing STUDYID value to ensure traceability to the study.

scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains:
    []

check:
  all:
    - name: STUDYID
      operator: non_empty

outcome:
  message: "STUDYID is empty or missing in {DOMAIN} dataset"
  severity: Error

provenance:
  p21_id: SD0001
  core_id: CORE-000252
  cg_ids:
    - CG0001
  fda_ids:
    []
  source_doc: "SDTM-IG v3.3 Section 4.1.1"
