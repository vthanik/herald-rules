Core:
  Id: FDAV-SD1326
  Status: Reference
  Version: '1'
Description: Related Device Identifier (RDEVID) and Related Subject or Pool Identifier
  (RSUBJID) should not both be populated for the same record.
Check:
  all:
    - name: RSUBJID
      operator: non_empty
    - name: RDEVID
      operator: non_empty
Outcome:
  Message: RDEVID is not null when RSUBJID is populated
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: AP--, APRELSUB
Standard: SDTM
Publisher ID: CG0365
IG Versions: SDTMIG 3.2
CORE Reference: CORE-000233
Executability: Fully Executable
Scope:
  Classes:
    Include: ALL
  Domains:
    Include: AP--

