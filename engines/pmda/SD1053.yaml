id: SD1053
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Records for subjects who failed a screening or were not assigned to study
  treatment (ARMCD is 'SCRNFAIL' or 'NOTASSGN') should not be included in the Trial
  Arms (TA) or Trial Visits (TV) datasets.
scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include:
      - TA
      - TV
check:
  all:
    - name: ARM
      operator: is_contained_by
      value:
        - Screen Failure
        - Not Assigned
        - Unplanned Treatment
        - Not Treated
outcome:
  message: Unexpected value for ARMCD variable
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1053
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000371

