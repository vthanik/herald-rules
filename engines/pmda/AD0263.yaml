id: AD0263
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: If a Date (*DT) variable is indicated to be imputed by population of
  an Imputation Flag (*DTF) variable value, that Date (*DT) variable must have a value.
scope:
  classes: []
  domains:
    - ADSL
    - BDS
    - OCCDS
    - ADAE
    - ADAMOTHER
check:
  all:
    - name: __see_description__
      operator: manual_review
outcome:
  message: '*DTF is populated, but *DT is not populated'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0263
  pmda_category: Error
  ig_versions: []

