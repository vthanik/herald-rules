id: SD1282
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Time Point Reference (--TPTREF) variable should not be present in the
  domain when the Planned Elapsed Time from Time Point Ref (--ELTM) variable, Planned
  Time Point Number (--TPTNUM) variable, and Planned Time Point (--TPT) variable are
  missing.
scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
  Use_Case: INDH, PROD
check:
  all:
    - name: --ELTM
      operator: not_exists
    - name: --TPTNUM
      operator: not_exists
    - name: --TPT
      operator: not_exists
    - name: --TPTREF
      operator: exists
outcome:
  message: --TPTREF variable is present when --ELTM, --TPTNUM, and --TPT are missing
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1282
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000080

