id: SD1027
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Description of Element (ELEMENT) must have a unique value for a given
  value of Element Code (ETCD) within the domain.
scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include:
      - TE
      - TA
      - SE
check:
  all:
    - name: ETCD
      operator: exists
    - name: ELEMENT
      operator: exists
    - any:
        - name: ETCD
          operator: is_not_unique_relationship
          value: ELEMENT
        - name: ELEMENT
          operator: is_not_unique_relationship
          value: ETCD
outcome:
  message: Non-unique value for ELEMENT within ETCD
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1027
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000132

