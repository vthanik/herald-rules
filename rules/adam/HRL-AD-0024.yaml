id: HRL-AD-0024
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: 'Within a study, All *GRy values must be the same for each unique value
  of *GRyN when primary variable *GRy is populated.  ADaM IG v1.0 p.11 general variable
  naming conventions #10: If any combining of the SDTM character categories is done,
  the name of the derived ADaM character grouping variable should end in GRy and the
  name of its numeric equivalent should end in GRyN where y is an integer from 1-9
  representing a grouping scheme.  CDISC created 3 new explicit rules for ADAE which
  were already covered by this general rule.'
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: VARIABLEGRVARIABLE
      operator: non_empty
    - name: '%Variables[*GR#]%'
      operator: all_values_equal
      group_by: STUDYID,%Variable.1%GR%Variable.2%N
outcome:
  message: Inconsistent value for %Variable.1%GR%Variable.2%
  severity: Error
provenance:
  p21_id: AD0038
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.0

