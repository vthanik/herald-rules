id: HRL-SD-0373
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: The Reason Arm and/or Actual Arm is Null (ARMNRS) variable should only
  be populated when Planned Arm Code (ARMCD) and Actual Arm Code (ACTARMCD) are null.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: ARMNRS
      operator: is_empty
    - name: ARMCD
      operator: non_empty
    - name: ACTARM
      operator: non_empty
outcome:
  message: ARMNRS is populated but ARMCD and ACTARMCD are populated
  severity: Error
provenance:
  p21_id: SD1360
  core_id: ~
  cg_ids:
    - CG0520
  fda_ids: []
  source_doc: SDTM-IG v3.3

