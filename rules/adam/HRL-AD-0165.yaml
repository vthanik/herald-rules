id: HRL-AD-0165
version: 1
status: Published
standard: ADaM
category: Terminology
sensitivity: Record
executability: Partially Executable
description: A variable of form ANLzzFL (analysis record flag) must be Y or null.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: '%Variables[ANL*FL]%'
      operator: in
      value: 'Y'
outcome:
  message: ANL%Variable.1%FL value is not Y or null
  severity: Error
provenance:
  p21_id: AD0178
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

