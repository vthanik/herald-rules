id: HRL-SD-0263
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: --RFTDTC is defined as the Date/time for a fixed reference time point
  defined by --TPTREF, therefore --RFTDTC should only be populated when --TPTREF is
  populated.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: --RFTDTC
      operator: is_empty
    - name: --TPTREF
      operator: is_empty
outcome:
  message: '%Domain%RFTDTC is populated when %Domain%TPTREF is not populated'
  severity: Error
provenance:
  p21_id: SD1238
  core_id: ~
  cg_ids:
    - CG0026
  fda_ids:
    - FDAB037
  source_doc: SDTM-IG v3.3

