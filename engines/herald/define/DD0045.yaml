# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 4.9; 5.3.12.3
id: DD0045
version: 1
status: Published
standard: Define-XML
category: Value-Level Metadata
sensitivity: Record
executability: Fully Executable
description: >
  Origin is required for value-level metadata in regulatory submissions.
scope:
  classes: []
  domains: []
check:
  all:
    - name: origin
      operator: empty
outcome:
  message: "Origin is missing at value-level. For regulatory submissions, origin must be provided at either variable or value level."
  severity: Warning
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "4.9; 5.3.12.3"
  cited_guidance: >
    For regulatory submissions, def:Origin metadata must be provided for all variables. In some cases, def:Origin will be provided only at the Value level.
