id: HRL-SD-0115
version: 1
status: Published
standard: SDTM
category: Cross-reference
sensitivity: Record
executability: Partially Executable
description: The combination of Visit Number (VISITNUM), Visit Name (VISIT), and Planned
  Study Day of Visit (VISITDY) values should match entries in the Trial Visits (TV)
  dataset, when they are planned visits (SVUPDES = NULL).
scope:
  classes:
    - SPECIAL-PURPOSE
  domains:
    - SV
check:
  all:
    - name: VISITNUM
      operator: non_empty
    - name: VISIT
      operator: non_empty
    - name: VISITDY
      operator: non_empty
    - name: SVUPDES
      operator: is_empty
outcome:
  message: VISITNUM/VISIT/VISITDY values do not match TV domain data
  severity: Error
provenance:
  p21_id: SD1018
  core_id: ~
  cg_ids:
    - CG0031
    - CG0032
    - CG0033
    - CG0215
    - CG0657
  fda_ids: []
  source_doc: SDTM-IG v3.3

