id: SD1375
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Not Executable
description: RFENDTC must be null when actual arm indicates that the subject is a
  screen failure ('Screen Failure'), was not assigned to an arm ('Not Assigned') or
  was not treated ('NOTTRT') (or null). This rule applies to studies where RFENDTC
  is associated with a treatment date.
