id: HRL-SD-0535
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: TSVCDREF variable value must be 'ISO 3166', when TSPARMCD='FCNTRY'.
scope:
  classes:
    - TRIAL DESIGN
  domains:
    - TS
check:
  all:
    - name: TSVCDREF
      operator: equal_to
      value: ISO 3166
    - name: TSPARMCD
      operator: equal_to
      value: FCNTRY
outcome:
  message: Invalid TSVCDREF value for FCNTRY
  severity: Error
provenance:
  p21_id: SD2244
  core_id: ~
  cg_ids:
    - CG0456
  fda_ids:
    - FDAB011
  source_doc: SDTM-IG v3.3

