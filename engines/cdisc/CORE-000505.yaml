Check:
  all:
    - name: TSPARMCD
      operator: equal_to
      value: SSTDTC
    - name: TSVAL
      operator: invalid_date
Core:
  Id: CORE-000505
  Status: Published
  Version: '1'
Description: Study Start Date (SSTDTC) value in the TS dataset should be populated
  in ISO 8601 format.
Executability: Fully Executable
Outcome:
  Message: TSVAL where TSPARMCD = SSTDTC is not in ISO 8601 format.
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - TRIAL DESIGN
  Domains:
    Include:
      - TS
Sensitivity: Record
