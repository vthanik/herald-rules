id: HRL-SD-0306
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: All values of Dictionary-Derived Term (--DECOD) should be the same for
  a given value of Preferred Term Code (--PTCD).
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: --DECOD
      operator: non_empty
    - name: --PTCD
      operator: non_empty
    - name: '%Domain%DECOD'
      operator: all_values_equal
      group_by: '%Domain%PTCD'
outcome:
  message: Inconsistent value for %Domain%DECOD within %Domain%PTCD
  severity: Error
provenance:
  p21_id: SD1287
  core_id: ~
  cg_ids:
    - CG0049
  fda_ids: []
  source_doc: SDTM-IG v3.3

