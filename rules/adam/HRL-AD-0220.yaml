id: HRL-AD-0220
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Within a study, All TRTAGy values must be the same for each unique value
  of TRTAGyN, when both variables are populated. Analogous rule for AD0237.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: TRTAGVARIABLE
      operator: non_empty
    - name: TRTAGVARIABLEN
      operator: non_empty
    - name: '%Variables[TRTAG#]%'
      operator: all_values_equal
      group_by: STUDYID,TRTAG%Variable.1%N
outcome:
  message: Inconsistent value for TRTAG%Variable.1%
  severity: Error
provenance:
  p21_id: AD0240B
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

