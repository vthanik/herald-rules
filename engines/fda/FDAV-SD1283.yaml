Core:
  Id: FDAV-SD1283
  Status: Reference
  Version: '1'
Description: Laterality (--LAT) variable should not be present in the domain, when
  the Location (--LOC) variable is missing.
Check:
  all:
    - name: --LOC
      operator: not_exists
    - name: --LAT
      operator: exists
Outcome:
  Message: --LAT variable is present when --LOC variable is missing
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: INTERVENTIONS, FINDINGS, FINDINGS ABOUT, EVENTS
Standard: SDTM
Publisher ID: CG0095
IG Versions:
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
CORE Reference: CORE-000079
Executability: Fully Executable
Scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL

