id: HRL-SD-0486
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Partially Executable
description: Value for Parameter Null Flavor (--VALNF) variable should be NULL, when
  Parameter Value (--VAL) variable value can be populated.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: --VAL
      operator: is_empty
    - name: --VALNF
      operator: non_empty
outcome:
  message: Both %Domain%VAL and %Domain%VALNF variables are populated
  severity: Error
provenance:
  p21_id: SD2018
  core_id: ~
  cg_ids:
    - CG0259
    - CG0260
  fda_ids: []
  source_doc: SDTM-IG v3.3

