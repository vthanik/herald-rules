Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  Within a single dataset, all BASE values must be the same for each unique combination of USUBJID and PARAMCD (single-dataset variant).
                Document: ADaM IG v1.1
                Section: '3.3.5'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-128-SD
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: BASE
      operator: consistent_within_subject
Core:
  Id: ADaM-128-SD
  Status: Published
  Version: '1'
Description: >-
  Single-dataset variant of ADaM-128. BASE must be consistent within USUBJID+PARAMCD in a single dataset.
Executability: Fully Executable
Outcome:
  Message: 'BASE has inconsistent values within the same dataset for same subject+parameter'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "BASE consistent within subject+param (single dataset)"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVISIT, BASE]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Baseline", 140.0]
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Week 4", 140.0]
    expected_findings: 0
  - name: "BASE inconsistent (single dataset)"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVISIT, BASE]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Baseline", 140.0]
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Week 4", 135.0]
    expected_findings: 1
