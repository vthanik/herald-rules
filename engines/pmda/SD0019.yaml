id: SD0019
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: The value of Parameter (--PARM) variable should be no more than 40 characters
  in length.
scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include: TS
  Use_Case: INDH
check:
  all:
    - name: TSPARM
      operator: longer_than
      value: 40
outcome:
  message: Invalid value for --PARM variable
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0019
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000148

