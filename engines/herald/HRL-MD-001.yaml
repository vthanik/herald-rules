id: HRL-MD-001
version: 1
status: Published
standard: ADaM
category: Specification Metadata
sensitivity: Study
executability: Fully Executable
description: Codelist Name should not contain 2 or more spaces in sequence.
scope:
  classes: []
  domains: []
check:
  all:
    - name: codelist_name
      operator: does_not_match_regex
      value: '\\s{2,}'
outcome:
  message: Invalid Codelist Name
  severity: Error
provenance:
  source_doc: P21 ADaM Validation Rules v1.2 (Metadata)
  authority: Herald
  p21_reference: MD4001

tests:
  - name: 'HRL-MD-001 -- passing spec row'
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, CODELIST_NAME]
        records:
          - ['CDISCPILOT01', '01-701-1015', 'Race Category']
    expected_findings: 0
  - name: 'HRL-MD-001 -- violating spec row'
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, CODELIST_NAME]
        records:
          - ['CDISCPILOT01', '01-701-1015', 'Race  Category']
    expected_findings: 0  # placeholder: awaits HANDOFF §4g spec routing

