id: HRL-SD-0383
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Numeric Reference Result in Std Units (--STREFN) should be populated
  when Reference Result in Standard Format (--STREFC) is populated.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: --STREFN
      operator: non_empty
    - name: --STREFC
      operator: non_empty
outcome:
  message: '%Domain%STREFN is null when %Domain%STREFC is populated'
  severity: Error
provenance:
  p21_id: SD1370
  core_id: ~
  cg_ids:
    - CG0550
  fda_ids: []
  source_doc: SDTM-IG v3.3

