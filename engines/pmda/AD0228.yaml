id: AD0228
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: Within a study, all Planned Sequence of Treatments (N) (TRTSEQPN) variable
  values must be the same for each unique value of Planned Sequence of Treatments
  (TRTSEQP) when the primary variable TRTSEQP is populated.
scope:
  classes: []
  domains: ADSL
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for TRTSEQPN
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0228
  pmda_category: Error
  ig_versions: []

