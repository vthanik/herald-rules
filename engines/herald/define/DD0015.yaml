# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 1.6
id: DD0015
version: 1
status: Published
standard: Define-XML
category: Standards Reference
sensitivity: Dataset
executability: Fully Executable
description: >
  ADaMIG version must be one of the allowable versions: 1.0, 1.1, 1.2, 1.3.
scope:
  classes: []
  domains: []
check:
  all:
    - name: standard_name
      operator: equal_to
      value: ADaMIG
    - name: standard_version
      operator: not_in
      value:
        - "1.0"
        - "1.1"
        - "1.2"
        - "1.3" 
outcome:
  message: "ADaMIG version is not allowable. Must be one of: 1.0, 1.1, 1.2, 1.3."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "1.6"
  cited_guidance: >
    Define-XML v2.1 can be used to transmit metadata for ADaMIG v1.0 and higher.
