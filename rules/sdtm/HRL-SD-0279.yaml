id: HRL-SD-0279
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Partially Executable
description: DTHFL must equal 'Y' when there is a record in the Adverse Events (AE)
  domain with AESDTH = 'Y'.
scope:
  classes:
    - EVENTS
  domains:
    - AE
check:
  all:
    - name: USUBJID
      operator: non_empty
    - name: AESDTH
      operator: equal_to
      value: 'Y'
outcome:
  message: DTHFL does not equal 'Y' when AE.AESDTH = 'Y'
  severity: Error
provenance:
  p21_id: SD1255
  core_id: ~
  cg_ids:
    - CG0135
  fda_ids: []
  source_doc: SDTM-IG v3.3

