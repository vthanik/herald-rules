id: SD1364
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Partially Executable
description: Actual Arm Code (ACTARMCD) and Actual Arm (ACTARM) must be null for subjects
  who weren't treated. This includes Screen Failure subjects, Not Assigned subjects,
  and Not Treated subjects.
scope:
  classes: []
  domains: DM
check:
  all:
    - name: __see_description__
      operator: manual_review
outcome:
  message: ACTARMCD/ACTARM is populated for a subject who wasn't treated
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1364
  pmda_category: Error
  ig_versions: []

