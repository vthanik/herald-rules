id: HRL-DD-0003
version: 1
status: Published
standard: Define-XML
category: Structure
sensitivity: Value
executability: Fully Executable

description: >
  Variable label must not exceed 40 characters in Define-XML. This constraint ensures compatibility with SAS V5 transport format.

scope:
  classes:
    []
  domains:
    []

check:
  all:
    - name: variable_label
      operator: shorter_than
      value: 41

outcome:
  message: "Variable label for '{variable_name}' exceeds 40 characters in Define-XML"
  severity: Error

provenance:
  p21_id: DD0003
  core_id: null
  cg_ids:
    - CG0203
  fda_ids:
    - FDA-DEF-003
  source_doc: "Define-XML v2.1 Specification Section 4.2, SAS V5 Format"
