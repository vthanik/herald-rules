id: DD0150
version: 1
status: Reference
standard: Define-XML
category: Define-XML
sensitivity: Record
executability: Not Executable
description: 'Invalid combination of def:Standard elements found in a v2.1 define.xml
  file. For SEND, at least two Standards must be defined: (1) where Type=''IG'' and
  Name begins with ''SENDIG'' and (2) where Type=''CT'' and PublishingSet=''SEND''.
  For SDTM, at least two Standards must be defined: (1) where Type=''IG'' and Name=''SDTMIG''
  and (2) where Type=''CT'' and PublishingSet=''SDTM''. For ADaM, at least two Standards
  must be defined: (1) where Type=''IG'' and Name=''ADaMIG'', and (2) where Type=''CT''
  and PublishingSet=''SDTM'' or where Type=''CT'' and PublishingSet=''ADaM''.'
scope:
  classes: []
  domains: Reject
check: []
outcome:
  message: Missing expected Standard
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: DD0150
  pmda_category: ''
  ig_versions: []

