id: HRL-AD-0204
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Within a study, All TRxxPGy values must be the same for each unique value
  of TRTxxP when TRTxxP is populated.  TRxxPGy is a more general pooled treatment
  for TRTxxP, therefore it may be used for many TRTxxP.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: TRTVARIABLEP
      operator: non_empty
    - name: '%Variables[TR##PG#]%'
      operator: all_values_equal
      group_by: STUDYID,TRT%Variable.1%P
outcome:
  message: Inconsistent value for TR%Variable.1%PG%Variable.2% within a unique TRT%Variable.1%P
  severity: Error
provenance:
  p21_id: AD0231
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

