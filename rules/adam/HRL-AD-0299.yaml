id: HRL-AD-0299
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Within a Study and a Parameter, all ANRLOC (Analysis Normal Range Lower
  Limit (C)) variable values must be the same for each unique value of ANRLO (Analysis
  Normal Range Lower Limit), when variable ANRLO is populated
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: ANRLO
      operator: non_empty
    - name: ANRLOC
      operator: all_values_equal
      group_by: STUDYID,PARAMCD,ANRLO
outcome:
  message: Inconsistent value for ANRLOC
  severity: Error
provenance:
  p21_id: AD0343
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

