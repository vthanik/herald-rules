Core:
  Id: FDAV-SD1088
  Status: Reference
  Version: '1'
Description: Study Day of Start (--STDY) variable value should be populated, when
  Start Study Date (--STDTC) and Subject Reference Start Date/Time (RFSTDTC) variables
  values are provided, and both of them include complete date part.
Check:
  all:
    - name: --STDTC
      operator: is_complete_date
    - name: RFSTDTC
      operator: is_complete_date
    - name: --STDY
      operator: not_equal_to
      value: $val_stdy
Outcome:
  Message: --STDY variable value is not populated
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: SE, SM, SV, INTERVENTIONS, EVENTS, FINDINGS, FINDINGS ABOUT
Standard: SDTM
Publisher ID: CG0220, 71, 72, 73, 74
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
  - SENDIG 3.0
  - SENDIG 3.1
  - SENDIG 3.1.1
  - SENDIG-AR 1.0
  - SENDIG-DART 1.1
CORE Reference: CORE-000552
Executability: Fully Executable
Scope:
  Classes:
    Include: ALL
  Domains:
    Exclude: DM
  Use_Case: INDH

