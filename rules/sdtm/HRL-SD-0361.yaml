id: HRL-SD-0361
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Planned Start of Assessment Interval (--STINT) and Planned End of Assessment
  Interval (--ENINT) variables should be present and populated when Name of Measurement,
  Test or Examination (--TEST) is over a time interval, 'T1 to T2', where 'T1' is
  represented by the value in --STINT and 'T2' is represented by the value in --ENINT.
scope:
  classes:
    - TRIAL DESIGN
  domains:
    - TE
check:
  all:
    - name: --STINT
      operator: non_empty
    - name: --ENINT
      operator: non_empty
outcome:
  message: Missing values for %Domain%STINT and %Domain%ENINT variables when %Domain%TEST
    references 'T1 to T2'
  severity: Error
provenance:
  p21_id: SD1348
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: P21 Community SDTM-IG 3.3 (FDA)

