# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.4.2
id: HRL-DD-024
version: 2
status: Published
standard: Define-XML
category: Study Metadata
sensitivity: Study
executability: Fully Executable
description: >
  StudyName is required and must be non-empty in the Define sheet.
scope:
  classes: []
  domains: []
check:
  all:
    - name: StudyName
      operator: non_empty
outcome:
  message: "StudyName is missing or empty in the Define sheet. This is required for all Define-XML documents."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.4.2"
  cited_guidance: >
    StudyName -- Required. Cardinality: Exactly one. A short name assigned to the study by the sponsor.

tests:
  - name: "HRL-DD-024 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-024 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

