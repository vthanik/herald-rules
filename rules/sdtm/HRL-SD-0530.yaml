id: HRL-SD-0530
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Planned Time Point Name (--TPT) value must be consistent for all records
  with same Subject (USUBJID) and Assessment Date/Time (--DTC).
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: --DTC
      operator: non_empty
    - name: '%Domain%TPT'
      operator: all_values_equal
      group_by: USUBJID,VISITNUM,%Domain%DTC
outcome:
  message: Inconsistent value for %Domain%TPT
  severity: Error
provenance:
  p21_id: SD2239
  core_id: ~
  cg_ids:
    - CG0240
  fda_ids: []
  source_doc: SDTM-IG v3.3

