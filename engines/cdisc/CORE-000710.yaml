Authorities:
  - Organization: CDISC
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited_Guidance: 'If the reference time point is prior to the date
                  of collection or assessment: Start values: an observation can start
                  BEFORE the reference point, can start COINCIDENT with the reference
                  point, can start AFTER the reference point, or it may not be known
                  (U) when it started. End values: an observation can end BEFORE the
                  reference point, can end COINCIDENT with the reference point, can
                  end AFTER the reference point, can be known that it didn''t end
                  but was ONGOING, or it is unknown (U) when it ended or if it was
                  ongoing.'
                Document: IG v3.4
                Section: 4.4.7
            Origin: SDTM and SDTMIG Conformance Rules
            Rule_Identifier:
              Id: CG0233
