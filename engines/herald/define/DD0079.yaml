# P21 Sheet validation against Define-XML v2.1 Specification
# Section: ARM 1.0
id: DD0079
version: 1
status: Published
standard: Define-XML
category: ARM Metadata
sensitivity: Record
executability: Fully Executable
description: >
  ARM AnalysisVariable is required when AnalysisResults are defined.
scope:
  classes: []
  domains: []
check:
  all:
    - name: variables
      operator: empty
outcome:
  message: "AnalysisVariable is missing in the AnalysisResults sheet. Variables must be populated."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "ARM 1.0"
  cited_guidance: >
    P21 DD0096: The armAnalysisVariable in the Analysis Results Metadata is missing and must be populated.
