Check:
  all:
    - any:
        - name: TSPARMCD
          operator: equal_to
          value: COMPTRT
        - name: TSPARMCD
          operator: equal_to
          value: CURTRT
        - name: TSPARMCD
          operator: equal_to
          value: TRT
    - name: TSVCDREF
      operator: not_equal_to
      value: UNII
Core:
  Id: CORE-000735
  Status: Published
  Version: '1'
Description: When TSPARMCD is equal to COMPTRT, CURTRT or TRT, TSVCDREF should equal
  UNII
Executability: Fully Executable
Outcome:
  Message: Throw error when TSPARMCD is equal to COMPTRT, CURTRT, or TRT and TSVCDREF
    ^= UNII
  Output_Variables:
    - TSPARMCD
    - TSVCDREF
