id: HRL-SD-019
version: 1
status: Published
standard: SDTM
category: Data Quality
sensitivity: Record
executability: Fully Executable
description: >
  Character variables in SDTM datasets must not contain non-printable ASCII
  control characters (hex 00-1F, 7F). These characters are invisible,
  cause XPT transport issues, and indicate data import contamination.
scope:
  classes: []
  domains:
    - ALL
check:
  all:
    - name: __any_character_var__
      operator: contains_control_characters
outcome:
  message: Non-printable control character detected in character variable
  severity: Error
provenance:
  source_doc: StudySAS Blog — Non-Printable Characters in AETERM/MHTERM (2025-01)
  authority: Herald
  reference_url: https://studysas.blogspot.com/2025/01/solving-non-printable-characters-in.html

tests:
  - name: "Clean text value without control characters"
    type: positive
    datasets:
      AE:
        variables: [STUDYID, USUBJID, AETERM]
        records:
          - ["CDISCPILOT01", "01-701-1015", "HEADACHE"]
          - ["CDISCPILOT01", "01-701-1023", "NAUSEA"]
    expected_findings: 0
  - name: "Text value with embedded tab character"
    type: negative
    datasets:
      AE:
        variables: [STUDYID, USUBJID, AETERM]
        records:
          - ["CDISCPILOT01", "01-701-1015", "HEAD\tACHE"]
    expected_findings: 1
