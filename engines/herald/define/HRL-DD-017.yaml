id: HRL-DD-017
version: 1
status: Published
standard: Define-XML
category: VLM Specification
sensitivity: Variable
executability: Fully Executable
description: >
  WhereClauseDef elements in define.xml ValueListDef must use SoftHard='Soft',
  not 'Hard'. Hard constraints incorrectly imply validation failure semantics
  rather than data subsetting semantics.
scope:
  classes: []
  domains: []
check:
  all:
    - name: __whereClause_softHard__
      operator: equal_to
      value: Hard
outcome:
  message: WhereClauseDef uses SoftHard='Hard' (should be 'Soft')
  severity: Warning
provenance:
  source_doc: StudySAS Blog — Define.xml for SUPPQUAL QNAM-Level Metadata (2026-04)
  authority: Herald
  reference_url: https://studysas.blogspot.com/2026/04/definexml-for-suppqual-getting-qnam.html

tests:
  - name: "WhereClauseDef with SoftHard=Soft"
    type: positive
    datasets:
      SUPPAE:
        variables: [STUDYID, RDOMAIN, USUBJID, QNAM, QVAL]
        records:
          - ["CDISCPILOT01", "AE", "01-701-1015", "AEACNOTH", "NONE"]
    expected_findings: 0
  - name: "WhereClauseDef with SoftHard=Hard"
    type: negative
    datasets:
      SUPPAE:
        variables: [STUDYID, RDOMAIN, USUBJID, QNAM, QVAL]
        records:
          - ["CDISCPILOT01", "AE", "01-701-1015", "AEACNOTH", "NONE"]
    expected_findings: 1
