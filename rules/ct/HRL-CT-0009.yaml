id: HRL-CT-0009
version: 1
status: Published
standard: CT
category: Terminology
sensitivity: Record
executability: Partially Executable
description: Paired variables such as TEST/TESTCD must be populated using terms with
  the same Codelist Code value in CDISC control terminology. There is one-to-one relationship
  between paired variable values defined in CDISC control terminology by Codelist
  Code value within the same value level condition.
scope:
  classes: []
  domains: []
check:
  all:
    - name: +%Variables$Config.@Clause.CodeList.PairedValues$DecodedVariable%
      operator: in
      value: '%Variable.Config.@Clause.CodeList.PairedValues%'
outcome:
  message: '%Variable% and %Variable.DecodedVariable% values do not have the same
    Code in CDISC CT when %Variable.Config.@Clause.Expression%'
  severity: Error
provenance:
  p21_id: CT2006
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB009
  source_doc: ADaM-IG v1.1

