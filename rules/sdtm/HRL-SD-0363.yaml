id: HRL-SD-0363
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Planned End of Assessment Interval (--ENINT) should not be NULL, when
  Planned Start of Assessment Interval (--STINT) is populated.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: --STINT
      operator: non_empty
    - name: '%Domain%ENINT'
      operator: non_empty
outcome:
  message: Missing value for %Domain%ENINT, when %Domain%STINT is provided
  severity: Error
provenance:
  p21_id: SD1350
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: P21 Community SDTM-IG 3.3 (FDA)

