id: HRL-SD-0514
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Fully Executable
description: '''Pharmacological Class of Investigational Therapy'' (PCLAS) record
  must be populated in Trial Summary (TS) domain, when study type is ''INTERVENTIONAL''
  and if Intervention Type (INTTYPE) is one for which pharmacological class is applicable.
  It is expected for SDTM IG v3.1.2 data and required for data in all more recent
  SDTM versions.'
scope:
  classes:
    - TRIAL DESIGN
  domains:
    - TS
check:
  all:
    - name: TSPARMCD
      operator: variable_exists
      value: PCLAS
outcome:
  message: Missing PCLAS Trial Summary Parameter
  severity: Error
provenance:
  p21_id: SD2223
  core_id: ~
  cg_ids:
    - CG0287
  fda_ids: []
  source_doc: SDTM-IG v3.3

