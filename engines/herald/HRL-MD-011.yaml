id: HRL-MD-011
version: 1
status: Published
standard: ADaM
category: Specification Metadata
sensitivity: Study
executability: Fully Executable
description: A Name value is required for each Form.  Name is a required attribute
  for the FormDef element. Forms are represented in ODM as FormDef elements.
scope:
  classes: []
  domains: []
check:
  all:
    - name: form_name
      operator: non_empty
outcome:
  message: Name is required for each Form
  severity: Error
provenance:
  source_doc: P21 ADaM Validation Rules v1.2 (Metadata)
  authority: Herald
  p21_reference: MD4011

tests:
  - name: 'HRL-MD-011 -- passing spec row'
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, FORM_NAME]
        records:
          - ['CDISCPILOT01', '01-701-1015', 'Demographics']
    expected_findings: 0
  - name: 'HRL-MD-011 -- violating spec row'
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, FORM_NAME]
        records:
          - ['CDISCPILOT01', '01-701-1015', '']
    expected_findings: 1

