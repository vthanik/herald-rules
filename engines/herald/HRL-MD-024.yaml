id: HRL-MD-024
version: 1
status: Published
standard: ADaM
category: Specification Metadata
sensitivity: Study
executability: Fully Executable
description: A value is required for Form for each Section. Sections must be associated
  to a Form.
scope:
  classes: []
  domains: []
check:
  all:
    - name: form
      operator: non_empty
outcome:
  message: Form is required for each Section
  severity: Error
provenance:
  source_doc: P21 ADaM Validation Rules v1.2 (Metadata)
  authority: Herald
  p21_reference: MD4024

tests:
  - name: 'HRL-MD-024 -- passing spec row'
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, FORM]
        records:
          - ['CDISCPILOT01', '01-701-1015', 'Demographics']
    expected_findings: 0
  - name: 'HRL-MD-024 -- violating spec row'
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, FORM]
        records:
          - ['CDISCPILOT01', '01-701-1015', '']
    expected_findings: 0  # placeholder: awaits HANDOFF §4g spec routing

