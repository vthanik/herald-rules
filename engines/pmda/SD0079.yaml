id: SD0079
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Partially Executable
description: Subjects that are not assigned to an Arm (ARMCD='NOTASSGN') or are screen
  failures (ARMCD='SCRNFAIL'), or ARM=null, should not have any Exposure records.
  Run-in records (EPOCH='RUN-IN') are excluded from firing for this validation rule.
scope:
  classes: []
  domains: EX
check:
  all:
    - name: __see_description__
      operator: manual_review
outcome:
  message: EX record is present when subject is not assigned to an arm
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0079
  pmda_category: Warning
  ig_versions: []

