id: SD0091
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Outcome of Adverse Event should equal 'FATAL' when Results in Death (AESDTH)
  is 'Y'.
scope:
  Classes:
    Include: EVENTS
  Domains:
    Include: AE
  Use_Case: INDH
check:
  all:
    - any:
        - name: AESCAN
          operator: equal_to
          value: 'Y'
          value_is_literal: yes
        - name: AESCONG
          operator: equal_to
          value: 'Y'
          value_is_literal: yes
        - name: AESDISAB
          operator: equal_to
          value: 'Y'
          value_is_literal: yes
        - name: AESDTH
          operator: equal_to
          value: 'Y'
          value_is_literal: yes
        - name: AESHOSP
          operator: equal_to
          value: 'Y'
          value_is_literal: yes
        - name: AESLIFE
          operator: equal_to
          value: 'Y'
          value_is_literal: yes
        - name: AESOD
          operator: equal_to
          value: 'Y'
          value_is_literal: yes
        - name: AESMIE
          operator: equal_to
          value: 'Y'
          value_is_literal: yes
    - name: AESER
      operator: not_equal_to
      value: 'Y'
      value_is_literal: yes
outcome:
  message: AEOUT is not 'FATAL' when AESDTH='Y'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0091
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000022

