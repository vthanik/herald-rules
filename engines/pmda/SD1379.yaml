id: SD1379
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Element Code (ETCD) values defined in Trial Elements (TE) should be assigned
  to at least one subject (USUBJID) in Subject Elements (SE).
scope:
  Classes:
    Include:
      - SPECIAL PURPOSE
      - TRIAL DESIGN
  Domains:
    Include:
      - SE
      - TA
  Use_Case: INDH
check:
  all:
    - name: ETCD
      operator: not_equal_to
      value: UNPLAN
    - name: ETCD
      operator: is_not_contained_by
      value: $te_etcd
outcome:
  message: ETCD value does not present in SE
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1379
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000173

