id: SD1150
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: All values of Inclusion/Exclusion Criterion (IETEST) should be the same
  for a given value of Inclusion/Exclusion Criterion Short Name (IETESTCD) and Protocol
  Criteria Versions (TIVERS).
scope:
  classes: []
  domains: TI
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for IETEST within IETESTCD
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1150
  pmda_category: Error
  ig_versions: []

