Core:
  Id: FDAV-SD1271
  Status: Reference
  Version: '1'
Description: The combination of Description of Element (ELEMENT), Rule for Start of
  Element (TESTRL), Rule for End of Element (TEENRL), and Planned Duration of Element
  (TEDUR) should be unique for each Element Code (ETCD).
Check:
  any:
    - name: ETCD
      operator: is_not_unique_set
      value:
        - ELEMENT
        - TESTRL
        - TEENRL
        - TEDUR
    - all:
        - name: ETCD
          operator: is_unique_set
          value:
            - ELEMENT
            - TESTRL
            - TEENRL
            - TEDUR
        - name: ELEMENT
          operator: is_not_unique_set
          value:
            - TESTRL
            - TEENRL
            - TEDUR
        - name: TESTRL
          operator: is_not_unique_set
          value:
            - ELEMENT
            - TEENRL
            - TEDUR
        - name: TEENRL
          operator: is_not_unique_set
          value:
            - ELEMENT
            - TESTRL
            - TEDUR
        - name: TEDUR
          operator: is_not_unique_set
          value:
            - ELEMENT
            - TEENRL
            - TESTRL
Outcome:
  Message: The combination of ELEMENT, TESTRL TEENRL, and TEDUR is not unique for
    each ETCD
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: TE
Standard: SDTM
Publisher ID: CG0325, 216
IG Versions:
