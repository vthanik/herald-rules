id: SD0089
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: At least one of Rule for End of Element (TEENRL) or Planned Duration
  of Element (TEDUR) should be populated.
scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include: TE
  Use_Case: INDH, NONCLIN
check:
  all:
    - any:
        - name: TEDUR
          operator: empty
        - name: TEDUR
          operator: not_exists
    - any:
        - name: TEENRL
          operator: empty
        - name: TEENRL
          operator: not_exists
outcome:
  message: Missing values for TEENRL and TEDUR
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0089
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000027

