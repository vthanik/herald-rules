Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  Unlike SDTM, only some of ADaM Required variables (where Core
                  attribute is Required) must not be null. The Core Required variables
                  PARAMCD and PARAM must have a non-missing value in every record.
                Document: ADaM IG v1.1
                Section: "3.1"
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-196
              Version: "1"
            Version: "1.0"
        Version: "1.1"
Check:
  all:
    - name: PARAMCD
      operator: non_empty
Core:
  Id: ADaM-196
  Status: Published
  Version: "1"
Description: >-
  Unlike SDTM, only some of ADaM Required variables (where Core attribute is
  Required) must not be null. PARAMCD is a Required variable that must have
  a non-missing value in all BDS dataset records.
Executability: Partially Executable
Outcome:
  Message: "Required Variable value is null"
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BASIC DATA STRUCTURE
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: "2026-04-12"

tests:
  - name: PARAMCD is present and non-missing (valid)
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - [CDISCPILOT01, 01-701-1015, SODIUM, 140]
    expected_findings: 0
  - name: PARAMCD is missing (violation)
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - [CDISCPILOT01, 01-701-1015, "", 140]
    expected_findings: 1
