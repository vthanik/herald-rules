# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.10
id: HRL-DD-064
version: 2
status: Published
standard: Define-XML
category: Value-Level Metadata
sensitivity: Record
executability: Fully Executable
description: >
  Where Clause is required for all value-level metadata entries.
scope:
  classes: []
  domains: []
check:
  all:
    - name: where_clause
      operator: non_empty
outcome:
  message: "Where Clause is missing. Each value-level metadata entry must have a Where Clause defining when the value applies."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.10"
  cited_guidance: >
    Each Value definition may have a Where Clause attached to describe when that Value applies.

tests:
  - name: "HRL-DD-064 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-064 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

