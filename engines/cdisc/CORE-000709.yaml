Check:
  all:
    - any:
        - name: CETERM
          operator: equal_to
          value: DEATH
          value_is_literal: yes
        - name: CEDECOD
          operator: equal_to
          value: DEATH
          value_is_literal: yes
    - all:
        - name: DTHFL
          operator: not_equal_to
          value: 'Y'
          value_is_literal: yes
Core:
  Id: CORE-000709
  Status: Published
  Version: '1'
Description: When a record is present in the CE dataset where CETERM or CEDECOD  =
  'DEATH' then death flag (DTHFL) should be populated as 'Y' in the DM dataset for
  the corresponding subject.
Executability: Fully Executable
Match_Datasets:
  - Keys:
      - USUBJID
    Name: CE
Outcome:
  Message: CETERM or CEDECOD is 'DEATH' in CE dataset, but DTHFL in DM dataset is
    not "Y".
  Output_Variables:
    - CETERM
    - CEDECOD
    - DTHFL
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - SPECIAL PURPOSE
  Domains:
    Include:
      - DM
Sensitivity: Record
