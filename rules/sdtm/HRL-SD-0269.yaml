id: HRL-SD-0269
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Partially Executable
description: Time Point Reference (--TPTREF) variable must be included into the domain,
  when Date/Time of Reference Point (--RFTDTC) variable is present.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: VARIABLE
      operator: variable_exists
      value: '%Domain%TPTREF'
outcome:
  message: Missing %Domain%TPTREF variable, when %Domain%RFTDTC variable is present
  severity: Error
provenance:
  p21_id: SD1245
  core_id: ~
  cg_ids:
    - CG0090
  fda_ids:
    - FDAB037
  source_doc: SDTM-IG v3.3

