id: SD1310
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: When the study type is interventional (TSPARMCD = 'STYPE' and TSVAL =
  'INTERVENTIONAL'), the Intervention Model parameter should be provided with Parameter
  Value populated (TSVAL should not be null when TSPARMCD = 'INTMODEL').
scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include: TS
check:
  all:
    - name: TSPARMCD
      operator: equal_to
      value: INTMODEL
    - name: $STYPE_INTERVENTIONAL
      operator: greater_than_or_equal_to
      value: 1
    - name: TSVAL
      operator: empty
outcome:
  message: TSVAL is missing for the INTMODEL Trial Summary Parameter when STYPE parameter
    equals 'INTERVENTIONAL'
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1310
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000469

