id: AD0151
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: 'Within a study, all CRITy values must be the same for each unique value
  of PARAMCD when PARAMCD and CRITy are populated. Example: PARAMCD = SYSBP (mm Hg),
  CRIT1 = SYSBP >160.'
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for CRITy within a unique PARAMCD
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0151
  pmda_category: Error
  ig_versions: []

