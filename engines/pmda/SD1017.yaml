id: SD1017
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Partially Executable - Possible Overreporting
description: Visit Number (VISITNUM) values should match entries in the Trial Visits
  (TV) dataset when they are planned visits (SVUPDES = null).
scope:
  Classes:
    Include: SPECIAL PURPOSE
  Domains:
    Include: SV
check:
  all:
    - any:
        - name: SVUPDES
          operator: empty
        - name: SVUPDES
          operator: not_exists
    - name: VISITNUM
      operator: is_not_contained_by
      value: $visitnums_in_tv
outcome:
  message: VISITNUM value does not match TV domain data
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1017
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000842

