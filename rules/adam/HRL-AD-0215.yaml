id: HRL-AD-0215
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Within a study, All TRTPGyN values must be the same for each unique value
  of TRTPGy when primary variable TRTPGy is populated. Analogous rule for AD0241.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: TRTPGVARIABLE
      operator: non_empty
    - name: '%Variables[TRTPG#N]%'
      operator: all_values_equal
      group_by: STUDYID,TRTPG%Variable.1%
outcome:
  message: Inconsistent value for TRTPG%Variable.1%N
  severity: Error
provenance:
  p21_id: AD0238
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.0

