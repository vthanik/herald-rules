Core:
  Id: FDAV-SD0009
  Status: Reference
  Version: '1'
Description: When Serious Event (AESER) variable value is 'Y', then at least one of
  seriousness criteria variables is expected to have value 'Y' (Involves Cancer (AESCAN),
  Congenital Anomaly or Birth Defect (AESCONG), Persist or Signif Disability/Incapacity
  (AESDISAB), Results in Death (AESDTH), Requires or Prolongs Hospitalization (AESHOSP),
  Is Life Threatening (AESLIFE), or Other Medically Important Serious Event (AESMIE)).
Check:
  all:
    - name: AESER
      operator: not_equal_to
      value: 'N'
    - all:
        - any:
            - name: AESCAN
              operator: not_exists
            - name: AESCAN
              operator: not_equal_to
              value: 'Y'
        - any:
            - name: AESCONG
              operator: not_exists
            - name: AESCONG
              operator: not_equal_to
              value: 'Y'
        - any:
            - name: AESDISAB
              operator: not_exists
            - name: AESDISAB
              operator: not_equal_to
              value: 'Y'
        - any:
            - name: AESDTH
              operator: not_exists
            - name: AESDTH
              operator: not_equal_to
              value: 'Y'
        - any:
            - name: AESHOSP
              operator: not_exists
            - name: AESHOSP
              operator: not_equal_to
              value: 'Y'
        - any:
            - name: AESLIFE
              operator: not_exists
            - name: AESLIFE
              operator: not_equal_to
              value: 'Y'
        - any:
            - name: AESOD
              operator: not_exists
            - name: AESOD
              operator: not_equal_to
              value: 'Y'
        - any:
            - name: AESMIE
              operator: not_exists
            - name: AESMIE
              operator: not_equal_to
              value: 'Y'
Outcome:
  Message: No qualifiers set to 'Y', when AE is Serious
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: AE
Standard: SDTM
Publisher ID: CG0042
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
CORE Reference: CORE-000266
Executability: Fully Executable
Scope:
  Classes:
    Include: EVENTS
  Domains:
    Include: AE
  Use_Case: INDH

