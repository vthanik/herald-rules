id: HRL-SD-0234
version: 1
status: Published
standard: SDTM
category: Limit
sensitivity: Record
executability: Fully Executable
description: End Date/Time of Treatment (EXENDTC) variable value must be less than
  or equal to Date/Time of Last Study Treatment (RFXENDTC).
scope:
  classes:
    - INTERVENTIONS
  domains:
    - EX
check:
  all:
    - name: SUB:RFXENDTC
      operator: greater_than
      value: eq EXENDTC
    - name: SUB:RFXENDTC
      operator: non_empty
    - name: EXENDTC
      operator: non_empty
outcome:
  message: EXENDTC date is after RFXENDTC
  severity: Error
provenance:
  p21_id: SD1207
  core_id: ~
  cg_ids:
    - CG0147
  fda_ids:
    - FDAB034
  source_doc: SDTM-IG v3.3

