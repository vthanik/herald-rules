id: SD0020
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: The value of Parameter Short Name (--PARMCD) variables should be no more
  than 8 characters in length.
scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include: TS
  Use_Case: INDH, NONCLIN
check:
  all:
    - name: TSPARMCD
      operator: longer_than
      value: 8
outcome:
  message: Invalid value for --PARMCD variable
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0020
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000147

