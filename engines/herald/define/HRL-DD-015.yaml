id: HRL-DD-015
version: 1
status: Published
standard: Define-XML
category: VLM Completeness
sensitivity: Dataset
executability: Fully Executable
description: >
  Every unique QNAM value in a SUPPQUAL dataset must have a corresponding
  WhereClauseDef entry in define.xml. Missing VLM entries mean the reviewer
  has no metadata for that supplemental qualifier.
scope:
  classes: []
  domains: []
check:
  all:
    - name: QNAM
      operator: not_in_define_vlm
      value: __whereClauseDef__
outcome:
  message: QNAM value in dataset has no corresponding WhereClauseDef in define.xml
  severity: Error
provenance:
  source_doc: StudySAS Blog — Define.xml for SUPPQUAL QNAM-Level Metadata (2026-04)
  authority: Herald
  reference_url: https://studysas.blogspot.com/2026/04/definexml-for-suppqual-getting-qnam.html

tests:
  - name: "All QNAMs documented in define.xml VLM"
    type: positive
    datasets:
      SUPPAE:
        variables: [STUDYID, RDOMAIN, USUBJID, QNAM, QLABEL, QVAL]
        records:
          - ["CDISCPILOT01", "AE", "01-701-1015", "AEACNOTH", "Other Action", "NONE"]
    expected_findings: 0
  - name: "QNAM without define.xml VLM entry"
    type: negative
    datasets:
      SUPPAE:
        variables: [STUDYID, RDOMAIN, USUBJID, QNAM, QLABEL, QVAL]
        records:
          - ["CDISCPILOT01", "AE", "01-701-1015", "UNDOCUMENTED", "Mystery Var", "X"]
    expected_findings: 1
