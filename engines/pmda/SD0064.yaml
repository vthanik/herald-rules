id: SD0064
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: All Subjects (USUBJID) must be present in Demographics (DM) domain.
scope:
  Classes:
    Include: ALL
  Domains:
    Exclude: AP--
  Use_Case: NONCLIN, INDH
check:
  all:
    - name: USUBJID
      operator: non_empty
    - name: USUBJID
      operator: is_not_contained_by
      value: $dm_usubjid
outcome:
  message: Subject is not present in DM domain
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0064
  pmda_category: Reject
  ig_versions: []
  core_reference: CORE-000201

