id: HRL-DD-004
version: 1
status: Published
standard: Define-XML
category: Conformance
sensitivity: Study
executability: Reference
description: When a variable or value level record is subject to controlled terminology,
  the Assigned Value must be populated with a term from its associated codelist.
scope:
  classes: []
  domains: []
outcome:
  message: Assigned value not found in codelist
  severity: Error
provenance:
  source_doc: P21 ADaM Validation Rules v1.2 (Define-XML)
  authority: Herald
  p21_reference: DD0147

tests:
  - name: "HRL-DD-004 — nominal compliant record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-004 — nominal violating record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

notes: >
  Blocked on `valid_codelist_term` operator (VLM Assigned Value must be a term in the linked codelist). See HANDOFF section 4g.

