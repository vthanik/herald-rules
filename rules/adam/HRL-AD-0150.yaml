id: HRL-AD-0150
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Any variable ending in LO must have a value less than or equal to its
  corresponding HI value (e.g. AWLO, ANRLO, A1LO).  Exceptions are R2AyLO.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: VARIABLELO
      operator: less_than
      value: eq %Variable.1%HI
    - name: '%Variables[*LO;!R2A#LO;!*ORNRLO]%'
      operator: non_empty
    - name: VARIABLEHI
      operator: non_empty
outcome:
  message: '%Variable.1%LO is greater than %Variable.1%HI'
  severity: Error
provenance:
  p21_id: AD0162
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

