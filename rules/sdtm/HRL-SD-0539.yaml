id: HRL-SD-0539
version: 1
status: Published
standard: SDTM
category: Format
sensitivity: Record
executability: Fully Executable
description: TSVAL variable value must be in ISO 8601 format, when TSPARMCD='SENDTC'.
scope:
  classes:
    - SPECIAL-PURPOSE
  domains:
    - SE
check:
  all:
    - name: TSPARMCD
      operator: equal_to
      value: SENDTC
    - name: TSVAL
      operator: non_empty
outcome:
  message: Invalid TSVAL value for SENDTC
  severity: Error
provenance:
  p21_id: SD2248
  core_id: ~
  cg_ids:
    - CG0286
  fda_ids: []
  source_doc: SDTM-IG v3.3

