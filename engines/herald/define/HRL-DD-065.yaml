# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.10.1
id: HRL-DD-065
version: 2
status: Published
standard: Define-XML
category: Value-Level Metadata
sensitivity: Record
executability: Fully Executable
description: >
  Where Clause comparators must be valid (LT, LE, GT, GE, EQ, NE, IN, NOTIN).
scope:
  classes: []
  domains: []
check:
  all:
    - name: where_comparator
      operator: empty
    - name: where_comparator
      operator: in
      value:
        - LT
        - LE
        - GT
        - GE
        - EQ
        - NE
        - IN
        - NOTIN
outcome:
  message: "Where Clause comparator is not valid. Allowable values: LT, LE, GT, GE, EQ, NE, IN, NOTIN."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.10.1"
  cited_guidance: >
    Comparator -- Required. 'LT','LE','GT','GE','EQ','NE','IN','NOTIN'.

tests:
  - name: "HRL-DD-065 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-065 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

