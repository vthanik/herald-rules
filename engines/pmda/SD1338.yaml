id: SD1338
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: A Link Group (RSLNKGRP) value for a response assessment that is referenced
  in the Disease Response (RS) domain for a subject must also be present in the Tumor
  Results (TR) domain for the appropriate measurement records for that subject.
scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
  Use_Case: INDH, PROD
check:
  all:
    - name: --LNKGRP
      operator: exists
    - name: $VARIABLE_COUNT
      operator: less_than
      value: 2
outcome:
  message: RSLNKGRP value does not exist in TR domain
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1338
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000358

