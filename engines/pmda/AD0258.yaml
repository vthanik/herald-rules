id: AD0258
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: Adverse Events specified in ADAE dataset must be traceable to the SDTM
  AE domain based on Study Identifier (STUDYID), Unique Subject Identifier (USUBJID)
  and Sequence Number (AESEQ) variables. ADaM ADAE dataset should be validated with
  SDTM AE domain to facility this check. There must be traceability between ADaM and
  SDTM study data. This usually refers to mapping issues since an ADaM ADAE records
  must have been born from SDTM AE domain.
scope:
  classes: []
  domains: ADAE
check:
  all:
    - name: __see_description__
      operator: manual_review
outcome:
  message: Record key from ADaM ADAE is not traceable to SDTM.AE (extra ADAE recs)
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0258
  pmda_category: Error
  ig_versions: []

