id: HRL-SD-0054
version: 1
status: Published
standard: SDTM
category: Format
sensitivity: Record
executability: Partially Executable
description: The value of Parameter Short Name (--PARMCD) variables should be no more
  than 8 characters in length.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: '%Domain%PARMCD'
      operator: matches_regex
      value: .{0,8}
outcome:
  message: Invalid value for %Domain%PARMCD variable
  severity: Error
provenance:
  p21_id: SD0020
  core_id: ~
  cg_ids:
    - CG0257
  fda_ids: []
  source_doc: SDTM-IG v3.3

