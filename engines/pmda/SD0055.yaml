id: SD0055
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Variable Data Types in the dataset should match the variable data types
  described in SDTM.
scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
check:
  all:
    - name: variable_data_type
      operator: not_equal_to
      value: library_variable_data_type
outcome:
  message: SDTM/dataset variable type mismatch
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0055
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-001082

