id: AD0066
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: If Planned Pooled Treatment y for Period xx (TRxxPGyN) numeric variable
  is present, there must be a corresponding Planned Pooled Treatment y for Period
  xx (TRxxPGy) character variable.
scope:
  classes: []
  domains:
    - ADSL
    - ADDL
check:
  all:
    - name: __see_description__
      operator: manual_review
outcome:
  message: TRxxPGyN is present, but TRxxPGy is not present
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0066
  pmda_category: Error
  ig_versions: []

