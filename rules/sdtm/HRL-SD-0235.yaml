id: HRL-SD-0235
version: 1
status: Published
standard: SDTM
category: Limit
sensitivity: Record
executability: Fully Executable
description: Date/Time of First Study Treatment (RFXSTDTC) variable value must be
  less than or equal to Date/Time of Last Study Treatment (RFXENDTC).
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: RFXENDTC
      operator: greater_than
      value: eq RFXSTDTC
    - name: RFXENDTC
      operator: non_empty
    - name: RFXSTDTC
      operator: non_empty
outcome:
  message: RFXSTDTC date is after RFXENDTC
  severity: Error
provenance:
  p21_id: SD1208
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB034
  source_doc: SDTM-IG v3.3

