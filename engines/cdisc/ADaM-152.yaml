Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If the record is flagged as the baseline (ABLFL = Y), then the baseline value (BASE) must equal the analysis value (AVAL) for that record.
                Document: ADaM IG v1.1
                Section: '3.3.5'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-152
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: ABLFL
      operator: equal_to
      value: 'Y'
    - name: AVAL
      operator: non_empty
    - name: BASE
      operator: non_empty
    - name: BASE
      operator: not_equal_to_variable
      value: AVAL
Core:
  Id: ADaM-152
  Status: Published
  Version: '1'
Description: >-
  When ABLFL = Y, the record IS the baseline, so BASE must equal AVAL for that record.
Executability: Fully Executable
Outcome:
  Message: 'ABLFL = Y but BASE does not equal AVAL (baseline value must match analysis value on baseline record)'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "ABLFL=Y and BASE=AVAL (correct)"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL, BASE, ABLFL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", 140.0, 140.0, "Y"]
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", 145.0, 140.0, ""]
    expected_findings: 0
  - name: "ABLFL=Y but BASE != AVAL (error)"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL, BASE, ABLFL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", 140.0, 130.0, "Y"]
    expected_findings: 1
