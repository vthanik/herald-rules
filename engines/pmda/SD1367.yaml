id: SD1367
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Not Executable
description: There should be at most one disposition event record per subject per
  Subcategory for Disposition Event (DSSCAT) per Epoch. If multiple disposition events
  are reported for a Subcategory for DSSCAT and EPOCH, the sponsor should identify
  a primary reason and use that to populate DSTERM and DSDECOD. Additional reasons
  should be submitted in SUPPDS.
scope:
  classes: []
  domains: DS
check: []
outcome:
  message: Multiple disposition events for the same DSSCAT and EPOCH
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1367
  pmda_category: Warning
  ig_versions: []

