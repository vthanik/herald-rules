id: HRL-SD-0046
version: 1
status: Published
standard: SDTM
category: Format
sensitivity: Value
executability: Fully Executable

description: >
  Character values must contain only ASCII characters. Non-ASCII characters in XPT files can cause processing failures at regulatory agencies.

scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
  domains:
    []

check:
  all:
    - name: {all_character_variables}
      operator: is_ascii

outcome:
  message: "Non-ASCII character found in variable '{variable_name}' in {DOMAIN}"
  severity: Warning

provenance:
  p21_id: SD0046
  core_id: null
  cg_ids:
    - CG0046
  fda_ids:
    - FDA-FMT-001
  source_doc: "FDA Study Data Technical Conformance Guide v4.5"
