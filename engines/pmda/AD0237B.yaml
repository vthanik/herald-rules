id: AD0237B
version: 1
status: Reference
standard: ADaM
category: Conformance
sensitivity: Record
executability: Fully Executable
description: Within a study, all Planned Pooled Treatment y (TRTPGy) variable values
  must be the same for each unique value of Planned Pooled Treatment y (N) (TRTPGyN)
  variable when both variables are populated. Analogous rule for AD0240.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - ADAMOTHER
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for TRTPGy
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0237B
  pmda_category: Error
  ig_versions: []

