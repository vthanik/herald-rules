id: HRL-SD-0182
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Partially Executable
description: End Reference Time Point (--ENTPT) variable must be included into the
  domain, when End Relative to Reference Time Point (--ENRTPT) variable is present.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: VARIABLE
      operator: variable_exists
      value: '%Domain%ENTPT'
outcome:
  message: Missing %Domain%ENTPT variable, when %Domain%ENRTPT variable is present
  severity: Error
provenance:
  p21_id: SD1101
  core_id: ~
  cg_ids:
    - CG0058
  fda_ids: []
  source_doc: SDTM-IG v3.3

