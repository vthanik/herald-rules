id: SD1117
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Not Executable
description: The structure of Findings class domains should be one record per Finding
  Result per subject. No Finding Result with the same Test Short Name (--TESTCD) and
  the same Qualifier variables at the same timepoint for the same Subject (USUBJID)
  are expected.
scope:
  classes: []
  domains:
    - FINDINGS(-DA
    - -MB
    - -MS
    - -RS
    - -TR
    - -TU)
    - FINDINGSABOUT
check: []
outcome:
  message: Duplicate records
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1117
  pmda_category: Warning
  ig_versions: []

