id: HRL-AD-0327
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: There is more than one value of TRCMPGyN for a given value of TRCMPGy,
  considering only those rows on which both variables are populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: VARIABLE
      operator: non_empty
    - name: TRCMPGVARIABLE
      operator: non_empty
    - name: '%Variables[TRCMPG#N]%'
      operator: all_values_equal
      group_by: STUDYID,TRCMPG%Variable.1%
outcome:
  message: Inconsistent value for TRCMPGyN
  severity: Error
provenance:
  p21_id: AD0617
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

