id: SD1376
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Subject Reference End Date/Time (RFENDTC) should be populated for all
  treated subjects, those where Actual Arm Code (ACTARMCD) is not equal to 'SCRNFAIL',
  'NOTASSGN' or 'NOTTRT' (or null). If the study is ongoing, Parameter Value (TSVAL)
  for the 'ONGOSIND/Ongoing Study Indicator' parameter should be set to 'Y' in the
  Trial Summary (TS) domain.
scope:
  Classes:
    Include: SPECIAL PURPOSE
  Domains:
    Include: DM
check:
  all:
    - name: ACTARM
      operator: is_not_contained_by
      value:
        - Screen Failure
        - Not Assigned
        - Not Treated
        - SCREEN FAILURE
        - NOT ASSIGNED
        - NOT TREATED
    - name: RFENDTC
      operator: empty
outcome:
  message: RFENDTC is not provided for a treated subject
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1376
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000378

