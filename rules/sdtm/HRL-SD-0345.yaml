id: HRL-SD-0345
version: 1
status: Published
standard: SDTM
category: Limit
sensitivity: Record
executability: Partially Executable
description: Start Date/Time of Event, Exposure (--STDTC) must be less or equal to
  Date/Time of Collection(--DTC)
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: --STDTC
      operator: less_than
      value: eq %Domain%DTC
    - name: --STDTC
      operator: non_empty
    - name: --DTC
      operator: non_empty
outcome:
  message: '%Domain%STDTC is after %Domain%DTC'
  severity: Error
provenance:
  p21_id: SD1331
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB034
  source_doc: SDTM-IG v3.3

