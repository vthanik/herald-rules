id: HRL-AD-0097
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Within a study, All ATPT values must be the same for each unique value
  group of [PARAMCD,ATPTN] when PARAMCD and primary variable ATPT are populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: PARAMCD
      operator: non_empty
    - name: ATPT
      operator: non_empty
    - name: ATPT
      operator: all_values_equal
      group_by: STUDYID,PARAMCD,ATPTN
outcome:
  message: Inconsistent value for ATPT
  severity: Error
provenance:
  p21_id: AD0117
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.0

