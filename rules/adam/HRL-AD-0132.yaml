id: HRL-AD-0132
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Within a study, All PARAM values must be the same for each unique value
  of PARAMN when primary variable PARAM is populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: PARAM
      operator: non_empty
    - name: PARAM
      operator: all_values_equal
      group_by: STUDYID,PARAMN
outcome:
  message: Inconsistent value for PARAM
  severity: Error
provenance:
  p21_id: AD0146
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

