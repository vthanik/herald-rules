id: AD0584
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: Within a parameter, there should be only a single value of Change to
  Baseline Category y (BCHGCATy) variable for a given value of Change to Baseline
  Category y (N) (BCHGCAyN) variable, considering only those rows on which both variables
  are populated.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - ADAMOTHER
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for BCHGCATy within a unique PARAMCD
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0584
  pmda_category: Error
  ig_versions: []

