id: HRL-AD-0205
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Within a study, All TRxxPGy values must be the same for each unique value
  of TRxxPGyN when primary variable TRxxPGy is populated. analogous rule for AD0235.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: TRVARIABLEPGVARIABLE
      operator: non_empty
    - name: '%Variables[TR##PG#]%'
      operator: all_values_equal
      group_by: STUDYID,TR%Variable.1%PG%Variable.2%N
outcome:
  message: Inconsistent value for TR%Variable.1%PG%Variable.2%
  severity: Error
provenance:
  p21_id: AD0232
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.0

