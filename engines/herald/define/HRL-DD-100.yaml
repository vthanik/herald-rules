# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 3.5
id: HRL-DD-100
version: 1
status: Published
standard: Define-XML
category: Orphan Detection
sensitivity: Study
executability: Fully Executable
description: >
  Codelist defined in Codelists sheet but never referenced by any Variable or ValueLevel entry.
scope:
  classes: []
  domains: []
check:
  all:
    - name: __codelist_is_referenced
      operator: equal_to
      value: false
outcome:
  message: "Codelist is defined but never referenced by any variable or value-level entry. Consider removing orphaned codelists."
  severity: Warning
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "3.5"
  cited_guidance: >
    For each controlled terminology referenced by variable or valuelist, a CodeList element must be provided.

tests:
  - name: "HRL-DD-100 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-100 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

