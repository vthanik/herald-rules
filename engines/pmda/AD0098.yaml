id: AD0098
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: Any variable ending in SDY (Start day) must have a value less than or
  equal to its corresponding EDY (end day) value.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - OCCDS
    - ADAE
    - MDOCCDS
    - ADAMOTHER
check:
  all:
    - name: __variable__
      operator: in_range
outcome:
  message: '*SDY is greater than *EDY'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0098
  pmda_category: Error
  ig_versions: []

