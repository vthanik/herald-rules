id: AD0310B
version: 1
status: Reference
standard: ADaM
category: Conformance
sensitivity: Record
executability: Fully Executable
description: Across studies, all SMQ Scope (SMQzzSC ) variable values must be the
  same for each unique value of SMQ Scope (N) (SMQzzSCN) variable when both variables
  are populated. The usual mapping is BROAD=1, NARROW=2.
scope:
  classes: []
  domains:
    - OCCDS
    - ADAE
    - MDOCCDS
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for SMQzzSC
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0310B
  pmda_category: Error
  ig_versions: []

