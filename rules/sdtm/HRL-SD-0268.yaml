id: HRL-SD-0268
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Partially Executable
description: Planned Time Point Name (--TPT) variable must be included into the domain,
  when Planned Time Point Number (--TPTNUM) variable is present.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: VARIABLE
      operator: variable_exists
      value: '%Domain%TPT'
outcome:
  message: Missing %Domain%TPT variable, when %Domain%TPTNUM variable is present
  severity: Error
provenance:
  p21_id: SD1244
  core_id: ~
  cg_ids:
    - CG0091
  fda_ids: []
  source_doc: SDTM-IG v3.3

