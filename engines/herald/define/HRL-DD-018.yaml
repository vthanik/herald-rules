id: HRL-DD-018
version: 1
status: Published
standard: Define-XML
category: CodeList Reference
sensitivity: Variable
executability: Fully Executable
description: >
  SUPPQUAL VLM ItemDefs with controlled terminology values must have a
  CodeListRef. Free-text QNAMs must NOT have a CodeListRef. Mismatch
  between value type and codelist presence causes P21 findings.
scope:
  classes: []
  domains: []
check:
  all:
    - name: __qnam_has_controlled_values__
      operator: equal_to
      value: true
    - name: __codeListRef__
      operator: empty
outcome:
  message: Controlled-terminology QNAM in VLM lacks CodeListRef
  severity: Error
provenance:
  source_doc: StudySAS Blog — Define.xml for SUPPQUAL QNAM-Level Metadata (2026-04)
  authority: Herald
  reference_url: https://studysas.blogspot.com/2026/04/definexml-for-suppqual-getting-qnam.html

tests:
  - name: "Controlled QNAM with CodeListRef present"
    type: positive
    datasets:
      SUPPAE:
        variables: [STUDYID, RDOMAIN, USUBJID, QNAM, QVAL]
        records:
          - ["CDISCPILOT01", "AE", "01-701-1015", "AEACNOTH", "DOSE REDUCED"]
    expected_findings: 0
  - name: "Controlled QNAM without CodeListRef"
    type: negative
    datasets:
      SUPPAE:
        variables: [STUDYID, RDOMAIN, USUBJID, QNAM, QVAL]
        records:
          - ["CDISCPILOT01", "AE", "01-701-1015", "AEACNOTH", "DOSE REDUCED"]
    expected_findings: 1
