id: SD0017
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: The value of Name of Measurement, Test or Examination (--TEST) should
  be no more than 40 characters in length.
scope:
  Classes:
    Include: FINDINGS
  Domains:
    Exclude: IE
  Use_Case: INDH, PROD
check:
  all:
    - name: --TEST
      operator: longer_than
      value: 40
outcome:
  message: Invalid value for --TEST variable
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0017
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000199

