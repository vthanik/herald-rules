Core:
  Id: FDAV-SD0023
  Status: Reference
  Version: '1'
Description: Completion Status (--STAT) should be set to 'NOT DONE', when Reason Not
  Done (--REASND) is populated.
Check:
  all:
    - name: --REASND
      operator: non_empty
    - name: --STAT
      operator: not_equal_to
      value: NOT DONE
Outcome:
  Message: Missing value for --STAT, when --REASND is provided
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: INTERVENTIONS, EVENTS, FINDINGS, FINDINGS ABOUT
Standard: SDTM
Publisher ID: CG0094, 146
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
  - SENDIG 3.0
  - SENDIG 3.1
  - SENDIG 3.1.1
  - SENDIG-AR 1.0
  - SENDIG-DART 1.1
CORE Reference: CORE-000225
Executability: Fully Executable
Scope:
  Classes:
    Include: ALL
  Domains:
    Exclude:
      - EX
      - AE
      - DS
      - DV
      - IE
  Use_Case: INDH, PROD

