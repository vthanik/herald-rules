id: HRL-DD-0002
version: 1
status: Published
standard: Define-XML
category: Presence
sensitivity: Value
executability: Fully Executable

description: >
  Variable label must not be empty in Define-XML. Every ItemDef element must have a non-empty Label attribute providing the variable description.

scope:
  classes:
    []
  domains:
    []

check:
  all:
    - name: variable_label
      operator: non_empty

outcome:
  message: "Variable '{variable_name}' in dataset '{dataset_name}' has an empty label in Define-XML"
  severity: Error

provenance:
  p21_id: DD0002
  core_id: null
  cg_ids:
    - CG0202
  fda_ids:
    - FDA-DEF-002
  source_doc: "Define-XML v2.1 Specification Section 4.2"
