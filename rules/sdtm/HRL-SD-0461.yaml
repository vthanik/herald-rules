id: HRL-SD-0461
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Partially Executable
description: Planned End of Assessment Interval (--ENINT) variable must be included
  in the domain, when Planned Start of Assessment Interval (--STINT) variable is present.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: VARIABLE
      operator: variable_exists
      value: '%Domain%ENINT'
outcome:
  message: Missing %Domain%ENINT variable, when %Domain%STINT variable is present
  severity: Error
provenance:
  p21_id: SD1450
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB044
  source_doc: SDTM-IG v3.3

