id: SD0033
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Planned Time Point Number (--TPTNUM) should not be null when Planned
  Time Point Name (--TPT) is populated.
scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
  Use_Case: INDH, PROD
check:
  all:
    - name: --TPT
      operator: exists
    - name: --TPTNUM
      operator: not_exists
outcome:
  message: Missing value for --TPTNUM when --TPT is provided
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0033
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000026

