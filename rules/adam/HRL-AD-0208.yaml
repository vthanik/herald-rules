id: HRL-AD-0208
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Within a study, All TRxxAGy values must be the same for each unique value
  of TRTxxA when TRTxxA is populated.  TRxxAGy is a more general pooled treatment
  for TRTxxA, therefore it may be used for many TRTxxA.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: TRTVARIABLEA
      operator: non_empty
    - name: '%Variables[TR##AG#]%'
      operator: all_values_equal
      group_by: STUDYID,TRT%Variable.1%A
outcome:
  message: Inconsistent value for TR%Variable.1%AG%Variable.2% within a unique TRT%Variable.1%A
  severity: Error
provenance:
  p21_id: AD0234
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

