Authorities:
  - Organization: CDISC
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited_Guidance: --LNKGRP is a grouping identifier used to identify
                  a group of records in one domain that is related to a record in
                  another domain, often forming a many-to-one relationship.
                Document: SDTMIG v3.4
                Item: 2.E.2
                Section: 4.2.6
            Origin: SDTM and SDTMIG Conformance Rules
            Rule_Identifier:
              Id: CG0022
              Version: '1'
            Version: '2.0'
        Version: '3.4'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited_Guidance: --LNKGRP is a grouping identifier used to identify
                  a group of records in one domain that is related to a record in
                  another domain, often forming a many-to-one relationship.
                Document: SDTMIG v3.3
                Item: 2.E.2
                Section: 4.2.6
            Origin: SDTM and SDTMIG Conformance Rules
            Rule_Identifier:
              Id: CG0022
              Version: '1'
            Version: '2.0'
        Version: '3.3'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited_Guidance: Identifier used to link related, grouped records across
                  domains.
                Document: SDTMIG v3.2
                Item: Specification
                Section: 6.1.
            Origin: SDTM and SDTMIG Conformance Rules
            Rule_Identifier:
              Id: CG0022
              Version: '1'
            Version: '2.0'
        Version: '3.2'
      - Name: TIG
        References:
          - Citations:
              - Cited_Guidance: A sequence of characters used to uniquely identify
                  a group of records, for a subject, in one domain and link it to
                  1 or more records for that subject in another domain.
                Document: SDTM v2.1
                Item: --LNKGRP, Definition column
                Section: SDTM- 3.1.4 Identifiers for All Classes
              - Cited_Guidance: Groups of records can be related by using grouping
                  variables such as --LNKID or --LNKGRP in IDVAR.  Using --LNKID or
                  --LNKGRP can be a more efficient method of representing relationships
                  in RELREC when relating a single or group of records in one dataset
                  to a group of records in another dataset.
                Document: SDTM v2.1
                Item: --LNKGRP, Definition column
                Section: 2.8.5.2
            Origin: TIG Conformance Rules
            Rule_Identifier:
              Id: TIG0306
              Version: '1'
            Version: '1.0'
        Substandard: SDTM
        Version: '1.0'
Check:
  all:
    - name: --LNKGRP
      operator: exists
    - name: $VARIABLE_COUNT
      operator: less_than
      value: 2
Core:
  Id: CORE-000358
  Status: Published
  Version: '1'
Description: Verify that when --LNKGRP is present in one domain it is also present
  in another domain.
Executability: Fully Executable
Operations:
  - id: $VARIABLE_COUNT
    name: --LNKGRP
    operator: variable_count
Outcome:
  Message: LNKGRP variable is not found in any of the other domains.
  Output_Variables:
    - --LNKGRP
    - $VARIABLE_COUNT
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ALL
  Use_Case: INDH, PROD
Sensitivity: Dataset
herald:
  source: CDISC Library API
  catalogs:
