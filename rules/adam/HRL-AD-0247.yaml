id: HRL-AD-0247
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Across studies, All AESEVN must be the same for each unique value of
  AESEV when primary variable AESEV is populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: AESEV
      operator: non_empty
    - name: AESEVN
      operator: all_values_equal
      group_by: AESEV
outcome:
  message: Inconsistent value for AESEVN
  severity: Error
provenance:
  p21_id: AD0281
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.0

