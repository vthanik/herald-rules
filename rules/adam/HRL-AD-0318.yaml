id: HRL-AD-0318
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Date of Randomization (RANDDT) variable value should be populated for
  randomized subjects (when Randomized Population Flag (RANDFL) variable value is
  'Y')
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: RANDFL
      operator: equal_to
      value: 'Y'
    - name: RANDDT
      operator: non_empty
outcome:
  message: Missing value for RANDDT, when RANDFL is Y
  severity: Error
provenance:
  p21_id: AD0366A
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

