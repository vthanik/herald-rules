Check:
  all:
    - name: TSPARMCD
      operator: equal_to
      value: TRT
    - name: $STYPE_INTERVENTIONAL
      operator: greater_than_or_equal_to
      value: 1
    - name: TSVAL
      operator: empty
Core:
  Id: CORE-000468
  Status: Published
  Version: '1'
Description: Raise an error when a record exists in TS where TSPARMCD = STYPE and
  TSVAL = INTERVENTIONAL but TSVAL for TSPARMCD = TRT is empty.
Executability: Fully Executable
Operations:
  - filter:
      TSPARMCD: STYPE
      TSVAL: INTERVENTIONAL
    group:
      - TSGRPID
    id: $STYPE_INTERVENTIONAL
    operator: record_count
Outcome:
  Message: A record exists in TS where TSPARMCD = STYPE and TSVAL = INTERVENTIONAL
    but TSVAL for TSPARMCD = TRT is empty.
  Output_Variables:
    - TSGRPID
    - TSPARMCD
    - TSVAL
    - $STYPE_INTERVENTIONAL
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - TRIAL DESIGN
  Domains:
    Include:
      - TS
Sensitivity: Record
herald:
  source: CDISC Library API
  catalogs:
