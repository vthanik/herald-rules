id: HRL-SD-0490
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Age Units (AGEU) variable values should be provided, when Age (AGE) or
  Age Range (AGETXT) variables values are populated.
scope:
  classes:
    - INTERVENTIONS
  domains:
    - AG
check:
  all:
    - name: AGE
      operator: non_empty
    - name: AGETXT
      operator: non_empty
    - name: AGEU
      operator: non_empty
outcome:
  message: Missing value for AGEU, when AGE or AGETXT is populated
  severity: Error
provenance:
  p21_id: SD2022
  core_id: ~
  cg_ids:
    - CG0432
  fda_ids: []
  source_doc: SDTM-IG v3.3

