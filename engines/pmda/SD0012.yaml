id: SD0012
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Study Day of Start of Event, Exposure or Observation (--STDY) must be
  less or equal to Study Day of End of Event, Exposure or Observation (--ENDY).
scope:
  classes: []
  domains:
    - SPECIALPURPOSE(-CO
    - -DM)
    - INTERVENTIONS
    - EVENTS
check:
  all:
    - name: __domain_variable__
      operator: check_value
outcome:
  message: --STDY is after --ENDY
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0012
  pmda_category: Error
  ig_versions: []

