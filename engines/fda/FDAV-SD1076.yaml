Core:
  Id: FDAV-SD1076
  Status: Reference
  Version: '1'
Description: SDTM model variable may be added into standard domains according its
  domain general class, if there are no restrictions on their usage specified in IG.
Check:
  all:
    - name: variable_name
      operator: not_equal_to
      value: EXMETHOD
    - name: variable_name
      operator: not_equal_to
      value: EGBEATNO
    - name: variable_name
      operator: not_equal_to
      value: ICIMPLBL
    - name: variable_name
      operator: not_equal_to
      value: MSAGENT
    - name: variable_name
      operator: not_equal_to
      value: MSCONC
    - name: variable_name
      operator: not_equal_to
      value: MSCONCU
    - name: variable_name
      operator: is_not_contained_by
      value: $allowed_variables
Outcome:
  Message: Model permissible variable added into standard domain
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: ''
Standard: SDTM
Publisher ID: CG0013, 265, 266, 267, 269, 270
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
  - SENDIG 3.0
  - SENDIG 3.1
  - SENDIG 3.1.1
  - SENDIG-AR 1.0
  - SENDIG-DART 1.1
CORE Reference: CORE-001079
Executability: Partially Executable - Possible Underreporting
Scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL

