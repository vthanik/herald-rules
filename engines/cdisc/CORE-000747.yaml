Check:
  all:
    - name: RACE
      operator: non_empty
    - name: RACE
      operator: not_equal_to
      value: BLACK OR AFRICAN AMERICAN
    - name: QNAM
      operator: equal_to
      value: CRACE
    - name: QVAL
      operator: equal_to
      value: HATIAN or NEGRO
