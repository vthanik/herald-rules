id: HRL-AD-0060
version: 1
status: Published
standard: ADaM
category: Presence
sensitivity: Record
executability: Partially Executable
description: If Planned Treatment for Period xx (TRTxxP) is present, Frist Treatment
  date for period xx (TRxxSDT) must be present if there is more than one treatment
  period.  When there is only 1 treatment period 01, TRTSDT is sufficient.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: VARIABLE
      operator: variable_exists
      value: TR%Variable.1%SDT
outcome:
  message: TRTxxP is present but TRxxSDT is not present for periods greater than 01
  severity: Error
provenance:
  p21_id: AD0078
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

