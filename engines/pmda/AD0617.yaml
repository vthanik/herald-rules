id: AD0617
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: There should be only a single value of Treatment Compliance (%) Group
  y (N) (TRCMPGyN) variable for a given value of Treatment Compliance (%) Group y
  (TRCMPGy) variable, considering only those rows on which both variables are populated.
scope:
  classes: []
  domains:
    - ADSL
    - ADDL
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for TRCMPGyN
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0617
  pmda_category: Error
  ig_versions: []

