id: SD1030
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Start Relative to Reference Period (--STRF) should not be populated for
  subjects with missing value for Reference Start Date/Time (RFSTDTC).
scope:
  Classes:
    Include: ALL
  Domains:
    Exclude: DM
  Use_Case: INDH
check:
  all:
    - name: RFSTDTC
      operator: empty
    - name: --STRF
      operator: non_empty
outcome:
  message: Value for --STRF is populated when RFSTDTC is null
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1030
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000262

