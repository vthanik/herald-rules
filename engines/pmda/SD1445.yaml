id: SD1445
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Not Executable
description: By its definition Last Observation Before Exposure Flag (--LOBXFL) should
  have only a single record for the same test for subject. Therefore, each subject
  (USUBJID) should have no more than one record with Last Observation Before Exposure
  Flag (--LOBXFL) equals 'Y' for the same assessment which is defined by Test (--TESTCD),
  --TSTDTL (Measurement, Test or Examination Detail), Category (--CAT), Subcategory
  (--SCAT), Method (--METHOD), Specimen (--SPEC), Location (--LOC) and Laterality
  (--LAT).
scope:
  classes: []
  domains:
    - FINDINGS
    - FINDINGSABOUT
check: []
outcome:
  message: Multiple --LOBXFL records for the same test
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1445
  pmda_category: Warning
  ig_versions: []

