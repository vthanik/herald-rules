id: HRL-AD-0189
version: 1
status: Published
standard: ADaM
category: Terminology
sensitivity: Record
executability: Partially Executable
description: 'ANLzzFN (Analyzed Record Flag zz Numeric) must be 1 or null.  For parameter-level
  and record-level numeric population flag variables: 1 = yes (included). Null values
  are allowed.'
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: '%Variables[ANL*FN]%'
      operator: in
      value: '1'
outcome:
  message: ANL%Variable.1%FN value is not 1 or null
  severity: Error
provenance:
  p21_id: AD0212
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

