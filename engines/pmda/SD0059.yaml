id: SD0059
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Variable DataType in define.xml must match variable Type in dataset.
  Define-XML data types of 'integer' and 'float' match dataset type of 'Num', all
  other match 'Char'.
scope:
  classes: []
  domains: []
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Define.xml/dataset variable type mismatch
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0059
  pmda_category: Warning
  ig_versions: []

