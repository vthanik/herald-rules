id: AD0288
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: Across studies, all Causality (N) (AERELN) variable values must be the
  same for each unique value of Causality (AEREL) variable when the primary variable
  AEREL is populated.
scope:
  classes: []
  domains: ADAE
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for AERELN
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0288
  pmda_category: Error
  ig_versions: []

