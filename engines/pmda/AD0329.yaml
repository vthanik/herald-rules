id: AD0329
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: Within a Study and a Parameter, all Baseline Category y (BASECATy) variable
  values must be the same for each unique value of Baseline Category y (N) (BASECAyN)
  variable when the primary variable BASECATy is populated.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for BASECAT*
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0329
  pmda_category: Error
  ig_versions: []

