Core:
  Id: FDAV-SD2239
  Status: Reference
  Version: '1'
Description: Planned Time Point Name (--TPT) value must be consistent for all records
  with same Subject (USUBJID) and Assessment Date/Time (--DTC).
Check:
  all:
    - name: VISITNUM
      operator: not_exists
    - name: --TPTREF
      operator: not_exists
    - name: --TPT
      operator: is_not_unique_relationship
      value: --TPTNUM
Outcome:
  Message: Inconsistent value for --TPT
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: FINDINGS, FINDINGS ABOUT
Standard: SDTM
Publisher ID: CG0240
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
  - SENDIG-AR 1.0
CORE Reference: CORE-000141
Executability: Fully Executable
Scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
  Use_Case: INDH

