# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.15
id: HRL-DD-083
version: 2
status: Published
standard: Define-XML
category: Comment Definition
sensitivity: Record
executability: Fully Executable
description: >
  Comment ID is required and must be unique.
scope:
  classes: []
  domains: []
check:
  all:
    - name: comment_id
      operator: non_empty
outcome:
  message: "Comment ID is missing. Each comment must have a unique ID."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.15"
  cited_guidance: >
    OID -- Required. Unique ID for the CommentDef.

tests:
  - name: "HRL-DD-083 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-083 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

