id: HRL-SD-0484
version: 1
status: Published
standard: SDTM
category: Terminology
sensitivity: Record
executability: Partially Executable
description: Value for System Organ Class Code (--SOCCD) variable must be populated
  using a System Organ Class Code of the MedDRA dictionary of a version specified
  in the define.xml.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: '%Variables[--SOCCD]%'
      operator: non_empty
outcome:
  message: Value for %Domain%SOCCD not found in MedDRA dictionary
  severity: Error
provenance:
  p21_id: SD2016
  core_id: ~
  cg_ids:
    - CG0437
  fda_ids:
    - FDAB003
  source_doc: SDTM-IG v3.3

