id: HRL-SD-0324
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Fully Executable
description: When the study type is interventional (TSPARMCD = 'STYPE' and TSVAL =
  'INTERVENTIONAL'), the Investigational Therapy or Treatment parameter should be
  provided with Parameter Value populated (TSVAL should not be null when TSPARMCD
  = 'TRT').
scope:
  classes:
    - TRIAL DESIGN
  domains:
    - TS
check:
  all:
    - name: TSPARMCD
      operator: variable_exists
      value: TRT
outcome:
  message: TSVAL is missing for the TRT Trial Summary Parameter, when STYPE parameter
    equals 'INTERVENTIONAL'
  severity: Error
provenance:
  p21_id: SD1309
  core_id: ~
  cg_ids:
    - CG0276
  fda_ids: []
  source_doc: SDTM-IG v3.3

