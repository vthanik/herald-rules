id: HRL-AD-0116
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: When all 3 variables are populated and AyLO does not equal 0, Ratio to
  AyLO (R2AyLO) must equal Analysis Value (AVAL) / Analysis Range y LO Value (AyLO).
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: R2AVARIABLELO
      operator: non_empty
    - name: AVAL
      operator: non_empty
    - name: AVARIABLELO
      operator: non_empty
    - name: AVARIABLELO
      operator: not_equal_to
      value: '0'
outcome:
  message: 'Calculation issue: R2A%Variable.1%LO != AVAL / A%Variable.1%LO'
  severity: Error
provenance:
  p21_id: AD0133
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

