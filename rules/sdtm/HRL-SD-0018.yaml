id: HRL-SD-0018
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Fully Executable

description: >
  AEDECOD must not be empty in the AE domain. The dictionary-derived adverse event term (MedDRA preferred term) is required for every adverse event record.

scope:
  classes:
    - EVENTS
  domains:
    - AE

check:
  all:
    - name: AEDECOD
      operator: non_empty

outcome:
  message: "AEDECOD is empty or missing in AE for subject '{USUBJID}'"
  severity: Error

provenance:
  p21_id: SD0018
  core_id: CORE-000269
  cg_ids:
    - CG0018
  fda_ids:
    - FDA-AE-002
  source_doc: "SDTM-IG v3.3 Section 6.2.1"
