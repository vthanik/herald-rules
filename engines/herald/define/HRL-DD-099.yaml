# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 3.5
id: HRL-DD-099
version: 1
status: Published
standard: Define-XML
category: Orphan Detection
sensitivity: Study
executability: Fully Executable
description: >
  Document defined in Documents sheet but never referenced by any Method or Comment.
scope:
  classes: []
  domains: []
check:
  all:
    - name: __document_is_referenced
      operator: equal_to
      value: false
outcome:
  message: "Document is defined but never referenced by any method or comment. Consider removing orphaned documents."
  severity: Warning
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "3.5"
  cited_guidance: >
    def:leaf elements provide the information needed to locate an external document file referenced in the Define-XML.

tests:
  - name: "HRL-DD-099 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-099 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

