id: HRL-SD-0329
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: When Reported Term for the Disposition Event (DSTERM) is 'COMPLETED',
  Standardized Disposition Term (DSDECOD) should have the same value 'COMPLETED'.
scope:
  classes:
    - EVENTS
  domains:
    - DS
check:
  all:
    - name: DSDECOD
      operator: equal_to
      value: COMPLETED
    - name: DSTERM
      operator: equal_to
      value: COMPLETED
outcome:
  message: DSDECOD is not 'COMPLETED', when DSTERM='COMPLETED'
  severity: Error
provenance:
  p21_id: SD1314
  core_id: ~
  cg_ids:
    - CG0065
  fda_ids: []
  source_doc: SDTM-IG v3.3

