id: HRL-AD-0036
version: 1
status: Published
standard: ADaM
category: Limit
sensitivity: Record
executability: Partially Executable
description: A variable with a suffix of DY (day) must not equal zero. Variables whose
  names end in DY are relative day variables. In ADaM as in the SDTM, there is no
  day 0. If there is a need to create a relative day variable that includes day 0,
  then its name must not end in DY.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: '%Variables[*DY]%'
      operator: matches_regex
      value: -?[1-9][0-9]*
outcome:
  message: '%Variable.1%DY = 0'
  severity: Error
provenance:
  p21_id: AD0046
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

