id: SD1221
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: TSVAL for PLANSUB record must be numeric.
scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include: TS
check:
  all:
    - name: TSPARMCD
      operator: equal_to
      value: PLANSUB
    - name: TSVAL
      operator: not_matches_regex
      value: ^[1-9]\d*$
outcome:
  message: Invalid TSVAL value for PLANSUB
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1221
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000340

