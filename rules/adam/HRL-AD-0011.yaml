id: HRL-AD-0011
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: When a Flag variable (FL) is N, its corresponding Flag numeric variable
  (FN) must be 0.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: VARIABLEFN
      operator: equal_to
      value: '0'
    - name: '%Variables[*FL]%'
      operator: equal_to
      value: 'N'
outcome:
  message: '%Variable.1%FL = N and %Variable.1%FN != 0'
  severity: Error
provenance:
  p21_id: AD0011
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

