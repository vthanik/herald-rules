Core:
  Id: FDAV-SD1241
  Status: Reference
  Version: '1'
Description: Body System or Organ Class (--BODSYS) must be populated when Body System
  or Organ Class Code (--BDSYCD) is populated.
Check:
  all:
    - name: --BODSYS
      operator: non_empty
    - name: --BDSYCD
      operator: empty
Outcome:
  Message: --BODSYS is not populated when --BDSYCD is populated
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: AE, CE, MH
Standard: SDTM
