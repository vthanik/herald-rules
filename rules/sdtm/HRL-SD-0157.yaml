id: HRL-SD-0157
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: All values of a Parameter Short Name (--PARMCD) variables should be the
  same for a given value of a Parameter (--PARM) variables.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: --PARMCD
      operator: non_empty
    - name: '%Domain%PARMCD'
      operator: all_values_equal
      group_by: '%Domain%PARM'
outcome:
  message: Inconsistent value for %Domain%PARMCD within %Domain%PARM
  severity: Error
provenance:
  p21_id: SD1070
  core_id: ~
  cg_ids:
    - CG0307
  fda_ids:
    - FDAB009
  source_doc: SDTM-IG v3.3

