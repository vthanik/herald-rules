id: HRL-AD-0160
version: 1
status: Published
standard: ADaM
category: Cross-reference
sensitivity: Record
executability: Partially Executable
description: If ONTRTFL =Y then TRTSDT <=ADT <= TRTEDT should be true (analysis must
  be between start and end range). Ensure subject exists in both files.
scope:
  classes:
    - ADSL
  domains:
    - ADSL
check:
  all:
    - name: ONTRTFL
      operator: equal_to
      value: 'Y'
    - name: USUBJID
      operator: non_empty
    - name: ADT
      operator: non_empty
outcome:
  message: Subject is on treatment (ONTRTFL), but analysis date (ADT) is after treatment
    end date (ADSL.TRTEDT)
  severity: Error
provenance:
  p21_id: AD0172
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

