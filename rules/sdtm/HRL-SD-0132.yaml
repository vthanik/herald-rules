id: HRL-SD-0132
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Sequence Number (TSSEQ) must have a  unique value for a given value of
  Trial Summary Parameter Short Name (TSPARMCD) within the domain.
scope:
  classes:
    - TRIAL DESIGN
  domains:
    - TS
check:
  all:
    - name: TSPARMCD
      operator: non_empty
    - name: TSSEQ
      operator: non_empty
    - name: TSSEQ
      operator: is_unique
      group_by: TSPARMCD
outcome:
  message: Non-unique value for TSSEQ variable within TSPARMCD
  severity: Error
provenance:
  p21_id: SD1038
  core_id: ~
  cg_ids:
    - CG0268
  fda_ids: []
  source_doc: SDTM-IG v3.3

