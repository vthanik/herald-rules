id: HRL-AD-0090
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Within a study, All AVISITN values must be the same for each unique value
  group of [PARAMCD,AVISIT] when PARAMCD and primary variable AVISIT are populated.
  Considering only those rows on which both variables are populated
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: PARAMCD
      operator: non_empty
    - name: AVISIT
      operator: non_empty
    - name: AVISITN
      operator: non_empty
    - name: AVISITN
      operator: all_values_equal
      group_by: STUDYID,PARAMCD,AVISIT
outcome:
  message: Inconsistent value for AVISITN
  severity: Error
provenance:
  p21_id: AD0109B
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

