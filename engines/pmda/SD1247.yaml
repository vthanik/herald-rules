id: SD1247
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: ECDOSE must be greater than zero when ECOCCUR does not equal 'N', ECSTAT
  does not equal 'NOT DONE', and ECDOSTXT is null. ECDOSE must not be set to zero
  (0) as an alternative method for indicating doses not taken, not given, or missed.
scope:
  Classes:
    Include: INTERVENTIONS
  Domains:
    Include: EC
  Use_Case: INDH
check:
  any:
    - all:
        - name: ECOCCUR
          operator: not_equal_to
          value: 'N'
          value_is_literal: yes
        - name: ECSTAT
          operator: empty
        - name: ECDOSTXT
          operator: empty
        - name: ECDOSE
          operator: less_than_or_equal_to
          value: 0
    - all:
        - name: ECOCCUR
          operator: not_equal_to
          value: 'N'
          value_is_literal: yes
        - name: ECSTAT
          operator: not_exists
        - name: ECDOSTXT
          operator: empty
        - name: ECDOSE
          operator: less_than_or_equal_to
          value: 0
    - all:
        - name: ECOCCUR
          operator: not_equal_to
          value: 'N'
          value_is_literal: yes
        - name: ECSTAT
          operator: empty
        - name: ECDOSTXT
          operator: not_exists
        - name: ECDOSE
          operator: less_than_or_equal_to
          value: 0
    - all:
        - name: ECOCCUR
          operator: not_equal_to
          value: 'N'
          value_is_literal: yes
        - name: ECSTAT
          operator: not_exists
        - name: ECDOSTXT
          operator: not_exists
        - name: ECDOSE
          operator: less_than_or_equal_to
          value: 0
outcome:
  message: ECDOSE is not greater than 0 when ECOCCUR does not equal 'N' and ECDOSTXT
    is null
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1247
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000137

