id: AD0150
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: Within a study and a given value of PARAMCD when both AVAL and AVALC
  are populated, then all AVAL values must be the same for each unique value of AVALC
  creating a one-to-one mapping.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for AVAL
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0150
  pmda_category: Warning
  ig_versions: []

