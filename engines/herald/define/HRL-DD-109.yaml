notes: >
  Blocked on `define_version_matches_schema` operator (def:DefineVersion must be '2.0.0' for Define-XML v2.0 and '2.1.0' for v2.1; today's `in` operator would need a schema-version pre-condition). See HANDOFF section 4g.

