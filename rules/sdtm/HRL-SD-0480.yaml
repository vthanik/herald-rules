id: HRL-SD-0480
version: 1
status: Published
standard: SDTM
category: Terminology
sensitivity: Record
executability: Partially Executable
description: Value for High Level Group Term Code (--HLGTCD) variable must be populated
  using a High Level Group Term Code of the MedDRA dictionary of a version specified
  in the define.xml.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: '%Variables[--HLGTCD]%'
      operator: non_empty
outcome:
  message: Value for %Domain%HLGTCD not found in MedDRA dictionary
  severity: Error
provenance:
  p21_id: SD2013
  core_id: ~
  cg_ids:
    - CG0384
  fda_ids:
    - FDAB003
  source_doc: SDTM-IG v3.3

