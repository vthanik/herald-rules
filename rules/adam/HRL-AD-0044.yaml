id: HRL-AD-0044
version: 1
status: Published
standard: ADaM
category: Presence
sensitivity: Record
executability: Fully Executable
description: The presence of SDTM.EX (Exposure) domain implies that there should be
  a Treatment Start Date / Datetime field present in the ADaM data.
scope:
  classes:
    - ADSL
  domains:
    - ADSL
check:
  all:
    - name: VARIABLE
      operator: variable_exists
      value: TRTSDT,TRTSDTM
outcome:
  message: SDTM.EX is present but neither ADSL TRTSDT nor TRTSDTM are present
  severity: Error
provenance:
  p21_id: AD0061
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

