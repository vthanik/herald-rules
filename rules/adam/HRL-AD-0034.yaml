id: HRL-AD-0034
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: When both time and datetime variables are collected on the same record
  for the same observation, the Time portion of the datetime variable should be equal
  to the Time variable itself.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: '%Variables[*TM;!DTM]%'
      operator: equal_to
      value: :TIME(%Variable.1%DTM)
    - name: VARIABLETM
      operator: non_empty
    - name: VARIABLEDTM
      operator: non_empty
outcome:
  message: '%Variable.1%TM and its corresponding %Variable.1%DTM variable have different
    time values'
  severity: Error
provenance:
  p21_id: AD0044
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

