id: HRL-SD-0002
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Fully Executable

description: >
  DOMAIN must not be empty in all SDTM domains. The two-character domain abbreviation is required for every record.

scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains:
    []

check:
  all:
    - name: DOMAIN
      operator: non_empty

outcome:
  message: "DOMAIN is empty or missing in dataset"
  severity: Error

provenance:
  p21_id: SD0002
  core_id: CORE-000253
  cg_ids:
    - CG0002
  fda_ids:
    []
  source_doc: "SDTM-IG v3.3 Section 4.1.1"
