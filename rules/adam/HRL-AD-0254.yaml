id: HRL-AD-0254
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Across studies, All AEREL must be the same for each unique value of AERELN
  when primary variable AEREL is populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: AEREL
      operator: non_empty
    - name: AEREL
      operator: all_values_equal
      group_by: AERELN
outcome:
  message: Inconsistent value for AEREL
  severity: Error
provenance:
  p21_id: AD0287
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.0

