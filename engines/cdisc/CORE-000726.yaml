        - name: ETHNIC
          operator: non_empty
        - name: ETHNIC
          operator: is_not_contained_by
          value:
            - HISPANIC OR LATINO
            - NOT HISPANIC OR LATINO
    - all:
        - name: QNAM
          operator: equal_to
          value: CETHNIC
        - name: QVAL
          operator: is_not_contained_by
          value:
