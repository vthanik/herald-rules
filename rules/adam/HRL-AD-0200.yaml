id: HRL-AD-0200
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Within a study, All TRTSEQA values must be the same for each unique value
  of TRTSEQAN when primary variable TRTSEQA is populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: TRTSEQA
      operator: non_empty
    - name: TRTSEQA
      operator: all_values_equal
      group_by: STUDYID,TRTSEQAN
outcome:
  message: Inconsistent value for TRTSEQA
  severity: Error
provenance:
  p21_id: AD0229
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.0

