id: HRL-AD-0120
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: When all 3 variables are populated and AyHI does not equal 0, Ratio to
  AyHI (R2AyHI) must equal Analysis Value (AVAL) / Analysis Range y HI Value (AyHI).
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: R2AVARIABLEHI
      operator: non_empty
    - name: AVAL
      operator: non_empty
    - name: AVARIABLEHI
      operator: non_empty
    - name: AVARIABLEHI
      operator: not_equal_to
      value: '0'
outcome:
  message: 'Calculation issue: R2A%Variable.1%HI != AVAL / A%Variable.1%HI'
  severity: Error
provenance:
  p21_id: AD0134
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

