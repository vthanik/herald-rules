id: HRL-SD-0087
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: End Date/Time of Treatment (EXENDTC) should be less than or equal to
  the Start Date/Time of the latest Disposition Event (DSSTDTC).
scope:
  classes:
    - EVENTS
  domains:
    - DS
check:
  all:
    - name: EXENDTC
      operator: less_than
      value: eq DS:DSSTDTC
    - name: EXENDTC
      operator: non_empty
    - name: DS:DSSTDTC
      operator: non_empty
    - name: USUBJID
      operator: non_empty
outcome:
  message: Exposure end date is after the latest Disposition date
  severity: Error
provenance:
  p21_id: SD0082
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB034
  source_doc: SDTM-IG v3.3

