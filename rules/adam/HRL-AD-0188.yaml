    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: ABLFN
      operator: in
      value: '1'
outcome:
  message: ABLFN value is not 1 or null
  severity: Error
provenance:
  p21_id: AD0211
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

