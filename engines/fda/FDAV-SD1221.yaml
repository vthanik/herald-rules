Core:
  Id: FDAV-SD1221
  Status: Reference
  Version: '1'
Description: TSVAL for PLANSUB record must be numeric.
Check:
  all:
    - name: TSPARMCD
      operator: equal_to
      value: PLANSUB
    - name: TSVAL
      operator: not_matches_regex
      value: ^[1-9]\d*$
Outcome:
  Message: Invalid TSVAL value for PLANSUB
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: TS
Standard: SDTM
Publisher ID: CG0440
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
CORE Reference: CORE-000340
Executability: Fully Executable
Scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include: TS

