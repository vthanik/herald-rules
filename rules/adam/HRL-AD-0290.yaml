id: HRL-AD-0290
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Within a Study and a Parameter, all CHGCATyN (Change from Baseline Category
  y (N)) variable values must be the same for each unique value of CHGCATy (Change
  from Baseline Category y), when primary variable CHGCATy is populated
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: CHGCATVARIABLE
      operator: non_empty
    - name: '%Variables[CHGCAT#N]%'
      operator: all_values_equal
      group_by: STUDYID,PARAMCD,CHGCAT%Variable.1%
outcome:
  message: Inconsistent value for CHGCAT%Variable.1%N
  severity: Error
provenance:
  p21_id: AD0332
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

