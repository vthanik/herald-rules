id: AD0123
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Not Executable
description: Within a study, all PARAMTYP values must be the same for each unique
  value of PARAMCD when PARAMCD is populated. If a PARAMCD is said to be derived,
  all instances must be derived. More than one parameter can be derived.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
check: []
outcome:
  message: Inconsistent value for PARAMTYP
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0123
  pmda_category: Error
  ig_versions: []

