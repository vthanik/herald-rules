id: HRL-SD-0238
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Standardized Result in Numeric Format (--STRESN) variable value should
  be equal Standardized Result in Character Format (--STRESC) variable value, when
  Standardized Result in Character Format (--STRESC) variable value represents a numeric
  value.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: --STRESN
      operator: equal_to_variable
      value: --STRESC
    - name: --STRESC
      operator: non_empty
    - name: --STRESN
      operator: non_empty
outcome:
  message: '%Domain%STRESN does not equal %Domain%STRESC'
  severity: Error
provenance:
  p21_id: SD1212
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB031
  source_doc: SDTM-IG v3.3

