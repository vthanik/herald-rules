id: SD1101
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: End Reference Time Point (--ENTPT) variable must be included into the
  domain when End Relative to Reference Time Point (--ENRTPT) variable is present.
scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
  Use_Case: INDH, PROD
check:
  all:
    - name: --ENRTPT
      operator: exists
    - name: --ENTPT
      operator: not_exists
outcome:
  message: Missing --ENTPT variable when --ENRTPT variable is present
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1101
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000171

