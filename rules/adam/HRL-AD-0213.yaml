id: HRL-AD-0213
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Within a study, All TRTPGy values must be the same for each unique value
  of TRTPGyN when primary variable TRTPGy is populated. Analogous rule for AD0240.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: TRTPGVARIABLE
      operator: non_empty
    - name: '%Variables[TRTPG#]%'
      operator: all_values_equal
      group_by: STUDYID,TRTPG%Variable.1%N
outcome:
  message: Inconsistent value for TRTPG%Variable.1%
  severity: Error
provenance:
  p21_id: AD0237
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.0

