id: SD0035
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Dose Units (--DOSU) must be populated when Dose per Administration (--DOSE),
  Dose Description (--DOSTXT) or Total Daily Dose (--DOSTOT) is provided.
scope:
  Classes:
    Include: INTERVENTIONS
  Domains:
    Include: ALL
  Use_Case: INDH
check:
  all:
    - name: --DOSU
      operator: empty
    - any:
        - name: --DOSE
          operator: non_empty
        - name: --DOSTXT
          operator: non_empty
        - name: --DOSTOT
          operator: non_empty
outcome:
  message: Missing value for --DOSU when --DOSE, --DOSTXT or --DOSTOT is provided
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0035
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000093

