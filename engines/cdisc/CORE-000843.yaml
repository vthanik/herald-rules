Check:
  all:
    - name: SVUPDES
      operator: non_empty
    - name: VISITNUM
      operator: is_contained_by
      value: $visitnum_in_tv
Core:
  Id: CORE-000843
  Status: Published
  Version: '1'
Description: When SVUPDES is populated, then the VISITNUM should not be equal to a
  VISITNUM in TV
Executability: Fully Executable
Operations:
  - domain: TV
    id: $visitnum_in_tv
    name: VISITNUM
    operator: distinct
Outcome:
  Message: SVUPDES is populated, but the VISITNUM equals a VISITNUM present in TV
  Output_Variables:
    - SVUPDES
    - VISITNUM
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - SPECIAL PURPOSE
  Domains:
    Include:
      - SV
Sensitivity: Record
herald:
