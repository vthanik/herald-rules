# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 4.3.2
id: HRL-DD-105
version: 1
status: Published
standard: Define-XML
category: Origin Metadata
sensitivity: Study
executability: Fully Executable
description: >
  Variables shared across datasets (e.g., USUBJID) should have consistent Origin across all datasets.
scope:
  classes: []
  domains: []
check:
  all:
    - name: __origin_consistent_across_datasets
      operator: equal_to
      value: false
outcome:
  message: "Variable origin is inconsistent across datasets. Shared variables like USUBJID should have consistent origin metadata."
  severity: Warning
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "4.3.2"
  cited_guidance: >
    P21 DD0109: USUBJID should always be derived/assigned in the same way.

tests:
  - name: "HRL-DD-105 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-105 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

