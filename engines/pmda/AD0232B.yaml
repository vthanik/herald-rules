id: AD0232B
version: 1
status: Reference
standard: ADaM
category: Conformance
sensitivity: Record
executability: Fully Executable
description: Within a study, all Planned Pooled Treatment y for Period xx (TRxxPGy)
  variable values must be the same for each unique value of Planned Pooled Trt y for
  Period xx (N) (TRxxPGyN) variable when both variables are populated. Analogous rule
  for AD0235.
scope:
  classes: []
  domains:
    - ADSL
    - ADDL
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for TRxxPGy
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0232B
  pmda_category: Error
  ig_versions: []

