id: SD0093
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Age Units (AGEU) should be provided when Age (AGE) is populated.
scope:
  Classes:
    Include: SPECIAL PURPOSE
  Domains:
    Include: DM
check:
  all:
    - any:
        - name: AGEU
          operator: not_exists
        - name: AGEU
          operator: empty
    - any:
        - name: AGETXT
          operator: non_empty
        - name: AGE
          operator: non_empty
outcome:
  message: Missing value for AGEU when AGE is provided
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0093
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000452

