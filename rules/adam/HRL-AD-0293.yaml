id: HRL-AD-0293
version: 1
status: Published
standard: ADaM
category: Presence
sensitivity: Record
executability: Partially Executable
description: If MCRITyML (Multi-Response Criterion y Evaluation) Flag variable is
  present, there must also be a corresponding  MCRITy (Analysis Multi-Response Criterion
  y) variable.
