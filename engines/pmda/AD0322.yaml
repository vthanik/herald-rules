id: AD0322
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: Within a given value of Planned Treatment (TRTP) variable, there can
  only be one unique value of Planned Pooled Treatment y (TRTPGy) variable.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - ADAMOTHER
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for TRTPGy within a given TRTP
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0322
  pmda_category: Error
  ig_versions: []

