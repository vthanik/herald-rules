id: HRL-SD-0139
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: I/E Criterion Original Result (IEORRES) must equal 'Y', when Inclusion/Exclusion
  Category (IECAT) is 'EXCLUSION'.
scope:
  classes:
    - FINDINGS
  domains:
    - IE
check:
  all:
    - name: IESTRESC
      operator: equal_to
      value: 'Y'
    - name: IECAT
      operator: equal_to_case_insensitive
      value: EXCLUSION
outcome:
  message: Inconsistent values for IEORRES/IECAT
  severity: Error
provenance:
  p21_id: SD1045
  core_id: ~
  cg_ids:
    - CG0175
  fda_ids: []
  source_doc: SDTM-IG v3.3

