id: HRL-SD-0044
version: 1
status: Published
standard: SDTM
category: Structure
sensitivity: Dataset
executability: Fully Executable

description: >
  Variable labels must not exceed 40 characters. This is a SAS V5 transport format limitation that applies to all SDTM datasets.

scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
  domains:
    []

check:
  all:
    - name: {all_variable_labels}
      operator: shorter_than
      value: 41

outcome:
  message: "Variable label for '{variable_name}' exceeds 40 characters in {DOMAIN}"
  severity: Error

provenance:
  p21_id: SD0044
  core_id: CORE-000295
  cg_ids:
    - CG0044
  fda_ids:
    - FDA-STR-002
  source_doc: "SAS V5 Transport Format Specification"
