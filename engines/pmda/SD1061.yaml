id: SD1061
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Microbiology Specimen (MB) dataset should be included when a Microbiology
  Susceptibility Test (MS) dataset is present.
scope:
  Classes:
    Include: FINDINGS
  Domains:
    Include: MS
check:
  all:
    - name: MS
      operator: exists
    - name: MB
      operator: not_exists
outcome:
  message: Missing MB dataset when MS dataset is present
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1061
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000188

