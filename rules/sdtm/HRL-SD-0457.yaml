id: HRL-SD-0457
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: By its definition Last Observation Before Exposure Flag (--LOBXFL) should
  have only a single record for the same test for subject. Therefore, each subject
  (USUBJID) should have no more than one record with  Last Observation Before Exposure
  Flag (--LOBXFL) equals 'Y' for the same assessment which is defined by Test (--TESTCD),
  Category (--CAT), Subcategory (--SCAT), Position of Subject During Observation (--POS),
  Method (--METHOD), Specimen (--SPEC), Location (--LOC) and Laterality (--LAT).
scope:
  classes:
    - FINDINGS
  domains:
    - SC
check:
  all:
    - name: --LOBXFL
      operator: equal_to
      value: 'Y'
    - name: '%Domain%TESTCD'
      operator: is_unique
      group_by: USUBJID,%Domain%CAT,%Domain%SCAT,%Domain%POS,%Domain%METHOD,%Domain%SPEC,%Domain%LOC,%Domain%LAT
outcome:
  message: Multiple %Domain%LOBXFL records for the same test
  severity: Error
provenance:
  p21_id: SD1445
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB026
  source_doc: SDTM-IG v3.3

