id: HRL-SD-0099
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Fully Executable
description: Supplemental Qualifiers special purpose dataset (SUPP--) can only be
  used to capture non-standard variables and their association to parent records in
  general-observation-class datasets (Events, Findings, Interventions) and Demographics.
  Another exception is Subject Visits domain in SDTM-IG prior v3.4
