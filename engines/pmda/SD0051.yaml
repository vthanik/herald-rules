id: SD0051
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: All values of Visit Name (VISIT) should be the same for a given value
  of Visit Number (VISITNUM).
scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
  Use_Case: INDH
check:
  all:
    - name: VISITNUM
      operator: is_contained_by
      value: $tv_visitnum
    - name: VISIT
      operator: is_not_unique_relationship
      value: VISITNUM
outcome:
  message: Inconsistent value for VISIT within VISITNUM
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0051
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000361

