id: HRL-SD-0100
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: The value of Subject Identifier for the Study (SUBJID) variable must
  be unique for each subject within the study.
scope:
