id: SD0056
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Variables described in SDTM IG as Required must be included in the dataset.
scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
  Use_Case: INDH, PROD, NONCLIN
check:
  all:
    - name: $required_variables
      operator: exists
    - name: variable_name
      operator: is_contained_by
      value: $required_variables
    - name: variable_value
      operator: empty
outcome:
  message: SDTM Required variable not found
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0056
  pmda_category: Reject
  ig_versions: []
  core_reference: CORE-000356

