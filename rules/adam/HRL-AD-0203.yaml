id: HRL-AD-0203
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Within a study, all TRTSEQAN values must be the same for each unique
  value of TRTSEQA, when both variables are populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: TRTSEQA
      operator: non_empty
    - name: TRTSEQAN
      operator: non_empty
    - name: TRTSEQAN
      operator: all_values_equal
      group_by: STUDYID,TRTSEQA
outcome:
  message: Inconsistent value for TRTSEQAN
  severity: Error
provenance:
  p21_id: AD0230B
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

