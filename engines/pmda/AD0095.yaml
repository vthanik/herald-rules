id: AD0095
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: Within a study, all TRTAN values must be the same for each unique value
  of TRTA when the primary variable TRTA is populated.
scope:
  classes: []
  domains:
    - BDS
    - ADAMOTHER
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for TRTAN
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0095
  pmda_category: Error
  ig_versions: []

