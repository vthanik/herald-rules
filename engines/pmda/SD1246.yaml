id: SD1246
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Time Point Reference (--TPTREF) variable must be included into the domain
  when Planned Elapsed Time from Time Point Ref (--ELTM) variable is present.
scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
  Use_Case: INDH, PROD
check:
  all:
    - name: --ELTM
      operator: exists
    - name: --TPTREF
      operator: not_exists
outcome:
  message: Missing --TPTREF variable when --ELTM variable is present
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1246
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000167

