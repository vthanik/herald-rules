Core:
  Id: FDAV-SD0057
  Status: Reference
  Version: '1'
Description: Variables described in SDTM IG as Expected should be included in the
  dataset.
Check:
  all:
    - name: variable_name
      operator: not_contains_all
      value: $expected_variables
Outcome:
  Message: SDTM Expected variable not found
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: ''
Standard: SDTM
Publisher ID: CG0016
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
  - SENDIG-AR 1.0
CORE Reference: CORE-000334
Executability: Fully Executable
Scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
  Use_Case: INDH, PROD, NONCLIN

