id: SD1049
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Qualifier Variable Label (QLABEL) value may have up to 40 characters.
scope:
  Classes:
    Include: RELATIONSHIP
  Domains:
    Include: SUPP--
  Use_Case: INDH, PROD
check:
  all:
    - name: QLABEL
      operator: longer_than
      value: 40
outcome:
  message: Invalid value for QLABEL
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1049
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000222

