id: HRL-SD-0503
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Fully Executable
description: '''Diagnosis Group'' (TDIGRP) record must be populated in Trial Summary
  (TS) domain, when study population is unhealthy subjects (HLTSUBJI = ''N''). It
  is expected for SDTM IG v3.1.2 data and required for data in all more recent SDTM
  versions.'
scope:
  classes:
    - TRIAL DESIGN
  domains:
    - TS
check:
  all:
    - name: TSPARMCD
      operator: variable_exists
      value: TDIGRP
outcome:
  message: Missing TDIGRP Trial Summary Parameter
  severity: Error
provenance:
  p21_id: SD2211
  core_id: ~
  cg_ids:
    - CG0287
  fda_ids: []
  source_doc: SDTM-IG v3.3

