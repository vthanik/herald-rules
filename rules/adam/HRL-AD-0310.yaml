id: HRL-AD-0310
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Within a study, all REGIONy (Geographic Region y) variable values must
  be the same for each unique value of REGIONyN (Geographic Region y (N)), when variable
  REGIONyN is populated
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: REGIONVARIABLEN
      operator: non_empty
    - name: '%Variables[REGION#]%'
      operator: all_values_equal
      group_by: STUDYID,REGION%Variable.1%N
outcome:
  message: Inconsistent value for REGION%Variable.1%
  severity: Error
provenance:
  p21_id: AD0355
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

