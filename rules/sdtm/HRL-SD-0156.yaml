id: HRL-SD-0156
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: All values of a Parameter (--PARM) variables should be the same for a
  given value of a Parameter Short Name (--PARMCD) variables.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: --PARM
      operator: non_empty
    - name: '%Domain%PARM'
      operator: all_values_equal
      group_by: '%Domain%PARMCD'
outcome:
  message: Inconsistent value for %Domain%PARM within %Domain%PARMCD
  severity: Error
provenance:
  p21_id: SD1069
  core_id: ~
  cg_ids:
    - CG0307
  fda_ids:
    - FDAB009
  source_doc: SDTM-IG v3.3

