# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.11.2
id: HRL-DD-032
version: 2
status: Published
standard: Define-XML
category: Dataset Definition
sensitivity: Dataset
executability: Fully Executable
description: >
  Class name must be a valid CDISC Controlled Terminology value for General Observation Class.
scope:
  classes: []
  domains: []
check:
  all:
    - name: class
      operator: empty
    - name: class
      operator: in
      value:
        - SPECIAL PURPOSE
        - INTERVENTIONS
        - EVENTS
        - FINDINGS
        - FINDINGS ABOUT
        - RELATIONSHIP
        - STUDY REFERENCE
        - TRIAL DESIGN
        - ASSOCIATED PERSONS
        - SUBJECT LEVEL ANALYSIS DATASET
        - BASIC DATA STRUCTURE
        - OCCURRENCE DATA STRUCTURE
        - ADAM OTHER
        - INTEGRATED SUBJECT LEVEL
        - DEVICE
outcome:
  message: "Class value is not a valid CDISC General Observation Class. Class is case-sensitive and controlled by a non-extensible codelist."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.11.2"
  cited_guidance: >
    Name -- Required. Text must follow CDISC Controlled Terminology for General Observation Class.

tests:
  - name: "HRL-DD-032 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-032 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

