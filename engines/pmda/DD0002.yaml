id: DD0002
version: 1
status: Reference
standard: Define-XML
category: Define-XML
sensitivity: Record
executability: Partially Executable
description: 'Define.xml must reference the following namespaces: 1) CDISC ODM xmlns="http://www.cdisc.org/ns/odm/v1.3"
  for Define-XML v2.0 and v2.1 or xmlns="http://www.cdisc.org/ns/odm/v1.2" for Define-XML
  v1.0; 2) CDISC Define xmlns:def="http://www.cdisc.org/ns/def/v2.1" for Define-XML
  v2.1, xmlns:def="http://www.cdisc.org/ns/def/v2.0" for Define-XML v2.0 or xmlns:def="http://www.cdisc.org/ns/def/v1.0"
  for Define-XML v1.0; 3) XML Schema Instance xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance";
  and 4) XLink xmlns:xlink="http://www.w3.org/1999/xlink". The XML Schema Instance
  namespace is only required when a local schema is provided, while the XLink namespace
  is only required when external documents are provided.'
scope:
  classes: []
  domains: Reject
check:
  all:
    - name: __see_description__
      operator: manual_review
outcome:
  message: Missing or invalid <namespace> namespace reference
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: DD0002
  pmda_category: X
  ig_versions: []

