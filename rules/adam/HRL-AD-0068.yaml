id: HRL-AD-0068
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Within a study, All TRTP values must be the same for each unique value
  of TRTPN when primary variable TRTP is populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: TRTP
      operator: non_empty
    - name: TRTP
      operator: all_values_equal
      group_by: STUDYID,TRTPN
outcome:
  message: Inconsistent value for TRTP
  severity: Error
provenance:
  p21_id: AD0093
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.0

