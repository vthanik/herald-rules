id: HRL-AD-0307
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Within a Study and a Parameter, all AyHIC (Analysis Range y Upper Limit
  (C)) variable values must be the same for each unique value of AyHI (Analysis Range
  y Upper Limit), when variable AyHI is populated
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: AVARIABLEHI
      operator: non_empty
    - name: '%Variables[A#HIC]%'
      operator: all_values_equal
      group_by: STUDYID,PARAMCD,A%Variable.1%HI
outcome:
  message: Inconsistent value for A%Variable.1%HIC
  severity: Error
provenance:
  p21_id: AD0351
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

