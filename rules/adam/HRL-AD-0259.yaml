id: HRL-AD-0259
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Across studies, All AREL must be the same for each unique value of ARELN,
  when both variables are populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: AREL
      operator: non_empty
    - name: ARELN
      operator: non_empty
    - name: AREL
      operator: all_values_equal
      group_by: ARELN
outcome:
  message: Inconsistent value for AREL
  severity: Error
provenance:
  p21_id: AD0289B
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

