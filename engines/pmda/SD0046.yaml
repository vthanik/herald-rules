id: SD0046
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: All values of Qualifier Variable Label (QLABEL) should be the same for
  a given value of Qualifier Variable Name (QNAM).
scope:
  classes: []
  domains: SUPPQUAL
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for QLABEL within QNAM
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0046
  pmda_category: Error
  ig_versions: []

