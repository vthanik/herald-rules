id: HRL-SD-0042
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Dataset
executability: Fully Executable

description: >
  The --SEQ variable must be unique within USUBJID for each domain. The sequence number must uniquely identify each record for a given subject within a domain.

scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
  domains:
    []

check:
  all:
    - name: {domain_prefix}SEQ
      operator: is_unique
      group_by: USUBJID

outcome:
  message: "{domain_prefix}SEQ value '{value}' is duplicated for USUBJID '{USUBJID}' in {DOMAIN}"
  severity: Error

provenance:
  p21_id: SD0042
  core_id: CORE-000293
  cg_ids:
    - CG0042
  fda_ids:
    []
  source_doc: "SDTM-IG v3.3 Section 4.1.4"
