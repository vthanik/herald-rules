id: HRL-SD-0256
version: 1
status: Published
standard: SDTM
category: Format
sensitivity: Record
executability: Partially Executable
description: Value level datatype must match the datatype described in define.xml.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - any:
        - name: VARIABLE
          operator: is_empty
    - name: +%Variables.@Clause.DataType:date|datetime|time|integer|float|text%
      operator: non_empty
outcome:
  message: '%Variable% datatype is not %Variable.@Clause.DataType% when %Variable.@Clause.Expression%'
  severity: Error
provenance:
  p21_id: SD1230
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

