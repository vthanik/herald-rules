id: HRL-DD-014
version: 1
status: Published
standard: Define-XML
category: ARM Metadata
sensitivity: Study
executability: Reference
description: >
  When ParameterOID is included in a arm:AnalysisResult, then at least one of the children arm:AnalysisDataset elements must be a BDS and the ParameterOID must reference a PARAMCD variable for that dataset.
scope:
  classes: []
  domains: []
check: []
outcome:
  message: Improper use of ParameterOID
  severity: Error
provenance:
  source_doc: P21 ADaM Validation Rules v1.2 (Define-XML)
  authority: Herald
  p21_reference: DD0093

tests:
  - name: "HRL-DD-014 — nominal compliant record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-014 — nominal violating record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

