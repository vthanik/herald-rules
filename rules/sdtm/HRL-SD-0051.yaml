id: HRL-SD-0051
version: 1
status: Published
standard: SDTM
category: Terminology
sensitivity: Record
executability: Partially Executable
description: Value for the Dictionary-Derived Term (--DECOD) variable must be populated
  using a Preferred Term of the MedDRA dictionary of a version specified in the define.xml
  (Case-insensitive).
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: '%Variables[--DECOD]%'
      operator: non_empty
outcome:
  message: Value for %Domain%DECOD not found in MedDRA dictionary
  severity: Error
provenance:
  p21_id: SD0008
  core_id: ~
  cg_ids:
    - CG0379
  fda_ids:
    - FDAB003
  source_doc: SDTM-IG v3.3

