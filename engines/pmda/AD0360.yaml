id: AD0360
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: Within a study, Cause of Death(N) (DTHCAUSN) variable values must be
  the same for each unique value of Cause of Death (DTHCAUS) variable when the primary
  variable DTHCAUS is populated.
scope:
  classes: []
  domains:
    - ADSL
    - ADDL
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for DTHCAUSN
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0360
  pmda_category: Error
  ig_versions: []

