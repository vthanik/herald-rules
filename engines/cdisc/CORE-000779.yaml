Check:
  all:
    - name: TDSTOFF
      operator: not_equal_to
      value: 0
    - name: TDSTOFF
      operator: not_matches_regex
      value: ^P(?=\d+[YMWD])(\d+Y)?(\d+M)?(\d+W)?(\d+D)?(T(?=\d+[HMS])(\d+H)?(\d+M)?(\d+S)?)?$
Core:
  Id: CORE-000779
  Status: Published
  Version: '1'
Description: TDSTOFF must be equal to 0 or a positive value in ISO 8601 Duration format
Executability: Fully Executable
Outcome:
  Message: TDSTOFF is not equal to zero or a positive value in ISO 8601 Duration format
