Core:
  Id: FDAV-SD0002
  Status: Reference
  Version: '1'
Description: Required variables (where Core attribute is 'Req') cannot be NULL for
  any records.
Check:
  all:
    - name: $required_variables
      operator: exists
    - name: variable_name
      operator: is_contained_by
      value: $required_variables
    - name: variable_value
      operator: empty
Outcome:
  Message: NULL value in variable marked as Required
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: ''
Standard: SDTM
Publisher ID: CG0014, CG0208, 12, 257
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
  - SENDIG 3.0
  - SENDIG 3.1
  - SENDIG 3.1.1
  - SENDIG-AR 1.0
  - SENDIG-DART 1.1
CORE Reference: CORE-000356
Executability: Fully Executable
Scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
  Use_Case: INDH, PROD, NONCLIN

