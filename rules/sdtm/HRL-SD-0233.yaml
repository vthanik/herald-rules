id: HRL-SD-0233
version: 1
status: Published
standard: SDTM
category: Limit
sensitivity: Record
executability: Fully Executable
description: Start Date/Time of Treatment (EXSTDTC) variable value must be less than
  or equal to Date/Time of Last Study Treatment (RFXENDTC).
scope:
  classes:
    - INTERVENTIONS
  domains:
    - EX
check:
  all:
    - name: SUB:RFXENDTC
      operator: greater_than
      value: eq EXSTDTC
    - name: SUB:RFXENDTC
      operator: non_empty
    - name: EXSTDTC
      operator: non_empty
outcome:
  message: EXSTDTC date is after RFXENDTC
  severity: Error
provenance:
  p21_id: SD1206
  core_id: ~
  cg_ids:
    - CG0147
  fda_ids:
    - FDAB034
  source_doc: SDTM-IG v3.3

