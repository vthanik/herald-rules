id: HRL-SD-0562
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Partially Executable
description: Start Study Date/Time (--STDTC) variable should be included into dataset,
  when Study Day of Start (--STDY) variable is present.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
