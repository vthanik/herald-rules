Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If TMPCTDF (Percent Diff. Nominal vs. Actual Time) is populated,
                  both ARRLT (Actual Time Relative to Reference) and NRRLT (Nominal
                  Time Relative to Reference) must also be populated.
                Document: ADaM IG v1.1
                Section: "7.2"
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-662
              Version: "1"
            Version: "1.0"
        Version: "1.1"
Check:
  all:
    - name: TMPCTDF
      operator: non_empty
    - name: ARRLT
      operator: empty
    - name: NRRLT
      operator: empty
Core:
  Id: ADaM-662
  Status: Published
  Version: "1"
Description: >-
  If TMPCTDF (Percent Diff. Nominal vs. Actual Time) is populated, both
  ARRLT (Actual Time Relative to Reference) and NRRLT (Nominal Time Relative
  to Reference) must also be populated.
Executability: Fully Executable
Outcome:
  Message: "TMPCTDF is populated and ARRLT or NRRLT are not populated"
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BASIC DATA STRUCTURE
  Domains:
    Include:
      - ADNCA
Sensitivity: Record
herald:
  source: CDISC ADaM Validation Rules XML (September 2015)
  catalogs:
    - ADaMIG 1.1
  fetched: "2026-04-12"

tests:
  - name: TMPCTDF with ARRLT and NRRLT present (valid)
    type: positive
    datasets:
      ADNCA:
        variables: [STUDYID, USUBJID, PARAMCD, TMPCTDF, ARRLT, NRRLT]
        records:
          - [CDISCPILOT01, 01-701-1015, CONC, 5.2, 10.5, 10.0]
    expected_findings: 0
  - name: TMPCTDF present but ARRLT and NRRLT missing (violation)
    type: negative
    datasets:
      ADNCA:
        variables: [STUDYID, USUBJID, PARAMCD, TMPCTDF, ARRLT, NRRLT]
        records:
          - [CDISCPILOT01, 01-701-1015, CONC, 5.2, "", ""]
    expected_findings: 1
