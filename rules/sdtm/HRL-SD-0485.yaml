id: HRL-SD-0485
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Partially Executable
description: Value for Parameter Value (--VAL) variable must be populated. --VAL can
  only be null when Parameter Null Flavor (--VALNF) variable value is populated.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: --VAL
      operator: non_empty
    - name: --VALNF
      operator: is_empty
outcome:
  message: Missing values for both %Domain%VAL and %Domain%VALNF
  severity: Error
provenance:
  p21_id: SD2017
  core_id: ~
  cg_ids:
    - CG0259
    - CG0260
  fda_ids: []
  source_doc: SDTM-IG v3.3

