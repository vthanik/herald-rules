id: HRL-SD-0365
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: The structure of Interventions class domains should be one record per
  Intervention Episode per subject. No Interventions with the same Treatment (--TRT),
  Decoded Term (--DECOD), Category (--CAT), Subcategory (--SCAT), Route (--ROUTE),
  Location (--LOC) and Treatment Vehicle (--TRTV) values for the same Subject (USUBJID)
  and the same Start Date (--STDTC) are expected.
scope:
  classes:
    - FINDINGS
  domains:
    - SC
check:
  all:
    - name: --TRT
      operator: non_empty
    - name: '%Domain%STDTC'
      operator: is_unique
      group_by: USUBJID,POOLID,SPDEVID,%Domain%TRT,%Domain%DECOD,%Domain%CAT,%Domain%SCAT,%Domain%ROUTE,%Domain%LOC,%Domain%LAT,%Domain%DIR,%Domain%TRTV,%Domain%ENDTC,%Domain%TPT,%Domain%TPTNUM
outcome:
  message: Duplicate records in %Domain% domain
  severity: Error
provenance:
  p21_id: SD1352
  core_id: ~
  cg_ids:
    - CG0019
  fda_ids: []
  source_doc: SDTM-IG v3.3

