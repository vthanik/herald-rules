id: SD1271
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: The combination of Description of Element (ELEMENT), Rule for Start of
  Element (TESTRL), Rule for End of Element (TEENRL), and Planned Duration of Element
  (TEDUR) should be unique for each Element Code (ETCD).
scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include: TE
  Use_Case: INDH
check:
  any:
    - name: ETCD
      operator: is_not_unique_set
      value:
        - ELEMENT
        - TESTRL
        - TEENRL
        - TEDUR
    - all:
        - name: ETCD
          operator: is_unique_set
          value:
            - ELEMENT
            - TESTRL
            - TEENRL
            - TEDUR
        - name: ELEMENT
          operator: is_not_unique_set
          value:
            - TESTRL
            - TEENRL
            - TEDUR
        - name: TESTRL
          operator: is_not_unique_set
          value:
            - ELEMENT
            - TEENRL
            - TEDUR
        - name: TEENRL
          operator: is_not_unique_set
          value:
            - ELEMENT
            - TESTRL
            - TEDUR
        - name: TEDUR
          operator: is_not_unique_set
          value:
            - ELEMENT
            - TEENRL
            - TESTRL
outcome:
  message: The combination of ELEMENT, TESTRL TEENRL, and TEDUR is not unique for
    each ETCD
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1271
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000580

