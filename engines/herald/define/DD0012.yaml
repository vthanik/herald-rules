# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 4.1.1
id: DD0012
version: 1
status: Published
standard: Define-XML
category: Standards Reference
sensitivity: Dataset
executability: Fully Executable
description: >
  Standard column must use a recognized standard name and version format.
scope:
  classes: []
  domains: []
check:
  all:
    - name: standard
      operator: not_empty
    - name: standard
      operator: not_matches_regex
      value: "^(SDTMIG|SDTMIG-MD|SDTMIG-AP|SDTMIG-PGx|SENDIG|SENDIG-DART|ADaMIG)\\s+\\d"  
outcome:
  message: "Standard does not match expected format '<Name> <Version>'. Must use allowable standard names (SDTMIG, ADaMIG, SENDIG, etc.)."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "4.1.1"
  cited_guidance: >
    Allowable Names: SDTMIG, SDTMIG-MD, SDTMIG-AP, SDTMIG-PGx, SENDIG, SENDIG-DART, ADaMIG.
