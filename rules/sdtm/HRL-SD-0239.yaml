id: HRL-SD-0239
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Subject Reference Start Date/Time (RFSTDTC) should be populated for all
  treated subjects, those where Actual Arm Code (ACTARMCD) is not equal to 'SCRNFAIL',
  'NOTASSGN', 'NOTTRT', or null.
scope:
  classes:
    - FINDINGS
  domains:
    - SC
check:
  all:
    - name: ACTARMCD
      operator: non_empty
    - name: RFSTDTC
      operator: non_empty
outcome:
  message: RFSTDTC is not provided for a treated subject
  severity: Error
provenance:
  p21_id: SD1213
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB038
  source_doc: SDTM-IG v3.3

