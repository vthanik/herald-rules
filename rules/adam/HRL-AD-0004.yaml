id: HRL-AD-0004
version: 1
status: Published
standard: ADaM
category: Presence
sensitivity: Record
executability: Fully Executable

description: >
  SITEID must not be empty in ADSL. The study site identifier is a required variable in the ADaM Subject-Level Analysis Dataset.

scope:
  classes:
    - ADSL
  domains:
    - ADSL

check:
  all:
    - name: SITEID
      operator: non_empty

outcome:
  message: "SITEID is empty or missing in ADSL for subject '{USUBJID}'"
  severity: Error

provenance:
  p21_id: AD0004
  core_id: null
  cg_ids:
    - CG0104
  fda_ids:
    - FDA-AD-004
  source_doc: "ADaM-IG v1.3 Section 3.1"
