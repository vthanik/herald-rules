id: AD0326
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: Within a Study and a Period, all Subperiod within Period (C) (ASPERC)
  variable values must be the same for each unique value of Subperiod within Period
  (ASPER) variable when the primary variable ASPER is populated.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - OCCDS
    - ADAE
    - MDOCCDS
    - ADAMOTHER
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for ASPERC
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0326
  pmda_category: Error
  ig_versions: []

