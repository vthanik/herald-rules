Check:
  all:
    - name: --STRESC
      operator: non_empty
    - name: --LOBXFL
      operator: equal_to
      value: 'Y'
      value_is_literal: yes
    - name: --LOBXFL
      operator: is_not_unique_set
      value:
        - --TESTCD
        - --CAT
        - --SCAT
        - --SPEC
        - --METHOD
        - USUBJID
Core:
  Id: CORE-000915
  Status: Published
  Version: '1'
Description: There should be only one record with a last observation before exposure
  flag and non missing character standard result value having the same --TESTCD, --CAT,
  --SCAT, --SPEC, --METHOD values.
Executability: Fully Executable
Outcome:
  Message: There are multiple records per assigned last observation before exposure
    flag (--LOBXFL).
  Output_Variables:
    - --TESTCD
    - --CAT
    - --SCAT
    - --SPEC
    - --METHOD
    - --LOBXFL
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - FINDINGS
  Domains:
    Include:
      - ALL
Sensitivity: Record
