id: SD1096
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Not Executable
description: 'SAS v5 export format has a limitation on variables length up to 200
  characters. If the collected value was more than 200 characters, then SUPPQUAL dataset
  should be used to store additional 200+ characters. Variable QNAM should have --TERM1,
  ---TERM2, etc. values for those records. Value splitting should be performed between
  words or numbers. See SDTM IG #4.1.5.3.2 for details. This risk-assessment check
  is triggered based on assumption that if original value was truncated, then the
  actual data value length is exactly 200 characters.'
scope:
  classes: []
  domains: EVENTS
check: []
outcome:
  message: High risk of truncated value for --TERM variable
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1096
  pmda_category: Warning
  ig_versions: []

