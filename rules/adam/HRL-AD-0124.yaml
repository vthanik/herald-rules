id: HRL-AD-0124
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Within a study, All SHIFTy values must be the same for each unique value
  of SHIFTyN when PARAMCD and primary variable SHIFTy are populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: PARAMCD
      operator: non_empty
    - name: SHIFTVARIABLE
      operator: non_empty
    - name: '%Variables[SHIFT#]%'
      operator: all_values_equal
      group_by: STUDYID,PARAMCD,SHIFT%Variable.1%N
outcome:
  message: Inconsistent value for SHIFT%Variable.1%
  severity: Error
provenance:
  p21_id: AD0135
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.0

