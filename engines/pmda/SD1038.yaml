id: SD1038
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Sequence Number (TSSEQ) must have a unique value for a given value of
  Trial Summary Parameter Short Name (TSPARMCD) within the domain.
scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include: TS
  Use_Case: INDH, NONCLIN
check:
  all:
    - name: TSPARMCD
      operator: is_not_unique_set
      value: DOMAIN
    - name: TSSEQ
      operator: is_not_unique_set
      value: TSPARMCD
outcome:
  message: Non-unique value for TSSEQ variable within TSPARMCD
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1038
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000154

