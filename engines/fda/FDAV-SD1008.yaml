Core:
  Id: FDAV-SD1008
  Status: Reference
  Version: '1'
Description: The value of Date/Time of Comment (CODTC) should be NULL, when comments
  are related to a specific parent record or group of parent records in a domain (RDOMAIN,
  IDVAR and IDVARVAL are populated).
Check:
  all:
    - name: IDVAR
      operator: non_empty
    - name: CODTC
      operator: non_empty
Outcome:
  Message: CODTC is populated, when comment is a child record of another domain
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: CO
Standard: SDTM
Publisher ID: CG0168, 120
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
  - SENDIG 3.0
CORE Reference: CORE-000187
Executability: Fully Executable
Scope:
  Classes:
    Include: SPECIAL PURPOSE
  Domains:
    Include: CO
  Use_Case: INDH

