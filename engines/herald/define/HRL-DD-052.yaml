# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.9.2
id: HRL-DD-052
version: 2
status: Published
standard: Define-XML
category: Variable Definition
sensitivity: Record
executability: Fully Executable
description: >
  Mandatory must be 'Yes' or 'No'.
scope:
  classes: []
  domains: []
check:
  all:
    - name: mandatory
      operator: empty
    - name: mandatory
      operator: in
      value:
        - "Yes"
        - "No" 
outcome:
  message: "Mandatory has an invalid value. Must be 'Yes' or 'No'."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.9.2"
  cited_guidance: >
    Mandatory -- Required. 'Yes', 'No'.

tests:
  - name: "HRL-DD-052 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-052 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

