Core:
  Id: FDAV-SD1354
  Status: Reference
  Version: '1'
Description: Arm Code (ARMCD) values defined in Trial Arms (TA) should be assigned
  to at least one subject (USUBJID) in Demographics (DM).
Check:
  all:
    - name: ARMCD
      operator: is_not_contained_by
      value:
        - SCRNFAIL
        - NOTASSGN
    - name: ARMCD
      operator: is_not_contained_by
      value: $armcd_list
Outcome:
  Message: ARMCD value not present in DM
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: TA
Standard: SDTM
Publisher ID: CG0126, 107
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
  - SENDIG 3.0
  - SENDIG 3.1
  - SENDIG 3.1.1
  - SENDIG-AR 1.0
  - SENDIG-DART 1.1
CORE Reference: CORE-000531
Executability: Fully Executable
Scope:
  Classes:
    Include: SPECIAL PURPOSE
  Domains:
    Include: DM

