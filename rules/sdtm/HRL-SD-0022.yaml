id: HRL-SD-0022
version: 1
status: Published
standard: SDTM
category: Terminology
sensitivity: Value
executability: Fully Executable

description: >
  AEREL must be in controlled terminology in the AE domain. The causality assessment must use standard terminology per CDISC CT codelist C66767.

scope:
  classes:
    - EVENTS
  domains:
    - AE

check:
  all:
    - name: AEREL
      operator: in
      value:
        - "NOT RELATED"
        - "UNLIKELY RELATED"
        - "POSSIBLY RELATED"
        - RELATED

outcome:
  message: "AEREL value '{AEREL}' is not in CDISC CT codelist C66767 in AE"
  severity: Error

provenance:
  p21_id: CT0022
  core_id: CORE-000273
  cg_ids:
    - CG0022
  fda_ids:
    []
  source_doc: "SDTM-IG v3.3 Section 6.2.1, CDISC CT C66767"
