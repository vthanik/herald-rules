Check:
  all:
    - name: SSSTRESC
      operator: equal_to
      value: DEAD
      value_is_literal: yes
    - name: $ds_dsdecod
      operator: does_not_contain
      value: DEATH
      value_is_literal: yes
Core:
  Id: CORE-000251
  Status: Published
  Version: '1'
Description: When survival status is completed as 'DEAD' in the SS dataset then a
  record should be present in the DS dataset where DSDECOD = 'DEATH' for the corresponding
  subject.
Executability: Fully Executable
Operations:
  - domain: DS
    group:
      - USUBJID
    id: $ds_dsdecod
    name: DSDECOD
    operator: distinct
Outcome:
  Message: SSTRESC in SS dataset is "DEAD", but a record is missing in DS dataset
    where DSDECOD = "DEATH".
  Output_Variables:
    - SSSTRESC
    - $ds_dsdecod
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - FINDINGS
  Domains:
    Include:
      - SS
Sensitivity: Record
herald:
  source: CDISC Library API
  catalogs:
