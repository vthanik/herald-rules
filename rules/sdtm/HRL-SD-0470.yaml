id: HRL-SD-0470
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: MedDRA coding info should be populated using variables in the Events
  General Observation Class, but not in SUPPQUAL domains.
scope:
  classes:
    - FINDINGS
  domains:
    - RE
check:
  all:
    - any:
        - name: QLABEL
          operator: equal_to_case_insensitive
          value: High Level Group Term
        - name: QLABEL
          operator: equal_to_case_insensitive
          value: High Level Term
        - name: QLABEL
          operator: equal_to_case_insensitive
          value: Lowest Level Term
        - name: QLABEL
          operator: equal_to_case_insensitive
          value: Lowest Level Term Code
        - name: QLABEL
          operator: equal_to_case_insensitive
          value: Preferred Term Code
        - name: QLABEL
          operator: equal_to_case_insensitive
          value: High Level Term Code
        - name: QLABEL
          operator: equal_to_case_insensitive
          value: High Level Group Term Code
        - name: QLABEL
          operator: equal_to_case_insensitive
          value: '''System Organ Class Code'')'
    - name: RDOMAIN
      operator: equal_to
      value: AE
    - name: RDOMAIN
      operator: equal_to
      value: MH
    - name: RDOMAIN
      operator: equal_to
      value: CE
outcome:
  message: Unexpected MedDRA coding in the SUPPQUAL domain
  severity: Error
provenance:
  p21_id: SD2006
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB003
  source_doc: SDTM-IG v3.3

