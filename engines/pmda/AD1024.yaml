description: 'When validating ADaM datasets, the DM dataset must also be included
  to ensure traceability. Note: For the final submission the eCTD structure should
  be maintained. Therefore, the SDTM and ADaM datasets should be submitted in their
  appropriate locations. Do not include the DM dataset in the ../analysis/adam/datasets
  folder.'
