Core:
  Id: FDAV-SD0035
  Status: Reference
  Version: '1'
Description: Dose Units (--DOSU) must be populated, when Dose per Administration (--DOSE),
  Dose Description (--DOSTXT) or Total Daily Dose (--DOSTOT) is provided.
Check:
  all:
    - name: --DOSU
      operator: empty
    - any:
        - name: --DOSE
          operator: non_empty
        - name: --DOSTXT
          operator: non_empty
        - name: --DOSTOT
          operator: non_empty
Outcome:
  Message: Missing value for --DOSU, when --DOSE, --DOSTXT or --DOSTOT is provided
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: INTERVENTIONS
Standard: SDTM
Publisher ID: CG0114
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
  - SENDIG 3.0
  - SENDIG 3.1
  - SENDIG 3.1.1
  - SENDIG-AR 1.0
  - SENDIG-DART 1.1
CORE Reference: CORE-000093
Executability: Fully Executable
Scope:
  Classes:
    Include: INTERVENTIONS
  Domains:
    Include: ALL
  Use_Case: INDH

