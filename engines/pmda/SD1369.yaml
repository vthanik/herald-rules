id: SD1369
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Reference Result in Standard Format (--STREFC) should be populated when
  Reference Result in Original Units (--ORREF) is populated.
scope:
  Classes:
    Include: FINDINGS
  Domains:
    Include: ALL
  Use_Case: INDH, PROD
check:
  all:
    - any:
        - name: --ORREF
          operator: non_empty
        - name: --DRVFL
          operator: equal_to
          value: 'Y'
    - name: --STREFC
      operator: empty
outcome:
  message: --STREFC is null when --ORREF is populated
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1369
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000110

