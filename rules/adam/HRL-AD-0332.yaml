id: HRL-AD-0332
version: 1
status: Published
standard: ADaM
category: Presence
sensitivity: Record
executability: Fully Executable
description: APHASE generally is a higher-level categorization of APERIOD. APHASE
  Does not replace APERIOD because APERIOD provides the indexing for the TRxx and
  APxx variables.  ADaM IG v1.0 p.25.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: VARIABLE
      operator: variable_exists
      value: APERIOD
outcome:
  message: APHASE is present but APERIOD is not present
  severity: Error
provenance:
  p21_id: AD1015
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: P21 Community ADaM-IG 1.0 (PMDA)

