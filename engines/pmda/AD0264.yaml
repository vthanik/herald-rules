  domains:
    - ADSL
    - BDS
    - OCCDS
    - ADAE
    - ADAMOTHER
check: []
outcome:
  message: '*TMF is populated, but *TM is not populated'
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0264
  pmda_category: Error
  ig_versions: []

