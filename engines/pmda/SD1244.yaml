id: SD1244
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Planned Time Point Name (--TPT) variable must be included into the domain
  when Planned Time Point Number (--TPTNUM) variable is present.
scope:
  classes: []
  domains:
    - SPECIALPURPOSE(-DM
    - -SE
    - -SV)
    - INTERVENTIONS
    - FINDINGS(-DO)
    - EVENTS
    - FINDINGSABOUT
check:
  all:
    - name: __required_variable__
      operator: exists
outcome:
  message: Missing --TPT variable when --TPTNUM variable is present
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1244
  pmda_category: Error
  ig_versions: []

