id: HRL-SD-0370
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Fully Executable
description: Disease Milestone Instance Date/Time (MIDSDTC) variable should not be
  present in the domain, when the Disease Milestone Instance Name (MIDS) variable
  is missing.
scope:
  classes:
    - FINDINGS
  domains:
    - MI
check:
  all:
    - name: VARIABLE
      operator: variable_exists
      value: MIDS
outcome:
  message: MIDSDTC variable is present when MIDS variable is missing
  severity: Error
provenance:
  p21_id: SD1357
  core_id: ~
  cg_ids:
    - CG0503
  fda_ids: []
  source_doc: SDTM-IG v3.3

