id: HRL-SD-0011
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Fully Executable

description: >
  ARM must not be empty when ARMCD is present in the DM domain. If a subject has an arm code, the full arm description must also be populated.

scope:
  classes:
    - SPECIAL-PURPOSE
  domains:
    - DM

check:
  all:
    - name: ARM
      operator: non_empty
      when:
        name: ARMCD
        operator: non_empty

outcome:
  message: "ARM is empty but ARMCD is populated for subject '{USUBJID}' in DM"
  severity: Error

provenance:
  p21_id: SD0011
  core_id: CORE-000262
  cg_ids:
    - CG0011
  fda_ids:
    []
  source_doc: "SDTM-IG v3.3 Section 5.1"
