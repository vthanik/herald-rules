id: HRL-SD-0171
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Partially Executable
description: Study Day of Start (--STDY) variable value should be not be imputed.
  It may be only populated, when both Start Study Date/Time (--STDTC) and Subject
  Reference Start Date/Time (RFSTDTC) variables values are provided, and both of them
  include complete date part.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: --STDY
      operator: is_empty
    - name: POOLID
      operator: is_empty
outcome:
  message: '%Domain%STDY variable value is imputed'
  severity: Error
provenance:
  p21_id: SD1089
  core_id: ~
  cg_ids:
    - CG0221
  fda_ids: []
  source_doc: SDTM-IG v3.3

