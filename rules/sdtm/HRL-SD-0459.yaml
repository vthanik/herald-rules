id: HRL-SD-0459
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Standardized Result in Numeric Format (--STRESN) variable value should
  be null when Standardized Result in Character Format (--STRESC) variable value does
  not represent a numeric value, (e.g. 'BLQ', value contains '<' or '>', etc.).
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: --STRESN
      operator: is_empty
    - name: --STRESC
      operator: non_empty
outcome:
  message: '%Domain%STRESN is populated when %Domain%STRESC value is not numeric'
  severity: Error
provenance:
  p21_id: SD1448
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB031
  source_doc: SDTM-IG v3.3

