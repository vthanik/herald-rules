id: HRL-SD-0257
version: 1
status: Published
standard: SDTM
category: Limit
sensitivity: Record
executability: Partially Executable
description: Value level length must not exceed the length as specified define.xml.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: +%Variables.@Clause.Length:/\d+/%
      operator: non_empty
outcome:
  message: '%Variable% value is longer than defined max length %Variable.@Clause.Length%
    when %Variable.@Clause.Expression%'
  severity: Error
provenance:
  p21_id: SD1231
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

