id: HRL-AD-0306
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Within a Study and a Parameter, all AyHI (Analysis Range y Upper Limit)
  variable values must be the same for each unique value of AyHIC  (Analysis Range
  y Upper Limit (C)), when variable AyHIC is populated
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: AVARIABLEHIC
      operator: non_empty
    - name: '%Variables[A#HI]%'
      operator: all_values_equal
      group_by: STUDYID,PARAMCD,A%Variable.1%HIC
outcome:
  message: Inconsistent value for A%Variable.1%HI
  severity: Error
provenance:
  p21_id: AD0350
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

