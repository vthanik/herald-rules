id: HRL-SD-0096
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Outcome of Adverse Event should equal 'FATAL', when Results in Death
  (AESDTH) is 'Y'.
scope:
  classes:
    - EVENTS
  domains:
    - AE
check:
  all:
    - any:
        - name: AEOUT
          operator: equal_to
          value: FATAL
        - name: AEOUT
          operator: equal_to
          value: ''''
outcome:
  message: Rule HRL-SD-0096 violation
  severity: Error
provenance:
  p21_id: SD0091
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: P21 rule SD0091

