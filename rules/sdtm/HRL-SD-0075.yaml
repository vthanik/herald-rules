id: HRL-SD-0075
version: 1
status: Published
standard: SDTM
category: Cross-reference
sensitivity: Record
executability: Partially Executable
description: All Unique Subject Identifier (USUBJID) + Visit Name (VISIT) + Visit
  Number (VISITNUM) combination values in data should be present in the Subject Visits
  (SV) domain. There is an exception for records, where Status (--STAT) variable value
  is populated. E.g., --STAT = 'NOT DONE'. Another exception is for records, where
  Occurrence (ECOCCUR) is 'N' in EC domain.
scope:
  classes:
    - INTERVENTIONS
  domains:
    - EC
check:
  all:
    - name: USUBJID
      operator: non_empty
    - name: VISIT
      operator: non_empty
    - name: VISITNUM
      operator: non_empty
    - name: --STAT
      operator: not_equal_to
      value: NOT DONE
    - name: ECOCCUR
      operator: not_equal_to
      value: 'N'
outcome:
  message: USUBJID/VISIT/VISITNUM values do not match SV domain data
  severity: Error
provenance:
  p21_id: SD0065
  core_id: ~
  cg_ids:
    - CG0034
  fda_ids: []
  source_doc: SDTM-IG v3.3

