id: HRL-SD-0165
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Partially Executable
description: Collection Study Day (--DY) variable should be included into dataset,
  when Collection Study Date/Time (--DTC) variable is present.
scope:
  classes:
    - FINDINGS
  domains:
    - DA
check:
  all:
    - name: VARIABLE
      operator: variable_exists
      value: '%Domain%DY'
outcome:
  message: Missing %Domain%DY variable, when %Domain%DTC variable is present
  severity: Error
provenance:
  p21_id: SD1083
  core_id: ~
  cg_ids: []
  fda_ids:
    - FDAB016
  source_doc: SDTM-IG v3.3

