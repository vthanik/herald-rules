id: HRL-AD-0281
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Within a Study, all APHASEN (Phase (N)) variable values must be the same
  for each unique value of APHASE (Phase), when primary variable APHASE is populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: APHASE
      operator: non_empty
    - name: APHASEN
      operator: all_values_equal
      group_by: STUDYID,APHASE
outcome:
  message: Inconsistent value for APHASEN
  severity: Error
provenance:
  p21_id: AD0323
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

