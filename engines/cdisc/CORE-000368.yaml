Check:
  all:
    - name: ARM
      operator: is_not_contained_by
      value:
        - Screen Failure
        - Not Assigned
        - SCREEN FAILURE
        - NOT ASSIGNED
    - name: ARM
      operator: is_not_contained_by
      value: $arm_list
Core:
  Id: CORE-000368
  Status: Published
  Version: '1'
Description: ARM values in Demographics are restricted to ARM values in Trial Arms
  when not equal to "Screen Failure" or "Not Assigned"
Executability: Fully Executable
Operations:
  - domain: TA
    id: $arm_list
    name: ARM
    operator: distinct
Outcome:
  Message: ARM is not in TA.ARM, but ARM in DM does not equal Screen Failure or Not
    Assigned.
  Output_Variables:
    - ARM
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - SPECIAL PURPOSE
  Domains:
    Include:
      - DM
Sensitivity: Record
