Core:
  Id: FDAV-SD2248
  Status: Reference
  Version: '1'
Description: TSVAL variable value must be in ISO 8601 format, when TSPARMCD='SENDTC'.
Check:
  all:
    - name: TSPARMCD
      operator: equal_to
      value: SENDTC
    - name: TSVAL
      operator: invalid_date
Outcome:
  Message: Invalid TSVAL value for SENDTC
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: TS
Standard: SDTM
Publisher ID: CG0286
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
CORE Reference: CORE-000506
Executability: Fully Executable
Scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include: TS

