# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.11
id: HRL-DD-043
version: 2
status: Published
standard: Define-XML
category: Dataset Definition
sensitivity: Dataset
executability: Fully Executable
description: >
  Purpose must be 'Tabulation' for SDTM/SEND or 'Analysis' for ADaM.
scope:
  classes: []
  domains: []
check:
  all:
    - name: purpose
      operator: empty
    - name: purpose
      operator: in
      value:
        - Tabulation
        - Analysis
outcome:
  message: "Purpose has an invalid value. Must be 'Tabulation' (SDTM/SEND) or 'Analysis' (ADaM)."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.11"
  cited_guidance: >
    Purpose -- Required. 'Tabulation', 'Analysis'. For SDTM and SEND, use Tabulation. For ADaM, use Analysis.

tests:
  - name: "HRL-DD-043 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-043 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

