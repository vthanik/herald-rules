id: SD2239
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Planned Time Point Name (--TPT) value must be consistent for all records
  with same Subject (USUBJID), Visit Num (VISITNUM), Object (--OBJ) and Assessment
  Date/Time (--DTC).
scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
  Use_Case: INDH
check:
  all:
    - name: VISITNUM
      operator: not_exists
    - name: --TPTREF
      operator: not_exists
    - name: --TPT
      operator: is_not_unique_relationship
      value: --TPTNUM
outcome:
  message: Inconsistent value for --TPT
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD2239
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000141

