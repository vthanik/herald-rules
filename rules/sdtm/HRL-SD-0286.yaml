id: HRL-SD-0286
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: MBRESCAT is expected to be populated in all records where a microorganism
  has been identified (MBTESTCD = 'ORGANISM'), excluding records where MBSTRESC equals
  'NO GROWTH' or MBMETHOD equals 'GRAM STAIN'.
scope:
  classes:
    - FINDINGS
  domains:
    - MB
check:
  all:
    - name: MBRESCAT
      operator: non_empty
    - name: MBTESTCD
      operator: equal_to
      value: ORGANISM
    - name: MBSTRESC
      operator: not_equal_to
      value: NO GROWTH
    - name: MBMETHOD
      operator: not_equal_to
      value: GRAM STAIN
outcome:
  message: MBRESCAT is null when MBTESTCD = 'ORGANISM'
  severity: Error
provenance:
  p21_id: SD1263
  core_id: ~
  cg_ids:
    - CG0193
  fda_ids: []
  source_doc: SDTM-IG v3.3

