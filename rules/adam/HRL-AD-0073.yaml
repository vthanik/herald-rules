id: HRL-AD-0073
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Within a study, All TRTA values must be the same for each unique value
  of TRTAN when primary variable TRTA is populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: TRTA
      operator: non_empty
    - name: TRTA
      operator: all_values_equal
      group_by: STUDYID,TRTAN
outcome:
  message: Inconsistent value for TRTA
  severity: Error
provenance:
  p21_id: AD0096
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.0

