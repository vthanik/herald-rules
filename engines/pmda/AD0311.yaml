id: AD0311
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: Across studies, all SMQ Scope (N) (SMQzzSCN) variable values must be
  the same for each unique value of SMQ Scope (SMQzzSC ) variable when the primary
  variable SMQzzSC is populated. The usual mapping is BROAD=1, NARROW=2.
scope:
  classes: []
  domains: ADAE
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for SMQzzSCN
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0311
  pmda_category: Error
  ig_versions: []

