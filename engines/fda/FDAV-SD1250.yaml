Core:
  Id: FDAV-SD1250
  Status: Reference
  Version: '1'
Description: Planned Time Point Number (--TPTNUM) variable must be included into the
  domain, when Planned Time Point Name (--TPT) variable is present.
Check:
  all:
    - name: --TPT
      operator: exists
    - name: --TPTNUM
      operator: not_exists
Outcome:
  Message: Missing --TPTNUM variable, when --TPT variable is present
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: ''
Standard: SDTM
Publisher ID: CG0468, 207
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
  - SENDIG 3.0
  - SENDIG 3.1
  - SENDIG 3.1.1
  - SENDIG-AR 1.0
  - SENDIG-DART 1.1
CORE Reference: CORE-000026
Executability: Fully Executable
Scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
  Use_Case: INDH, PROD

