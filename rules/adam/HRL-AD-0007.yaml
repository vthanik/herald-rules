id: HRL-AD-0007
version: 1
status: Published
standard: ADaM
category: Terminology
sensitivity: Value
executability: Fully Executable

description: >
  SAFFL must be in (Y, N) in ADSL. The safety population flag must contain only the values Y or N.

scope:
  classes:
    - ADSL
  domains:
    - ADSL

check:
  all:
    - name: SAFFL
      operator: in
      value:
        - "Y"
        - "N"

outcome:
  message: "SAFFL value '{SAFFL}' is not Y or N in ADSL for subject '{USUBJID}'"
  severity: Error

provenance:
  p21_id: AD0007
  core_id: null
  cg_ids:
    - CG0107
  fda_ids:
    - FDA-AD-007
  source_doc: "ADaM-IG v1.3 Section 3.1.3"
