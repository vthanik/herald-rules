id: SD1004
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: The value of Planned Arm Code (ARMCD) should be no more than 20 characters
  in length.
scope:
  Classes:
    Include:
      - SPECIAL PURPOSE
      - TRIAL DESIGN
  Domains:
    Include:
      - DM
      - TA
  Use_Case: INDH
check:
  all:
    - name: ARMCD
      operator: matches_regex
      value: ^(.){21,}$
outcome:
  message: Invalid value for ARMCD exceeding 20 characters
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1004
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000010

