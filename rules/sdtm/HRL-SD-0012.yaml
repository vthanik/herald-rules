id: HRL-SD-0012
version: 1
status: Published
standard: SDTM
category: Format
sensitivity: Value
executability: Fully Executable

description: >
  RFSTDTC must be a valid ISO 8601 date/datetime string in the DM domain. The reference start date must conform to ISO 8601 format.

scope:
  classes:
    - SPECIAL-PURPOSE
  domains:
    - DM

check:
  all:
    - name: RFSTDTC
      operator: is_valid_iso8601

outcome:
  message: "RFSTDTC value '{RFSTDTC}' is not a valid ISO 8601 date in DM"
  severity: Error

provenance:
  p21_id: SD0012
  core_id: CORE-000263
  cg_ids:
    - CG0012
  fda_ids:
    []
  source_doc: "SDTM-IG v3.3 Section 5.1"
