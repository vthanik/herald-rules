id: SD0069
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: All Demographics (DM) subjects (USUBJID) should have at least one record
  in the Disposition (DS) domain. The only possible exceptions for SDTMIG v3.2 (and
  earlier) are Screen Failures (ARMCD=SCRNFAIL) and Not Assigned Treatment (ARMCD=NOTASSGN)
  subjects, or subjects with ARMCD=null. If the study is ongoing, Parameter Value
  (TSVAL) for the 'ONGOSIND/Ongoing Study Indicator' parameter should be set to 'Y'
  in the Trial Summary (TS) domain.
scope:
  Classes:
    Include: ALL
  Domains:
    Include: DM
check:
  all:
    - name: ACTARMCD
      operator: is_not_contained_by
      value:
        - SCRNFAIL
        - NOTASSGN
        - NOTTRT
    - name: USUBJID
      operator: is_not_contained_by
      value: $ds_usubjid
outcome:
  message: No Disposition record found for subject
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0069
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000515

