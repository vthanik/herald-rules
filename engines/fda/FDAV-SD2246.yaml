Core:
  Id: FDAV-SD2246
  Status: Reference
  Version: '1'
Description: TSVAL variable value must be numeric, when TSPARMCD='NARMS'.
Check:
  all:
    - name: TSPARMCD
      operator: equal_to
      value: NARMS
    - any:
        - name: TSVAL
          operator: less_than_or_equal_to
          value: 0
        - name: TSVAL
          operator: not_matches_regex
          value: (-?[1-9]\d*|0)$
Outcome:
  Message: Invalid TSVAL value for NARMS
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: TS
Standard: SDTM
Publisher ID: CG0284
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
CORE Reference: CORE-000587
Executability: Fully Executable
Scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include: TS

