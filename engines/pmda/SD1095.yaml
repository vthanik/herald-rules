id: SD1095
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Split datasets must not have the name of original domain. E.g., lbhm.xpt
  is a valid name when lb.xpt is not a valid dataset name for split domain.
scope:
  Classes:
    Include: ALL
  Domains:
    Exclude:
      - SUPP--
      - AP--
    include_split_datasets: yes
check:
  any:
    - name: dataset_name
      operator: shorter_than
      value: 3
    - name: dataset_name
      operator: longer_than
      value: 4
outcome:
  message: Invalid dataset name for split domain
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1095
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000510

