id: HRL-AD-0239
version: 1
status: Published
standard: ADaM
category: Terminology
sensitivity: Record
executability: Partially Executable
description: An ADAE treatment flag variable must have a value that is Y or null.  Current
  flags are Treatment Emergent Analysis (TRTEMFL), Pre-treatment (PREFL), On-treatment
  (ONTRTFL), Follow-up (FUPFL), and Last value on-treatment (LVOTFL).
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: '%Variables[TRTEMFL,PREFL,FUPFL,ONTRTFL,LVOTFL]%'
      operator: in
      value: 'Y'
outcome:
  message: '%Variable% flag value is not Y or null'
  severity: Error
provenance:
  p21_id: AD0269
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

