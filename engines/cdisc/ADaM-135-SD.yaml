Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  Within a single dataset, all SHIFTy values must be the same for each unique combination of USUBJID and PARAMCD where the record is the baseline.
                Document: ADaM IG v1.1
                Section: '3.3.7'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-135-SD
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: SHIFT1
      operator: consistent_within_subject
Core:
  Id: ADaM-135-SD
  Status: Published
  Version: '1'
Description: >-
  SHIFT1 (Shift from Baseline) must be consistent within USUBJID+PARAMCD.
Executability: Partially Executable
Outcome:
  Message: 'SHIFT1 has inconsistent values for the same subject+parameter'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "SHIFT1 consistent within subject+param"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVISIT, SHIFT1]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Baseline", "NORMAL to NORMAL"]
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Week 2", "NORMAL to NORMAL"]
    expected_findings: 0
  - name: "SHIFT1 inconsistent within same subject+param"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVISIT, SHIFT1]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Baseline", "NORMAL to NORMAL"]
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Week 4", "NORMAL to HIGH"]
    expected_findings: 1
