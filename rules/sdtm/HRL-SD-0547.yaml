id: HRL-SD-0547
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: TSVCDREF variable value must be 'UNII', when TSPARMCD='COMPTRT'.
scope:
  classes:
    - SPECIAL-PURPOSE
  domains:
    - CO
check:
  all:
    - name: TSVCDREF
      operator: equal_to
      value: UNII
    - name: TSPARMCD
      operator: equal_to
      value: COMPTRT
    - name: TSVALNF
      operator: is_empty
outcome:
  message: Invalid TSVCDREF value for COMPTRT
  severity: Error
provenance:
  p21_id: SD2256
  core_id: ~
  cg_ids:
    - CG0444
  fda_ids: []
  source_doc: SDTM-IG v3.3

