id: SD1116
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Split datasets should have matching variable lengths for future mergers.
  Datasets should be resized to the maximum length used prior to splitting.
scope:
  classes: []
  domains:
    - INTERVENTIONS
    - FINDINGS
    - EVENTS
    - FINDINGSABOUT
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent variable length within split datasets
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1116
  pmda_category: Warning
  ig_versions: []

