id: HRL-MD-005
version: 1
status: Published
standard: ADaM
category: Specification Metadata
sensitivity: Study
executability: Fully Executable
description: A Name value is required for each Event.  Name is a required attribute
  for the StudyEventDef element. Events are represented in ODM as StudyEventDef elements.
scope:
  classes: []
  domains: []
check:
  all:
    - name: event_name
      operator: non_empty
outcome:
  message: Name is required for each Event
  severity: Error
provenance:
  source_doc: P21 ADaM Validation Rules v1.2 (Metadata)
  authority: Herald
  p21_reference: MD4005

tests:
  - name: 'HRL-MD-005 -- passing spec row'
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, EVENT_NAME]
        records:
          - ['CDISCPILOT01', '01-701-1015', 'Screening Visit']
    expected_findings: 0
  - name: 'HRL-MD-005 -- violating spec row'
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, EVENT_NAME]
        records:
          - ['CDISCPILOT01', '01-701-1015', '']
    expected_findings: 0  # placeholder: awaits HANDOFF §4g spec routing

