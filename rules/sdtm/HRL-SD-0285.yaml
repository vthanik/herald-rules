id: HRL-SD-0285
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Subject Status Date/Time of Assessment (SSDTC) must be greater than or
  equal to Start Date/Time of Disposition Event (DSSTDTC) when the subject's status
  is 'DEAD'.
scope:
  classes:
    - EVENTS
  domains:
    - DS
check:
  all:
    - name: SSDTC
      operator: greater_than
      value: eq DS:DSSTDTC
    - name: SSDTC != '' @and DS:DSSTDTC != '' @and USUBJID != '' @and (SSSTRESC
      operator: equal_to
      value: DEAD
    - name: SSSTRESC
      operator: equal_to
      value: ''''
outcome:
  message: Rule HRL-SD-0285 violation
  severity: Error
provenance:
  p21_id: SD1262
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: P21 rule SD1262

