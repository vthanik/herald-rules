id: AD0366
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: Date of Randomization (RANDDT) variable should be included into dataset
  when Randomized Population Flag (RANDFL) variable is present.
scope:
  classes: []
  domains:
    - ADSL
    - ADDL
check:
  all:
    - name: __required_variable__
      operator: exists
outcome:
  message: Missing RANDDT variable when RANDFL variable is present
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0366
  pmda_category: Error
  ig_versions: []

