id: SD1279
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Dose Description (ECDOSTXT) should be populated when Dose (ECDOSE) is
  null, ECOCCUR does not equal 'N', and ECSTAT does not equal 'NOT DONE'.
scope:
  Classes:
    Include: INTERVENTIONS
  Domains:
    Include: EC
  Use_Case: INDH
check:
  any:
    - all:
        - name: ECDOSE
          operator: empty
        - name: ECOCCUR
          operator: not_equal_to
          value: 'N'
          value_is_literal: yes
        - name: ECSTAT
          operator: empty
        - name: ECDOSTXT
          operator: empty
    - all:
        - name: ECDOSE
          operator: empty
        - name: ECOCCUR
          operator: not_equal_to
          value: 'N'
          value_is_literal: yes
        - name: ECSTAT
          operator: not_exists
        - name: ECDOSTXT
          operator: empty
    - all:
        - name: ECDOSE
          operator: empty
        - name: ECOCCUR
          operator: not_exists
        - name: ECSTAT
          operator: empty
        - name: ECDOSTXT
          operator: empty
    - all:
        - name: ECDOSE
          operator: empty
        - name: ECOCCUR
          operator: not_exists
        - name: ECSTAT
          operator: not_exists
        - name: ECDOSTXT
          operator: empty
outcome:
  message: ECDOSTXT is null when ECDOSE is null and ECOCCUR does not equal 'N'
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1279
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000217

