id: AD0281
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: Across studies, all Severity/Intensity (N) (AESEVN) variable must be
  the same for each unique value of Severity/Intensity (AESEV) variable when the primary
  variable AESEV is populated.
scope:
  classes: []
  domains: ADAE
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for AESEVN
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0281
  pmda_category: Error
  ig_versions: []

