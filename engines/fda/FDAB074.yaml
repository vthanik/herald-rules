Core:
  Id: FDAB074
  Status: Reference
Description: The microscopic examination status of each organ/tissue should be consistent
  between the MI.xpt (MISTAT, MISPCUFL) and Tumor.xpt (ORGANEXM) for each animal.
  Explain any inconsistencies in the nSDRG.
