# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.3
id: HRL-DD-028
version: 2
status: Published
standard: Define-XML
category: Study Metadata
sensitivity: Study
executability: Fully Executable
description: >
  def:Context must be 'Submission' or 'Other' when specified.
scope:
  classes: []
  domains: []
check:
  all:
    - name: Context
      operator: empty
    - name: Context
      operator: in
      value:
        - Submission
        - Other
outcome:
  message: "def:Context has an invalid value. Must be 'Submission' or 'Other'."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.3"
  cited_guidance: >
    def:Context -- Required. Allowable Values: 'Submission', 'Other'.

tests:
  - name: "HRL-DD-028 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-028 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

