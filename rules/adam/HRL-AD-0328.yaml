id: HRL-AD-0328
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: On a given record, if TRCMPGy is populated then TRCMP must be populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: TRCMP
      operator: non_empty
    - name: '%Variables[TRCMPG#]%'
      operator: non_empty
outcome:
  message: TRCMPGy is populated and TRCMP is not populated
  severity: Error
provenance:
  p21_id: AD0618
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

