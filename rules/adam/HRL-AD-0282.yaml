id: HRL-AD-0282
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Within a Study, all APHASE (Phase) variable values must be the same for
  each unique value of APHASEN (Phase (N)), when primary variable APHASEN is populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: APHASEN
      operator: non_empty
    - name: APHASE
      operator: all_values_equal
      group_by: STUDYID,APHASEN
outcome:
  message: Inconsistent value for APHASE
  severity: Error
provenance:
  p21_id: AD0324
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

