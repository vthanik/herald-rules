id: AD0401
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Not Executable
description: On a given record, if Analysis Toxicity Description Low (ATOXDSCL) variable
  value is populated, then both Analysis Value (AVAL) and the Analysis Toxicity Grade
  Low (ATOXGRL) variable values must be populated.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - ADAMOTHER
check: []
outcome:
  message: AVAL is not populated or ATOXGRL is not populated, and ATOXDSCL is populated
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0401
  pmda_category: Error
  ig_versions: []

