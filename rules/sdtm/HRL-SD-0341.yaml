id: HRL-SD-0341
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Related Device Identifier (RDEVID) and Related Subject or Pool Identifier
  (RSUBJID) should not both be populated for the same record.
scope:
  classes:
    - FINDINGS
  domains:
    - RS
check:
  all:
    - name: RDEVID
      operator: is_empty
    - name: RSUBJID
      operator: non_empty
outcome:
  message: RDEVID is not null when RSUBJID is populated
  severity: Error
provenance:
  p21_id: SD1326
  core_id: ~
  cg_ids:
    - CG0365
  fda_ids: []
  source_doc: SDTM-IG v3.2

