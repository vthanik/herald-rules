id: AD0688
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: There is more than one record per study for unique values of USUBJID
  and SPDEVID in the ADDL dataset.
scope:
  classes: []
  domains: ADDL
check:
  all:
    - name: __key_variables__
      operator: is_unique
outcome:
  message: SPDEVID duplicate values are not allowed within a study and subject
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0688
  pmda_category: Error
  ig_versions: []

