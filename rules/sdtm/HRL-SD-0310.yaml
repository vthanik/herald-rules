id: HRL-SD-0310
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: End Relative to Reference Time Point (--ENRTPT) must be populated when
  End Reference Time Point (--ENTPT) is populated.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: --ENRTPT
      operator: non_empty
    - name: --ENTPT
      operator: non_empty
outcome:
  message: Missing value for %Domain%ENRTPT, when %Domain%ENTPT is populated
  severity: Error
provenance:
  p21_id: SD1291
  core_id: ~
  cg_ids:
    - CG0045
  fda_ids: []
  source_doc: SDTM-IG v3.3

