id: SD0085
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: I/E Criterion Original Result (IEORRES) and I/E Criterion Result in Std
  Format (IESTRESC) should have the same value.
scope:
  Classes:
    Include: FINDINGS
  Domains:
    Include: IE
  Use_Case: INDH
check:
  all:
    - name: IESTRESC
      operator: not_equal_to
      value: IEORRES
outcome:
  message: Mismatch between IEORRES and IESTRESC values
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0085
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000025

