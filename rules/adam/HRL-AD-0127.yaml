id: HRL-AD-0127
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Within a study, All SHIFTyN values must be the same for each unique value
  of SHIFTy, when PARAMCD, SHIFTy and SHIFTyN variables are populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: PARAMCD
      operator: non_empty
    - name: SHIFTVARIABLE
      operator: non_empty
    - name: SHIFTVARIABLEN
      operator: non_empty
    - name: '%Variables[SHIFT#N]%'
      operator: all_values_equal
      group_by: STUDYID,PARAMCD,SHIFT%Variable.1%
outcome:
  message: Inconsistent value for SHIFT%Variable.1%N
  severity: Error
provenance:
  p21_id: AD0136B
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

