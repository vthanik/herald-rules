id: HRL-SD-0276
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: DTHFL must equal 'Y' when there is a record in the Subject Status (SS)
  domain with SSSTRESC = 'DEAD'.
scope:
  classes:
    - FINDINGS
  domains:
    - SS
check:
  all:
    - name: USUBJID != '' @and (SSSTRESC
      operator: equal_to
      value: DEAD
    - name: SSSTRESC
      operator: equal_to
      value: ''''
outcome:
  message: Rule HRL-SD-0276 violation
  severity: Error
provenance:
  p21_id: SD1252
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: P21 rule SD1252

