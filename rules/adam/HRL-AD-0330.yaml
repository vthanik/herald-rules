id: HRL-AD-0330
version: 1
status: Published
standard: ADaM
category: Presence
sensitivity: Record
executability: Partially Executable
description: In a pair of corresponding character and numeric variables, the primary
  or most commonly used variable must be present if its secondary version describing
  it (*N or *C) is present.  This is the generic rule to capture all instances of
  custom variables. Specific rules AD0064, AD0066, AD0070, AD0075, AD0097, and AD0201
  exist for some standard ADaM variables. AD1012A rule covers all other standard ADaM
  variable.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: VARIABLE
      operator: variable_exists
      value: '%Variable.1%'
outcome:
  message: Secondary custom variable is present but its primary variable is not present
  severity: Error
provenance:
  p21_id: AD1012
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

