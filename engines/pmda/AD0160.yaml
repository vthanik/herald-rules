id: AD0160
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: If Analysis Window Unit (AWU) variable is present, then Analysis Window
  Beginning Timepoint (AWLO) and (Analysis Window Ending Timepoint) AWHI variables
  must be present.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - ADAMOTHER
check:
  all:
    - name: AWU
      operator: non_empty
    - name: AWLO
      operator: empty
    - name: AWHI
      operator: empty
outcome:
  message: AWU is present, but both AWLO and AWHI are not present
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0160
  pmda_category: Error
  ig_versions: []

