id: HRL-SD-0032
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Fully Executable

description: >
  LBORRESU must not be empty when LBORRES is present in the LB domain. When a laboratory result is recorded, its unit must also be populated.

scope:
  classes:
    - FINDINGS
  domains:
    - LB

check:
  all:
    - name: LBORRESU
      operator: non_empty
      when:
        name: LBORRES
        operator: non_empty

outcome:
  message: "LBORRESU is empty but LBORRES is populated in LB for subject '{USUBJID}'"
  severity: Error

provenance:
  p21_id: SD0032
  core_id: CORE-000283
  cg_ids:
    - CG0032
  fda_ids:
    []
  source_doc: "SDTM-IG v3.3 Section 6.3.4"
