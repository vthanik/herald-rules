id: HRL-MD-016
version: 1
status: Published
standard: ADaM
category: Specification Metadata
sensitivity: Study
executability: Fully Executable
description: Question Text is required for each Question.
scope:
  classes: []
  domains: []
check:
  all:
    - name: question_text
      operator: non_empty
outcome:
  message: Question Text is required for each Question
  severity: Error
provenance:
  source_doc: P21 ADaM Validation Rules v1.2 (Metadata)
  authority: Herald
  p21_reference: MD4016

tests:
  - name: 'HRL-MD-016 -- passing spec row'
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, QUESTION_TEXT]
        records:
          - ['CDISCPILOT01', '01-701-1015', 'What is your date of birth?']
    expected_findings: 0
  - name: 'HRL-MD-016 -- violating spec row'
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, QUESTION_TEXT]
        records:
          - ['CDISCPILOT01', '01-701-1015', '']
    expected_findings: 1

