id: HRL-AD-0326
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: There is more than one value of TRCMPGy for a given value of TRCMPGyN,
  considering only those rows on which both variables are populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: VARIABLE
      operator: non_empty
    - name: VARIABLEN
      operator: non_empty
    - name: '%Variables[TRCMPG#]%'
      operator: all_values_equal
      group_by: STUDYID,%Variable%N
outcome:
  message: Inconsistent value for TRCMPGy
  severity: Error
provenance:
  p21_id: AD0616
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

