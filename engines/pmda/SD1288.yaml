id: SD1288
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: All values of Preferred Term Code (--PTCD) should be the same for a given
  value of Dictionary-Derived Term (--DECOD).
scope:
  Classes:
    Include: EVENTS
  Domains:
    Include: ALL
  Use_Case: INDH
check:
  all:
    - name: --DECOD
      operator: exists
    - name: --PTCD
      operator: exists
    - name: --PTCD
      operator: is_not_unique_relationship
      value: --DECOD
outcome:
  message: Inconsistent value for --PTCD within --DECOD
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1288
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000268

