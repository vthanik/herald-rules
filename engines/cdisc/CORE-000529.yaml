Authorities:
  - Organization: CDISC
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited_Guidance: The Study Day value is incremented by 1 for each date
                  following RFSTDTC. Dates prior to RFSTDTC are decreased by 1, with
                  the date preceding RFSTDTC designated as Study Day -1 (there is
                  no Study Day 0)....All Study Day values are integers. Thus to calculate
                  Study Day, --DY = (date portion of --DTC) - (date portion of RFSTDTC)
                  + 1 if --DTC is on or after RFSTDTC, --DY = (date portion of --DTC)
                  - (date portion of RFSTDTC) if --DTC precedes RFSTDTC. This algorithm
                  should be used across all domains.
                Document: SDTMIG v3.4
                Section: 4.4.4
            Origin: SDTM and SDTMIG Conformance Rules
            Rule_Identifier:
              Id: CG0006
              Version: '2'
            Version: '2.0'
        Version: '3.4'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited_Guidance: 'IG v3.2[4.1.4.4][The Study Day value is incremented
                  by 1 for each date following RFSTDTC. Dates prior to RFSTDTC are
                  decreased by 1, with the date preceding RFSTDTC designated as Study
                  Day -1 (there is no Study Day 0). . . . All Study Day values are
                  integers.]IG v3.2[4.1.4.4][Thus, to calculate Study Day:  --DY =
                  (date portion of --DTC) - (date portion of RFSTDTC) + 1 if --DTC
                  is on or after RFSTDTC --DY = (date portion of --DTC) - (date portion
                  of RFSTDTC) if --DTC precedes RFSTDTC This algorithm should be used
