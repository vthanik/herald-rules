    - name: ACPARMCD
      operator: variable_exists
      value: BAGENSPC
outcome:
  message: Missing BAGENSPC Challenge Agent Parameter when ACPARMCD = 'CAGTCAT' and
    ACVAL = 'BIOLOGICAL'
  severity: Error
