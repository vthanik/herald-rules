id: SD0021
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Partially Executable
description: One End Time-Point variable is expected to be populated when an event
  or an intervention occurred. (E.g., End Date/Time of Event or Intervention (--ENDTC),
  or End Relative to Reference Period (--ENRF), or End Relative to Reference Period
  (--ENRTPT) should not be missing, or Occurrence (--OCCUR) = 'N' or Completion Status
  (--STAT) != '') or Duration (--DUR) != '').
scope:
  classes: []
  domains:
    - INTERVENTIONS(-AG
    - -ML)
    - EVENTS(-BE
    - -DE
    - -DS
    - -DT
    - -DV)
check:
  all:
    - name: __see_description__
      operator: manual_review
outcome:
  message: Missing End Time-Point value
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD0021
  pmda_category: Warning
  ig_versions: []

