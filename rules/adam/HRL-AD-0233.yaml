id: HRL-AD-0233
version: 1
status: Published
standard: ADaM
category: Cross-reference
sensitivity: Record
executability: Partially Executable
description: Adverse Events specified in SDTM AE must be traceable to ADaM ADAE domain
  based on Study (STUDYID), unique subject (USUBJID) and sequence (AESEQ).  The ADAE
  structure for the standard adverse event safety dataset must have at least one record
  per each AE recorded in SDTM AE domain.  However, subjects not analyzed (e.g. screen
  failures) who have AEs recorded in SDTM AE but not in ADSL do not need to be included
  in ADAE.  Currently this check does not take into account the latter.  Please check
  your ADSL file to see if these issues are for screen failures.
scope:
  classes:
    - ADSL
  domains:
    - ADSL
check:
  all: []
outcome:
  message: Record key from SDTM AE is not traceable to ADaM ADAE (not enough ADAE
    recs)
  severity: Error
provenance:
  p21_id: AD0253
  core_id: ~
