id: AD0167
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: If Baseline Reference Range Indicator (BNRIND) variable is present, then
  Analysis Reference Range Indicator (ANRIND) and Baseline Record Flag (ABLFL) variables
  must be present.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
check:
  all:
    - name: ABLFL
      operator: equal_to
      value: 'Y'
    - name: BNRIND
      operator: non_empty
    - name: ANRIND
      operator: non_empty
    - name: BNRIND
      operator: not_equal_to_variable
      value: ANRIND
outcome:
  message: BNRIND is present, but ABLFL is not present
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0167
  pmda_category: Error
  ig_versions: []

