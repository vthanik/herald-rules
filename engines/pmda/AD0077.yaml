id: AD0077
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: Within a study, all TRTxxP values must be the same for each unique value
  of TRTxxPN when the primary variable TRTxxP is populated.
scope:
  classes: []
  domains: ADSL
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for TRTxxP
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0077
  pmda_category: Error
  ig_versions: []

