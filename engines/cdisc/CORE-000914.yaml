Check:
  all:
    - name: --STRESC
      operator: non_empty
    - name: --BLFL
      operator: equal_to
      value: 'Y'
      value_is_literal: yes
    - name: --BLFL
      operator: is_not_unique_set
      value:
        - --TESTCD
        - --CAT
        - --SCAT
        - --SPEC
        - --METHOD
        - USUBJID
Core:
  Id: CORE-000914
  Status: Published
  Version: '1'
Description: There should be only one record with a baseline flag and non missing
  character standard result value having the same --TESTCD, --CAT, --SCAT, --SPEC,
  --METHOD values.
Executability: Fully Executable
Outcome:
  Message: There are multiple records per assigned baseline flag (--BLFL).
  Output_Variables:
    - --TESTCD
    - --CAT
    - --SCAT
    - --SPEC
    - --METHOD
    - --BLFL
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - FINDINGS
  Domains:
    Include:
      - ALL
Sensitivity: Record
