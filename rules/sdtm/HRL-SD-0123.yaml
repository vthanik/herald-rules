id: HRL-SD-0123
version: 1
status: Published
standard: SDTM
category: Format
sensitivity: Record
executability: Partially Executable
description: Variables value must not include non-ASCII or non-printable characters
  (outside of 32-126 ASCII code range), limited to variables which values may be converted
  into new variable name or label (--TEST, --TESTCD, --PARM, --PARMCD, QLABEL, QNAM).
scope:
  classes:
    - TRIAL DESIGN
  domains:
    - TE
check:
  all:
    - name: '%Variables[*TEST,QLABEL,*PARM,*TESTCD,QNAM,*PARMCD]%'
      operator: matches_regex
      value: ^((?![\x00-\x1F\x7F-\xFF]).)*$
outcome:
  message: Non-ASCII or non-printable characters in %Variable% variable
  severity: Error
provenance:
  p21_id: SD1029
  core_id: ~
  cg_ids:
    - CG0257
    - CG0258
    - CG0372
    - CG0406
  fda_ids: []
  source_doc: SDTM-IG v3.3

