id: AD0201
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: If Actual Pooled Treatment y (TRTAGyN) numeric variable is present, there
  must be a corresponding Planned Pooled Treatment y (TRTPGy) character variable.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - ADAMOTHER
check:
  all:
    - name: __see_description__
      operator: manual_review
outcome:
  message: TRTAGyN is present, but TRTAGy is not present
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0201
  pmda_category: Error
  ig_versions: []

