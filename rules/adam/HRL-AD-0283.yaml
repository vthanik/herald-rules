id: HRL-AD-0283
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Within a Study and a Period, all ASPER (Subperiod within Period) variable
  values must be the same for each unique value of ASPERC (Subperiod within Period
  (C)), when primary variable ASPERC is populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: ASPERC
      operator: non_empty
    - name: ASPER
      operator: all_values_equal
      group_by: STUDYID,APERIOD,ASPERC
outcome:
  message: Inconsistent value for ASPER
  severity: Error
provenance:
  p21_id: AD0325
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

