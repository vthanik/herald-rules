id: HRL-SD-0201
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Dataset
executability: Fully Executable
description: 'In the Comments (CO) domain, the following Identifier and Timing variables
  are Permissible and may be populated as appropriate when comments are not related
  to other domain records (i.e., RDOMAIN and IDVAR variable values are not populated):
  COGRPID, COREFID, COSPID, VISIT, VISITNUM, VISITDY, TAETORD, CODY, COTPT, COTPTNUM,
  COELTM, COTPTREF, CORFTDTC.'
scope:
  classes:
    - SPECIAL-PURPOSE
  domains:
    - CO
check:
  all:
    - name: COGRPID
      operator: is_empty
    - name: COREFID
      operator: is_empty
    - name: COSPID
      operator: is_empty
    - name: VISIT
      operator: is_empty
    - name: VISITNUM
      operator: is_empty
    - name: VISITDY
      operator: is_empty
    - name: TAETORD
      operator: is_empty
    - name: CODY
      operator: is_empty
    - name: COTPT
      operator: is_empty
    - name: COTPTNUM
      operator: is_empty
    - name: COELTM
      operator: is_empty
    - name: COTPTREF
      operator: is_empty
    - name: CORFTDTC
      operator: is_empty
    - name: RDOMAIN
      operator: non_empty
    - name: IDVAR
      operator: non_empty
outcome:
  message: Inappropriate usage of variables in CO domain, when comment is a child
    record of another domain
  severity: Error
provenance:
  p21_id: SD1119
  core_id: ~
  cg_ids:
    - CG0168
  fda_ids: []
  source_doc: SDTM-IG v3.3

