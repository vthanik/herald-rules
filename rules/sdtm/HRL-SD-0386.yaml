id: HRL-SD-0386
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: RFSTDTC must be null when the Reason Arm and/or Actual Arm is Null (ARMNRS)
  variable is populated (excluding values of UNPLANNED TREATMENT), which indicates
  that the subject did not receive treatment.
scope:
  classes:
    - FINDINGS
  domains:
    - TR
check:
  all:
    - name: RFSTDTC
      operator: is_empty
    - name: ARMNRS
      operator: non_empty
outcome:
  message: RFSTDTC is populated for subject who did not receive treatment
  severity: Error
provenance:
  p21_id: SD1373
  core_id: ~
  cg_ids:
    - CG0534
  fda_ids: []
  source_doc: SDTM-IG v3.3

