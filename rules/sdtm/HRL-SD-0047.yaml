id: HRL-SD-0047
version: 1
status: Published
standard: SDTM
category: Format
sensitivity: Value
executability: Fully Executable

description: >
  All date/datetime variables (variables ending in DTC) must follow ISO 8601 format. This is a fundamental SDTM requirement for date representation.

scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
  domains:
    []

check:
  all:
    - name: {variables_ending_in_DTC}
      operator: is_valid_iso8601

outcome:
  message: "Date variable '{variable_name}' contains non-ISO 8601 value in {DOMAIN}"
  severity: Error

provenance:
  p21_id: SD0047
  core_id: CORE-000297
  cg_ids:
    - CG0047
  fda_ids:
    []
  source_doc: "SDTM-IG v3.3 Section 4.1.3"
