Authorities:
  - Organization: CDISC
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited_Guidance: 'If the reference time point corresponds to the date
                  of collection or assessment: Start values: an  observation can start
                  BEFORE that time point, can start COINCIDENT with that time point,
                  or it is unknown  (U) when it started. End values: an observation
                  can end BEFORE that time point, can end COINCIDENT with  that time
                  point, can be known that it didn''t end but was ONGOING, or it is
                  unknown (U) at all when it  ended or if it was ongoing.  AFTER is
                  not a valid value in this case because it would represent an event
                  after the date of collection.'
                Document: IG v3.4
                Section: 4.4.7
            Origin: SDTM and SDTMIG Conformance Rules
            Rule_Identifier:
              Id: CG0232
              Version: '1'
            Version: '2.0'
