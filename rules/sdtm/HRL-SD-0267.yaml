id: HRL-SD-0267
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: All values of Body System or Organ Class Code (--BDSYCD) should be the
  same for a given value of Body System or Organ Class (--BODSYS).
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: --BDSYCD
      operator: non_empty
    - name: '%Domain%BDSYCD'
      operator: all_values_equal
      group_by: '%Domain%BODSYS'
outcome:
  message: Inconsistent value for %Domain%BDSYCD within %Domain%BODSYS
  severity: Error
provenance:
  p21_id: SD1243
  core_id: ~
  cg_ids:
    - CG0083
  fda_ids: []
  source_doc: SDTM-IG v3.3

