id: SD2016
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Value for System Organ Class Code (--SOCCD) variable must be populated
  using a System Organ Class Code of the MedDRA dictionary of a version specified
  in the define.xml.
scope:
  classes: []
  domains:
    - AE
    - CE
    - MH
check:
  all:
    - name: __domain_variable__
      operator: check_value
outcome:
  message: Value for --SOCCD not found in MedDRA dictionary
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD2016
  pmda_category: Error
  ig_versions: []

