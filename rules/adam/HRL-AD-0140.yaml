id: HRL-AD-0140
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: 'Within a study, All CRITy values must be the same for each unique value
  of PARAMCD when PARAMCD and CRITy are populated.  Example: PARAMCD = SYSBP (mm Hg),
  CRIT1 = SYSBP >160.'
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: PARAMCD
      operator: non_empty
    - name: CRITVARIABLE
      operator: non_empty
    - name: '%Variables[CRIT#]%'
      operator: all_values_equal
      group_by: STUDYID,PARAMCD
outcome:
  message: Inconsistent value for CRIT%Variable.1% within a unique PARAMCD
  severity: Error
provenance:
  p21_id: AD0151
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

