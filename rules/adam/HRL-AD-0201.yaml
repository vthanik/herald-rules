id: HRL-AD-0201
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Within a study, all TRTSEQA values must be the same for each unique value
  of TRTSEQAN, when both variables are populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: TRTSEQA
      operator: non_empty
    - name: TRTSEQAN
      operator: non_empty
    - name: TRTSEQA
      operator: all_values_equal
      group_by: STUDYID,TRTSEQAN
outcome:
  message: Inconsistent value for TRTSEQA
  severity: Error
provenance:
  p21_id: AD0229B
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

