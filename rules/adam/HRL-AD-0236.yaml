id: HRL-AD-0236
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: If a date variable (DT) is indicated to be imputated by population of
  an Imputation flag (DTF), that date variable (DT) must have a value.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: VARIABLEDT
      operator: non_empty
    - name: '%Variables[*DTF]%'
      operator: non_empty
outcome:
  message: '%Variable.1%DTF is populated but %Variable.1%DT is not populated'
  severity: Error
provenance:
  p21_id: AD0263
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

