id: SD1283
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Laterality (--LAT) variable should not be present in the domain when
  the Location (--LOC) variable is missing.
scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
check:
  all:
    - name: --LOC
      operator: not_exists
    - name: --LAT
      operator: exists
outcome:
  message: --LAT variable is present when --LOC variable is missing
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1283
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000079

