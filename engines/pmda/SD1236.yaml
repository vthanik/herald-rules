id: SD1236
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: The value of Sequence Number (--SEQ) variable must be unique for each
  record within a domain and within each combination of Sponsor Device Identifier
  (SPDEVID) and Unique Subject Identifier (USUBJID) variables' values.
scope:
  Classes:
    Include: ALL
  Domains:
    Exclude: TS
check:
  any:
    - all:
        - name: --SEQ
          operator: exists
        - name: USUBJID
          operator: non_empty
        - name: --SEQ
          operator: is_not_unique_set
          value:
            - DOMAIN
            - USUBJID
    - all:
        - name: --SEQ
          operator: exists
        - name: POOLID
          operator: non_empty
        - name: --SEQ
          operator: is_not_unique_set
          value:
            - DOMAIN
            - POOLID
outcome:
  message: Duplicate value for --SEQ variable
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1236
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000544

