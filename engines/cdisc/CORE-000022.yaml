Authorities:
  - Organization: CDISC
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited_Guidance: If categories of serious events are collected secondarily
                  to a leading question, as in the example below, the values of the
                  variables that capture reasons an event is considered serious (i.e.,
                  AESCAN, AESCONG, etc.) may be null. For example, if Serious is answered
                  "No", the values for these variables maybe null. However, if Serious
                  is answered "Yes", at least one of them will have a "Y" response.
                Document: SDTMIG v3.4
                Item: Assumption 6a
                Section: 6.2.1
            Origin: SDTM and SDTMIG Conformance Rules
            Rule_Identifier:
              Id: CG0041
              Version: '1'
            Version: '2.0'
        Version: '3.4'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited_Guidance: If categories of serious events are collected secondarily
                  to a leading question, as in the example below, the values of the
                  variables that capture reasons an event is considered serious (i.e.,
                  AESCAN, AESCONG, etc.) may be null. For example, if Serious is answered
                  "No", the values for these variables maybe null. However, if Serious
                  is answered "Yes", at least one of them will have a "Y" response.
                Document: SDTMIG v3.3
                Item: Assumption 6a
                Section: 6.2.1
            Origin: SDTM and SDTMIG Conformance Rules
            Rule_Identifier:
              Id: CG0041
              Version: '1'
            Version: '2.0'
        Version: '3.3'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited_Guidance: If categories of serious events are collected secondarily
                  to a leading question, as in the example below, the values of the
                  variables that capture reasons an event is considered serious (i.e.,
                  AESCAN, AESCONG, etc.) may be null. For example, if Serious is answered
                  "No", the values for these variables may be null. However, if Serious
                  is answered "Yes", at least one of them will have a "Y" response.
                Document: SDTMIG v3.2
                Item: Assumption 6a
                Section: 6.2.
            Origin: SDTM and SDTMIG Conformance Rules
            Rule_Identifier:
              Id: CG0041
              Version: '1'
            Version: '2.0'
        Version: '3.2'
      - Name: TIG
        References:
          - Citations:
              - Cited_Guidance: If categories of serious events are collected secondarily
                  to a leading question the values of the variables that capture reasons
                  an event is considered serious (e.g., AESCAN, AESCONG) may be null.
                  On the other hand, if the CRF is structured so that a response is
                  collected for each seriousness category, all category variables
                  (e.g., AESDTH, AESHOSP) would be populated and AESER would be derived.
                Document: TIG 1.0
                Item: Assumption 7a
                Section: 2.8.10.1
            Origin: TIG Conformance Rules
            Rule_Identifier:
              Id: TIG0320
              Version: '1'
            Version: '1.0'
        Substandard: SDTM
        Version: '1.0'
Check:
  all:
    - any:
        - name: AESCAN
          operator: equal_to
          value: 'Y'
          value_is_literal: yes
        - name: AESCONG
          operator: equal_to
          value: 'Y'
          value_is_literal: yes
        - name: AESDISAB
          operator: equal_to
          value: 'Y'
          value_is_literal: yes
        - name: AESDTH
          operator: equal_to
          value: 'Y'
          value_is_literal: yes
        - name: AESHOSP
          operator: equal_to
          value: 'Y'
          value_is_literal: yes
        - name: AESLIFE
          operator: equal_to
          value: 'Y'
          value_is_literal: yes
        - name: AESOD
          operator: equal_to
          value: 'Y'
          value_is_literal: yes
        - name: AESMIE
          operator: equal_to
          value: 'Y'
          value_is_literal: yes
    - name: AESER
      operator: not_equal_to
      value: 'Y'
      value_is_literal: yes
Core:
  Id: CORE-000022
  Status: Published
  Version: '1'
Description: Raise an error when AESCAN, AESCONG, AESDISAB, AESDTH, AESHOSP, AESLIFE,
  AESOD or AESMIE = 'Y' and AESER = 'N' or is empty.
Executability: Fully Executable
Outcome:
  Message: At least one of the Seriousness criteria (AESCAN, AESCONG, AESDISAB, AESDTH,
    AESHOSP, AESLIFE, AESOD or AESMIE)  = 'Y', but AESER = 'N' or empty.
  Output_Variables:
    - AETERM
    - AESTDTC
    - AESER
    - AESCAN
    - AESCONG
    - AESDISAB
    - AESDTH
    - AESHOSP
    - AESLIFE
    - AESOD
    - AESMIE
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - EVENTS
  Domains:
    Include:
      - AE
  Use_Case: INDH
Sensitivity: Record
herald:
  source: CDISC Library API
  catalogs:
    - SDTMIG 3.2
    - SDTMIG 3.3
  fetched: '2026-04-03T12:15:16Z'

