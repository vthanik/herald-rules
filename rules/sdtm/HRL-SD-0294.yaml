id: HRL-SD-0294
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: The combination of Description of Element (ELEMENT), Rule for Start of
  Element (TESTRL), Rule for End of Element (TEENRL), and Planned Duration of Element
  (TEDUR) should be unique for each Element Code (ETCD).
scope:
  classes:
    - TRIAL DESIGN
  domains:
    - TE
check:
  all:
    - name: ELEMENT
      operator: non_empty
    - name: TESTRL
      operator: non_empty
    - name: TEENRL
      operator: non_empty
    - name: TEDUR
      operator: non_empty
    - name: ETCD
      operator: all_values_equal
      group_by: ELEMENT,TESTRL,TEENRL,TEDUR
outcome:
  message: The combination of ELEMENT, TESTRL TEENRL, and TEDUR is not unique for
    each ETCD
  severity: Error
provenance:
  p21_id: SD1271
  core_id: ~
  cg_ids:
    - CG0325
  fda_ids: []
  source_doc: SDTM-IG v3.3

