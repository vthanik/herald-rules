Check:
  all:
    - name: --ORNRLO
      operator: non_empty
    - name: --ORNRLO
      operator: matches_regex
      value: ^-?(0|[1-9]\d*)(\.\d+)?$
    - name: --ORNRHI
      operator: non_empty
    - name: --ORNRHI
      operator: matches_regex
      value: ^-?(0|[1-9]\d*)(\.\d+)?$
    - name: --ORNRHI
      operator: less_than_or_equal_to
      value: --ORNRLO
Core:
  Id: CORE-000889
  Status: Published
  Version: '1'
Description: Normal Range Upper Limit-Original Units (--ORNRHI) is greater than the
  Normal Range Lower Limit-Original Units (--ORNRLO).
Executability: Partially Executable - Possible Underreporting
Outcome:
  Message: --ORNRHI is less than or equal to --ORNRLO.
  Output_Variables:
    - --TESTCD
    - --ORNRHI
    - --ORNRLO
