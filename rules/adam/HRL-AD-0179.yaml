id: HRL-AD-0179
version: 1
status: Published
standard: ADaM
category: Cross-reference
sensitivity: Record
executability: Partially Executable
description: When analysis period (APERIOD) exists such as 01, the BDS Analysis period
  end time (APERETM) must = ADSL analysis period end time (AP01ETM) for that period.
scope:
  classes:
    - ADSL
  domains:
    - ADSL
check:
  all:
    - name: APERIOD
      operator: non_empty
outcome:
  message: BDS.APERIOD xx has an APERETM != ADSL.APxxETM
  severity: Error
