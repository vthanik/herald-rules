id: AD0588
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: Within a parameter, there should be only a single value of Percent Change
  to Baseline Category y (PBCHGCAy) variable for a given value of Percent Change to
  Baseline Category y (N) (PBCHGCyN) variable, considering only those rows on which
  both variables are populated.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
    - ADAMOTHER
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for PBCHGCAy within a unique PARAMCD
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0588
  pmda_category: Error
  ig_versions: []

