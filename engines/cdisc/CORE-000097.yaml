Check:
  all:
    - name: EPOCH
      operator: exists
    - name: SESTDTC
      operator: date_less_than_or_equal_to
      value: SVSTDTC
    - name: SVSTDTC
      operator: date_less_than_or_equal_to
      value: SEENDTC
    - name: EPOCH
      operator: not_equal_to
      value: SE.EPOCH
Core:
  Id: CORE-000097
  Status: Published
  Version: '1'
Description: Raise an error when variable EPOCH values don't match between Subject
  Visits (SV) and Subject Elements (SE) datasets.
Executability: Partially Executable - Possible Overreporting
Match_Datasets:
  - Keys:
      - USUBJID
    Name: SE
Outcome:
  Message: EPOCH values don't match between Subject Visits (SV) and Subject Elements
    (SE) datasets.
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - SPECIAL PURPOSE
  Domains:
    Include:
      - SV
  Use_Case: INDH
Sensitivity: Record
herald:
  source: CDISC Library API
  catalogs:
    - SDTMIG 3.2
    - SDTMIG 3.3
