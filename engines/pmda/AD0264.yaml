id: AD0264
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Not Executable
description: If a Time (*TM) variable is indicated to be imputed by population of
  an Imputation Flag (*TMF) variable value, that Time (*TM) variable must have a value.
