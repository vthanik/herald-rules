id: SD1005
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Study Identifier (STUDYID) values must match the STUDYID in Demographics
  (DM) domain.
scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
  Use_Case: INDH, NONCLIN
check:
  all:
    - name: STUDYID
      operator: is_not_contained_by
      value: $dm_studyid
outcome:
  message: Invalid STUDYID
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1005
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000172

