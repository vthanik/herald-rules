id: HRL-SD-0021
version: 1
status: Published
standard: SDTM
category: Terminology
sensitivity: Value
executability: Fully Executable

description: >
  AESEV must be in controlled terminology in the AE domain. Valid values are MILD, MODERATE, and SEVERE per CDISC CT codelist C66769.

scope:
  classes:
    - EVENTS
  domains:
    - AE

check:
  all:
    - name: AESEV
      operator: in
      value:
        - MILD
        - MODERATE
        - SEVERE

outcome:
  message: "AESEV value '{AESEV}' is not in (MILD, MODERATE, SEVERE) in AE"
  severity: Error

provenance:
  p21_id: CT0021
  core_id: CORE-000272
  cg_ids:
    - CG0021
  fda_ids:
    []
  source_doc: "SDTM-IG v3.3 Section 6.2.1, CDISC CT C66769"
