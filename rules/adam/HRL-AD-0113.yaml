id: HRL-AD-0113
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: When all 3 variables are populated and BASE  does not equal 0, Ratio
  to Base (R2BASE) must equal Analysis Value (AVAL) / Baseline Value (BASE).  AD0132A
  will raise errors when BASE equals 0.  AD0132B also complements this check.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: R2BASE
      operator: non_empty
    - name: AVAL
      operator: non_empty
    - name: BASE
      operator: non_empty
    - name: BASE
      operator: not_equal_to
      value: '0'
outcome:
  message: 'Calculation issue: R2BASE != AVAL / BASE'
  severity: Error
provenance:
  p21_id: AD0132
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

