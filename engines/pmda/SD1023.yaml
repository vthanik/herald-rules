id: SD1023
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Combination of Visit Name (VISIT) and Visit Number (VISITNUM) in subject-level
  domains should match that in the TV domain except for Unscheduled and Unplanned
  visits.
scope:
  Classes:
    Include: ALL
  Domains:
    Exclude: TV
  Use_Case: INDH
check:
  all:
    - name: VISIT
      operator: non_empty
    - name: SVPRESP
      operator: equal_to
      value: 'Y'
    - name: VISIT
      operator: is_not_contained_by
      value: $tv_visit
outcome:
  message: VISIT/VISITNUM values do not match TV domain data
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1023
  pmda_category: Warning
  ig_versions: []
  core_reference: CORE-000269

