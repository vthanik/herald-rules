id: AD0125B
version: 1
status: Reference
standard: ADaM
category: Conformance
sensitivity: Record
executability: Fully Executable
description: Within a study, all PARCATy values must be the same for each unique value
  of PARCATyN when both variables are populated.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for PARCATy
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0125B
  pmda_category: Error
  ig_versions: []

