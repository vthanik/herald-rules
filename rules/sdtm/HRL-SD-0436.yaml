    - name: ACPARMCD
      operator: variable_exists
      value: CHAGCAS
outcome:
  message: Missing CHAGCAS Challenge Agent Parameter when ACPARMCD = 'CAGTCAT' and
    ACVAL = 'CHEMICAL'
  severity: Error
