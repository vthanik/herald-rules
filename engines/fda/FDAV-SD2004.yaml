Core:
  Id: FDAV-SD2004
  Status: Reference
  Version: '1'
Description: Subject Death Flag (DTHFL) value must equal 'Y', when Date/Time of Death
  (DTHDTC) is provided.
Check:
  all:
    - name: DTHDTC
      operator: non_empty
    - name: DTHFL
      operator: not_equal_to
      value: 'Y'
Outcome:
  Message: Missing value for DTHFL, when DTHDTC is populated
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: DM
Standard: SDTM
Publisher ID: CG0435
IG Versions:
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
CORE Reference: CORE-000007
Executability: Fully Executable
Scope:
  Classes:
    Include: SPECIAL PURPOSE
  Domains:
    Include: DM
  Use_Case: INDH

