id: HRL-SD-0036
version: 1
status: Published
standard: SDTM
category: Format
sensitivity: Value
executability: Fully Executable

description: >
  CMSTDTC must be a valid ISO 8601 date/datetime string in the CM domain. The concomitant medication start date must conform to ISO 8601 format.

scope:
  classes:
    - INTERVENTIONS
  domains:
    - CM

check:
  all:
    - name: CMSTDTC
      operator: is_valid_iso8601

outcome:
  message: "CMSTDTC value '{CMSTDTC}' is not a valid ISO 8601 date in CM"
  severity: Error

provenance:
  p21_id: SD0036
  core_id: CORE-000287
  cg_ids:
    - CG0036
  fda_ids:
    []
  source_doc: "SDTM-IG v3.3 Section 6.1.2"
