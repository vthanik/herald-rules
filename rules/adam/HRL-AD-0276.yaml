id: HRL-AD-0276
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Across studies, All SMQzzSCN must be the same for each unique value of
  SMQzzSC, when both variables are populated. The usual mapping is BROAD=1,NARROW=2.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: SMQVARIABLESC
      operator: non_empty
    - name: SMQVARIABLESCN
      operator: non_empty
    - name: '%Variables[SMQ##SCN]%'
      operator: all_values_equal
      group_by: SMQ%Variable.1%SC
outcome:
  message: Inconsistent value for SMQ%Variable.1%SCN
  severity: Error
provenance:
  p21_id: AD0311B
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

