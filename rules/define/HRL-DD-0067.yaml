description: For Define-XML v2.0, the Origin Type attribute must have a value of 'CRF',
  'Derived', 'Assigned', 'Protocol', 'eDT', or 'Predecessor' for SDTM and ADaM data
  and 'COLLECTED', 'DERIVED', 'OTHER', or 'NOT AVAILABLE' for SEND data. For Define-XML
  v2.1, the Origin Type attribute must have a value of 'Collected', 'Derived', 'Assigned',
  'Protocol', or 'Predecessor' for SDTM and SEND data and 'Derived', 'Assigned', or
  'Predecessor' for ADaM.
