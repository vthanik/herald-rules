id: HRL-AD-0065
version: 1
status: Published
standard: ADaM
category: Presence
sensitivity: Record
executability: Partially Executable
description: At least 1 treatment variable is required in a BDS dataset. This requirement
  is satisfied by any of the subject-level (ARM, ACTARM, TRTxxP, TRTxxA, TRTSEQP,
  TRTSEQA, TRxxPGy, TRxxAGy, TSEQPGy, TSEQAGy) or record-level (TRTP, TRTA, TRTPGy,
  TRTAGy) treatment variables. One is allowed to use any treatment variable in analysis
  of BDS. Any subject-level treatment variable may be copied into the BDS dataset
  from ADSL.
scope:
  classes:
    - ADSL
  domains:
    - ADSL
check:
  all:
    - name: VARIABLE
      operator: variable_exists
      value: =%Variables[ARM,ACTARM,TRT##P,TRT##A,TRTSEQP,TRTSEQA,TR##PG#,TR##AG#,TSEQPG#,TSEQAG#,TRTP,TRTA,TRTPG#,TRTAG#;!TRT00P;!TRT00A]%
outcome:
  message: None of the subject-level or record-level treatment variables defined in
    the IG are present
  severity: Error
provenance:
  p21_id: AD0090
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

