id: AD0246
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Partially Executable
description: When Censor (CNSR) variable is present, the Time-to-Event Origin Date
  for Subject (STARTDT) and one of Analysis Date (ADT) or Analysis Datetime (ADTM)
  variables must be included in the dataset. In Time to Event studies, the basis of
  analysis is the time from a defined starting point to the time of occurrence of
  the event of interest.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
check:
  all:
    - name: __see_description__
      operator: manual_review
outcome:
  message: CNSR is present, but both ADT and ADTM are not present
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0246
  pmda_category: Error
  ig_versions: []

