id: HRL-AD-0197
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Within a study, all TRTSEQP values must be the same for each unique value
  of TRTSEQPN, when both variables are populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: TRTSEQP
      operator: non_empty
    - name: TRTSEQPN
      operator: non_empty
    - name: TRTSEQP
      operator: all_values_equal
      group_by: STUDYID,TRTSEQPN
outcome:
  message: Inconsistent value for TRTSEQP
  severity: Error
provenance:
  p21_id: AD0227B
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

