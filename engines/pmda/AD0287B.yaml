id: AD0287B
version: 1
status: Reference
standard: ADaM
category: Conformance
sensitivity: Record
executability: Fully Executable
description: Across studies, all Causality (AEREL) variable values must be the same
  for each unique value of Causality (N) (AERELN) variable when both variables are
  populated.
scope:
  classes: []
  domains:
    - OCCDS
    - ADAE
    - MDOCCDS
    - ADAMOTHER
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for AEREL
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0287B
  pmda_category: Error
  ig_versions: []

