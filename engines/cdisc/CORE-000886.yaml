        Version: '3.3'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited_Guidance: For interventional studies all treated subjects should
                  have exposure data.
                Document: FDA
                Section: FDAB023
            Origin: FDA Business Rules
            Rule_Identifier:
              Id: FB2306
              Version: '1'
