id: HRL-MD-026
version: 1
status: Published
standard: ADaM
category: Specification Metadata
sensitivity: Study
executability: Fully Executable
description: Term (Display Term) should not contain 2 or more spaces in sequence.
scope:
  classes: []
  domains: []
check:
  all:
    - name: term
      operator: does_not_match_regex
      value: '\\s{2,}'
outcome:
  message: Invalid Term (Display Term)
  severity: Error
provenance:
  source_doc: P21 ADaM Validation Rules v1.2 (Metadata)
  authority: Herald
  p21_reference: MD4026

tests:
  - name: 'HRL-MD-026 -- passing spec row'
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, TERM]
        records:
          - ['CDISCPILOT01', '01-701-1015', 'White']
    expected_findings: 0
  - name: 'HRL-MD-026 -- violating spec row'
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, TERM]
        records:
          - ['CDISCPILOT01', '01-701-1015', 'White  Race']
    expected_findings: 0  # placeholder: awaits HANDOFF §4g spec routing

