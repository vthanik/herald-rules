id: HRL-SD-0252
version: 1
status: Published
standard: SDTM
category: Presence
sensitivity: Record
executability: Fully Executable
description: Trial Indication (INDIC) record must be populated in Trial Summary (TS)
  domain, when study type is 'INTERVENTIONAL'. It is required for SDTM IG v3.1.2 data
  and all more recent SDTM versions.
scope:
  classes:
    - TRIAL DESIGN
  domains:
    - TS
check:
  all:
    - name: TSPARMCD
      operator: variable_exists
      value: INDIC
outcome:
  message: Missing INDIC Trial Summary Parameter
  severity: Error
provenance:
  p21_id: SD1226
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: P21 Community SDTM-IG 3.2 (PMDA)

