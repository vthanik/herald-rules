id: HRL-SD-0466
version: 1
status: Published
standard: SDTM
category: Cross-reference
sensitivity: Record
executability: Partially Executable
description: Actual Arm Code (ACTARMCD) values should match entries in the Trial Arms
  (TA) dataset, except for subjects who failed screening ('SCRNFAIL'),  or were not
  fully assigned to an Arm ('NOTASSGN'),  or randomized but not treated ('NOTTRT'),
  or received non-planned treatment ('UNPLAN').
scope:
  classes:
    - FINDINGS
  domains:
    - SC
check:
  all:
    - name: ACTARMCD
      operator: not_equal_to
      value: NOTTRT
    - name: ACTARMCD
      operator: non_empty
outcome:
  message: Invalid value for ACTARMCD
  severity: Error
provenance:
  p21_id: SD2002
  core_id: ~
  cg_ids:
    - CG0124
    - CG0125
    - CG0512
  fda_ids: []
  source_doc: SDTM-IG v3.3

