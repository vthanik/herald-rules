id: AD0127A
version: 2
status: Reference
standard: ADaM
category: Conformance
sensitivity: Record
executability: Fully Executable
description: ABLFL is required if BASE or BASEC is present in the dataset.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
check:
  any:
    - all:
        - name: BASE
          operator: non_empty
        - name: ABLFL
          operator: empty
    - all:
        - name: BASEC
          operator: non_empty
        - name: ABLFL
          operator: empty
outcome:
  message: BASE or BASEC is present, but ABLFL is not present
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0127A
  pmda_category: Error
  ig_versions: []

