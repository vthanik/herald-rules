Core:
  Id: FDAV-SD1047
  Status: Reference
  Version: '1'
Description: Only one of Dose (--DOSE) or Dose Description (--DOSTXT) variables must
  be populated on the same record.
Check:
  all:
    - name: --DOSTXT
      operator: non_empty
    - name: --DOSE
      operator: non_empty
Outcome:
  Message: Both --DOSE and --DOSTXT values are populated
Rule Type: Record Data
Sensitivity: Record
