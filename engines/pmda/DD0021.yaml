id: DD0021
version: 1
status: Reference
standard: Define-XML
category: Define-XML
sensitivity: Record
executability: Not Executable
description: 'Allowable values of Standard Name are: Values from the STDNAM Codelist
  in Define-CT for Define-XML v2.1, ''SDTM-IG'', ''SEND-IG'', ''SEND-IG-AR'', ''SEND-IG-DART'',
  ''SEND-IG-GENETOX'', ''ADaM-IG'', or ''BIMO'' for Define-XML v2.0, or ''CDISC SDTM'',
  ''CDISC SEND'', or ''CDISC ADaM'' for Define-XML v1.0. Values must conform to this
  list of values. Note: Refer to the data standards catalog by the relevant Regulatory
  Agency for acceptance of standards and their versions.'
scope:
