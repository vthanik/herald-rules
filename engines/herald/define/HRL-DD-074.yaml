# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.13.1; 5.3.13.2
id: HRL-DD-074
version: 2
status: Published
standard: Define-XML
category: Codelist Definition
sensitivity: Record
executability: Fully Executable
description: >
  Term (CodedValue) is required for each codelist entry.
scope:
  classes: []
  domains: []
check:
  all:
    - name: term
      operator: non_empty
outcome:
  message: "Codelist Term (CodedValue) is missing. Each codelist entry must have a term value."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "5.3.13.1; 5.3.13.2"
  cited_guidance: >
    CodedValue -- Required. The coded value.

tests:
  - name: "HRL-DD-074 — compliant spec record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-074 — violating spec record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

