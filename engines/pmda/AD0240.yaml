id: AD0240
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: Within a study, all Actual Pooled Treatment y (TRTAGy) variable values
  must be the same for each unique value of Actual Pooled Treatment y (N) (TRTAGyN)
  variable when the primary variable TRTAGy is populated. Analogous rule for AD0237.
scope:
  classes: []
  domains:
    - BDS
    - ADAMOTHER
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for TRTAGy
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0240
  pmda_category: Error
  ig_versions: []

