id: HRL-SD-0048
version: 1
status: Published
standard: SDTM
category: Format
sensitivity: Value
executability: Fully Executable

description: >
  VISITNUM must be numeric when present. The visit number is a numeric field used for ordering visits and must not contain non-numeric values.

scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
  domains:
    []

check:
  all:
    - name: VISITNUM
      operator: is_numeric

outcome:
  message: "VISITNUM value '{VISITNUM}' is not numeric in {DOMAIN}"
  severity: Error

provenance:
  p21_id: SD0048
  core_id: CORE-000298
  cg_ids:
    - CG0048
  fda_ids:
    []
  source_doc: "SDTM-IG v3.3 Section 4.1.5"
