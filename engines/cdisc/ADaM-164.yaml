Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  If Baseline Toxicity Grade (BTOXGR) variable is present, then BTOXGR on the baseline record (ABLFL=Y) must equal ATOXGR on that same record.
                Document: ADaM IG v1.1
                Section: '3.3.7'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-164
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: ABLFL
      operator: equal_to
      value: 'Y'
    - name: BTOXGR
      operator: non_empty
    - name: ATOXGR
      operator: non_empty
    - name: BTOXGR
      operator: not_equal_to_variable
      value: ATOXGR
Core:
  Id: ADaM-164
  Status: Published
  Version: '1'
Description: >-
  On the baseline record (ABLFL=Y), BTOXGR must equal ATOXGR.
Executability: Fully Executable
Outcome:
  Message: 'ABLFL=Y but BTOXGR does not equal ATOXGR on baseline record'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "ABLFL=Y and BTOXGR=ATOXGR (correct)"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ABLFL, ATOXGR, BTOXGR]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Y", "1", "1"]
    expected_findings: 0
  - name: "ABLFL=Y but BTOXGR != ATOXGR (error)"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, ABLFL, ATOXGR, BTOXGR]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Y", "1", "2"]
    expected_findings: 1
