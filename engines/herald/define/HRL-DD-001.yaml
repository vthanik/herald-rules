id: HRL-DD-001
version: 1
status: Published
standard: Define-XML
category: Conformance
sensitivity: Study
executability: Reference
description: FDA's Clinical Trial Repository (CTR) software currently has a maximum
  length of 1000 characters for data attributes in Define.xml.
scope:
  classes: []
  domains: []
outcome:
  message: Invalid length of attributes in Define.xml
  severity: Error
provenance:
  source_doc: P21 ADaM Validation Rules v1.2 (Define-XML)
  authority: Herald
  p21_reference: DD0086

tests:
  - name: "HRL-DD-001 — nominal compliant record"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 0
  - name: "HRL-DD-001 — nominal violating record"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL]
        records:
          - ["CDISCPILOT01", "01-701-1015", "ALT", "25"]
    expected_findings: 1

notes: >
  Blocked on `define_attribute_length_le` operator (walks all text attributes in define.xml, flags any > 1000 chars). See HANDOFF section 4g.

