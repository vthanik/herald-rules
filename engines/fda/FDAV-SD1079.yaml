Core:
  Id: FDAV-SD1079
  Status: Reference
  Version: '1'
Description: 'Order of variables should reflect the order of the variables in the
  SDTM Model. Variables for the three general observation classes must be ordered
  with Identifiers first, followed by the Topic, Qualifier, and Timing variables.
  Within each role, variables must be ordered as shown in SDTM: Tables 2.2.1, 2.2.2,
  2.2.3, 2.2.4, and 2.2.5.'
Check:
  all:
    - name: $column_order_from_dataset
      operator: is_not_ordered_subset_of
      value: $column_order_from_library
Outcome:
  Message: Variable is in wrong order within domain
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: ''
Standard: SDTM
Publisher ID: CG0330, CG0664, 48
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
  - SENDIG 3.0
  - SENDIG 3.1
  - SENDIG 3.1.1
  - SENDIG-AR 1.0
  - SENDIG-DART 1.1
CORE Reference: CORE-000852
Executability: Fully Executable
Scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL

