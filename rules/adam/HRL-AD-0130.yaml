id: HRL-AD-0130
version: 1
status: Published
standard: ADaM
category: Consistency
sensitivity: Record
executability: Fully Executable
description: Within a study, All PARAMCD values must be the same for each unique value
  of PARAM when both PARAMCD and PARAM are populated.
scope:
  classes:
    - ADSL
    - BDS
    - OCCDS
  domains: []
check:
  all:
    - name: PARAMCD
      operator: non_empty
    - name: PARAM
      operator: non_empty
    - name: PARAMCD
      operator: all_values_equal
      group_by: STUDYID,PARAM
outcome:
  message: Inconsistent value for PARAMCD within a unique PARAM
  severity: Error
provenance:
  p21_id: AD0142
  core_id: ~
  cg_ids: []
  fda_ids: []
  source_doc: ADaM-IG v1.1

