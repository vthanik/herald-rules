id: HRL-SD-0385
version: 1
status: Published
standard: SDTM
category: Consistency
sensitivity: Record
executability: Partially Executable
description: Character Result/Finding in Std Format (--STRESC) should be populated
  when Last Observation Before Exposure Flag (--LOBXFL) is set to 'Y'.
scope:
  classes:
    - EVENTS
    - FINDINGS
    - INTERVENTIONS
    - SPECIAL-PURPOSE
    - TRIAL DESIGN
    - RELATIONSHIP
    - ASSOCIATED PERSONS
  domains: []
check:
  all:
    - name: --STRESC
      operator: non_empty
    - name: --LOBXFL
      operator: equal_to
      value: 'Y'
outcome:
  message: '%Domain%STRESC is null when %Domain%LOBXFL = ''Y'''
  severity: Error
provenance:
  p21_id: SD1372
  core_id: ~
  cg_ids:
    - CG0569
  fda_ids: []
  source_doc: SDTM-IG v3.3

