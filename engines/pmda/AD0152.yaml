id: AD0152
version: 2
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: If the record is flagged as the baseline (ABLFL = Y), then the baseline
  Value (BASE) must equal the Analysis Value (AVAL).
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
check:
  all:
    - name: ABLFL
      operator: equal_to
      value: 'Y'
    - name: AVAL
      operator: non_empty
    - name: BASE
      operator: non_empty
    - name: BASE
      operator: not_equal_to_variable
      value: AVAL
outcome:
  message: ABLFL = Y, but BASE != AVAL
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0152
  pmda_category: Error
  ig_versions: []

