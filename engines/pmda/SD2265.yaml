id: SD2265
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: 'TSVAL and TSVALCD values must be populated from the same record in MED-RT
  or NDF-RT (Note: Any version 2018-02-05 or earlier uses NDF-RT, and any version
  after is MED-RT).'
scope:
  classes: []
  domains: TS
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: TSVAL/TSVALCD value mismatch for PCLAS
  severity: Warning
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD2265
  pmda_category: Warning
  ig_versions: []

