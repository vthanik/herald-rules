id: DD0022
version: 1
status: Reference
standard: Define-XML
category: Define-XML
sensitivity: Record
executability: Not Executable
description: 'Standard Version must have a valid value for the given Standard Name.
  Allowed values are ''3.1.2'', ''3.1.3'', ''3.2'', ''3.3'', or ''3.4'' for SDTM-IG,
  ''3.0'', ''3.1'', or ''3.1.1'' for SEND-IG, ''1.0'' for SEND-IG-AR, ''1.1'' for
  SEND-IG-DART, ''1.0'' for SEND-IG-GENETOX, ''1.0'', ''1.1'', ''1.2'', or ''1.3''
  for ADaM-IG, and ''1.0'' for BIMO. Define-XML specification represents Standard
  Version as def:StandardVersion attribute on MetaDataVersion element. Note: Refer
  to the data standards catalog by the relevant Regulatory Agency for acceptance of
  standards and their versions.'
scope:
  classes: []
  domains: Reject
check: []
outcome:
  message: Invalid Standard Version value <value> for <standard>
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: DD0022
  pmda_category: X
  ig_versions: []

