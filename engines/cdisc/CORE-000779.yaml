    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited_Guidance: 'A fixed offset from the date provided by the variable
                  referenced in TDANCVAR. This is used when the timing of planned
                  cycles does not start on the exact day referenced in the variable
                  indicated in TDANCVAR. The value of this variable will be either
                  zero or a positive value and will be represented in ISO 8601 character
                  format.  '
