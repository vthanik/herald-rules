Check:
  all:
    - name: --STTPT
      operator: non_empty
    - name: --STTPT
      operator: is_complete_date
    - name: --DTC
      operator: exists
    - name: --STTPT
      operator: date_equal_to
      value: --DTC
    - name: --STRTPT
      operator: is_not_contained_by
      value:
        - BEFORE
        - COINCIDENT
        - UNKNOWN
Core:
  Id: CORE-000763
  Status: Published
  Version: '1'
Description: Trigger error when --STRTPT is not in ('BEFORE', 'COINCIDENT', 'UNKNOWN')
Executability: Partially Executable
Outcome:
  Message: --STTPT is equal to the date of collection or assessment but --STRTPT is
    not in ('BEFORE', 'COINCIDENT',  'UNKNOWN').
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ALL
  Use_Case: INDH, PROD
Sensitivity: Record
herald:
  source: CDISC Library API
  catalogs:
    - SDTMIG 3.2
    - SDTMIG 3.3
  fetched: '2026-04-03T12:15:16Z'

