Core:
  Id: FDAV-SD0053
  Status: Reference
  Version: '1'
Description: Description of Arm (ARM) must equal 'Not Assigned', when Arm Code (ARMCD)
  is 'NOTASSGN', and vice versa.
Check:
  all:
    - name: ARMCD
      operator: is_contained_by
      value:
        - SCRNFAIL
        - NOTASSGN
    - name: ARMCD
      operator: not_equal_to
      value: ACTARMCD
Outcome:
  Message: ARM is not 'Not Assigned', when ARMCD equals 'NOTASSGN', or vice versa
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: DM, TA
Standard: SDTM
Publisher ID: CG0129
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
CORE Reference: CORE-000377
Executability: Fully Executable
Scope:
  Classes:
    Include: SPECIAL PURPOSE
  Domains:
    Include: DM

