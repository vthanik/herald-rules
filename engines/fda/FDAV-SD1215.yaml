Core:
  Id: FDAV-SD1215
  Status: Reference
  Version: '1'
Description: TSVAL value must be either ISO 8601 format for time period (e.g. P80Y)
  or null, when TSPARMCD='AGEMAX'.
Check:
  all:
    - name: TSPARMCD
      operator: equal_to
      value: AGEMAX
    - name: TSVAL
      operator: non_empty
    - name: TSVAL
      negative: no
      operator: invalid_duration
Outcome:
  Message: Invalid TSVAL value for AGEMAX
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: TS
Standard: SDTM
Publisher ID: CG0270
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
CORE Reference: CORE-000294
Executability: Fully Executable
Scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include: TS
  Use_Case: INDH

