# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 4.3.2.1
id: DD0035
version: 1
status: Published
standard: Define-XML
category: Origin Metadata
sensitivity: Record
executability: Fully Executable
description: >
  SDTM Origin Source must be a valid value.
scope:
  classes: []
  domains: []
check:
  all:
    - name: purpose
      operator: equal_to
      value: Tabulation
    - name: source
      operator: not_empty
    - name: source
      operator: not_in
      value:
        - Subject
        - Investigator
        - Vendor
        - Sponsor
outcome:
  message: "SDTM Source value is not valid. Must be one of: Subject, Investigator, Vendor, Sponsor."
  severity: Error
provenance:
  source_doc: CDISC Define-XML v2.1 Specification
  authority: CDISC
  section: "4.3.2.1"
  cited_guidance: >
    Allowed Source Values for SDTM: Subject, Investigator, Vendor, Sponsor.
