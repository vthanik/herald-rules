Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  Within a study, all BASE values must be the same for each unique combination of USUBJID and PARAMCD. Baseline values should be consistent within a parameter for a subject.
                Document: ADaM IG v1.1
                Section: '3.3.5'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-128
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: BASE
      operator: consistent_within_subject
Core:
  Id: ADaM-128
  Status: Published
  Version: '1'
Description: >-
  BASE (Baseline Value) must be consistent across all records for the same subject and parameter. Multiple different BASE values for the same USUBJID and PARAMCD indicate an error.
Executability: Fully Executable
Outcome:
  Message: 'BASE has inconsistent values across records for the same subject and parameter'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "BASE consistent within USUBJID+PARAMCD"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVISIT, BASE]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Baseline", 140.0]
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Week 2", 140.0]
    expected_findings: 0
  - name: "BASE inconsistent within USUBJID+PARAMCD"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVISIT, BASE]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Baseline", 140.0]
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "Week 2", 145.0]
    expected_findings: 1
