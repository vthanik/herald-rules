Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited_Guidance: >-
                  At least one analysis value variable (AVAL or AVALC) must be present
                  in BDS datasets. The analysis value is the primary endpoint or
                  measurement for the BDS dataset.
                Document: ADaM IG v1.1
                Section: '3.3.3'
            Origin: ADaM IG Conformance Rules
            Rule_Identifier:
              Id: ADaM-198
              Version: '1'
            Version: '1.0'
        Version: '1.1'
Check:
  all:
    - name: AVAL
      operator: non_empty
    - name: AVALC
      operator: non_empty
Core:
  Id: ADaM-198
  Status: Published
  Version: '1'
Description: >-
  BDS datasets must contain at least one analysis value variable (AVAL for numeric
  or AVALC for character). If both AVAL and AVALC are null for a record, this may
  indicate missing analysis values.
Executability: Fully Executable
Outcome:
  Message: 'Neither AVAL nor AVALC is populated for this BDS record'
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - BDS
  Domains:
    Include:
      - ALL
Sensitivity: Record
herald:
  ig_versions: ["1.1", "1.2"]
  source: PMDA Validation Rules v6.0 (March 2025)
  catalogs:
    - ADaMIG 1.1
  fetched: '2026-04-12'

tests:
  - name: "AVAL is populated (analysis value present)"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL, AVALC]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", 140.0, ""]
    expected_findings: 0
  - name: "AVALC is populated (character analysis value present)"
    type: positive
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL, AVALC]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "", "NORMAL"]
    expected_findings: 0
  - name: "Both AVAL and AVALC are null"
    type: negative
    datasets:
      ADLB:
        variables: [STUDYID, USUBJID, PARAMCD, AVAL, AVALC]
        records:
          - ["CDISCPILOT01", "01-701-1015", "SODIUM", "", ""]
    expected_findings: 1
