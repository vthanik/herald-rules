Core:
  Id: FDAV-SD0064
  Status: Reference
  Version: '1'
Description: All Subjects (USUBJID) must be present in Demographics (DM) domain.
Check:
  all:
    - name: USUBJID
      operator: non_empty
    - name: USUBJID
      operator: is_not_contained_by
      value: $dm_usubjid
Outcome:
  Message: Subject is not present in DM domain
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: ''
Standard: SDTM
Publisher ID: CG0029, 109
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
  - SENDIG 3.0
  - SENDIG 3.1
  - SENDIG 3.1.1
  - SENDIG-AR 1.0
  - SENDIG-DART 1.1
CORE Reference: CORE-000201
Executability: Fully Executable
Scope:
  Classes:
    Include: ALL
  Domains:
    Exclude: AP--
  Use_Case: NONCLIN, INDH

