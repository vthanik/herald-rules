Core:
  Id: FDAV-SD2256
  Status: Reference
  Version: '1'
Description: TSVCDREF variable value must be 'UNII', when TSPARMCD='COMPTRT'.
Check:
  all:
    - any:
        - name: TSPARMCD
          operator: equal_to
          value: COMPTRT
        - name: TSPARMCD
          operator: equal_to
          value: CURTRT
        - name: TSPARMCD
          operator: equal_to
          value: TRT
    - name: TSVCDREF
      operator: not_equal_to
      value: UNII
Outcome:
  Message: Invalid TSVCDREF value for COMPTRT
Rule Type: Record Data
Sensitivity: Record
Authorities:
  - Organization: CDISC
Source: FDA Validator Rules v1.6
Domains: TS
Standard: SDTM
Publisher ID: CG0444
IG Versions:
  - SDTMIG 3.1.2
  - SDTMIG 3.1.3
  - SDTMIG 3.2
  - SDTMIG 3.3
CORE Reference: CORE-000735
Executability: Fully Executable
Scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include: TS

