Check:
  all:
    - name: DTHFL
      operator: equal_to
      value: 'Y'
      value_is_literal: yes
    - name: $ae_aeout
      operator: does_not_contain
      value: FATAL
      value_is_literal: yes
    - name: $ae_aesdth
      operator: does_not_contain
      value: 'Y'
      value_is_literal: yes
Core:
  Id: CORE-001078
  Status: Published
  Version: '1'
Description: When Death flag (DTHFL) in the DM dataset is populated as 'Y' then a
  record should be present in the AE dataset where AEOUT = 'FATAL' and AESDTH = 'Y'
  for the corresponding subject.
Executability: Fully Executable
Grouping_Variables:
  - USUBJID
Match_Datasets:
  - Keys:
      - USUBJID
    Name: DM
  - Keys:
      - USUBJID
    Name: AE
Operations:
  - domain: AE
    group:
      - USUBJID
    id: $ae_aeout
    name: AEOUT
    operator: distinct
  - domain: AE
    group:
      - USUBJID
    id: $ae_aesdth
    name: AESDTH
    operator: distinct
Outcome:
  Message: DTHFL in DM dataset is "Y" but a record is missing in AE dataset where
    AESDTH = "Y" and AEOUT = "FATAL".
  Output_Variables:
    - $ae_aeout
    - $ae_aesdth
    - DTHFL
    - USUBJID
Rule_Type: Record Data
Scope:
  Classes:
    Include:
      - EVENTS
  Domains:
    Include:
      - AE
Sensitivity: Group
herald:
  source: CDISC Library API
  catalogs:
    - SDTMIG 3.2
