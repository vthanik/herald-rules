# P21 Sheet validation against Define-XML v2.1 Specification
# Section: 5.3.15
id: DD0061
version: 1
status: Published
standard: Define-XML
category: Comment Definition
sensitivity: Record
executability: Fully Executable
description: >
  Comment Description is required.
scope:
  classes: []
  domains: []
check:
