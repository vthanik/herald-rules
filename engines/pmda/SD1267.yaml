id: SD1267
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Planned Order of Element within Arm (TAETORD) variable value must be
  an integer.
scope:
  Classes:
    Include: TRIAL DESIGN
  Domains:
    Include: TA
  Use_Case: INDH, NONCLIN
check:
  all:
    - name: TAETORD
      operator: not_matches_regex
      value: ^(-?[1-9]\d*|0)$
outcome:
  message: Invalid value for TAETORD
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: SD1267
  pmda_category: Error
  ig_versions: []
  core_reference: CORE-000534

