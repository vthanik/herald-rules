id: AD0124
version: 1
status: Reference
standard: ADaM
category: ADaM Conformance
sensitivity: Record
executability: Fully Executable
description: Within a study, all PARCATy values must be the same for each unique value
  of PARAMCD when PARAMCD is populated. A Parameter can only be categorized once.
  However, that Category can be used across PARAMs.
scope:
  classes: []
  domains:
    - BDS
    - ADNCA
    - MDBDS
check:
  all:
    - name: __variable__
      operator: consistent_within_subject
outcome:
  message: Inconsistent value for PARCATy within a unique PARAMCD
  severity: Error
provenance:
  source_doc: PMDA Validation Rules v6.0
  authority: PMDA
  rule_id: AD0124
  pmda_category: Error
  ig_versions: []

