id: SD1074
version: 1
status: Reference
standard: SDTM
category: SDTM Conformance
sensitivity: Record
executability: Fully Executable
description: Variables designed only for SEND pre-clinical studies must be not included
  in the SDTM dataset.
scope:
  Classes:
    Include: ALL
  Domains:
    Include: ALL
check:
